apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoecd7600f-bfe6-4e95-bb19-5073868885a4.fullname" . }}
  labels:
    {{- include "go-echoecd7600f-bfe6-4e95-bb19-5073868885a4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoecd7600f-bfe6-4e95-bb19-5073868885a4.selectorLabels" . | nindent 6 }}
