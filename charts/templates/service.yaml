apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc60d1f4d-23e0-4b38-94dd-82161dba5fb2.fullname" . }}
  labels:
    {{- include "go-echoc60d1f4d-23e0-4b38-94dd-82161dba5fb2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc60d1f4d-23e0-4b38-94dd-82161dba5fb2.selectorLabels" . | nindent 6 }}
