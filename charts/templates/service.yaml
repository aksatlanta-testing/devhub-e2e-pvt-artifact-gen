apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo093f74e6-1c96-4f8e-b841-ced0aeff38c4.fullname" . }}
  labels:
    {{- include "go-echo093f74e6-1c96-4f8e-b841-ced0aeff38c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo093f74e6-1c96-4f8e-b841-ced0aeff38c4.selectorLabels" . | nindent 6 }}
