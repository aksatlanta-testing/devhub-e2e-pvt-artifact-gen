apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob123e9b7-653c-4a3c-ba23-71de74570b39.fullname" . }}
  labels:
    {{- include "go-echob123e9b7-653c-4a3c-ba23-71de74570b39.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob123e9b7-653c-4a3c-ba23-71de74570b39.selectorLabels" . | nindent 6 }}
