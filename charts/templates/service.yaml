apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob7f5be9e-901d-484f-8910-0ae5cd8c6324.fullname" . }}
  labels:
    {{- include "go-echob7f5be9e-901d-484f-8910-0ae5cd8c6324.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob7f5be9e-901d-484f-8910-0ae5cd8c6324.selectorLabels" . | nindent 6 }}
