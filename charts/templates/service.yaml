apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod5472f32-9adf-4182-8a4c-3365a1a37fe0.fullname" . }}
  labels:
    {{- include "go-echod5472f32-9adf-4182-8a4c-3365a1a37fe0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod5472f32-9adf-4182-8a4c-3365a1a37fe0.selectorLabels" . | nindent 6 }}
