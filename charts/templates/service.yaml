apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo81eb3030-5556-4da1-b9f2-49fab401fccd.fullname" . }}
  labels:
    {{- include "go-echo81eb3030-5556-4da1-b9f2-49fab401fccd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo81eb3030-5556-4da1-b9f2-49fab401fccd.selectorLabels" . | nindent 6 }}
