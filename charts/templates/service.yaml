apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4568783b-97a9-4ac1-bfb7-7f2494cd9f6b.fullname" . }}
  labels:
    {{- include "go-echo4568783b-97a9-4ac1-bfb7-7f2494cd9f6b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4568783b-97a9-4ac1-bfb7-7f2494cd9f6b.selectorLabels" . | nindent 6 }}
