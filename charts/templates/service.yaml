apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaccf87d1-a5bd-4fe9-8904-f8b1d7938a05.fullname" . }}
  labels:
    {{- include "go-echoaccf87d1-a5bd-4fe9-8904-f8b1d7938a05.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaccf87d1-a5bd-4fe9-8904-f8b1d7938a05.selectorLabels" . | nindent 6 }}
