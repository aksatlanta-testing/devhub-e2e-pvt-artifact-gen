apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob9d6ebe2-7bc1-41ba-842a-825418068e7a.fullname" . }}
  labels:
    {{- include "go-echob9d6ebe2-7bc1-41ba-842a-825418068e7a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob9d6ebe2-7bc1-41ba-842a-825418068e7a.selectorLabels" . | nindent 6 }}
