apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7090846b-cb45-46d8-9164-6f6db82d427b.fullname" . }}
  labels:
    {{- include "go-echo7090846b-cb45-46d8-9164-6f6db82d427b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7090846b-cb45-46d8-9164-6f6db82d427b.selectorLabels" . | nindent 6 }}
