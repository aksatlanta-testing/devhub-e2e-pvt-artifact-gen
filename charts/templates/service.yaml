apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7ed9d817-db11-48f1-8fef-15874a513065.fullname" . }}
  labels:
    {{- include "go-echo7ed9d817-db11-48f1-8fef-15874a513065.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7ed9d817-db11-48f1-8fef-15874a513065.selectorLabels" . | nindent 6 }}
