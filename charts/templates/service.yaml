apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b5d5122-dea4-4e08-9796-c8f85adb0920.fullname" . }}
  labels:
    {{- include "go-echo0b5d5122-dea4-4e08-9796-c8f85adb0920.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b5d5122-dea4-4e08-9796-c8f85adb0920.selectorLabels" . | nindent 6 }}
