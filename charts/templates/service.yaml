apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo37046dfc-01c8-488d-a7e1-7ca7bb9dadd3.fullname" . }}
  labels:
    {{- include "go-echo37046dfc-01c8-488d-a7e1-7ca7bb9dadd3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo37046dfc-01c8-488d-a7e1-7ca7bb9dadd3.selectorLabels" . | nindent 6 }}
