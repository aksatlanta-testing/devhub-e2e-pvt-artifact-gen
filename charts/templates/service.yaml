apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof2d727f2-26d8-4356-a42a-f03dcd574688.fullname" . }}
  labels:
    {{- include "go-echof2d727f2-26d8-4356-a42a-f03dcd574688.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof2d727f2-26d8-4356-a42a-f03dcd574688.selectorLabels" . | nindent 6 }}
