apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3462517e-522c-419d-ada1-ff90d02f61da.fullname" . }}
  labels:
    {{- include "go-echo3462517e-522c-419d-ada1-ff90d02f61da.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3462517e-522c-419d-ada1-ff90d02f61da.selectorLabels" . | nindent 6 }}
