apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf7ee7de-4ab8-4375-99f0-b1405e0560b0.fullname" . }}
  labels:
    {{- include "go-echoaf7ee7de-4ab8-4375-99f0-b1405e0560b0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf7ee7de-4ab8-4375-99f0-b1405e0560b0.selectorLabels" . | nindent 6 }}
