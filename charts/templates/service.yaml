apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6fdfc1a5-e0d3-485f-aeb6-7193489a1614.fullname" . }}
  labels:
    {{- include "go-echo6fdfc1a5-e0d3-485f-aeb6-7193489a1614.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6fdfc1a5-e0d3-485f-aeb6-7193489a1614.selectorLabels" . | nindent 6 }}
