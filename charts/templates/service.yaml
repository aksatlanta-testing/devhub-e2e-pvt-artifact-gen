apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3feb8e39-ab67-40a1-a086-35dc5309a4b1.fullname" . }}
  labels:
    {{- include "go-echo3feb8e39-ab67-40a1-a086-35dc5309a4b1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3feb8e39-ab67-40a1-a086-35dc5309a4b1.selectorLabels" . | nindent 6 }}
