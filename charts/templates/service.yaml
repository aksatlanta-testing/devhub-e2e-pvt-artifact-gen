apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe2687035-5b42-4d37-8e9a-dc1371a5c93c.fullname" . }}
  labels:
    {{- include "go-echoe2687035-5b42-4d37-8e9a-dc1371a5c93c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe2687035-5b42-4d37-8e9a-dc1371a5c93c.selectorLabels" . | nindent 6 }}
