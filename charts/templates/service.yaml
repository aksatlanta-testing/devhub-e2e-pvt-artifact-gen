apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo87cc9e58-7ed0-4ef4-80dd-63e287ad98cc.fullname" . }}
  labels:
    {{- include "go-echo87cc9e58-7ed0-4ef4-80dd-63e287ad98cc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo87cc9e58-7ed0-4ef4-80dd-63e287ad98cc.selectorLabels" . | nindent 6 }}
