apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe916cb17-ad7f-42d7-b37f-3b3af988ce42.fullname" . }}
  labels:
    {{- include "go-echoe916cb17-ad7f-42d7-b37f-3b3af988ce42.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe916cb17-ad7f-42d7-b37f-3b3af988ce42.selectorLabels" . | nindent 6 }}
