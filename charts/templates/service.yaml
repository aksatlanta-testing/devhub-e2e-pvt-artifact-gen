apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo85c4f747-0cbe-44b9-a936-c81ec8eaa5e1.fullname" . }}
  labels:
    {{- include "go-echo85c4f747-0cbe-44b9-a936-c81ec8eaa5e1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo85c4f747-0cbe-44b9-a936-c81ec8eaa5e1.selectorLabels" . | nindent 6 }}
