apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof964a24c-bdae-4e7b-9f11-4e0c6b057d07.fullname" . }}
  labels:
    {{- include "go-echof964a24c-bdae-4e7b-9f11-4e0c6b057d07.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof964a24c-bdae-4e7b-9f11-4e0c6b057d07.selectorLabels" . | nindent 6 }}
