apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobdd66143-8ac7-4638-ad3f-d20aaa7ba1ea.fullname" . }}
  labels:
    {{- include "go-echobdd66143-8ac7-4638-ad3f-d20aaa7ba1ea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobdd66143-8ac7-4638-ad3f-d20aaa7ba1ea.selectorLabels" . | nindent 6 }}
