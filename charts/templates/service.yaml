apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo79799703-fd35-43db-bd3b-e8edeb57639b.fullname" . }}
  labels:
    {{- include "go-echo79799703-fd35-43db-bd3b-e8edeb57639b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo79799703-fd35-43db-bd3b-e8edeb57639b.selectorLabels" . | nindent 6 }}
