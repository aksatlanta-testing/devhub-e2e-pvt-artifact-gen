apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo38df9d24-89dd-49ad-8bc6-2485aa8d260b.fullname" . }}
  labels:
    {{- include "go-echo38df9d24-89dd-49ad-8bc6-2485aa8d260b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo38df9d24-89dd-49ad-8bc6-2485aa8d260b.selectorLabels" . | nindent 6 }}
