apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa87701f1-31c5-483a-8729-093985035af8.fullname" . }}
  labels:
    {{- include "go-echoa87701f1-31c5-483a-8729-093985035af8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa87701f1-31c5-483a-8729-093985035af8.selectorLabels" . | nindent 6 }}
