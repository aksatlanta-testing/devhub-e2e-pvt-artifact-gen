apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9705708f-050c-4bd3-b7fd-29702416e1e7.fullname" . }}
  labels:
    {{- include "go-echo9705708f-050c-4bd3-b7fd-29702416e1e7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9705708f-050c-4bd3-b7fd-29702416e1e7.selectorLabels" . | nindent 6 }}
