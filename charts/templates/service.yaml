apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1129b9ca-d4b8-45d7-bcd6-8bae71d9ce35.fullname" . }}
  labels:
    {{- include "go-echo1129b9ca-d4b8-45d7-bcd6-8bae71d9ce35.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1129b9ca-d4b8-45d7-bcd6-8bae71d9ce35.selectorLabels" . | nindent 6 }}
