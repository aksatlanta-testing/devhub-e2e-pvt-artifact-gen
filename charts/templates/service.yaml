apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod74f7977-102e-4dd8-a3da-16dbf084930f.fullname" . }}
  labels:
    {{- include "go-echod74f7977-102e-4dd8-a3da-16dbf084930f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod74f7977-102e-4dd8-a3da-16dbf084930f.selectorLabels" . | nindent 6 }}
