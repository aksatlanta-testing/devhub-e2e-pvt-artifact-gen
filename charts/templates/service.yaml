apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo51361b00-04c3-4666-a646-62702b2620cc.fullname" . }}
  labels:
    {{- include "go-echo51361b00-04c3-4666-a646-62702b2620cc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo51361b00-04c3-4666-a646-62702b2620cc.selectorLabels" . | nindent 6 }}
