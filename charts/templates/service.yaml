apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3a14c4a2-19c4-4916-b563-56d0d5c28abf.fullname" . }}
  labels:
    {{- include "go-echo3a14c4a2-19c4-4916-b563-56d0d5c28abf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3a14c4a2-19c4-4916-b563-56d0d5c28abf.selectorLabels" . | nindent 6 }}
