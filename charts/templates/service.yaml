apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7114fef3-7535-4659-a838-c08a5fedd32f.fullname" . }}
  labels:
    {{- include "go-echo7114fef3-7535-4659-a838-c08a5fedd32f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7114fef3-7535-4659-a838-c08a5fedd32f.selectorLabels" . | nindent 6 }}
