apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof22b38f5-4fb6-491e-a884-5e61e6a61aa4.fullname" . }}
  labels:
    {{- include "go-echof22b38f5-4fb6-491e-a884-5e61e6a61aa4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof22b38f5-4fb6-491e-a884-5e61e6a61aa4.selectorLabels" . | nindent 6 }}
