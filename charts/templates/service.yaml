apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof19ce562-56ba-4b97-9079-0dcbf3b46da2.fullname" . }}
  labels:
    {{- include "go-echof19ce562-56ba-4b97-9079-0dcbf3b46da2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof19ce562-56ba-4b97-9079-0dcbf3b46da2.selectorLabels" . | nindent 6 }}
