apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa9a3d501-4ede-46b4-ac26-ef0564577805.fullname" . }}
  labels:
    {{- include "go-echoa9a3d501-4ede-46b4-ac26-ef0564577805.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa9a3d501-4ede-46b4-ac26-ef0564577805.selectorLabels" . | nindent 6 }}
