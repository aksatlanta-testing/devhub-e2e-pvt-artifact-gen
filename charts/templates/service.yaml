apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod36becbb-1dee-4d5a-bda6-9d64ca2c1029.fullname" . }}
  labels:
    {{- include "go-echod36becbb-1dee-4d5a-bda6-9d64ca2c1029.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod36becbb-1dee-4d5a-bda6-9d64ca2c1029.selectorLabels" . | nindent 6 }}
