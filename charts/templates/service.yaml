apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3db3c910-1fa3-4ae3-8b7d-b301d6f4012d.fullname" . }}
  labels:
    {{- include "go-echo3db3c910-1fa3-4ae3-8b7d-b301d6f4012d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3db3c910-1fa3-4ae3-8b7d-b301d6f4012d.selectorLabels" . | nindent 6 }}
