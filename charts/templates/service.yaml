apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobcbeb705-e4fe-42e8-9602-419b9d1a8418.fullname" . }}
  labels:
    {{- include "go-echobcbeb705-e4fe-42e8-9602-419b9d1a8418.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobcbeb705-e4fe-42e8-9602-419b9d1a8418.selectorLabels" . | nindent 6 }}
