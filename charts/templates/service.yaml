apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc217be78-83b8-4a4e-a3a2-cde7dff8696c.fullname" . }}
  labels:
    {{- include "go-echoc217be78-83b8-4a4e-a3a2-cde7dff8696c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc217be78-83b8-4a4e-a3a2-cde7dff8696c.selectorLabels" . | nindent 6 }}
