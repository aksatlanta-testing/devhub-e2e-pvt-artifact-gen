apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8a6b46cb-96ed-49b7-a86e-2d8b2ed5b212.fullname" . }}
  labels:
    {{- include "go-echo8a6b46cb-96ed-49b7-a86e-2d8b2ed5b212.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8a6b46cb-96ed-49b7-a86e-2d8b2ed5b212.selectorLabels" . | nindent 6 }}
