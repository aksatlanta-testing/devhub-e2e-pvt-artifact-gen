apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoefd61f74-c420-4cb0-81ce-5637612bd255.fullname" . }}
  labels:
    {{- include "go-echoefd61f74-c420-4cb0-81ce-5637612bd255.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoefd61f74-c420-4cb0-81ce-5637612bd255.selectorLabels" . | nindent 6 }}
