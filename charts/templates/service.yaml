apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo34fbc0db-2c9e-4c14-a966-1197a68b9af6.fullname" . }}
  labels:
    {{- include "go-echo34fbc0db-2c9e-4c14-a966-1197a68b9af6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo34fbc0db-2c9e-4c14-a966-1197a68b9af6.selectorLabels" . | nindent 6 }}
