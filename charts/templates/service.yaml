apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo275f9b5a-c7ac-4837-b62f-f4449e598c97.fullname" . }}
  labels:
    {{- include "go-echo275f9b5a-c7ac-4837-b62f-f4449e598c97.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo275f9b5a-c7ac-4837-b62f-f4449e598c97.selectorLabels" . | nindent 6 }}
