apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo545c37a3-7768-4bef-8c1a-714f41686dd4.fullname" . }}
  labels:
    {{- include "go-echo545c37a3-7768-4bef-8c1a-714f41686dd4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo545c37a3-7768-4bef-8c1a-714f41686dd4.selectorLabels" . | nindent 6 }}
