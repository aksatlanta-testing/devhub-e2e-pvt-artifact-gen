apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoac6cc148-b474-4f7d-9767-2261203a33f3.fullname" . }}
  labels:
    {{- include "go-echoac6cc148-b474-4f7d-9767-2261203a33f3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoac6cc148-b474-4f7d-9767-2261203a33f3.selectorLabels" . | nindent 6 }}
