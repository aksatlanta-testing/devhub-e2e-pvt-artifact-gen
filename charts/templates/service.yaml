apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo931a1cfe-1601-4211-bd04-1f859ae70b33.fullname" . }}
  labels:
    {{- include "go-echo931a1cfe-1601-4211-bd04-1f859ae70b33.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo931a1cfe-1601-4211-bd04-1f859ae70b33.selectorLabels" . | nindent 6 }}
