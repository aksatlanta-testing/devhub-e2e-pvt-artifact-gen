apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4a09b716-10c9-4451-973e-2cb5bf3a276c.fullname" . }}
  labels:
    {{- include "go-echo4a09b716-10c9-4451-973e-2cb5bf3a276c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4a09b716-10c9-4451-973e-2cb5bf3a276c.selectorLabels" . | nindent 6 }}
