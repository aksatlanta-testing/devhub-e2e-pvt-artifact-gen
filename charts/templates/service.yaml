apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4b726b5c-27da-473c-9ec3-5fce92d6f649.fullname" . }}
  labels:
    {{- include "go-echo4b726b5c-27da-473c-9ec3-5fce92d6f649.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4b726b5c-27da-473c-9ec3-5fce92d6f649.selectorLabels" . | nindent 6 }}
