apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8e79e4a0-bf6f-4113-8c55-aebd79124378.fullname" . }}
  labels:
    {{- include "go-echo8e79e4a0-bf6f-4113-8c55-aebd79124378.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8e79e4a0-bf6f-4113-8c55-aebd79124378.selectorLabels" . | nindent 6 }}
