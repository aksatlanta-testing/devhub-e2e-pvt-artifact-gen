apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7189ef9b-cd12-4a1e-83e1-c624d82536cf.fullname" . }}
  labels:
    {{- include "go-echo7189ef9b-cd12-4a1e-83e1-c624d82536cf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7189ef9b-cd12-4a1e-83e1-c624d82536cf.selectorLabels" . | nindent 6 }}
