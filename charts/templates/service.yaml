apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b7a11c5-c2e7-471d-aafa-830c412b65d6.fullname" . }}
  labels:
    {{- include "go-echo0b7a11c5-c2e7-471d-aafa-830c412b65d6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b7a11c5-c2e7-471d-aafa-830c412b65d6.selectorLabels" . | nindent 6 }}
