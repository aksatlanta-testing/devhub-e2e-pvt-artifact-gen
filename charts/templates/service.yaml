apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6e49b699-1c0e-4b89-b5f7-7c6fde98503c.fullname" . }}
  labels:
    {{- include "go-echo6e49b699-1c0e-4b89-b5f7-7c6fde98503c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6e49b699-1c0e-4b89-b5f7-7c6fde98503c.selectorLabels" . | nindent 6 }}
