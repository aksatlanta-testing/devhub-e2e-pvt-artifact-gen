apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1b794458-e4ec-4b3e-808e-fc33f5956fe5.fullname" . }}
  labels:
    {{- include "go-echo1b794458-e4ec-4b3e-808e-fc33f5956fe5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1b794458-e4ec-4b3e-808e-fc33f5956fe5.selectorLabels" . | nindent 6 }}
