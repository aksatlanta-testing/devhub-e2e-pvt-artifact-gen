apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof3d0f25c-4816-4b7a-84df-6798f96458d2.fullname" . }}
  labels:
    {{- include "go-echof3d0f25c-4816-4b7a-84df-6798f96458d2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof3d0f25c-4816-4b7a-84df-6798f96458d2.selectorLabels" . | nindent 6 }}
