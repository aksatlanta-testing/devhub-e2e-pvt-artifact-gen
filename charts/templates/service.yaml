apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod40b969f-7eb7-4536-aada-aa5ec8bbda49.fullname" . }}
  labels:
    {{- include "go-echod40b969f-7eb7-4536-aada-aa5ec8bbda49.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod40b969f-7eb7-4536-aada-aa5ec8bbda49.selectorLabels" . | nindent 6 }}
