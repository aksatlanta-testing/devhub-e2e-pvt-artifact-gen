apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo950499f4-69be-412d-8790-4a50290ec9ec.fullname" . }}
  labels:
    {{- include "go-echo950499f4-69be-412d-8790-4a50290ec9ec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo950499f4-69be-412d-8790-4a50290ec9ec.selectorLabels" . | nindent 6 }}
