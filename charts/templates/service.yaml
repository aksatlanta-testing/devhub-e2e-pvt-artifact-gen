apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo80c30933-afb4-4ec1-bdbf-546a2893fd0d.fullname" . }}
  labels:
    {{- include "go-echo80c30933-afb4-4ec1-bdbf-546a2893fd0d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo80c30933-afb4-4ec1-bdbf-546a2893fd0d.selectorLabels" . | nindent 6 }}
