apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8e4f6319-d338-4069-8bd8-20308a054193.fullname" . }}
  labels:
    {{- include "go-echo8e4f6319-d338-4069-8bd8-20308a054193.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8e4f6319-d338-4069-8bd8-20308a054193.selectorLabels" . | nindent 6 }}
