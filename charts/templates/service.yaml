apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo88c72a7a-e1cd-4b45-bfaa-17e9317610c7.fullname" . }}
  labels:
    {{- include "go-echo88c72a7a-e1cd-4b45-bfaa-17e9317610c7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo88c72a7a-e1cd-4b45-bfaa-17e9317610c7.selectorLabels" . | nindent 6 }}
