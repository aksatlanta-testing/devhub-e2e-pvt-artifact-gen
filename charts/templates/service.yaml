apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo58f4f2a6-b7be-4f9d-8b28-f4c1c72a6d03.fullname" . }}
  labels:
    {{- include "go-echo58f4f2a6-b7be-4f9d-8b28-f4c1c72a6d03.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo58f4f2a6-b7be-4f9d-8b28-f4c1c72a6d03.selectorLabels" . | nindent 6 }}
