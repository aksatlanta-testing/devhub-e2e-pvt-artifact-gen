apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo14cf4f3b-baba-40fb-8f71-672fc796038b.fullname" . }}
  labels:
    {{- include "go-echo14cf4f3b-baba-40fb-8f71-672fc796038b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo14cf4f3b-baba-40fb-8f71-672fc796038b.selectorLabels" . | nindent 6 }}
