apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0d402b8c-c260-4a51-9c77-2dad33939955.fullname" . }}
  labels:
    {{- include "go-echo0d402b8c-c260-4a51-9c77-2dad33939955.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0d402b8c-c260-4a51-9c77-2dad33939955.selectorLabels" . | nindent 6 }}
