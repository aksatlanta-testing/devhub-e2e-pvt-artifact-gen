apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo87c8cd68-32dc-4dc0-bf85-8ed42bc352e5.fullname" . }}
  labels:
    {{- include "go-echo87c8cd68-32dc-4dc0-bf85-8ed42bc352e5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo87c8cd68-32dc-4dc0-bf85-8ed42bc352e5.selectorLabels" . | nindent 6 }}
