apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo803254db-a1c3-4cd1-aefd-3c2f8d5164c5.fullname" . }}
  labels:
    {{- include "go-echo803254db-a1c3-4cd1-aefd-3c2f8d5164c5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo803254db-a1c3-4cd1-aefd-3c2f8d5164c5.selectorLabels" . | nindent 6 }}
