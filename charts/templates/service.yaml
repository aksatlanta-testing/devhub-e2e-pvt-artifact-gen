apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd6b67ff-e774-4dd9-bd91-cc1685bffe8d.fullname" . }}
  labels:
    {{- include "go-echobd6b67ff-e774-4dd9-bd91-cc1685bffe8d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd6b67ff-e774-4dd9-bd91-cc1685bffe8d.selectorLabels" . | nindent 6 }}
