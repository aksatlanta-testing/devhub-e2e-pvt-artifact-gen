apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob307f370-e8c6-4bed-a43e-fb24175e01e4.fullname" . }}
  labels:
    {{- include "go-echob307f370-e8c6-4bed-a43e-fb24175e01e4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob307f370-e8c6-4bed-a43e-fb24175e01e4.selectorLabels" . | nindent 6 }}
