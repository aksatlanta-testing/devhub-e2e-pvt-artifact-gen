apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo182b94c3-289e-41fc-a621-ae1125b31615.fullname" . }}
  labels:
    {{- include "go-echo182b94c3-289e-41fc-a621-ae1125b31615.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo182b94c3-289e-41fc-a621-ae1125b31615.selectorLabels" . | nindent 6 }}
