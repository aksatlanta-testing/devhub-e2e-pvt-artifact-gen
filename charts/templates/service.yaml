apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7265a6f2-bdae-410e-8f77-01cd3e7e4780.fullname" . }}
  labels:
    {{- include "go-echo7265a6f2-bdae-410e-8f77-01cd3e7e4780.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7265a6f2-bdae-410e-8f77-01cd3e7e4780.selectorLabels" . | nindent 6 }}
