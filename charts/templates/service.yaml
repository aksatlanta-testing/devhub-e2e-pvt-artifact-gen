apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa25b5ff0-e51c-4975-89f2-48d3661899ec.fullname" . }}
  labels:
    {{- include "go-echoa25b5ff0-e51c-4975-89f2-48d3661899ec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa25b5ff0-e51c-4975-89f2-48d3661899ec.selectorLabels" . | nindent 6 }}
