apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo55c66926-257e-404c-86ea-bedba58a1c32.fullname" . }}
  labels:
    {{- include "go-echo55c66926-257e-404c-86ea-bedba58a1c32.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo55c66926-257e-404c-86ea-bedba58a1c32.selectorLabels" . | nindent 6 }}
