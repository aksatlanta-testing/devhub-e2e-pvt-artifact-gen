apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo75044195-f97a-4afb-aa2c-c2d485767c24.fullname" . }}
  labels:
    {{- include "go-echo75044195-f97a-4afb-aa2c-c2d485767c24.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo75044195-f97a-4afb-aa2c-c2d485767c24.selectorLabels" . | nindent 6 }}
