apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa75cca86-567f-4469-9df1-dbec3c12bc7e.fullname" . }}
  labels:
    {{- include "go-echoa75cca86-567f-4469-9df1-dbec3c12bc7e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa75cca86-567f-4469-9df1-dbec3c12bc7e.selectorLabels" . | nindent 6 }}
