apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5823c86a-a753-4222-8703-f05b2fd9306d.fullname" . }}
  labels:
    {{- include "go-echo5823c86a-a753-4222-8703-f05b2fd9306d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5823c86a-a753-4222-8703-f05b2fd9306d.selectorLabels" . | nindent 6 }}
