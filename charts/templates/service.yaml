apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1d4347e0-9fcd-46a7-9be5-284531aec3bc.fullname" . }}
  labels:
    {{- include "go-echo1d4347e0-9fcd-46a7-9be5-284531aec3bc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1d4347e0-9fcd-46a7-9be5-284531aec3bc.selectorLabels" . | nindent 6 }}
