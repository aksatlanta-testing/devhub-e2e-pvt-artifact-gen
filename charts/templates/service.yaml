apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc9cfa7b0-80e7-4d7b-85f1-431dcb663e50.fullname" . }}
  labels:
    {{- include "go-echoc9cfa7b0-80e7-4d7b-85f1-431dcb663e50.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc9cfa7b0-80e7-4d7b-85f1-431dcb663e50.selectorLabels" . | nindent 6 }}
