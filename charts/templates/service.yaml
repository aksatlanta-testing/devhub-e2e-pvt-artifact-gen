apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo289b96de-886b-4019-96a9-546ec82cfde0.fullname" . }}
  labels:
    {{- include "go-echo289b96de-886b-4019-96a9-546ec82cfde0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo289b96de-886b-4019-96a9-546ec82cfde0.selectorLabels" . | nindent 6 }}
