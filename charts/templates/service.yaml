apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e051e72-d30d-46ef-b93b-f4e672b613e1.fullname" . }}
  labels:
    {{- include "go-echo0e051e72-d30d-46ef-b93b-f4e672b613e1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e051e72-d30d-46ef-b93b-f4e672b613e1.selectorLabels" . | nindent 6 }}
