apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4971ecf-2917-4b04-b063-29576b1af019.fullname" . }}
  labels:
    {{- include "go-echoc4971ecf-2917-4b04-b063-29576b1af019.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4971ecf-2917-4b04-b063-29576b1af019.selectorLabels" . | nindent 6 }}
