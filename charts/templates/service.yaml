apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2e87d72d-7956-479b-9106-5be127190af7.fullname" . }}
  labels:
    {{- include "go-echo2e87d72d-7956-479b-9106-5be127190af7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2e87d72d-7956-479b-9106-5be127190af7.selectorLabels" . | nindent 6 }}
