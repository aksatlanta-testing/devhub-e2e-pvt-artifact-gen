apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo769c1ba6-9dd2-485d-b1e2-f482f9ab4438.fullname" . }}
  labels:
    {{- include "go-echo769c1ba6-9dd2-485d-b1e2-f482f9ab4438.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo769c1ba6-9dd2-485d-b1e2-f482f9ab4438.selectorLabels" . | nindent 6 }}
