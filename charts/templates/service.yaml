apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoee6cd6a0-a85f-4511-a21c-5914f5593906.fullname" . }}
  labels:
    {{- include "go-echoee6cd6a0-a85f-4511-a21c-5914f5593906.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoee6cd6a0-a85f-4511-a21c-5914f5593906.selectorLabels" . | nindent 6 }}
