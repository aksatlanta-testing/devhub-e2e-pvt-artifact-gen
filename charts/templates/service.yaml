apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo936ee8a4-819c-4933-8b57-0a2ce224aac5.fullname" . }}
  labels:
    {{- include "go-echo936ee8a4-819c-4933-8b57-0a2ce224aac5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo936ee8a4-819c-4933-8b57-0a2ce224aac5.selectorLabels" . | nindent 6 }}
