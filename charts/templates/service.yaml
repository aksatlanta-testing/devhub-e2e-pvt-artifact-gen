apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo21329e7d-5dd9-4bb9-9fce-928592ddbdc2.fullname" . }}
  labels:
    {{- include "go-echo21329e7d-5dd9-4bb9-9fce-928592ddbdc2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo21329e7d-5dd9-4bb9-9fce-928592ddbdc2.selectorLabels" . | nindent 6 }}
