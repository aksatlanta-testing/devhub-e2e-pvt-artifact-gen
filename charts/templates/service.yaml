apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo37afe6d1-7344-4bde-bebd-f350ca9bc694.fullname" . }}
  labels:
    {{- include "go-echo37afe6d1-7344-4bde-bebd-f350ca9bc694.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo37afe6d1-7344-4bde-bebd-f350ca9bc694.selectorLabels" . | nindent 6 }}
