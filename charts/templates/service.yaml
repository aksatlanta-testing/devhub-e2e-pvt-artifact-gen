apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe8e25af3-859e-4abe-93ac-a44bd69a9fe0.fullname" . }}
  labels:
    {{- include "go-echoe8e25af3-859e-4abe-93ac-a44bd69a9fe0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe8e25af3-859e-4abe-93ac-a44bd69a9fe0.selectorLabels" . | nindent 6 }}
