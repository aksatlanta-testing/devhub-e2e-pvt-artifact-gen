apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1f4ff277-08df-4849-b4b1-bc0c14d7115a.fullname" . }}
  labels:
    {{- include "go-echo1f4ff277-08df-4849-b4b1-bc0c14d7115a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1f4ff277-08df-4849-b4b1-bc0c14d7115a.selectorLabels" . | nindent 6 }}
