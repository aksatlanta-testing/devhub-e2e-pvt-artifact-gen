apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa306ce52-65f8-4b4e-9b91-f9f913df3493.fullname" . }}
  labels:
    {{- include "go-echoa306ce52-65f8-4b4e-9b91-f9f913df3493.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa306ce52-65f8-4b4e-9b91-f9f913df3493.selectorLabels" . | nindent 6 }}
