apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocd84368c-7952-48b4-bccc-21d3f38b721c.fullname" . }}
  labels:
    {{- include "go-echocd84368c-7952-48b4-bccc-21d3f38b721c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocd84368c-7952-48b4-bccc-21d3f38b721c.selectorLabels" . | nindent 6 }}
