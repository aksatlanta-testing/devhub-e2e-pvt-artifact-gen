apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9163cb5a-4aaf-4947-899b-d62139c6268c.fullname" . }}
  labels:
    {{- include "go-echo9163cb5a-4aaf-4947-899b-d62139c6268c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9163cb5a-4aaf-4947-899b-d62139c6268c.selectorLabels" . | nindent 6 }}
