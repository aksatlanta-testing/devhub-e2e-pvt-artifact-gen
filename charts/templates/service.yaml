apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo31403558-c224-4f6f-a26d-3c0d0eeea347.fullname" . }}
  labels:
    {{- include "go-echo31403558-c224-4f6f-a26d-3c0d0eeea347.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo31403558-c224-4f6f-a26d-3c0d0eeea347.selectorLabels" . | nindent 6 }}
