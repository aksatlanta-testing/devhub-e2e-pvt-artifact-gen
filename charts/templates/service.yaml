apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo53bef432-b467-4210-a52b-2faa7d224c50.fullname" . }}
  labels:
    {{- include "go-echo53bef432-b467-4210-a52b-2faa7d224c50.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo53bef432-b467-4210-a52b-2faa7d224c50.selectorLabels" . | nindent 6 }}
