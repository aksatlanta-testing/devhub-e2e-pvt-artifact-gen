apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1487e521-f2d9-43b7-825e-2ef9279f1510.fullname" . }}
  labels:
    {{- include "go-echo1487e521-f2d9-43b7-825e-2ef9279f1510.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1487e521-f2d9-43b7-825e-2ef9279f1510.selectorLabels" . | nindent 6 }}
