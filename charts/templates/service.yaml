apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc904c891-3c08-4edf-aae4-928f9f3f3e52.fullname" . }}
  labels:
    {{- include "go-echoc904c891-3c08-4edf-aae4-928f9f3f3e52.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc904c891-3c08-4edf-aae4-928f9f3f3e52.selectorLabels" . | nindent 6 }}
