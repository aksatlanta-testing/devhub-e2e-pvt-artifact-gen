apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob5c1cdd2-e558-4d45-8e56-1cb6f3682c34.fullname" . }}
  labels:
    {{- include "go-echob5c1cdd2-e558-4d45-8e56-1cb6f3682c34.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob5c1cdd2-e558-4d45-8e56-1cb6f3682c34.selectorLabels" . | nindent 6 }}
