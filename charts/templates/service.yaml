apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3e674d0c-77a2-4e63-9bdd-849365fcf48a.fullname" . }}
  labels:
    {{- include "go-echo3e674d0c-77a2-4e63-9bdd-849365fcf48a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3e674d0c-77a2-4e63-9bdd-849365fcf48a.selectorLabels" . | nindent 6 }}
