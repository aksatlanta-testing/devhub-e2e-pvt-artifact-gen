apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoef781566-721c-4cb6-9480-c9d57bc2615f.fullname" . }}
  labels:
    {{- include "go-echoef781566-721c-4cb6-9480-c9d57bc2615f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoef781566-721c-4cb6-9480-c9d57bc2615f.selectorLabels" . | nindent 6 }}
