apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob4db56f3-e719-4e27-a96b-284201c761e0.fullname" . }}
  labels:
    {{- include "go-echob4db56f3-e719-4e27-a96b-284201c761e0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob4db56f3-e719-4e27-a96b-284201c761e0.selectorLabels" . | nindent 6 }}
