apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo692fd0c7-5d9e-427f-9142-7576a7927602.fullname" . }}
  labels:
    {{- include "go-echo692fd0c7-5d9e-427f-9142-7576a7927602.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo692fd0c7-5d9e-427f-9142-7576a7927602.selectorLabels" . | nindent 6 }}
