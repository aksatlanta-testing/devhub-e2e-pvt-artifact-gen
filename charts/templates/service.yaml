apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoadd960a0-72d4-4644-bd7b-9d26f9ea9d14.fullname" . }}
  labels:
    {{- include "go-echoadd960a0-72d4-4644-bd7b-9d26f9ea9d14.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoadd960a0-72d4-4644-bd7b-9d26f9ea9d14.selectorLabels" . | nindent 6 }}
