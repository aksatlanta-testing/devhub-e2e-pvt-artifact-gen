apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaaa43053-12d9-4b17-bac4-71c2918bf45e.fullname" . }}
  labels:
    {{- include "go-echoaaa43053-12d9-4b17-bac4-71c2918bf45e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaaa43053-12d9-4b17-bac4-71c2918bf45e.selectorLabels" . | nindent 6 }}
