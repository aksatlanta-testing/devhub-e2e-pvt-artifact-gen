apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoffd5b6b1-f33e-457e-b150-33f28c402741.fullname" . }}
  labels:
    {{- include "go-echoffd5b6b1-f33e-457e-b150-33f28c402741.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoffd5b6b1-f33e-457e-b150-33f28c402741.selectorLabels" . | nindent 6 }}
