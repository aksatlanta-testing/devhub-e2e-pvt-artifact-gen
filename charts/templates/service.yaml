apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo82c6d78c-f4d3-4c04-aa58-d475e2af6aa1.fullname" . }}
  labels:
    {{- include "go-echo82c6d78c-f4d3-4c04-aa58-d475e2af6aa1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo82c6d78c-f4d3-4c04-aa58-d475e2af6aa1.selectorLabels" . | nindent 6 }}
