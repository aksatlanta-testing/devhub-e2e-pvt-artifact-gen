apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoab511798-8181-48fc-81af-3a2247f76760.fullname" . }}
  labels:
    {{- include "go-echoab511798-8181-48fc-81af-3a2247f76760.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoab511798-8181-48fc-81af-3a2247f76760.selectorLabels" . | nindent 6 }}
