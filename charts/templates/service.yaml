apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf8babe2-1f6b-489e-8aba-3ba2698b0ae4.fullname" . }}
  labels:
    {{- include "go-echoaf8babe2-1f6b-489e-8aba-3ba2698b0ae4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf8babe2-1f6b-489e-8aba-3ba2698b0ae4.selectorLabels" . | nindent 6 }}
