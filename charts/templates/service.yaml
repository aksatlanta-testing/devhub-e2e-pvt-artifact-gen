apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo41904e97-b2d5-4eef-9c9c-c00f5831419c.fullname" . }}
  labels:
    {{- include "go-echo41904e97-b2d5-4eef-9c9c-c00f5831419c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo41904e97-b2d5-4eef-9c9c-c00f5831419c.selectorLabels" . | nindent 6 }}
