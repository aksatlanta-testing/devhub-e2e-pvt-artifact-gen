apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo71f12660-d4d2-453b-9dea-e45a879e4306.fullname" . }}
  labels:
    {{- include "go-echo71f12660-d4d2-453b-9dea-e45a879e4306.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo71f12660-d4d2-453b-9dea-e45a879e4306.selectorLabels" . | nindent 6 }}
