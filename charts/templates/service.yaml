apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod941e20b-a73a-4d13-960b-1d2980ae9c16.fullname" . }}
  labels:
    {{- include "go-echod941e20b-a73a-4d13-960b-1d2980ae9c16.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod941e20b-a73a-4d13-960b-1d2980ae9c16.selectorLabels" . | nindent 6 }}
