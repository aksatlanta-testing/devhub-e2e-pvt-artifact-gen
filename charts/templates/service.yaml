apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod6f04044-d336-42b5-b247-7afe0cc6418b.fullname" . }}
  labels:
    {{- include "go-echod6f04044-d336-42b5-b247-7afe0cc6418b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod6f04044-d336-42b5-b247-7afe0cc6418b.selectorLabels" . | nindent 6 }}
