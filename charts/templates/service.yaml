apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo70f2c6bd-a4dc-4555-b78e-1b2c58cbcc09.fullname" . }}
  labels:
    {{- include "go-echo70f2c6bd-a4dc-4555-b78e-1b2c58cbcc09.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo70f2c6bd-a4dc-4555-b78e-1b2c58cbcc09.selectorLabels" . | nindent 6 }}
