apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoecef4cef-7657-40ab-b0d4-844b90f7c9ee.fullname" . }}
  labels:
    {{- include "go-echoecef4cef-7657-40ab-b0d4-844b90f7c9ee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoecef4cef-7657-40ab-b0d4-844b90f7c9ee.selectorLabels" . | nindent 6 }}
