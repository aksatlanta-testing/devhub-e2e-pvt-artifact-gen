apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6a93599e-34e6-41d2-a5ac-cd19b1d5edb1.fullname" . }}
  labels:
    {{- include "go-echo6a93599e-34e6-41d2-a5ac-cd19b1d5edb1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6a93599e-34e6-41d2-a5ac-cd19b1d5edb1.selectorLabels" . | nindent 6 }}
