apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe0b87973-4d45-42ff-8aa5-3e87ec3e8891.fullname" . }}
  labels:
    {{- include "go-echoe0b87973-4d45-42ff-8aa5-3e87ec3e8891.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe0b87973-4d45-42ff-8aa5-3e87ec3e8891.selectorLabels" . | nindent 6 }}
