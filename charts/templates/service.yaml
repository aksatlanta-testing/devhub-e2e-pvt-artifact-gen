apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo679191f2-0a51-425f-a62a-c9e9a6405c00.fullname" . }}
  labels:
    {{- include "go-echo679191f2-0a51-425f-a62a-c9e9a6405c00.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo679191f2-0a51-425f-a62a-c9e9a6405c00.selectorLabels" . | nindent 6 }}
