apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob27902f3-1711-4c1c-8ccd-45bda52c292e.fullname" . }}
  labels:
    {{- include "go-echob27902f3-1711-4c1c-8ccd-45bda52c292e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob27902f3-1711-4c1c-8ccd-45bda52c292e.selectorLabels" . | nindent 6 }}
