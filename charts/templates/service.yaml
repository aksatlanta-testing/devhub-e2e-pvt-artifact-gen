apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0eed1675-021f-4d83-8d90-274a9f61c8f7.fullname" . }}
  labels:
    {{- include "go-echo0eed1675-021f-4d83-8d90-274a9f61c8f7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0eed1675-021f-4d83-8d90-274a9f61c8f7.selectorLabels" . | nindent 6 }}
