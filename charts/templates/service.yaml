apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoff203208-6f0a-48f4-9312-39a05ea635ac.fullname" . }}
  labels:
    {{- include "go-echoff203208-6f0a-48f4-9312-39a05ea635ac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoff203208-6f0a-48f4-9312-39a05ea635ac.selectorLabels" . | nindent 6 }}
