apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo01858cbe-5e5a-4536-82c3-9b2818851dca.fullname" . }}
  labels:
    {{- include "go-echo01858cbe-5e5a-4536-82c3-9b2818851dca.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo01858cbe-5e5a-4536-82c3-9b2818851dca.selectorLabels" . | nindent 6 }}
