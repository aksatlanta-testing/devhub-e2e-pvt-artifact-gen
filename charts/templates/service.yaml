apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4e98e9af-35ad-4f6d-886a-a5b7f25c701a.fullname" . }}
  labels:
    {{- include "go-echo4e98e9af-35ad-4f6d-886a-a5b7f25c701a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4e98e9af-35ad-4f6d-886a-a5b7f25c701a.selectorLabels" . | nindent 6 }}
