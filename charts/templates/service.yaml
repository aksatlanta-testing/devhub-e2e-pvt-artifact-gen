apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e066db1-fa33-46f5-a6ef-9e3f4fa47693.fullname" . }}
  labels:
    {{- include "go-echo0e066db1-fa33-46f5-a6ef-9e3f4fa47693.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e066db1-fa33-46f5-a6ef-9e3f4fa47693.selectorLabels" . | nindent 6 }}
