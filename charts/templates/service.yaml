apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6b4d69c3-5119-41b3-a902-ded6b4849dcb.fullname" . }}
  labels:
    {{- include "go-echo6b4d69c3-5119-41b3-a902-ded6b4849dcb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6b4d69c3-5119-41b3-a902-ded6b4849dcb.selectorLabels" . | nindent 6 }}
