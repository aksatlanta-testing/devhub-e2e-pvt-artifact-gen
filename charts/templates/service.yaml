apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe72f5cf0-fb71-4886-8a9b-845c91bcc493.fullname" . }}
  labels:
    {{- include "go-echoe72f5cf0-fb71-4886-8a9b-845c91bcc493.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe72f5cf0-fb71-4886-8a9b-845c91bcc493.selectorLabels" . | nindent 6 }}
