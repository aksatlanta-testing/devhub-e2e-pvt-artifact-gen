apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8c275856-bda6-4cc2-acab-6227f21c13d1.fullname" . }}
  labels:
    {{- include "go-echo8c275856-bda6-4cc2-acab-6227f21c13d1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8c275856-bda6-4cc2-acab-6227f21c13d1.selectorLabels" . | nindent 6 }}
