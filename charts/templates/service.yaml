apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo33275dcc-d480-4693-b6c8-a2ae9447caa1.fullname" . }}
  labels:
    {{- include "go-echo33275dcc-d480-4693-b6c8-a2ae9447caa1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo33275dcc-d480-4693-b6c8-a2ae9447caa1.selectorLabels" . | nindent 6 }}
