apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo41e0521a-59a6-4574-9b66-9ce87f09b37b.fullname" . }}
  labels:
    {{- include "go-echo41e0521a-59a6-4574-9b66-9ce87f09b37b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo41e0521a-59a6-4574-9b66-9ce87f09b37b.selectorLabels" . | nindent 6 }}
