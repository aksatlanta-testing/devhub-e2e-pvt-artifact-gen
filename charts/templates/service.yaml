apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8357b61-68e1-41b8-a8f7-ae434bfb7387.fullname" . }}
  labels:
    {{- include "go-echoc8357b61-68e1-41b8-a8f7-ae434bfb7387.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8357b61-68e1-41b8-a8f7-ae434bfb7387.selectorLabels" . | nindent 6 }}
