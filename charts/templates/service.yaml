apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo62baf8b6-31bc-45f2-8464-58042aad0279.fullname" . }}
  labels:
    {{- include "go-echo62baf8b6-31bc-45f2-8464-58042aad0279.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo62baf8b6-31bc-45f2-8464-58042aad0279.selectorLabels" . | nindent 6 }}
