apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo95f04140-e90d-4df7-93b4-b219699ae306.fullname" . }}
  labels:
    {{- include "go-echo95f04140-e90d-4df7-93b4-b219699ae306.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo95f04140-e90d-4df7-93b4-b219699ae306.selectorLabels" . | nindent 6 }}
