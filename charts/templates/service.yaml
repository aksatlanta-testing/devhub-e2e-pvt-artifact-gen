apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo74b710ee-fc35-4d0d-97bc-23035d7d9692.fullname" . }}
  labels:
    {{- include "go-echo74b710ee-fc35-4d0d-97bc-23035d7d9692.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo74b710ee-fc35-4d0d-97bc-23035d7d9692.selectorLabels" . | nindent 6 }}
