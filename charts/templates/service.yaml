apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo50795870-8223-4664-8858-a8a70af8ba92.fullname" . }}
  labels:
    {{- include "go-echo50795870-8223-4664-8858-a8a70af8ba92.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo50795870-8223-4664-8858-a8a70af8ba92.selectorLabels" . | nindent 6 }}
