apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo22d304c4-6453-4c50-bce4-1c2abd51bfa1.fullname" . }}
  labels:
    {{- include "go-echo22d304c4-6453-4c50-bce4-1c2abd51bfa1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo22d304c4-6453-4c50-bce4-1c2abd51bfa1.selectorLabels" . | nindent 6 }}
