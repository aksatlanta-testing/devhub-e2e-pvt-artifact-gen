apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5a9f5a80-5364-4a23-8135-65559fd79e77.fullname" . }}
  labels:
    {{- include "go-echo5a9f5a80-5364-4a23-8135-65559fd79e77.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5a9f5a80-5364-4a23-8135-65559fd79e77.selectorLabels" . | nindent 6 }}
