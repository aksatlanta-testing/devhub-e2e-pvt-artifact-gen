apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo495d04f7-87bc-4ef4-ac50-798c92d47424.fullname" . }}
  labels:
    {{- include "go-echo495d04f7-87bc-4ef4-ac50-798c92d47424.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo495d04f7-87bc-4ef4-ac50-798c92d47424.selectorLabels" . | nindent 6 }}
