apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4ccb4a3d-7797-4543-a457-02535939fe33.fullname" . }}
  labels:
    {{- include "go-echo4ccb4a3d-7797-4543-a457-02535939fe33.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4ccb4a3d-7797-4543-a457-02535939fe33.selectorLabels" . | nindent 6 }}
