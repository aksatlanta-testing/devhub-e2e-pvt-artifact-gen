apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1aec8256-1d0c-4bad-a54f-2e33f511287f.fullname" . }}
  labels:
    {{- include "go-echo1aec8256-1d0c-4bad-a54f-2e33f511287f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1aec8256-1d0c-4bad-a54f-2e33f511287f.selectorLabels" . | nindent 6 }}
