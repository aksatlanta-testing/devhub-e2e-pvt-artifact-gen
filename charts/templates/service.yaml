apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo224bc1b9-a70f-4380-b2b7-3cff4c044741.fullname" . }}
  labels:
    {{- include "go-echo224bc1b9-a70f-4380-b2b7-3cff4c044741.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo224bc1b9-a70f-4380-b2b7-3cff4c044741.selectorLabels" . | nindent 6 }}
