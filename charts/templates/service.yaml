apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo69a619e2-8925-40db-9602-2c06e5972aea.fullname" . }}
  labels:
    {{- include "go-echo69a619e2-8925-40db-9602-2c06e5972aea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo69a619e2-8925-40db-9602-2c06e5972aea.selectorLabels" . | nindent 6 }}
