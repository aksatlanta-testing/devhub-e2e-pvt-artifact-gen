apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeb7ff402-4eba-462d-9a01-9cace05efb45.fullname" . }}
  labels:
    {{- include "go-echoeb7ff402-4eba-462d-9a01-9cace05efb45.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeb7ff402-4eba-462d-9a01-9cace05efb45.selectorLabels" . | nindent 6 }}
