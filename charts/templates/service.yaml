apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof9768c8e-3e52-4b34-9ce3-70f25d7b4f52.fullname" . }}
  labels:
    {{- include "go-echof9768c8e-3e52-4b34-9ce3-70f25d7b4f52.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof9768c8e-3e52-4b34-9ce3-70f25d7b4f52.selectorLabels" . | nindent 6 }}
