apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo148ca951-e512-4bcf-bac2-79cad672d43d.fullname" . }}
  labels:
    {{- include "go-echo148ca951-e512-4bcf-bac2-79cad672d43d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo148ca951-e512-4bcf-bac2-79cad672d43d.selectorLabels" . | nindent 6 }}
