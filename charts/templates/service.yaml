apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo551e1d6f-a413-4565-8e06-f382dd18aaf4.fullname" . }}
  labels:
    {{- include "go-echo551e1d6f-a413-4565-8e06-f382dd18aaf4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo551e1d6f-a413-4565-8e06-f382dd18aaf4.selectorLabels" . | nindent 6 }}
