apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo711f67a5-f3b3-494c-88c0-b1c7c0ab6f20.fullname" . }}
  labels:
    {{- include "go-echo711f67a5-f3b3-494c-88c0-b1c7c0ab6f20.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo711f67a5-f3b3-494c-88c0-b1c7c0ab6f20.selectorLabels" . | nindent 6 }}
