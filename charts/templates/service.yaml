apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo61ddefb5-735e-4e5c-8bbf-d430b3e87191.fullname" . }}
  labels:
    {{- include "go-echo61ddefb5-735e-4e5c-8bbf-d430b3e87191.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo61ddefb5-735e-4e5c-8bbf-d430b3e87191.selectorLabels" . | nindent 6 }}
