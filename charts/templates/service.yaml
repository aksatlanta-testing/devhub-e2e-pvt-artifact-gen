apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobf9ae698-5b04-4595-9901-5b7372fc1d40.fullname" . }}
  labels:
    {{- include "go-echobf9ae698-5b04-4595-9901-5b7372fc1d40.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobf9ae698-5b04-4595-9901-5b7372fc1d40.selectorLabels" . | nindent 6 }}
