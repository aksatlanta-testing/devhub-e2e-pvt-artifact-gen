apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7851d361-56ca-4a50-972b-60d1a5fa9738.fullname" . }}
  labels:
    {{- include "go-echo7851d361-56ca-4a50-972b-60d1a5fa9738.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7851d361-56ca-4a50-972b-60d1a5fa9738.selectorLabels" . | nindent 6 }}
