apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof4983fbf-5c8c-4699-bca2-87313b3c982d.fullname" . }}
  labels:
    {{- include "go-echof4983fbf-5c8c-4699-bca2-87313b3c982d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof4983fbf-5c8c-4699-bca2-87313b3c982d.selectorLabels" . | nindent 6 }}
