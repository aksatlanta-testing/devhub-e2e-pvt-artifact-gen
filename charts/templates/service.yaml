apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo72c97c99-5960-4576-b695-db5f5c6efd50.fullname" . }}
  labels:
    {{- include "go-echo72c97c99-5960-4576-b695-db5f5c6efd50.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo72c97c99-5960-4576-b695-db5f5c6efd50.selectorLabels" . | nindent 6 }}
