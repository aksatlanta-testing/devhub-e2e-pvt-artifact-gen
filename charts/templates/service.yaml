apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod6d95a23-dae0-40b0-ae53-9f7dc7cdbfc8.fullname" . }}
  labels:
    {{- include "go-echod6d95a23-dae0-40b0-ae53-9f7dc7cdbfc8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod6d95a23-dae0-40b0-ae53-9f7dc7cdbfc8.selectorLabels" . | nindent 6 }}
