apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa8f48789-91d6-424d-b1be-5d9543042976.fullname" . }}
  labels:
    {{- include "go-echoa8f48789-91d6-424d-b1be-5d9543042976.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa8f48789-91d6-424d-b1be-5d9543042976.selectorLabels" . | nindent 6 }}
