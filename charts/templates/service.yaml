apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo47780492-829f-4538-bf56-19bd12165189.fullname" . }}
  labels:
    {{- include "go-echo47780492-829f-4538-bf56-19bd12165189.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo47780492-829f-4538-bf56-19bd12165189.selectorLabels" . | nindent 6 }}
