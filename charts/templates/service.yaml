apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo844fdcf7-af07-49e8-8a5f-2229db6fcee2.fullname" . }}
  labels:
    {{- include "go-echo844fdcf7-af07-49e8-8a5f-2229db6fcee2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo844fdcf7-af07-49e8-8a5f-2229db6fcee2.selectorLabels" . | nindent 6 }}
