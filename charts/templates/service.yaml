apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5089253d-73f2-4712-a486-22348952f3e8.fullname" . }}
  labels:
    {{- include "go-echo5089253d-73f2-4712-a486-22348952f3e8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5089253d-73f2-4712-a486-22348952f3e8.selectorLabels" . | nindent 6 }}
