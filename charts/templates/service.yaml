apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5ef865d5-8df6-492f-a604-0f908cdb66d2.fullname" . }}
  labels:
    {{- include "go-echo5ef865d5-8df6-492f-a604-0f908cdb66d2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5ef865d5-8df6-492f-a604-0f908cdb66d2.selectorLabels" . | nindent 6 }}
