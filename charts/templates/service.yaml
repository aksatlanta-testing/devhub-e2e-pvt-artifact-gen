apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo45721f97-d97a-4a79-baf8-872b99cfe79b.fullname" . }}
  labels:
    {{- include "go-echo45721f97-d97a-4a79-baf8-872b99cfe79b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo45721f97-d97a-4a79-baf8-872b99cfe79b.selectorLabels" . | nindent 6 }}
