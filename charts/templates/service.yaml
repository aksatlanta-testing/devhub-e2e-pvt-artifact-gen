apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo53553386-7eb7-403f-8c47-8eb2e6389948.fullname" . }}
  labels:
    {{- include "go-echo53553386-7eb7-403f-8c47-8eb2e6389948.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo53553386-7eb7-403f-8c47-8eb2e6389948.selectorLabels" . | nindent 6 }}
