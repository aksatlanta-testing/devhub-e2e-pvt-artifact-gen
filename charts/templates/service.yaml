apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9594cb01-bdee-4568-a947-8c30c1963e6a.fullname" . }}
  labels:
    {{- include "go-echo9594cb01-bdee-4568-a947-8c30c1963e6a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9594cb01-bdee-4568-a947-8c30c1963e6a.selectorLabels" . | nindent 6 }}
