apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6f731142-760f-4e63-9729-06dec6078ed1.fullname" . }}
  labels:
    {{- include "go-echo6f731142-760f-4e63-9729-06dec6078ed1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6f731142-760f-4e63-9729-06dec6078ed1.selectorLabels" . | nindent 6 }}
