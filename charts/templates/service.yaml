apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe877fa15-c27a-4172-ae65-2df5ad0d660e.fullname" . }}
  labels:
    {{- include "go-echoe877fa15-c27a-4172-ae65-2df5ad0d660e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe877fa15-c27a-4172-ae65-2df5ad0d660e.selectorLabels" . | nindent 6 }}
