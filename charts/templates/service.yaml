apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo384a7924-bf37-4237-b696-b849a951c62f.fullname" . }}
  labels:
    {{- include "go-echo384a7924-bf37-4237-b696-b849a951c62f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo384a7924-bf37-4237-b696-b849a951c62f.selectorLabels" . | nindent 6 }}
