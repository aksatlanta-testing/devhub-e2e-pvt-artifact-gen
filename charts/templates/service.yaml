apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod81ddbde-c0fa-475d-b12b-c1d1e7d8e12e.fullname" . }}
  labels:
    {{- include "go-echod81ddbde-c0fa-475d-b12b-c1d1e7d8e12e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod81ddbde-c0fa-475d-b12b-c1d1e7d8e12e.selectorLabels" . | nindent 6 }}
