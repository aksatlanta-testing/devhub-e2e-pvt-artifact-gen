apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1b1adb31-f6fc-49d0-b942-e8517fcf8b04.fullname" . }}
  labels:
    {{- include "go-echo1b1adb31-f6fc-49d0-b942-e8517fcf8b04.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1b1adb31-f6fc-49d0-b942-e8517fcf8b04.selectorLabels" . | nindent 6 }}
