apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo33cf68bf-586f-400b-98ff-25b9cb845020.fullname" . }}
  labels:
    {{- include "go-echo33cf68bf-586f-400b-98ff-25b9cb845020.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo33cf68bf-586f-400b-98ff-25b9cb845020.selectorLabels" . | nindent 6 }}
