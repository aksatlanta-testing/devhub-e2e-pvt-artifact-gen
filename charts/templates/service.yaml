apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo00dd851f-2bea-45f3-afc0-9818f4724716.fullname" . }}
  labels:
    {{- include "go-echo00dd851f-2bea-45f3-afc0-9818f4724716.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo00dd851f-2bea-45f3-afc0-9818f4724716.selectorLabels" . | nindent 6 }}
