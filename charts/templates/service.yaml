apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo76c94c33-d8aa-4f1a-a6b0-06ece5c838a6.fullname" . }}
  labels:
    {{- include "go-echo76c94c33-d8aa-4f1a-a6b0-06ece5c838a6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo76c94c33-d8aa-4f1a-a6b0-06ece5c838a6.selectorLabels" . | nindent 6 }}
