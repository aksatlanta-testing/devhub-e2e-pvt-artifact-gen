apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeaf7f480-55bf-4050-b956-a803773ae80e.fullname" . }}
  labels:
    {{- include "go-echoeaf7f480-55bf-4050-b956-a803773ae80e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeaf7f480-55bf-4050-b956-a803773ae80e.selectorLabels" . | nindent 6 }}
