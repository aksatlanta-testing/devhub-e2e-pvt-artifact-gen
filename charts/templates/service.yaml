apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6ed7b44c-0548-47a4-9c1f-85d0a421c92c.fullname" . }}
  labels:
    {{- include "go-echo6ed7b44c-0548-47a4-9c1f-85d0a421c92c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6ed7b44c-0548-47a4-9c1f-85d0a421c92c.selectorLabels" . | nindent 6 }}
