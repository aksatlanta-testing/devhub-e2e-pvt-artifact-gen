apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo85b01c8c-399e-43c5-88ce-7d3293a6c9e7.fullname" . }}
  labels:
    {{- include "go-echo85b01c8c-399e-43c5-88ce-7d3293a6c9e7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo85b01c8c-399e-43c5-88ce-7d3293a6c9e7.selectorLabels" . | nindent 6 }}
