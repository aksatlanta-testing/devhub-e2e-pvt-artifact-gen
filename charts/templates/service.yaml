apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofb950280-f41f-44d5-8c8d-d18b10ddbf16.fullname" . }}
  labels:
    {{- include "go-echofb950280-f41f-44d5-8c8d-d18b10ddbf16.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofb950280-f41f-44d5-8c8d-d18b10ddbf16.selectorLabels" . | nindent 6 }}
