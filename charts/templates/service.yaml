apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo36523873-f9b8-4ece-9c1d-45f6b5a5090b.fullname" . }}
  labels:
    {{- include "go-echo36523873-f9b8-4ece-9c1d-45f6b5a5090b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo36523873-f9b8-4ece-9c1d-45f6b5a5090b.selectorLabels" . | nindent 6 }}
