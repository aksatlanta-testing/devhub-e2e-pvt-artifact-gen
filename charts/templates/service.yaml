apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo424390f3-1618-4a06-8b01-72fa2ea77e7e.fullname" . }}
  labels:
    {{- include "go-echo424390f3-1618-4a06-8b01-72fa2ea77e7e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo424390f3-1618-4a06-8b01-72fa2ea77e7e.selectorLabels" . | nindent 6 }}
