apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo49813498-3764-41d0-9303-24ca9cdc38f3.fullname" . }}
  labels:
    {{- include "go-echo49813498-3764-41d0-9303-24ca9cdc38f3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo49813498-3764-41d0-9303-24ca9cdc38f3.selectorLabels" . | nindent 6 }}
