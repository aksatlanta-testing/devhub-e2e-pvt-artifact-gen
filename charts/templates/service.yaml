apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04bf10b6-2752-426c-96ac-f1c5df117dbc.fullname" . }}
  labels:
    {{- include "go-echo04bf10b6-2752-426c-96ac-f1c5df117dbc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04bf10b6-2752-426c-96ac-f1c5df117dbc.selectorLabels" . | nindent 6 }}
