apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoef1bf959-55c6-4935-a097-c7c08eb353c0.fullname" . }}
  labels:
    {{- include "go-echoef1bf959-55c6-4935-a097-c7c08eb353c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoef1bf959-55c6-4935-a097-c7c08eb353c0.selectorLabels" . | nindent 6 }}
