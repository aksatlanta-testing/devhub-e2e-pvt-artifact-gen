apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof0cdfc20-aab9-4d4a-8e47-b5c85d43a44b.fullname" . }}
  labels:
    {{- include "go-echof0cdfc20-aab9-4d4a-8e47-b5c85d43a44b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof0cdfc20-aab9-4d4a-8e47-b5c85d43a44b.selectorLabels" . | nindent 6 }}
