apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo223f9b34-c908-4c5f-86b6-b2b9c84b4050.fullname" . }}
  labels:
    {{- include "go-echo223f9b34-c908-4c5f-86b6-b2b9c84b4050.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo223f9b34-c908-4c5f-86b6-b2b9c84b4050.selectorLabels" . | nindent 6 }}
