apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf6190e3-2c3b-420f-8310-630e6f1747cd.fullname" . }}
  labels:
    {{- include "go-echoaf6190e3-2c3b-420f-8310-630e6f1747cd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf6190e3-2c3b-420f-8310-630e6f1747cd.selectorLabels" . | nindent 6 }}
