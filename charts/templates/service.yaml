apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob3b86037-3d81-47a5-a770-45cb5178fe0c.fullname" . }}
  labels:
    {{- include "go-echob3b86037-3d81-47a5-a770-45cb5178fe0c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob3b86037-3d81-47a5-a770-45cb5178fe0c.selectorLabels" . | nindent 6 }}
