apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c45bd0c-1cf9-4c3b-a926-7a8196f94569.fullname" . }}
  labels:
    {{- include "go-echo1c45bd0c-1cf9-4c3b-a926-7a8196f94569.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c45bd0c-1cf9-4c3b-a926-7a8196f94569.selectorLabels" . | nindent 6 }}
