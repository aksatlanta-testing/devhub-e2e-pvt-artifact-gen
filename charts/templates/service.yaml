apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04df0182-b55a-4bc9-af5e-bc5f80abc8ea.fullname" . }}
  labels:
    {{- include "go-echo04df0182-b55a-4bc9-af5e-bc5f80abc8ea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04df0182-b55a-4bc9-af5e-bc5f80abc8ea.selectorLabels" . | nindent 6 }}
