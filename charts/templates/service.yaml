apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo604a69cd-1e7a-495c-821e-95fa0005cd5e.fullname" . }}
  labels:
    {{- include "go-echo604a69cd-1e7a-495c-821e-95fa0005cd5e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo604a69cd-1e7a-495c-821e-95fa0005cd5e.selectorLabels" . | nindent 6 }}
