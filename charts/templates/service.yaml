apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob939a16d-3524-4628-9c3b-27a5e3491edd.fullname" . }}
  labels:
    {{- include "go-echob939a16d-3524-4628-9c3b-27a5e3491edd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob939a16d-3524-4628-9c3b-27a5e3491edd.selectorLabels" . | nindent 6 }}
