apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo49a2432b-88c2-4625-8a18-bd2b439262ab.fullname" . }}
  labels:
    {{- include "go-echo49a2432b-88c2-4625-8a18-bd2b439262ab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo49a2432b-88c2-4625-8a18-bd2b439262ab.selectorLabels" . | nindent 6 }}
