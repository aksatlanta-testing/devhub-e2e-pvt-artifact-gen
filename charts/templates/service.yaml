apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof2fc9730-a75b-49b2-ab78-1cee41f34b31.fullname" . }}
  labels:
    {{- include "go-echof2fc9730-a75b-49b2-ab78-1cee41f34b31.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof2fc9730-a75b-49b2-ab78-1cee41f34b31.selectorLabels" . | nindent 6 }}
