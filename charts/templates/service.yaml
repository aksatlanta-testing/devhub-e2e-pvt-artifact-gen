apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodcd47bb8-125c-4140-bbe9-037892936276.fullname" . }}
  labels:
    {{- include "go-echodcd47bb8-125c-4140-bbe9-037892936276.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodcd47bb8-125c-4140-bbe9-037892936276.selectorLabels" . | nindent 6 }}
