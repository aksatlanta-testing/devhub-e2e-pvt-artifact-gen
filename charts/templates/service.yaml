apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo538d0804-17f0-43cf-865a-2086e5ba6675.fullname" . }}
  labels:
    {{- include "go-echo538d0804-17f0-43cf-865a-2086e5ba6675.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo538d0804-17f0-43cf-865a-2086e5ba6675.selectorLabels" . | nindent 6 }}
