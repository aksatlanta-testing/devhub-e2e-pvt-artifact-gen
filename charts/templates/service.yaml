apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5e54c1e5-9535-48b3-9ada-983687d07ffe.fullname" . }}
  labels:
    {{- include "go-echo5e54c1e5-9535-48b3-9ada-983687d07ffe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5e54c1e5-9535-48b3-9ada-983687d07ffe.selectorLabels" . | nindent 6 }}
