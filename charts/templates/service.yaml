apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo88b1f3c5-e2cd-49f8-9462-ee2e89143f59.fullname" . }}
  labels:
    {{- include "go-echo88b1f3c5-e2cd-49f8-9462-ee2e89143f59.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo88b1f3c5-e2cd-49f8-9462-ee2e89143f59.selectorLabels" . | nindent 6 }}
