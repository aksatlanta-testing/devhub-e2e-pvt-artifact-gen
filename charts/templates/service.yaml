apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo658b1e8c-d1e8-456c-8e0d-e20044e1aade.fullname" . }}
  labels:
    {{- include "go-echo658b1e8c-d1e8-456c-8e0d-e20044e1aade.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo658b1e8c-d1e8-456c-8e0d-e20044e1aade.selectorLabels" . | nindent 6 }}
