apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc5849c32-99cb-454b-9d3e-eb78f9655854.fullname" . }}
  labels:
    {{- include "go-echoc5849c32-99cb-454b-9d3e-eb78f9655854.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc5849c32-99cb-454b-9d3e-eb78f9655854.selectorLabels" . | nindent 6 }}
