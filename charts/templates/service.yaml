apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2bee5086-d275-445e-a548-a6ba5e2a2e2c.fullname" . }}
  labels:
    {{- include "go-echo2bee5086-d275-445e-a548-a6ba5e2a2e2c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2bee5086-d275-445e-a548-a6ba5e2a2e2c.selectorLabels" . | nindent 6 }}
