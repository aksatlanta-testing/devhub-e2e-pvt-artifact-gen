apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1a12a8d9-a9fc-453b-9428-0d531722b985.fullname" . }}
  labels:
    {{- include "go-echo1a12a8d9-a9fc-453b-9428-0d531722b985.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1a12a8d9-a9fc-453b-9428-0d531722b985.selectorLabels" . | nindent 6 }}
