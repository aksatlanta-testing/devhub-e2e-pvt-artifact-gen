apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo848449fe-572a-4390-916b-97dd79ef4ed3.fullname" . }}
  labels:
    {{- include "go-echo848449fe-572a-4390-916b-97dd79ef4ed3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo848449fe-572a-4390-916b-97dd79ef4ed3.selectorLabels" . | nindent 6 }}
