apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa80b10f8-66e8-4c01-8db8-3b0a217e58c9.fullname" . }}
  labels:
    {{- include "go-echoa80b10f8-66e8-4c01-8db8-3b0a217e58c9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa80b10f8-66e8-4c01-8db8-3b0a217e58c9.selectorLabels" . | nindent 6 }}
