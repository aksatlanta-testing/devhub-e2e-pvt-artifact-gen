apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3dab1b27-0322-4d2c-a0a7-35e9713e36d5.fullname" . }}
  labels:
    {{- include "go-echo3dab1b27-0322-4d2c-a0a7-35e9713e36d5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3dab1b27-0322-4d2c-a0a7-35e9713e36d5.selectorLabels" . | nindent 6 }}
