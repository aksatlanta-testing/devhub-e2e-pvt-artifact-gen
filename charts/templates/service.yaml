apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5fea0104-76c0-428e-bd11-17b65ed21f5e.fullname" . }}
  labels:
    {{- include "go-echo5fea0104-76c0-428e-bd11-17b65ed21f5e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5fea0104-76c0-428e-bd11-17b65ed21f5e.selectorLabels" . | nindent 6 }}
