apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeaa311f3-e005-4f00-a61b-21e0277947d1.fullname" . }}
  labels:
    {{- include "go-echoeaa311f3-e005-4f00-a61b-21e0277947d1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeaa311f3-e005-4f00-a61b-21e0277947d1.selectorLabels" . | nindent 6 }}
