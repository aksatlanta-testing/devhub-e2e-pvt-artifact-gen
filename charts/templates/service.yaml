apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo416b0051-baf3-48dc-90df-e05be7732b19.fullname" . }}
  labels:
    {{- include "go-echo416b0051-baf3-48dc-90df-e05be7732b19.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo416b0051-baf3-48dc-90df-e05be7732b19.selectorLabels" . | nindent 6 }}
