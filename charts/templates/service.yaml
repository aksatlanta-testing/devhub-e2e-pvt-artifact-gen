apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4dbad79-9418-417a-be81-9bcefc47480a.fullname" . }}
  labels:
    {{- include "go-echoc4dbad79-9418-417a-be81-9bcefc47480a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4dbad79-9418-417a-be81-9bcefc47480a.selectorLabels" . | nindent 6 }}
