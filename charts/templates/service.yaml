apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof7d7ee90-5831-4252-bf27-521245d1eb55.fullname" . }}
  labels:
    {{- include "go-echof7d7ee90-5831-4252-bf27-521245d1eb55.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof7d7ee90-5831-4252-bf27-521245d1eb55.selectorLabels" . | nindent 6 }}
