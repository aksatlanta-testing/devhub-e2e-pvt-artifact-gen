apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod55e06bb-3e9d-474c-a50b-48c9caf0cdfd.fullname" . }}
  labels:
    {{- include "go-echod55e06bb-3e9d-474c-a50b-48c9caf0cdfd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod55e06bb-3e9d-474c-a50b-48c9caf0cdfd.selectorLabels" . | nindent 6 }}
