apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo323f35a3-fc27-4caf-867e-ee274a856b42.fullname" . }}
  labels:
    {{- include "go-echo323f35a3-fc27-4caf-867e-ee274a856b42.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo323f35a3-fc27-4caf-867e-ee274a856b42.selectorLabels" . | nindent 6 }}
