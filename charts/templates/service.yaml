apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6e3bd396-dd8f-43e3-bc8c-257e6006f392.fullname" . }}
  labels:
    {{- include "go-echo6e3bd396-dd8f-43e3-bc8c-257e6006f392.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6e3bd396-dd8f-43e3-bc8c-257e6006f392.selectorLabels" . | nindent 6 }}
