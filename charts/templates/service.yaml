apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob16f0ab2-198a-4ecd-9144-eb266e126194.fullname" . }}
  labels:
    {{- include "go-echob16f0ab2-198a-4ecd-9144-eb266e126194.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob16f0ab2-198a-4ecd-9144-eb266e126194.selectorLabels" . | nindent 6 }}
