apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7f70e87b-c81f-46ed-a38c-98101ac013f1.fullname" . }}
  labels:
    {{- include "go-echo7f70e87b-c81f-46ed-a38c-98101ac013f1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7f70e87b-c81f-46ed-a38c-98101ac013f1.selectorLabels" . | nindent 6 }}
