apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe7c17599-220e-4f66-9562-767664240f7d.fullname" . }}
  labels:
    {{- include "go-echoe7c17599-220e-4f66-9562-767664240f7d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
