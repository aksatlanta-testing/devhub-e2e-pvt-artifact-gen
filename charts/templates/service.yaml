apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo565da9e0-27bb-4309-b509-104e4695c9a8.fullname" . }}
  labels:
    {{- include "go-echo565da9e0-27bb-4309-b509-104e4695c9a8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo565da9e0-27bb-4309-b509-104e4695c9a8.selectorLabels" . | nindent 6 }}
