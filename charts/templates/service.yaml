apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1f7e48de-e81b-4df8-a1d4-5c8418a3ec53.fullname" . }}
  labels:
    {{- include "go-echo1f7e48de-e81b-4df8-a1d4-5c8418a3ec53.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1f7e48de-e81b-4df8-a1d4-5c8418a3ec53.selectorLabels" . | nindent 6 }}
