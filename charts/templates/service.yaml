apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodbfa3f03-c815-4a89-b27e-87b4eff3e933.fullname" . }}
  labels:
    {{- include "go-echodbfa3f03-c815-4a89-b27e-87b4eff3e933.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodbfa3f03-c815-4a89-b27e-87b4eff3e933.selectorLabels" . | nindent 6 }}
