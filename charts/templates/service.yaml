apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeb88649f-51e6-4bdb-be32-7a8a3a3313d5.fullname" . }}
  labels:
    {{- include "go-echoeb88649f-51e6-4bdb-be32-7a8a3a3313d5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeb88649f-51e6-4bdb-be32-7a8a3a3313d5.selectorLabels" . | nindent 6 }}
