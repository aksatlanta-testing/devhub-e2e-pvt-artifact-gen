apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo79d4a28f-4850-46c5-a3f1-9634cd48ae22.fullname" . }}
  labels:
    {{- include "go-echo79d4a28f-4850-46c5-a3f1-9634cd48ae22.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo79d4a28f-4850-46c5-a3f1-9634cd48ae22.selectorLabels" . | nindent 6 }}
