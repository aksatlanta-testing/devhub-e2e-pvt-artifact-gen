apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc0b634f8-f597-4315-8130-6b3775f3446f.fullname" . }}
  labels:
    {{- include "go-echoc0b634f8-f597-4315-8130-6b3775f3446f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc0b634f8-f597-4315-8130-6b3775f3446f.selectorLabels" . | nindent 6 }}
