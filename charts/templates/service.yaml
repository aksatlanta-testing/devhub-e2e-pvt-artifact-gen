apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8f89d62c-8849-47b9-97fa-2a1b73c92faf.fullname" . }}
  labels:
    {{- include "go-echo8f89d62c-8849-47b9-97fa-2a1b73c92faf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8f89d62c-8849-47b9-97fa-2a1b73c92faf.selectorLabels" . | nindent 6 }}
