apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4e150370-221c-485f-af69-f35385ad28b4.fullname" . }}
  labels:
    {{- include "go-echo4e150370-221c-485f-af69-f35385ad28b4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4e150370-221c-485f-af69-f35385ad28b4.selectorLabels" . | nindent 6 }}
