apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7f599dd8-13eb-49af-b761-778465baa351.fullname" . }}
  labels:
    {{- include "go-echo7f599dd8-13eb-49af-b761-778465baa351.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7f599dd8-13eb-49af-b761-778465baa351.selectorLabels" . | nindent 6 }}
