apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo38e40dcf-45d4-4fe4-a38d-703d94bd0bd4.fullname" . }}
  labels:
    {{- include "go-echo38e40dcf-45d4-4fe4-a38d-703d94bd0bd4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo38e40dcf-45d4-4fe4-a38d-703d94bd0bd4.selectorLabels" . | nindent 6 }}
