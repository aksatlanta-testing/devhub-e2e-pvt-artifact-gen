apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3afd2ccb-9f2f-4996-b168-42d93235ac65.fullname" . }}
  labels:
    {{- include "go-echo3afd2ccb-9f2f-4996-b168-42d93235ac65.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3afd2ccb-9f2f-4996-b168-42d93235ac65.selectorLabels" . | nindent 6 }}
