apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4920787-b010-4798-8d1f-40d6ee39b93a.fullname" . }}
  labels:
    {{- include "go-echoc4920787-b010-4798-8d1f-40d6ee39b93a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4920787-b010-4798-8d1f-40d6ee39b93a.selectorLabels" . | nindent 6 }}
