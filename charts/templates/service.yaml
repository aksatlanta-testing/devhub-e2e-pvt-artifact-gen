apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo337bc273-0e3c-479d-8597-2e78c28df949.fullname" . }}
  labels:
    {{- include "go-echo337bc273-0e3c-479d-8597-2e78c28df949.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo337bc273-0e3c-479d-8597-2e78c28df949.selectorLabels" . | nindent 6 }}
