apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe4dba566-8368-4f09-befc-c238b14d9878.fullname" . }}
  labels:
    {{- include "go-echoe4dba566-8368-4f09-befc-c238b14d9878.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe4dba566-8368-4f09-befc-c238b14d9878.selectorLabels" . | nindent 6 }}
