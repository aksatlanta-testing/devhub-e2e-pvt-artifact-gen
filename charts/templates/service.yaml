apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo41e0af34-c1d5-4f27-8c22-402b00f0653f.fullname" . }}
  labels:
    {{- include "go-echo41e0af34-c1d5-4f27-8c22-402b00f0653f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo41e0af34-c1d5-4f27-8c22-402b00f0653f.selectorLabels" . | nindent 6 }}
