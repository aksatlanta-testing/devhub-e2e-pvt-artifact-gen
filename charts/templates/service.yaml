apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo63a9cb0b-6222-4220-8158-488c621f3912.fullname" . }}
  labels:
    {{- include "go-echo63a9cb0b-6222-4220-8158-488c621f3912.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo63a9cb0b-6222-4220-8158-488c621f3912.selectorLabels" . | nindent 6 }}
