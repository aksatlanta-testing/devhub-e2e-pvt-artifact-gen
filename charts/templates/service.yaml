apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocfca0e5a-ac49-4267-b04a-7b4163895a47.fullname" . }}
  labels:
    {{- include "go-echocfca0e5a-ac49-4267-b04a-7b4163895a47.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocfca0e5a-ac49-4267-b04a-7b4163895a47.selectorLabels" . | nindent 6 }}
