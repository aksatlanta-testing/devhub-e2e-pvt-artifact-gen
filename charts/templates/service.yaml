apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda67a0a3-0caf-4885-b2e3-aac246fa543c.fullname" . }}
  labels:
    {{- include "go-echoda67a0a3-0caf-4885-b2e3-aac246fa543c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda67a0a3-0caf-4885-b2e3-aac246fa543c.selectorLabels" . | nindent 6 }}
