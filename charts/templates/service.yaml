apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod97b9a1c-592e-45b6-9ece-f6618fde498b.fullname" . }}
  labels:
    {{- include "go-echod97b9a1c-592e-45b6-9ece-f6618fde498b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod97b9a1c-592e-45b6-9ece-f6618fde498b.selectorLabels" . | nindent 6 }}
