apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3675fa0f-58cc-42b7-9b8b-01e3de7c149a.fullname" . }}
  labels:
    {{- include "go-echo3675fa0f-58cc-42b7-9b8b-01e3de7c149a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3675fa0f-58cc-42b7-9b8b-01e3de7c149a.selectorLabels" . | nindent 6 }}
