apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5780590e-c11c-4ace-9aaf-fac4a9457bf3.fullname" . }}
  labels:
    {{- include "go-echo5780590e-c11c-4ace-9aaf-fac4a9457bf3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5780590e-c11c-4ace-9aaf-fac4a9457bf3.selectorLabels" . | nindent 6 }}
