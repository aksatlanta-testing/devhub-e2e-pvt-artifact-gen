apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob5125f5f-5d25-49e2-bee0-dad26c03853e.fullname" . }}
  labels:
    {{- include "go-echob5125f5f-5d25-49e2-bee0-dad26c03853e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob5125f5f-5d25-49e2-bee0-dad26c03853e.selectorLabels" . | nindent 6 }}
