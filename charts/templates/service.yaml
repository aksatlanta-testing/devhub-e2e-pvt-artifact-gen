apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo199b5c15-9f39-41c3-acbb-492d1c292928.fullname" . }}
  labels:
    {{- include "go-echo199b5c15-9f39-41c3-acbb-492d1c292928.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo199b5c15-9f39-41c3-acbb-492d1c292928.selectorLabels" . | nindent 6 }}
