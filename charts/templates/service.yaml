apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod2d9b801-ce82-44d8-9b70-c723ce788ef5.fullname" . }}
  labels:
    {{- include "go-echod2d9b801-ce82-44d8-9b70-c723ce788ef5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod2d9b801-ce82-44d8-9b70-c723ce788ef5.selectorLabels" . | nindent 6 }}
