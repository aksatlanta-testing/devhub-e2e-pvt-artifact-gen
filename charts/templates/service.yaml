apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8a2bcffb-6dca-4a03-9dbb-858b4269df95.fullname" . }}
  labels:
    {{- include "go-echo8a2bcffb-6dca-4a03-9dbb-858b4269df95.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8a2bcffb-6dca-4a03-9dbb-858b4269df95.selectorLabels" . | nindent 6 }}
