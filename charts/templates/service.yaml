apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobee28165-5a1a-4c4f-9e58-2e6c7969db10.fullname" . }}
  labels:
    {{- include "go-echobee28165-5a1a-4c4f-9e58-2e6c7969db10.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobee28165-5a1a-4c4f-9e58-2e6c7969db10.selectorLabels" . | nindent 6 }}
