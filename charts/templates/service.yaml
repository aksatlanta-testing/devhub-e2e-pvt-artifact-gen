apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo50252a77-6ef2-44f2-bad5-11bd380003be.fullname" . }}
  labels:
    {{- include "go-echo50252a77-6ef2-44f2-bad5-11bd380003be.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo50252a77-6ef2-44f2-bad5-11bd380003be.selectorLabels" . | nindent 6 }}
