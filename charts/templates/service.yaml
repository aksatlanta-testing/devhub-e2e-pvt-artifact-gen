apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocedc5f67-3112-43b1-a237-407f04b1e04e.fullname" . }}
  labels:
    {{- include "go-echocedc5f67-3112-43b1-a237-407f04b1e04e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocedc5f67-3112-43b1-a237-407f04b1e04e.selectorLabels" . | nindent 6 }}
