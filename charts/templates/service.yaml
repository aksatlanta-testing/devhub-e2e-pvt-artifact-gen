apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc9ecdb4d-2840-4758-8336-797566506754.fullname" . }}
  labels:
    {{- include "go-echoc9ecdb4d-2840-4758-8336-797566506754.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc9ecdb4d-2840-4758-8336-797566506754.selectorLabels" . | nindent 6 }}
