apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6ea5dd9b-96c3-4bf0-9444-5d7f4b60cfa8.fullname" . }}
  labels:
    {{- include "go-echo6ea5dd9b-96c3-4bf0-9444-5d7f4b60cfa8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6ea5dd9b-96c3-4bf0-9444-5d7f4b60cfa8.selectorLabels" . | nindent 6 }}
