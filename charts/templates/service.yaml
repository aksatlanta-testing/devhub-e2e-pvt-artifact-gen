apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo30c8a154-10f2-4a26-af75-8788809db5f2.fullname" . }}
  labels:
    {{- include "go-echo30c8a154-10f2-4a26-af75-8788809db5f2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo30c8a154-10f2-4a26-af75-8788809db5f2.selectorLabels" . | nindent 6 }}
