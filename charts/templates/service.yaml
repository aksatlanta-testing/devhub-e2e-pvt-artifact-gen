apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echode43eea5-5a70-4a3e-9d2b-45fb01258990.fullname" . }}
  labels:
    {{- include "go-echode43eea5-5a70-4a3e-9d2b-45fb01258990.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echode43eea5-5a70-4a3e-9d2b-45fb01258990.selectorLabels" . | nindent 6 }}
