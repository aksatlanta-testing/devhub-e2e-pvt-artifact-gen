apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2440430a-602c-4bba-91b7-7da2cafe9d1c.fullname" . }}
  labels:
    {{- include "go-echo2440430a-602c-4bba-91b7-7da2cafe9d1c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2440430a-602c-4bba-91b7-7da2cafe9d1c.selectorLabels" . | nindent 6 }}
