apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9c4fdf75-52d4-4181-b31c-9566dd13107c.fullname" . }}
  labels:
    {{- include "go-echo9c4fdf75-52d4-4181-b31c-9566dd13107c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9c4fdf75-52d4-4181-b31c-9566dd13107c.selectorLabels" . | nindent 6 }}
