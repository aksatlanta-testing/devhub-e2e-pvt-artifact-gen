apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04e6e3c1-e8df-444e-babe-c29e8b92d9ad.fullname" . }}
  labels:
    {{- include "go-echo04e6e3c1-e8df-444e-babe-c29e8b92d9ad.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04e6e3c1-e8df-444e-babe-c29e8b92d9ad.selectorLabels" . | nindent 6 }}
