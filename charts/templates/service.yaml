apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5bf5aa8d-ec71-4090-a0a9-2ffbf5c82a86.fullname" . }}
  labels:
    {{- include "go-echo5bf5aa8d-ec71-4090-a0a9-2ffbf5c82a86.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5bf5aa8d-ec71-4090-a0a9-2ffbf5c82a86.selectorLabels" . | nindent 6 }}
