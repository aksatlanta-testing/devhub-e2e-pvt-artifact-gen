apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7b83b7cf-75c5-411e-8ba8-5ff0b4e5a502.fullname" . }}
  labels:
    {{- include "go-echo7b83b7cf-75c5-411e-8ba8-5ff0b4e5a502.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7b83b7cf-75c5-411e-8ba8-5ff0b4e5a502.selectorLabels" . | nindent 6 }}
