apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofb98b8f8-3951-46ae-aa3e-8ec7ff6937c2.fullname" . }}
  labels:
    {{- include "go-echofb98b8f8-3951-46ae-aa3e-8ec7ff6937c2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofb98b8f8-3951-46ae-aa3e-8ec7ff6937c2.selectorLabels" . | nindent 6 }}
