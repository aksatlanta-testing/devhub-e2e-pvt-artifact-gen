apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoec480c83-094e-4e3c-9090-8d9772b2b85c.fullname" . }}
  labels:
    {{- include "go-echoec480c83-094e-4e3c-9090-8d9772b2b85c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoec480c83-094e-4e3c-9090-8d9772b2b85c.selectorLabels" . | nindent 6 }}
