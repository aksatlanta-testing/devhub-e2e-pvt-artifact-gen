apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1f6d7a09-9d6f-419d-a9d8-daf201487a10.fullname" . }}
  labels:
    {{- include "go-echo1f6d7a09-9d6f-419d-a9d8-daf201487a10.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1f6d7a09-9d6f-419d-a9d8-daf201487a10.selectorLabels" . | nindent 6 }}
