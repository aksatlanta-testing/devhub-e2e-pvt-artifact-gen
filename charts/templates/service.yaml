apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe0bbda1e-4e36-4b69-bae6-2a03b629afd8.fullname" . }}
  labels:
    {{- include "go-echoe0bbda1e-4e36-4b69-bae6-2a03b629afd8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe0bbda1e-4e36-4b69-bae6-2a03b629afd8.selectorLabels" . | nindent 6 }}
