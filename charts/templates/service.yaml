apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod474aea9-57da-402a-b88c-58c67e799f44.fullname" . }}
  labels:
    {{- include "go-echod474aea9-57da-402a-b88c-58c67e799f44.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod474aea9-57da-402a-b88c-58c67e799f44.selectorLabels" . | nindent 6 }}
