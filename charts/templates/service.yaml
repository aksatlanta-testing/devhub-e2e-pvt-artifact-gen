apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9be5d107-25f9-4b7c-b261-50cda81f9829.fullname" . }}
  labels:
    {{- include "go-echo9be5d107-25f9-4b7c-b261-50cda81f9829.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9be5d107-25f9-4b7c-b261-50cda81f9829.selectorLabels" . | nindent 6 }}
