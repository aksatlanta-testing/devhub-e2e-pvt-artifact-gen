apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5f74dd48-bc2f-467e-9f97-dc678746dc5b.fullname" . }}
  labels:
    {{- include "go-echo5f74dd48-bc2f-467e-9f97-dc678746dc5b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5f74dd48-bc2f-467e-9f97-dc678746dc5b.selectorLabels" . | nindent 6 }}
