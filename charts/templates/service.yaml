apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo73a9d8c3-ece5-4d26-8a4d-411cdfe35a11.fullname" . }}
  labels:
    {{- include "go-echo73a9d8c3-ece5-4d26-8a4d-411cdfe35a11.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo73a9d8c3-ece5-4d26-8a4d-411cdfe35a11.selectorLabels" . | nindent 6 }}
