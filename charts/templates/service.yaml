apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa7891e77-da17-4265-86cb-cf5e5ceb7dd1.fullname" . }}
  labels:
    {{- include "go-echoa7891e77-da17-4265-86cb-cf5e5ceb7dd1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa7891e77-da17-4265-86cb-cf5e5ceb7dd1.selectorLabels" . | nindent 6 }}
