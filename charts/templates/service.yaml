apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo51ca82de-7d93-4b0d-8a34-5233e64e32fd.fullname" . }}
  labels:
    {{- include "go-echo51ca82de-7d93-4b0d-8a34-5233e64e32fd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo51ca82de-7d93-4b0d-8a34-5233e64e32fd.selectorLabels" . | nindent 6 }}
