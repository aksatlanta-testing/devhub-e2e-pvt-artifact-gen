apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof9c8c9a2-ad50-4e9d-ae7e-4a79a41ddb40.fullname" . }}
  labels:
    {{- include "go-echof9c8c9a2-ad50-4e9d-ae7e-4a79a41ddb40.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof9c8c9a2-ad50-4e9d-ae7e-4a79a41ddb40.selectorLabels" . | nindent 6 }}
