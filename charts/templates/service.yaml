apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4bd35f8-8a58-48c4-a79f-b16006d074fd.fullname" . }}
  labels:
    {{- include "go-echoc4bd35f8-8a58-48c4-a79f-b16006d074fd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4bd35f8-8a58-48c4-a79f-b16006d074fd.selectorLabels" . | nindent 6 }}
