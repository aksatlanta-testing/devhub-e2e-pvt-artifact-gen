apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod89a448f-0407-4163-ae77-7548b28459d0.fullname" . }}
  labels:
    {{- include "go-echod89a448f-0407-4163-ae77-7548b28459d0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod89a448f-0407-4163-ae77-7548b28459d0.selectorLabels" . | nindent 6 }}
