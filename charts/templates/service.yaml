apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof72dcb71-0f57-4104-96ad-dbfa753968f8.fullname" . }}
  labels:
    {{- include "go-echof72dcb71-0f57-4104-96ad-dbfa753968f8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof72dcb71-0f57-4104-96ad-dbfa753968f8.selectorLabels" . | nindent 6 }}
