apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5ea9cc92-1319-4b46-8df0-1cd83d4c0d89.fullname" . }}
  labels:
    {{- include "go-echo5ea9cc92-1319-4b46-8df0-1cd83d4c0d89.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5ea9cc92-1319-4b46-8df0-1cd83d4c0d89.selectorLabels" . | nindent 6 }}
