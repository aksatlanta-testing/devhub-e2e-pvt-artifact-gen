apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo01a1fc31-529e-428b-85d3-393af528d945.fullname" . }}
  labels:
    {{- include "go-echo01a1fc31-529e-428b-85d3-393af528d945.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo01a1fc31-529e-428b-85d3-393af528d945.selectorLabels" . | nindent 6 }}
