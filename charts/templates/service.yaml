apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoff3a5599-5788-4b71-8ebf-fbaf4cbdbff5.fullname" . }}
  labels:
    {{- include "go-echoff3a5599-5788-4b71-8ebf-fbaf4cbdbff5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoff3a5599-5788-4b71-8ebf-fbaf4cbdbff5.selectorLabels" . | nindent 6 }}
