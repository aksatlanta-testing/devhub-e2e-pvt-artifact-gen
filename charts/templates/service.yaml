apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8d1bfbec-d5ea-4390-85ed-e141b691e065.fullname" . }}
  labels:
    {{- include "go-echo8d1bfbec-d5ea-4390-85ed-e141b691e065.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8d1bfbec-d5ea-4390-85ed-e141b691e065.selectorLabels" . | nindent 6 }}
