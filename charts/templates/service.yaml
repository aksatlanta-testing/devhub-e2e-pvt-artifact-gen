apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5f9dac2d-14b3-4f9e-b65b-b09e202f91b0.fullname" . }}
  labels:
    {{- include "go-echo5f9dac2d-14b3-4f9e-b65b-b09e202f91b0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5f9dac2d-14b3-4f9e-b65b-b09e202f91b0.selectorLabels" . | nindent 6 }}
