apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo99efba1a-bfe7-4be6-b9c8-13ae8f9b79d5.fullname" . }}
  labels:
    {{- include "go-echo99efba1a-bfe7-4be6-b9c8-13ae8f9b79d5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo99efba1a-bfe7-4be6-b9c8-13ae8f9b79d5.selectorLabels" . | nindent 6 }}
