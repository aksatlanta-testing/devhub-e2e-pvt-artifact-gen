apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo112dccaf-592d-4231-adf8-a787c63e8227.fullname" . }}
  labels:
    {{- include "go-echo112dccaf-592d-4231-adf8-a787c63e8227.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo112dccaf-592d-4231-adf8-a787c63e8227.selectorLabels" . | nindent 6 }}
