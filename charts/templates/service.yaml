apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9fadc015-c681-4b6f-9550-da551212af35.fullname" . }}
  labels:
    {{- include "go-echo9fadc015-c681-4b6f-9550-da551212af35.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9fadc015-c681-4b6f-9550-da551212af35.selectorLabels" . | nindent 6 }}
