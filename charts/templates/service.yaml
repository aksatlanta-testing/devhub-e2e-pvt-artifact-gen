apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0c691aff-e4a1-4073-8b16-dccbfa2319f4.fullname" . }}
  labels:
    {{- include "go-echo0c691aff-e4a1-4073-8b16-dccbfa2319f4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0c691aff-e4a1-4073-8b16-dccbfa2319f4.selectorLabels" . | nindent 6 }}
