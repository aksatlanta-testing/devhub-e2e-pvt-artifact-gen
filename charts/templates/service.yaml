apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo15ff17a7-6e59-448a-b213-e7f5fffd0cf2.fullname" . }}
  labels:
    {{- include "go-echo15ff17a7-6e59-448a-b213-e7f5fffd0cf2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo15ff17a7-6e59-448a-b213-e7f5fffd0cf2.selectorLabels" . | nindent 6 }}
