apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1ef4c3fe-5f66-4899-b4c4-b7b46bd02f65.fullname" . }}
  labels:
    {{- include "go-echo1ef4c3fe-5f66-4899-b4c4-b7b46bd02f65.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1ef4c3fe-5f66-4899-b4c4-b7b46bd02f65.selectorLabels" . | nindent 6 }}
