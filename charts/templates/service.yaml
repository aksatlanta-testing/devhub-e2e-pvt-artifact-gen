apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7a0941ba-bfcf-46e3-837d-2071d5f3915a.fullname" . }}
  labels:
    {{- include "go-echo7a0941ba-bfcf-46e3-837d-2071d5f3915a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7a0941ba-bfcf-46e3-837d-2071d5f3915a.selectorLabels" . | nindent 6 }}
