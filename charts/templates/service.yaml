apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodbc92214-9c62-483e-8732-a3a7daa999f1.fullname" . }}
  labels:
    {{- include "go-echodbc92214-9c62-483e-8732-a3a7daa999f1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodbc92214-9c62-483e-8732-a3a7daa999f1.selectorLabels" . | nindent 6 }}
