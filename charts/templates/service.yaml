apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0233b005-8920-4b79-930c-01ee968724be.fullname" . }}
  labels:
    {{- include "go-echo0233b005-8920-4b79-930c-01ee968724be.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0233b005-8920-4b79-930c-01ee968724be.selectorLabels" . | nindent 6 }}
