apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9f6996c0-baa4-4d13-aa25-5e955ea2a65d.fullname" . }}
  labels:
    {{- include "go-echo9f6996c0-baa4-4d13-aa25-5e955ea2a65d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9f6996c0-baa4-4d13-aa25-5e955ea2a65d.selectorLabels" . | nindent 6 }}
