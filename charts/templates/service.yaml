apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo77d26215-bb1b-41ba-b5f1-c4dd0698d2f2.fullname" . }}
  labels:
    {{- include "go-echo77d26215-bb1b-41ba-b5f1-c4dd0698d2f2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo77d26215-bb1b-41ba-b5f1-c4dd0698d2f2.selectorLabels" . | nindent 6 }}
