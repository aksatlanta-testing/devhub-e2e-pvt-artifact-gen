apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe0c5232a-381f-49f9-9c5b-5043b3e68e5b.fullname" . }}
  labels:
    {{- include "go-echoe0c5232a-381f-49f9-9c5b-5043b3e68e5b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe0c5232a-381f-49f9-9c5b-5043b3e68e5b.selectorLabels" . | nindent 6 }}
