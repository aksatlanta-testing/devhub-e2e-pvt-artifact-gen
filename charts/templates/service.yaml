apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7ba80744-871e-42f6-bfab-3ced81bfa561.fullname" . }}
  labels:
    {{- include "go-echo7ba80744-871e-42f6-bfab-3ced81bfa561.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7ba80744-871e-42f6-bfab-3ced81bfa561.selectorLabels" . | nindent 6 }}
