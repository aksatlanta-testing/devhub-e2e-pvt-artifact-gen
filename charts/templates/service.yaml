apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo75b5c170-c305-4c40-a4d2-bcdbd421847d.fullname" . }}
  labels:
    {{- include "go-echo75b5c170-c305-4c40-a4d2-bcdbd421847d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo75b5c170-c305-4c40-a4d2-bcdbd421847d.selectorLabels" . | nindent 6 }}
