apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo62902224-225d-4117-be5c-8b7b53417f5b.fullname" . }}
  labels:
    {{- include "go-echo62902224-225d-4117-be5c-8b7b53417f5b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo62902224-225d-4117-be5c-8b7b53417f5b.selectorLabels" . | nindent 6 }}
