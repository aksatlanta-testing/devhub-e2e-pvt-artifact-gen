apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo00e6ef35-3fa5-48c7-816c-cd14f6cd78aa.fullname" . }}
  labels:
    {{- include "go-echo00e6ef35-3fa5-48c7-816c-cd14f6cd78aa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo00e6ef35-3fa5-48c7-816c-cd14f6cd78aa.selectorLabels" . | nindent 6 }}
