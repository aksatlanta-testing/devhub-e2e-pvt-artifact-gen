apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa63b5e35-a9cd-443b-bec6-3d8ee761287e.fullname" . }}
  labels:
    {{- include "go-echoa63b5e35-a9cd-443b-bec6-3d8ee761287e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa63b5e35-a9cd-443b-bec6-3d8ee761287e.selectorLabels" . | nindent 6 }}
