apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1dd54702-b16a-44bc-a66c-c585aa0a8253.fullname" . }}
  labels:
    {{- include "go-echo1dd54702-b16a-44bc-a66c-c585aa0a8253.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1dd54702-b16a-44bc-a66c-c585aa0a8253.selectorLabels" . | nindent 6 }}
