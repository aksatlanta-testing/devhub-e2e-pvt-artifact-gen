apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodac66ce5-5a70-4156-8c7d-8f3db3177358.fullname" . }}
  labels:
    {{- include "go-echodac66ce5-5a70-4156-8c7d-8f3db3177358.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodac66ce5-5a70-4156-8c7d-8f3db3177358.selectorLabels" . | nindent 6 }}
