apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo649cfeeb-16ca-42e2-a280-ee00f341f62e.fullname" . }}
  labels:
    {{- include "go-echo649cfeeb-16ca-42e2-a280-ee00f341f62e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo649cfeeb-16ca-42e2-a280-ee00f341f62e.selectorLabels" . | nindent 6 }}
