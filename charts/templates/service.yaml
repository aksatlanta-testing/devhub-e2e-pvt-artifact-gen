apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo647fa926-eed2-41a8-955e-c6b9182d3270.fullname" . }}
  labels:
    {{- include "go-echo647fa926-eed2-41a8-955e-c6b9182d3270.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo647fa926-eed2-41a8-955e-c6b9182d3270.selectorLabels" . | nindent 6 }}
