apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b39c69e-1623-4d66-817d-ae00ec9f6b6b.fullname" . }}
  labels:
    {{- include "go-echo0b39c69e-1623-4d66-817d-ae00ec9f6b6b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b39c69e-1623-4d66-817d-ae00ec9f6b6b.selectorLabels" . | nindent 6 }}
