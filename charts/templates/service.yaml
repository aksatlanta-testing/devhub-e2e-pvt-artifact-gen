apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo66232a98-37e2-43ce-9daa-a833876bbcdb.fullname" . }}
  labels:
    {{- include "go-echo66232a98-37e2-43ce-9daa-a833876bbcdb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo66232a98-37e2-43ce-9daa-a833876bbcdb.selectorLabels" . | nindent 6 }}
