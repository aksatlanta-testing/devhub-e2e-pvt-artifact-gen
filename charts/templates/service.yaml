apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7f1d0d07-79b2-4993-8daf-581ea0e5abdd.fullname" . }}
  labels:
    {{- include "go-echo7f1d0d07-79b2-4993-8daf-581ea0e5abdd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7f1d0d07-79b2-4993-8daf-581ea0e5abdd.selectorLabels" . | nindent 6 }}
