apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ef89c16-a9ec-4c1a-9d4a-24511348c5bd.fullname" . }}
  labels:
    {{- include "go-echo3ef89c16-a9ec-4c1a-9d4a-24511348c5bd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ef89c16-a9ec-4c1a-9d4a-24511348c5bd.selectorLabels" . | nindent 6 }}
