apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo763b3b50-f45e-4cc6-ad0b-802de21be6c0.fullname" . }}
  labels:
    {{- include "go-echo763b3b50-f45e-4cc6-ad0b-802de21be6c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo763b3b50-f45e-4cc6-ad0b-802de21be6c0.selectorLabels" . | nindent 6 }}
