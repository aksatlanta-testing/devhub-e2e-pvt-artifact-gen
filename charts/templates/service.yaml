apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5459201e-cd94-4a7a-b29d-9e5a5e226023.fullname" . }}
  labels:
    {{- include "go-echo5459201e-cd94-4a7a-b29d-9e5a5e226023.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5459201e-cd94-4a7a-b29d-9e5a5e226023.selectorLabels" . | nindent 6 }}
