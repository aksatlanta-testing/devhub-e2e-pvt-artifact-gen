apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe534df3b-1e13-4d90-9f9c-c30b26a3facd.fullname" . }}
  labels:
    {{- include "go-echoe534df3b-1e13-4d90-9f9c-c30b26a3facd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe534df3b-1e13-4d90-9f9c-c30b26a3facd.selectorLabels" . | nindent 6 }}
