apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo991397de-065a-4da1-9116-d66ad7e168a7.fullname" . }}
  labels:
    {{- include "go-echo991397de-065a-4da1-9116-d66ad7e168a7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo991397de-065a-4da1-9116-d66ad7e168a7.selectorLabels" . | nindent 6 }}
