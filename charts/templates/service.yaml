apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo95f45725-9180-4564-a075-d0ce2b55bafa.fullname" . }}
  labels:
    {{- include "go-echo95f45725-9180-4564-a075-d0ce2b55bafa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo95f45725-9180-4564-a075-d0ce2b55bafa.selectorLabels" . | nindent 6 }}
