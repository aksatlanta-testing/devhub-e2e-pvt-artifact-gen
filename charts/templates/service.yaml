apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo712efd23-3dfc-4ac7-925e-81cb641928a5.fullname" . }}
  labels:
    {{- include "go-echo712efd23-3dfc-4ac7-925e-81cb641928a5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo712efd23-3dfc-4ac7-925e-81cb641928a5.selectorLabels" . | nindent 6 }}
