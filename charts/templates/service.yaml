apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe7d104f0-894c-41a4-b8ec-515aca33b255.fullname" . }}
  labels:
    {{- include "go-echoe7d104f0-894c-41a4-b8ec-515aca33b255.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe7d104f0-894c-41a4-b8ec-515aca33b255.selectorLabels" . | nindent 6 }}
