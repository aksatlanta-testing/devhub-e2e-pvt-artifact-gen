apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob9c266f4-d1a1-4d97-b20a-d99fa874107e.fullname" . }}
  labels:
    {{- include "go-echob9c266f4-d1a1-4d97-b20a-d99fa874107e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob9c266f4-d1a1-4d97-b20a-d99fa874107e.selectorLabels" . | nindent 6 }}
