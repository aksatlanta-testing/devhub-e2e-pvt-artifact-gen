apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo88be09ce-f183-444b-8b3f-d80177485e5b.fullname" . }}
  labels:
    {{- include "go-echo88be09ce-f183-444b-8b3f-d80177485e5b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo88be09ce-f183-444b-8b3f-d80177485e5b.selectorLabels" . | nindent 6 }}
