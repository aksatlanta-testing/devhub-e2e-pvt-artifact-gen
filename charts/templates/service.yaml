apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3d689df7-d3e6-41d5-91f6-c5a53433435a.fullname" . }}
  labels:
    {{- include "go-echo3d689df7-d3e6-41d5-91f6-c5a53433435a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3d689df7-d3e6-41d5-91f6-c5a53433435a.selectorLabels" . | nindent 6 }}
