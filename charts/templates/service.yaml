apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa8784139-3103-424b-ab77-23a4d497f483.fullname" . }}
  labels:
    {{- include "go-echoa8784139-3103-424b-ab77-23a4d497f483.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa8784139-3103-424b-ab77-23a4d497f483.selectorLabels" . | nindent 6 }}
