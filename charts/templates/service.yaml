apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4a393d22-7519-4be7-a9f8-f6ee5523e0d1.fullname" . }}
  labels:
    {{- include "go-echo4a393d22-7519-4be7-a9f8-f6ee5523e0d1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4a393d22-7519-4be7-a9f8-f6ee5523e0d1.selectorLabels" . | nindent 6 }}
