apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo639fb40a-2532-4214-bdfa-07c369560849.fullname" . }}
  labels:
    {{- include "go-echo639fb40a-2532-4214-bdfa-07c369560849.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo639fb40a-2532-4214-bdfa-07c369560849.selectorLabels" . | nindent 6 }}
