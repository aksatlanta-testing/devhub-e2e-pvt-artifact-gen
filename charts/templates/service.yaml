apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo16f43686-34c5-45a1-8b32-8199bed0012b.fullname" . }}
  labels:
    {{- include "go-echo16f43686-34c5-45a1-8b32-8199bed0012b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo16f43686-34c5-45a1-8b32-8199bed0012b.selectorLabels" . | nindent 6 }}
