apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3e4bb597-2340-47ec-8fda-dab3b5d9d3a8.fullname" . }}
  labels:
    {{- include "go-echo3e4bb597-2340-47ec-8fda-dab3b5d9d3a8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3e4bb597-2340-47ec-8fda-dab3b5d9d3a8.selectorLabels" . | nindent 6 }}
