apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo027535ab-1c50-49b0-ba01-2734d7ce8e8a.fullname" . }}
  labels:
    {{- include "go-echo027535ab-1c50-49b0-ba01-2734d7ce8e8a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo027535ab-1c50-49b0-ba01-2734d7ce8e8a.selectorLabels" . | nindent 6 }}
