apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5190e54f-b817-4da5-98a1-49cdee3fa16f.fullname" . }}
  labels:
    {{- include "go-echo5190e54f-b817-4da5-98a1-49cdee3fa16f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5190e54f-b817-4da5-98a1-49cdee3fa16f.selectorLabels" . | nindent 6 }}
