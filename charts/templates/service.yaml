apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4a0d4473-70ad-45e2-8cbc-4fcb0bf72a79.fullname" . }}
  labels:
    {{- include "go-echo4a0d4473-70ad-45e2-8cbc-4fcb0bf72a79.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4a0d4473-70ad-45e2-8cbc-4fcb0bf72a79.selectorLabels" . | nindent 6 }}
