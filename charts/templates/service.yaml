apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4de5720-9b2e-4f25-b82b-a5509363c5bd.fullname" . }}
  labels:
    {{- include "go-echoc4de5720-9b2e-4f25-b82b-a5509363c5bd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4de5720-9b2e-4f25-b82b-a5509363c5bd.selectorLabels" . | nindent 6 }}
