apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa586d946-c8d5-4f55-8560-cbafc1ce0ae0.fullname" . }}
  labels:
    {{- include "go-echoa586d946-c8d5-4f55-8560-cbafc1ce0ae0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa586d946-c8d5-4f55-8560-cbafc1ce0ae0.selectorLabels" . | nindent 6 }}
