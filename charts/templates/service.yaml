apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc17d78aa-b019-42b0-95c3-6d461a742fbb.fullname" . }}
  labels:
    {{- include "go-echoc17d78aa-b019-42b0-95c3-6d461a742fbb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc17d78aa-b019-42b0-95c3-6d461a742fbb.selectorLabels" . | nindent 6 }}
