apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoebff50df-09c4-435f-bf58-e9924408be62.fullname" . }}
  labels:
    {{- include "go-echoebff50df-09c4-435f-bf58-e9924408be62.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoebff50df-09c4-435f-bf58-e9924408be62.selectorLabels" . | nindent 6 }}
