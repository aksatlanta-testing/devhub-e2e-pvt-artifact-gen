apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa1a62531-8ddd-4032-859a-af2e955a80b9.fullname" . }}
  labels:
    {{- include "go-echoa1a62531-8ddd-4032-859a-af2e955a80b9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa1a62531-8ddd-4032-859a-af2e955a80b9.selectorLabels" . | nindent 6 }}
