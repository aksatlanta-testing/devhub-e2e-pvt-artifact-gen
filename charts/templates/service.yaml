apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo83208dc7-0ea4-4cce-97db-96841fd43d6f.fullname" . }}
  labels:
    {{- include "go-echo83208dc7-0ea4-4cce-97db-96841fd43d6f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo83208dc7-0ea4-4cce-97db-96841fd43d6f.selectorLabels" . | nindent 6 }}
