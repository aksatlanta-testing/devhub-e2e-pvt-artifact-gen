apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof81a40ce-9bef-4f03-8dc1-0b663caa64b3.fullname" . }}
  labels:
    {{- include "go-echof81a40ce-9bef-4f03-8dc1-0b663caa64b3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof81a40ce-9bef-4f03-8dc1-0b663caa64b3.selectorLabels" . | nindent 6 }}
