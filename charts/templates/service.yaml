apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo370e6827-82ae-41ea-9ac5-361974bd83eb.fullname" . }}
  labels:
    {{- include "go-echo370e6827-82ae-41ea-9ac5-361974bd83eb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo370e6827-82ae-41ea-9ac5-361974bd83eb.selectorLabels" . | nindent 6 }}
