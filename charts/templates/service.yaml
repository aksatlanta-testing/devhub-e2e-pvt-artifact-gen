apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9f1775fe-17f2-4c13-8439-bc3161ae80bf.fullname" . }}
  labels:
    {{- include "go-echo9f1775fe-17f2-4c13-8439-bc3161ae80bf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9f1775fe-17f2-4c13-8439-bc3161ae80bf.selectorLabels" . | nindent 6 }}
