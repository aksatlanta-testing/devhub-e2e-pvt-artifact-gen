apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4e272dd2-c007-4800-a1bb-9358d0687fab.fullname" . }}
  labels:
    {{- include "go-echo4e272dd2-c007-4800-a1bb-9358d0687fab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4e272dd2-c007-4800-a1bb-9358d0687fab.selectorLabels" . | nindent 6 }}
