apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaad9f4ac-1a17-4031-9f91-6d34726e7fb3.fullname" . }}
  labels:
    {{- include "go-echoaad9f4ac-1a17-4031-9f91-6d34726e7fb3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaad9f4ac-1a17-4031-9f91-6d34726e7fb3.selectorLabels" . | nindent 6 }}
