apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc165d097-5294-4289-af6c-d5ee40eaad5c.fullname" . }}
  labels:
    {{- include "go-echoc165d097-5294-4289-af6c-d5ee40eaad5c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc165d097-5294-4289-af6c-d5ee40eaad5c.selectorLabels" . | nindent 6 }}
