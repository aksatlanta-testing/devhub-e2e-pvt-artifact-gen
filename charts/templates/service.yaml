apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ff30c65-0d29-4ac9-9398-272f40813e82.fullname" . }}
  labels:
    {{- include "go-echo3ff30c65-0d29-4ac9-9398-272f40813e82.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ff30c65-0d29-4ac9-9398-272f40813e82.selectorLabels" . | nindent 6 }}
