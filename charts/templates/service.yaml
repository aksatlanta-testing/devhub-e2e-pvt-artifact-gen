apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo360c4539-3ec8-4b72-b012-0d215275349f.fullname" . }}
  labels:
    {{- include "go-echo360c4539-3ec8-4b72-b012-0d215275349f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo360c4539-3ec8-4b72-b012-0d215275349f.selectorLabels" . | nindent 6 }}
