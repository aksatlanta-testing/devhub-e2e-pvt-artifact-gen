apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2a9b16a3-4758-4fe9-b66b-03c2c01b6d1d.fullname" . }}
  labels:
    {{- include "go-echo2a9b16a3-4758-4fe9-b66b-03c2c01b6d1d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2a9b16a3-4758-4fe9-b66b-03c2c01b6d1d.selectorLabels" . | nindent 6 }}
