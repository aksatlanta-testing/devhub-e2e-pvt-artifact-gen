apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3e73f00e-fbd6-46d6-a446-5942d4432661.fullname" . }}
  labels:
    {{- include "go-echo3e73f00e-fbd6-46d6-a446-5942d4432661.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3e73f00e-fbd6-46d6-a446-5942d4432661.selectorLabels" . | nindent 6 }}
