apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo940b7a97-e43d-4af2-8cfa-ae35732ef66f.fullname" . }}
  labels:
    {{- include "go-echo940b7a97-e43d-4af2-8cfa-ae35732ef66f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo940b7a97-e43d-4af2-8cfa-ae35732ef66f.selectorLabels" . | nindent 6 }}
