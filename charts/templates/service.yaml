apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc77fcd1d-079b-4b72-ba44-2f0236693467.fullname" . }}
  labels:
    {{- include "go-echoc77fcd1d-079b-4b72-ba44-2f0236693467.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc77fcd1d-079b-4b72-ba44-2f0236693467.selectorLabels" . | nindent 6 }}
