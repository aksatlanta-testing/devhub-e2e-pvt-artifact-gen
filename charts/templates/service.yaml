apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0c4c8fd4-f9a7-474d-8922-8d2ff22c0926.fullname" . }}
  labels:
    {{- include "go-echo0c4c8fd4-f9a7-474d-8922-8d2ff22c0926.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0c4c8fd4-f9a7-474d-8922-8d2ff22c0926.selectorLabels" . | nindent 6 }}
