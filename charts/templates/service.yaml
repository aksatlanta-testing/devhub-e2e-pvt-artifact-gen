apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo60c94c05-04b3-4f44-96f5-0f72cca1b79a.fullname" . }}
  labels:
    {{- include "go-echo60c94c05-04b3-4f44-96f5-0f72cca1b79a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo60c94c05-04b3-4f44-96f5-0f72cca1b79a.selectorLabels" . | nindent 6 }}
