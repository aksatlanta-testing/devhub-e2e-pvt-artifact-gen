apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo05cb9c61-8c0e-4273-8d4e-a129b2e1553e.fullname" . }}
  labels:
    {{- include "go-echo05cb9c61-8c0e-4273-8d4e-a129b2e1553e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo05cb9c61-8c0e-4273-8d4e-a129b2e1553e.selectorLabels" . | nindent 6 }}
