apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodd211a63-28aa-46bc-b7bc-3ce25acffa85.fullname" . }}
  labels:
    {{- include "go-echodd211a63-28aa-46bc-b7bc-3ce25acffa85.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodd211a63-28aa-46bc-b7bc-3ce25acffa85.selectorLabels" . | nindent 6 }}
