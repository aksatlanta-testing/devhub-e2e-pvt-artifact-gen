apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof825c7fd-9d78-4874-a47e-13663a7aea6b.fullname" . }}
  labels:
    {{- include "go-echof825c7fd-9d78-4874-a47e-13663a7aea6b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof825c7fd-9d78-4874-a47e-13663a7aea6b.selectorLabels" . | nindent 6 }}
