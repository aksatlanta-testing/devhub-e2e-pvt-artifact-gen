apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe50c14cf-39b7-4a10-be7b-cb6f81586a46.fullname" . }}
  labels:
    {{- include "go-echoe50c14cf-39b7-4a10-be7b-cb6f81586a46.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe50c14cf-39b7-4a10-be7b-cb6f81586a46.selectorLabels" . | nindent 6 }}
