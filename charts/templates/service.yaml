apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc3d41212-ee7d-45ee-ba87-fdc1fef01f0a.fullname" . }}
  labels:
    {{- include "go-echoc3d41212-ee7d-45ee-ba87-fdc1fef01f0a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc3d41212-ee7d-45ee-ba87-fdc1fef01f0a.selectorLabels" . | nindent 6 }}
