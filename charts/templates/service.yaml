apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo743e5a5f-5382-495e-9f6f-c6fdb3bdf2d7.fullname" . }}
  labels:
    {{- include "go-echo743e5a5f-5382-495e-9f6f-c6fdb3bdf2d7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo743e5a5f-5382-495e-9f6f-c6fdb3bdf2d7.selectorLabels" . | nindent 6 }}
