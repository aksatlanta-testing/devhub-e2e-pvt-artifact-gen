apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo369d11b1-8c6a-4731-99f1-512f1f661ae2.fullname" . }}
  labels:
    {{- include "go-echo369d11b1-8c6a-4731-99f1-512f1f661ae2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo369d11b1-8c6a-4731-99f1-512f1f661ae2.selectorLabels" . | nindent 6 }}
