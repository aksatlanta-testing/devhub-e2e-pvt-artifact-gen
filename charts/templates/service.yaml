apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo158649b6-eb39-465b-a5fc-0065d0aa80b2.fullname" . }}
  labels:
    {{- include "go-echo158649b6-eb39-465b-a5fc-0065d0aa80b2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo158649b6-eb39-465b-a5fc-0065d0aa80b2.selectorLabels" . | nindent 6 }}
