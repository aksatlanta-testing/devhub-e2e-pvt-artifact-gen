apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8cbba6e5-c73b-45e2-b13d-b8ad98def9d5.fullname" . }}
  labels:
    {{- include "go-echo8cbba6e5-c73b-45e2-b13d-b8ad98def9d5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8cbba6e5-c73b-45e2-b13d-b8ad98def9d5.selectorLabels" . | nindent 6 }}
