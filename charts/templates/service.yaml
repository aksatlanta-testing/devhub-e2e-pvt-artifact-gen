apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8db0db20-e1db-41ff-8787-9b12eae66226.fullname" . }}
  labels:
    {{- include "go-echo8db0db20-e1db-41ff-8787-9b12eae66226.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8db0db20-e1db-41ff-8787-9b12eae66226.selectorLabels" . | nindent 6 }}
