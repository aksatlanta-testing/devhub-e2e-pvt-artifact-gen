apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ad2f9ea-603c-4d51-a44c-839373ab0548.fullname" . }}
  labels:
    {{- include "go-echo3ad2f9ea-603c-4d51-a44c-839373ab0548.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ad2f9ea-603c-4d51-a44c-839373ab0548.selectorLabels" . | nindent 6 }}
