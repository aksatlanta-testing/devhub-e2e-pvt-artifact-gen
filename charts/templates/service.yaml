apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo788bdfa2-e7c9-4e42-bdad-bd1df73d0b8d.fullname" . }}
  labels:
    {{- include "go-echo788bdfa2-e7c9-4e42-bdad-bd1df73d0b8d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo788bdfa2-e7c9-4e42-bdad-bd1df73d0b8d.selectorLabels" . | nindent 6 }}
