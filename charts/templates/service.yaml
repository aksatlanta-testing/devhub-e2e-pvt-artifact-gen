apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8fc0196c-6695-454e-b9ea-483ca0c7eee9.fullname" . }}
  labels:
    {{- include "go-echo8fc0196c-6695-454e-b9ea-483ca0c7eee9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8fc0196c-6695-454e-b9ea-483ca0c7eee9.selectorLabels" . | nindent 6 }}
