apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7310eee7-2600-4b13-9a1c-b9e7eba90b79.fullname" . }}
  labels:
    {{- include "go-echo7310eee7-2600-4b13-9a1c-b9e7eba90b79.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7310eee7-2600-4b13-9a1c-b9e7eba90b79.selectorLabels" . | nindent 6 }}
