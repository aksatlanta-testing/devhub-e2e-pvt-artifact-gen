apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob666072c-234a-4d4a-b8c3-b5ad7ab85b31.fullname" . }}
  labels:
    {{- include "go-echob666072c-234a-4d4a-b8c3-b5ad7ab85b31.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob666072c-234a-4d4a-b8c3-b5ad7ab85b31.selectorLabels" . | nindent 6 }}
