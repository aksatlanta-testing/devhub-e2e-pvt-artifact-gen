apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo62150722-8f48-4935-a5b3-bced4ee0e46b.fullname" . }}
  labels:
    {{- include "go-echo62150722-8f48-4935-a5b3-bced4ee0e46b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo62150722-8f48-4935-a5b3-bced4ee0e46b.selectorLabels" . | nindent 6 }}
