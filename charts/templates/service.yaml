apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe68ed439-7f72-4531-859e-57070c1a4c46.fullname" . }}
  labels:
    {{- include "go-echoe68ed439-7f72-4531-859e-57070c1a4c46.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe68ed439-7f72-4531-859e-57070c1a4c46.selectorLabels" . | nindent 6 }}
