apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo684ecee2-84aa-4071-9a96-3f9a3bc37c91.fullname" . }}
  labels:
    {{- include "go-echo684ecee2-84aa-4071-9a96-3f9a3bc37c91.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo684ecee2-84aa-4071-9a96-3f9a3bc37c91.selectorLabels" . | nindent 6 }}
