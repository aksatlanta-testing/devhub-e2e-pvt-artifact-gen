apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa187823d-3395-43c0-82fd-bea560640f95.fullname" . }}
  labels:
    {{- include "go-echoa187823d-3395-43c0-82fd-bea560640f95.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa187823d-3395-43c0-82fd-bea560640f95.selectorLabels" . | nindent 6 }}
