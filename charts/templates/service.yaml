apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6b48d4a8-959a-4cad-8ec1-ac9cae46a6e4.fullname" . }}
  labels:
    {{- include "go-echo6b48d4a8-959a-4cad-8ec1-ac9cae46a6e4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6b48d4a8-959a-4cad-8ec1-ac9cae46a6e4.selectorLabels" . | nindent 6 }}
