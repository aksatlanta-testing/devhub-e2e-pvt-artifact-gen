apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo93d2ea60-4725-4704-95bc-93fa9ce23f02.fullname" . }}
  labels:
    {{- include "go-echo93d2ea60-4725-4704-95bc-93fa9ce23f02.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo93d2ea60-4725-4704-95bc-93fa9ce23f02.selectorLabels" . | nindent 6 }}
