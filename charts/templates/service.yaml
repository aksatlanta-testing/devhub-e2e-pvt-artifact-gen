apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofcd1aaef-bdea-466a-9c02-713cb8b2ae23.fullname" . }}
  labels:
    {{- include "go-echofcd1aaef-bdea-466a-9c02-713cb8b2ae23.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofcd1aaef-bdea-466a-9c02-713cb8b2ae23.selectorLabels" . | nindent 6 }}
