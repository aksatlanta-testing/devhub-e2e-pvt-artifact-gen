apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6b519bf2-7872-44c2-a1b5-c8622155f0e4.fullname" . }}
  labels:
    {{- include "go-echo6b519bf2-7872-44c2-a1b5-c8622155f0e4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6b519bf2-7872-44c2-a1b5-c8622155f0e4.selectorLabels" . | nindent 6 }}
