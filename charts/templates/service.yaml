apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8e96944e-8c0f-445b-90fe-301665bf0d37.fullname" . }}
  labels:
    {{- include "go-echo8e96944e-8c0f-445b-90fe-301665bf0d37.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8e96944e-8c0f-445b-90fe-301665bf0d37.selectorLabels" . | nindent 6 }}
