apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo57edc69f-1b1c-431e-a98b-fdb7171e29d3.fullname" . }}
  labels:
    {{- include "go-echo57edc69f-1b1c-431e-a98b-fdb7171e29d3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo57edc69f-1b1c-431e-a98b-fdb7171e29d3.selectorLabels" . | nindent 6 }}
