apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob1f2a1cb-44d6-4c28-b200-cf7c0bb79041.fullname" . }}
  labels:
    {{- include "go-echob1f2a1cb-44d6-4c28-b200-cf7c0bb79041.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob1f2a1cb-44d6-4c28-b200-cf7c0bb79041.selectorLabels" . | nindent 6 }}
