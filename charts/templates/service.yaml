apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob872de5d-f408-4ad6-98a5-8b32cf3ed555.fullname" . }}
  labels:
    {{- include "go-echob872de5d-f408-4ad6-98a5-8b32cf3ed555.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob872de5d-f408-4ad6-98a5-8b32cf3ed555.selectorLabels" . | nindent 6 }}
