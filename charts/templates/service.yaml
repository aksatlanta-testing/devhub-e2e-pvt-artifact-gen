apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4fa1d74a-fe18-44be-98cb-46dd15db6612.fullname" . }}
  labels:
    {{- include "go-echo4fa1d74a-fe18-44be-98cb-46dd15db6612.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4fa1d74a-fe18-44be-98cb-46dd15db6612.selectorLabels" . | nindent 6 }}
