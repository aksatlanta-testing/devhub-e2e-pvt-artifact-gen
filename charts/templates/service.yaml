apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoad1a1a8a-34cd-4984-bee8-49abdb6e4fa4.fullname" . }}
  labels:
    {{- include "go-echoad1a1a8a-34cd-4984-bee8-49abdb6e4fa4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoad1a1a8a-34cd-4984-bee8-49abdb6e4fa4.selectorLabels" . | nindent 6 }}
