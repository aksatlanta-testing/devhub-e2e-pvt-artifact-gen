apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod9f6a4ac-7c27-44d6-a2fb-2205cc2203a7.fullname" . }}
  labels:
    {{- include "go-echod9f6a4ac-7c27-44d6-a2fb-2205cc2203a7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod9f6a4ac-7c27-44d6-a2fb-2205cc2203a7.selectorLabels" . | nindent 6 }}
