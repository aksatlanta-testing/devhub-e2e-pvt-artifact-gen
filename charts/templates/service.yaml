apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0ce35fea-de6f-4e04-b1dc-937445ea2454.fullname" . }}
  labels:
    {{- include "go-echo0ce35fea-de6f-4e04-b1dc-937445ea2454.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0ce35fea-de6f-4e04-b1dc-937445ea2454.selectorLabels" . | nindent 6 }}
