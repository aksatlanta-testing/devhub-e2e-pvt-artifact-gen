apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo404aabd1-3bd8-4833-9f3a-030a5ff5e5af.fullname" . }}
  labels:
    {{- include "go-echo404aabd1-3bd8-4833-9f3a-030a5ff5e5af.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo404aabd1-3bd8-4833-9f3a-030a5ff5e5af.selectorLabels" . | nindent 6 }}
