apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo02b0b119-e05e-40fa-833f-ee1ef178ef33.fullname" . }}
  labels:
    {{- include "go-echo02b0b119-e05e-40fa-833f-ee1ef178ef33.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo02b0b119-e05e-40fa-833f-ee1ef178ef33.selectorLabels" . | nindent 6 }}
