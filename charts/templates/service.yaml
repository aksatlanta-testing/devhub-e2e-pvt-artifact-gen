apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4560578e-aed8-4727-abca-abcd05e5dc54.fullname" . }}
  labels:
    {{- include "go-echo4560578e-aed8-4727-abca-abcd05e5dc54.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4560578e-aed8-4727-abca-abcd05e5dc54.selectorLabels" . | nindent 6 }}
