apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod7127c76-fd0d-473f-bc9a-8f7446625685.fullname" . }}
  labels:
    {{- include "go-echod7127c76-fd0d-473f-bc9a-8f7446625685.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod7127c76-fd0d-473f-bc9a-8f7446625685.selectorLabels" . | nindent 6 }}
