apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1b5ef7bb-8182-474c-948a-24f749b213c8.fullname" . }}
  labels:
    {{- include "go-echo1b5ef7bb-8182-474c-948a-24f749b213c8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1b5ef7bb-8182-474c-948a-24f749b213c8.selectorLabels" . | nindent 6 }}
