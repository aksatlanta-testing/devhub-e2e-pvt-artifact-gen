apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocdf309eb-3d3b-41c6-9418-caa996302d79.fullname" . }}
  labels:
    {{- include "go-echocdf309eb-3d3b-41c6-9418-caa996302d79.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocdf309eb-3d3b-41c6-9418-caa996302d79.selectorLabels" . | nindent 6 }}
