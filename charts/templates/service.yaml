apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4395c080-cc79-48af-820a-c492da3e5903.fullname" . }}
  labels:
    {{- include "go-echo4395c080-cc79-48af-820a-c492da3e5903.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4395c080-cc79-48af-820a-c492da3e5903.selectorLabels" . | nindent 6 }}
