apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3a869281-2aae-440c-85e8-92d32cc15051.fullname" . }}
  labels:
    {{- include "go-echo3a869281-2aae-440c-85e8-92d32cc15051.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3a869281-2aae-440c-85e8-92d32cc15051.selectorLabels" . | nindent 6 }}
