apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7d9b8006-33f8-4579-8931-6d833b9e4c3a.fullname" . }}
  labels:
    {{- include "go-echo7d9b8006-33f8-4579-8931-6d833b9e4c3a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7d9b8006-33f8-4579-8931-6d833b9e4c3a.selectorLabels" . | nindent 6 }}
