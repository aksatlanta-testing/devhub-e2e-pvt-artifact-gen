apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo325bdb80-2dd2-45fc-8550-5eceecb5827c.fullname" . }}
  labels:
    {{- include "go-echo325bdb80-2dd2-45fc-8550-5eceecb5827c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo325bdb80-2dd2-45fc-8550-5eceecb5827c.selectorLabels" . | nindent 6 }}
