apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo06f4bccd-23f5-406d-adda-bbe21a01b664.fullname" . }}
  labels:
    {{- include "go-echo06f4bccd-23f5-406d-adda-bbe21a01b664.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo06f4bccd-23f5-406d-adda-bbe21a01b664.selectorLabels" . | nindent 6 }}
