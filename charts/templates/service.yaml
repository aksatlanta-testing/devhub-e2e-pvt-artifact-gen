apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo35e6ffb9-cd03-4714-a75d-98a2d11c08d7.fullname" . }}
  labels:
    {{- include "go-echo35e6ffb9-cd03-4714-a75d-98a2d11c08d7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo35e6ffb9-cd03-4714-a75d-98a2d11c08d7.selectorLabels" . | nindent 6 }}
