apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4e2aede0-5654-4d97-89b0-768847185cd2.fullname" . }}
  labels:
    {{- include "go-echo4e2aede0-5654-4d97-89b0-768847185cd2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4e2aede0-5654-4d97-89b0-768847185cd2.selectorLabels" . | nindent 6 }}
