apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo264984f6-d257-4370-8862-ae58886d619e.fullname" . }}
  labels:
    {{- include "go-echo264984f6-d257-4370-8862-ae58886d619e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo264984f6-d257-4370-8862-ae58886d619e.selectorLabels" . | nindent 6 }}
