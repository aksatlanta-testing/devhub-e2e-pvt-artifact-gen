apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2c92f71a-3f25-4c9b-9b5b-1c5cf4ee57b1.fullname" . }}
  labels:
    {{- include "go-echo2c92f71a-3f25-4c9b-9b5b-1c5cf4ee57b1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2c92f71a-3f25-4c9b-9b5b-1c5cf4ee57b1.selectorLabels" . | nindent 6 }}
