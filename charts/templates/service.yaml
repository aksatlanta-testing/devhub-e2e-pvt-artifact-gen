apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7bd345ac-c55f-42da-8632-07bba702756d.fullname" . }}
  labels:
    {{- include "go-echo7bd345ac-c55f-42da-8632-07bba702756d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7bd345ac-c55f-42da-8632-07bba702756d.selectorLabels" . | nindent 6 }}
