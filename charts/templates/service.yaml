apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3f0a831f-dbb1-4827-9c9e-c304c454b707.fullname" . }}
  labels:
    {{- include "go-echo3f0a831f-dbb1-4827-9c9e-c304c454b707.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3f0a831f-dbb1-4827-9c9e-c304c454b707.selectorLabels" . | nindent 6 }}
