apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo73079288-9e65-420a-9c8b-cc1736665f0c.fullname" . }}
  labels:
    {{- include "go-echo73079288-9e65-420a-9c8b-cc1736665f0c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo73079288-9e65-420a-9c8b-cc1736665f0c.selectorLabels" . | nindent 6 }}
