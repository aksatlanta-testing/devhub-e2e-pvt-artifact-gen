apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe8dc4b04-f7aa-44de-a2d1-0a4bbaa801c0.fullname" . }}
  labels:
    {{- include "go-echoe8dc4b04-f7aa-44de-a2d1-0a4bbaa801c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe8dc4b04-f7aa-44de-a2d1-0a4bbaa801c0.selectorLabels" . | nindent 6 }}
