apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa74b2be4-2535-4351-8ce8-f13b62771044.fullname" . }}
  labels:
    {{- include "go-echoa74b2be4-2535-4351-8ce8-f13b62771044.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa74b2be4-2535-4351-8ce8-f13b62771044.selectorLabels" . | nindent 6 }}
