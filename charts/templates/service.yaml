apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof86af585-0fb5-4842-88fc-380d2dbdbc89.fullname" . }}
  labels:
    {{- include "go-echof86af585-0fb5-4842-88fc-380d2dbdbc89.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof86af585-0fb5-4842-88fc-380d2dbdbc89.selectorLabels" . | nindent 6 }}
