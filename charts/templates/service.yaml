apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7807e3ec-70d8-467e-907a-dd25772119c2.fullname" . }}
  labels:
    {{- include "go-echo7807e3ec-70d8-467e-907a-dd25772119c2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7807e3ec-70d8-467e-907a-dd25772119c2.selectorLabels" . | nindent 6 }}
