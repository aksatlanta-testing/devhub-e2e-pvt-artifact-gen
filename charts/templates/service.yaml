apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodb55a045-981a-44f4-8303-7748683afb6e.fullname" . }}
  labels:
    {{- include "go-echodb55a045-981a-44f4-8303-7748683afb6e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodb55a045-981a-44f4-8303-7748683afb6e.selectorLabels" . | nindent 6 }}
