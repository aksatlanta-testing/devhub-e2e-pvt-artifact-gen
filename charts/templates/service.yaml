apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6de756a6-3dce-4084-aeb5-b6fa5ed26be3.fullname" . }}
  labels:
    {{- include "go-echo6de756a6-3dce-4084-aeb5-b6fa5ed26be3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6de756a6-3dce-4084-aeb5-b6fa5ed26be3.selectorLabels" . | nindent 6 }}
