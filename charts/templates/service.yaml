apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1aed6824-4bd2-4764-b4bd-0d0f289fd236.fullname" . }}
  labels:
    {{- include "go-echo1aed6824-4bd2-4764-b4bd-0d0f289fd236.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1aed6824-4bd2-4764-b4bd-0d0f289fd236.selectorLabels" . | nindent 6 }}
