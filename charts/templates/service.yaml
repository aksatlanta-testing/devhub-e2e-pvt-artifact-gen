apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaea4150d-bf77-4f01-b20e-215976d1a15a.fullname" . }}
  labels:
    {{- include "go-echoaea4150d-bf77-4f01-b20e-215976d1a15a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaea4150d-bf77-4f01-b20e-215976d1a15a.selectorLabels" . | nindent 6 }}
