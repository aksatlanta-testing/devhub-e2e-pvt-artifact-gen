apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo16300bcf-ecb3-4686-bf95-4dffef09d33c.fullname" . }}
  labels:
    {{- include "go-echo16300bcf-ecb3-4686-bf95-4dffef09d33c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo16300bcf-ecb3-4686-bf95-4dffef09d33c.selectorLabels" . | nindent 6 }}
