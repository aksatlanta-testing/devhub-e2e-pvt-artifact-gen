apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo53887ad9-f2cc-49f5-93d1-e9c3181b0281.fullname" . }}
  labels:
    {{- include "go-echo53887ad9-f2cc-49f5-93d1-e9c3181b0281.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo53887ad9-f2cc-49f5-93d1-e9c3181b0281.selectorLabels" . | nindent 6 }}
