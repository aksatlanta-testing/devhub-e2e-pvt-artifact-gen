apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo21483a6e-9349-41c4-9a56-d890c6fa18b3.fullname" . }}
  labels:
    {{- include "go-echo21483a6e-9349-41c4-9a56-d890c6fa18b3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo21483a6e-9349-41c4-9a56-d890c6fa18b3.selectorLabels" . | nindent 6 }}
