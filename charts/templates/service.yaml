apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7e90223d-c9e9-44ef-88ae-7248d5eccd54.fullname" . }}
  labels:
    {{- include "go-echo7e90223d-c9e9-44ef-88ae-7248d5eccd54.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7e90223d-c9e9-44ef-88ae-7248d5eccd54.selectorLabels" . | nindent 6 }}
