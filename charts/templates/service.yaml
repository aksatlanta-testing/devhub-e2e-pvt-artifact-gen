apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe8dce8ba-999b-4c05-a290-d842e145a0c6.fullname" . }}
  labels:
    {{- include "go-echoe8dce8ba-999b-4c05-a290-d842e145a0c6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe8dce8ba-999b-4c05-a290-d842e145a0c6.selectorLabels" . | nindent 6 }}
