apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof1ada1d3-c242-4cc4-be4d-c95daa495946.fullname" . }}
  labels:
    {{- include "go-echof1ada1d3-c242-4cc4-be4d-c95daa495946.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof1ada1d3-c242-4cc4-be4d-c95daa495946.selectorLabels" . | nindent 6 }}
