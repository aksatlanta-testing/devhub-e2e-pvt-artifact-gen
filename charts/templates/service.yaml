apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob399bd13-45d5-4299-a211-46fac25037fd.fullname" . }}
  labels:
    {{- include "go-echob399bd13-45d5-4299-a211-46fac25037fd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob399bd13-45d5-4299-a211-46fac25037fd.selectorLabels" . | nindent 6 }}
