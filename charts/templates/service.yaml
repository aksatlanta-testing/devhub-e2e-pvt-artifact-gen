apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9c2da2ec-bf36-4382-9b7d-f69d863fc01a.fullname" . }}
  labels:
    {{- include "go-echo9c2da2ec-bf36-4382-9b7d-f69d863fc01a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9c2da2ec-bf36-4382-9b7d-f69d863fc01a.selectorLabels" . | nindent 6 }}
