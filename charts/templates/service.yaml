apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6ef5c358-c8ab-4303-8892-68a077362242.fullname" . }}
  labels:
    {{- include "go-echo6ef5c358-c8ab-4303-8892-68a077362242.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6ef5c358-c8ab-4303-8892-68a077362242.selectorLabels" . | nindent 6 }}
