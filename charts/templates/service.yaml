apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe2b7cdd-0120-4bef-ba6c-6008796c06ab.fullname" . }}
  labels:
    {{- include "go-echofe2b7cdd-0120-4bef-ba6c-6008796c06ab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe2b7cdd-0120-4bef-ba6c-6008796c06ab.selectorLabels" . | nindent 6 }}
