apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoed87d4e5-47fb-4aec-8642-da6ab8036e06.fullname" . }}
  labels:
    {{- include "go-echoed87d4e5-47fb-4aec-8642-da6ab8036e06.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoed87d4e5-47fb-4aec-8642-da6ab8036e06.selectorLabels" . | nindent 6 }}
