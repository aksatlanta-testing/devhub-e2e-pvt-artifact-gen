apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo444e98e2-35ce-42e5-8a82-1df09b33a26c.fullname" . }}
  labels:
    {{- include "go-echo444e98e2-35ce-42e5-8a82-1df09b33a26c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo444e98e2-35ce-42e5-8a82-1df09b33a26c.selectorLabels" . | nindent 6 }}
