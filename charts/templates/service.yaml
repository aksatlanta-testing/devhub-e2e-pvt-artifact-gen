apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod271f2fc-43a9-462c-8c67-920a9bb8ac88.fullname" . }}
  labels:
    {{- include "go-echod271f2fc-43a9-462c-8c67-920a9bb8ac88.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod271f2fc-43a9-462c-8c67-920a9bb8ac88.selectorLabels" . | nindent 6 }}
