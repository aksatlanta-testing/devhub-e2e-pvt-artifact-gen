apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc702b806-a270-4523-97e4-f2fb0945bfa0.fullname" . }}
  labels:
    {{- include "go-echoc702b806-a270-4523-97e4-f2fb0945bfa0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc702b806-a270-4523-97e4-f2fb0945bfa0.selectorLabels" . | nindent 6 }}
