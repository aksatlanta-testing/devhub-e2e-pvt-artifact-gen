apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe51c5989-e1ee-40bd-8469-181be10b6b96.fullname" . }}
  labels:
    {{- include "go-echoe51c5989-e1ee-40bd-8469-181be10b6b96.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe51c5989-e1ee-40bd-8469-181be10b6b96.selectorLabels" . | nindent 6 }}
