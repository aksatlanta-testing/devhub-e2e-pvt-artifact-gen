apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodc78f435-28fe-4e62-9c55-ab9ccc1a171e.fullname" . }}
  labels:
    {{- include "go-echodc78f435-28fe-4e62-9c55-ab9ccc1a171e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodc78f435-28fe-4e62-9c55-ab9ccc1a171e.selectorLabels" . | nindent 6 }}
