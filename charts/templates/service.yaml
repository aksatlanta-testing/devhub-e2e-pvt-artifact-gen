apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoad8bbe28-5946-4366-a8e6-aa006a192670.fullname" . }}
  labels:
    {{- include "go-echoad8bbe28-5946-4366-a8e6-aa006a192670.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoad8bbe28-5946-4366-a8e6-aa006a192670.selectorLabels" . | nindent 6 }}
