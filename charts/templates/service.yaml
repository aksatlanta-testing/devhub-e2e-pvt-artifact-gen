apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodaab501b-2bb4-41dd-9591-9f39691bd333.fullname" . }}
  labels:
    {{- include "go-echodaab501b-2bb4-41dd-9591-9f39691bd333.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodaab501b-2bb4-41dd-9591-9f39691bd333.selectorLabels" . | nindent 6 }}
