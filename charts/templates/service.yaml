apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo461d4149-c176-4150-a323-9e255fd56907.fullname" . }}
  labels:
    {{- include "go-echo461d4149-c176-4150-a323-9e255fd56907.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo461d4149-c176-4150-a323-9e255fd56907.selectorLabels" . | nindent 6 }}
