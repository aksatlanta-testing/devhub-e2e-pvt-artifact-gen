apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9514ac4d-2349-4fd0-8e0c-b5a0c983908f.fullname" . }}
  labels:
    {{- include "go-echo9514ac4d-2349-4fd0-8e0c-b5a0c983908f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9514ac4d-2349-4fd0-8e0c-b5a0c983908f.selectorLabels" . | nindent 6 }}
