apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo11833f45-2f98-4997-9fbb-45dde46c7c79.fullname" . }}
  labels:
    {{- include "go-echo11833f45-2f98-4997-9fbb-45dde46c7c79.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo11833f45-2f98-4997-9fbb-45dde46c7c79.selectorLabels" . | nindent 6 }}
