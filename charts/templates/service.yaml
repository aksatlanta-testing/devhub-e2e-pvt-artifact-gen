apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1b72356b-7680-4b6c-b534-5b440d50e9e0.fullname" . }}
  labels:
    {{- include "go-echo1b72356b-7680-4b6c-b534-5b440d50e9e0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1b72356b-7680-4b6c-b534-5b440d50e9e0.selectorLabels" . | nindent 6 }}
