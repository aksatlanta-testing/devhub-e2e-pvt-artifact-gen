apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo50bbbd20-bf7a-499f-910d-fb5614ab845a.fullname" . }}
  labels:
    {{- include "go-echo50bbbd20-bf7a-499f-910d-fb5614ab845a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo50bbbd20-bf7a-499f-910d-fb5614ab845a.selectorLabels" . | nindent 6 }}
