apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo99f95207-4471-4ef6-b45d-d11b8423533c.fullname" . }}
  labels:
    {{- include "go-echo99f95207-4471-4ef6-b45d-d11b8423533c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo99f95207-4471-4ef6-b45d-d11b8423533c.selectorLabels" . | nindent 6 }}
