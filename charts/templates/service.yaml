apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof50d9ddb-e4d3-4bdc-9f0e-0302bf146f66.fullname" . }}
  labels:
    {{- include "go-echof50d9ddb-e4d3-4bdc-9f0e-0302bf146f66.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof50d9ddb-e4d3-4bdc-9f0e-0302bf146f66.selectorLabels" . | nindent 6 }}
