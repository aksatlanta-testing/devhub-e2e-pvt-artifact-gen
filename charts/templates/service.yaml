apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2395d454-ba5c-4a26-a127-0103cec44679.fullname" . }}
  labels:
    {{- include "go-echo2395d454-ba5c-4a26-a127-0103cec44679.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2395d454-ba5c-4a26-a127-0103cec44679.selectorLabels" . | nindent 6 }}
