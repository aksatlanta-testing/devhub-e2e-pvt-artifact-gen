apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04d3d047-cca9-479f-9f9f-9d405e9fc590.fullname" . }}
  labels:
    {{- include "go-echo04d3d047-cca9-479f-9f9f-9d405e9fc590.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04d3d047-cca9-479f-9f9f-9d405e9fc590.selectorLabels" . | nindent 6 }}
