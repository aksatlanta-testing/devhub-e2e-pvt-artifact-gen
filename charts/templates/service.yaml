apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo15700da4-9eec-4fd3-b8f5-37d4e9bacb72.fullname" . }}
  labels:
    {{- include "go-echo15700da4-9eec-4fd3-b8f5-37d4e9bacb72.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo15700da4-9eec-4fd3-b8f5-37d4e9bacb72.selectorLabels" . | nindent 6 }}
