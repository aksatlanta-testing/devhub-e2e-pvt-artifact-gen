apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoec3e9e71-ec02-430e-9cd7-70e83aecf1e9.fullname" . }}
  labels:
    {{- include "go-echoec3e9e71-ec02-430e-9cd7-70e83aecf1e9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoec3e9e71-ec02-430e-9cd7-70e83aecf1e9.selectorLabels" . | nindent 6 }}
