apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod9e1fb18-29fd-48cc-b510-6417100b41dc.fullname" . }}
  labels:
    {{- include "go-echod9e1fb18-29fd-48cc-b510-6417100b41dc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod9e1fb18-29fd-48cc-b510-6417100b41dc.selectorLabels" . | nindent 6 }}
