apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1b7868bd-9606-4917-881c-e9f2021479db.fullname" . }}
  labels:
    {{- include "go-echo1b7868bd-9606-4917-881c-e9f2021479db.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1b7868bd-9606-4917-881c-e9f2021479db.selectorLabels" . | nindent 6 }}
