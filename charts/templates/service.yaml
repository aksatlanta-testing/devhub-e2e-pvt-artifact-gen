apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo567071d6-f4db-4be6-9608-3cbf32b7d984.fullname" . }}
  labels:
    {{- include "go-echo567071d6-f4db-4be6-9608-3cbf32b7d984.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo567071d6-f4db-4be6-9608-3cbf32b7d984.selectorLabels" . | nindent 6 }}
