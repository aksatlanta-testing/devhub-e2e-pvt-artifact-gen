apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobb382d03-6174-4027-834e-9d671320c0ab.fullname" . }}
  labels:
    {{- include "go-echobb382d03-6174-4027-834e-9d671320c0ab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobb382d03-6174-4027-834e-9d671320c0ab.selectorLabels" . | nindent 6 }}
