apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo87b9a04b-3879-4a74-bd21-c894cd3f620f.fullname" . }}
  labels:
    {{- include "go-echo87b9a04b-3879-4a74-bd21-c894cd3f620f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo87b9a04b-3879-4a74-bd21-c894cd3f620f.selectorLabels" . | nindent 6 }}
