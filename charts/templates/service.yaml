apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3e63ee96-1f80-430c-98ae-8ae16c7b8e8d.fullname" . }}
  labels:
    {{- include "go-echo3e63ee96-1f80-430c-98ae-8ae16c7b8e8d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3e63ee96-1f80-430c-98ae-8ae16c7b8e8d.selectorLabels" . | nindent 6 }}
