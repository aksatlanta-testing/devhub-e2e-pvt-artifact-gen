apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9b77e908-d028-4cb7-9150-b2ccdcdac9a4.fullname" . }}
  labels:
    {{- include "go-echo9b77e908-d028-4cb7-9150-b2ccdcdac9a4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9b77e908-d028-4cb7-9150-b2ccdcdac9a4.selectorLabels" . | nindent 6 }}
