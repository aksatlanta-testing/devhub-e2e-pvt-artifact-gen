apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo43e1e632-e184-49af-8eb8-d6416cd1b1f9.fullname" . }}
  labels:
    {{- include "go-echo43e1e632-e184-49af-8eb8-d6416cd1b1f9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo43e1e632-e184-49af-8eb8-d6416cd1b1f9.selectorLabels" . | nindent 6 }}
