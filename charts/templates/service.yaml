apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4bdf3dad-6e83-4228-972c-b3499b175b1a.fullname" . }}
  labels:
    {{- include "go-echo4bdf3dad-6e83-4228-972c-b3499b175b1a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4bdf3dad-6e83-4228-972c-b3499b175b1a.selectorLabels" . | nindent 6 }}
