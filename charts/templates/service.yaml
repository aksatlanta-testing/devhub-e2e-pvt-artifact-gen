apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4fdc8018-d75d-4b8a-8766-e7b5ba5e3865.fullname" . }}
  labels:
    {{- include "go-echo4fdc8018-d75d-4b8a-8766-e7b5ba5e3865.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4fdc8018-d75d-4b8a-8766-e7b5ba5e3865.selectorLabels" . | nindent 6 }}
