apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof53cf2e8-1ce6-4142-862f-7f7865ed2039.fullname" . }}
  labels:
    {{- include "go-echof53cf2e8-1ce6-4142-862f-7f7865ed2039.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof53cf2e8-1ce6-4142-862f-7f7865ed2039.selectorLabels" . | nindent 6 }}
