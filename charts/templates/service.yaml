apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3454c2c1-d051-4eba-8122-3f6d1262e0a4.fullname" . }}
  labels:
    {{- include "go-echo3454c2c1-d051-4eba-8122-3f6d1262e0a4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3454c2c1-d051-4eba-8122-3f6d1262e0a4.selectorLabels" . | nindent 6 }}
