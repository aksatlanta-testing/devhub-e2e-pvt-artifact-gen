apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof8e94977-c0f6-4366-8aaf-157bb628b7d5.fullname" . }}
  labels:
    {{- include "go-echof8e94977-c0f6-4366-8aaf-157bb628b7d5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof8e94977-c0f6-4366-8aaf-157bb628b7d5.selectorLabels" . | nindent 6 }}
