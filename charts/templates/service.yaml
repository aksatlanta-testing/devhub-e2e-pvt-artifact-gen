apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo690edfa8-2f17-4dda-9dda-7911abfc6c7c.fullname" . }}
  labels:
    {{- include "go-echo690edfa8-2f17-4dda-9dda-7911abfc6c7c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo690edfa8-2f17-4dda-9dda-7911abfc6c7c.selectorLabels" . | nindent 6 }}
