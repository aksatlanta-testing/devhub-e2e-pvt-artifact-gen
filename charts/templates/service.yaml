apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoecbb7311-1f8d-47c9-b030-305226e1bea2.fullname" . }}
  labels:
    {{- include "go-echoecbb7311-1f8d-47c9-b030-305226e1bea2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoecbb7311-1f8d-47c9-b030-305226e1bea2.selectorLabels" . | nindent 6 }}
