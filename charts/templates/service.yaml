apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b0b4271-bf22-4044-9e0f-d552ad683714.fullname" . }}
  labels:
    {{- include "go-echo0b0b4271-bf22-4044-9e0f-d552ad683714.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b0b4271-bf22-4044-9e0f-d552ad683714.selectorLabels" . | nindent 6 }}
