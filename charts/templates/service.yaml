apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4af96d0a-147b-48b1-8e4c-5c5477da77c3.fullname" . }}
  labels:
    {{- include "go-echo4af96d0a-147b-48b1-8e4c-5c5477da77c3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4af96d0a-147b-48b1-8e4c-5c5477da77c3.selectorLabels" . | nindent 6 }}
