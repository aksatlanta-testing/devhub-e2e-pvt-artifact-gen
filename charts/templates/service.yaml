apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0f9938fd-af5d-438a-922d-ed850c9de29c.fullname" . }}
  labels:
    {{- include "go-echo0f9938fd-af5d-438a-922d-ed850c9de29c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0f9938fd-af5d-438a-922d-ed850c9de29c.selectorLabels" . | nindent 6 }}
