apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo188e5f44-7041-4e39-8ff3-b6796702d155.fullname" . }}
  labels:
    {{- include "go-echo188e5f44-7041-4e39-8ff3-b6796702d155.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo188e5f44-7041-4e39-8ff3-b6796702d155.selectorLabels" . | nindent 6 }}
