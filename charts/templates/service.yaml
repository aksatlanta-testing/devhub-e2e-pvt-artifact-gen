apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoca8edffe-17c2-4b99-9a6c-e268e22a245b.fullname" . }}
  labels:
    {{- include "go-echoca8edffe-17c2-4b99-9a6c-e268e22a245b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoca8edffe-17c2-4b99-9a6c-e268e22a245b.selectorLabels" . | nindent 6 }}
