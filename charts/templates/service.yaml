apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod2e62d06-be84-4567-a5e3-66bdbf41e845.fullname" . }}
  labels:
    {{- include "go-echod2e62d06-be84-4567-a5e3-66bdbf41e845.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod2e62d06-be84-4567-a5e3-66bdbf41e845.selectorLabels" . | nindent 6 }}
