apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo674ddb44-09c1-4c71-b292-c92dc61ec4df.fullname" . }}
  labels:
    {{- include "go-echo674ddb44-09c1-4c71-b292-c92dc61ec4df.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo674ddb44-09c1-4c71-b292-c92dc61ec4df.selectorLabels" . | nindent 6 }}
