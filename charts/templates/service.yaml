apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04682b9c-0f6f-490b-8569-8a0bd11cff5f.fullname" . }}
  labels:
    {{- include "go-echo04682b9c-0f6f-490b-8569-8a0bd11cff5f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04682b9c-0f6f-490b-8569-8a0bd11cff5f.selectorLabels" . | nindent 6 }}
