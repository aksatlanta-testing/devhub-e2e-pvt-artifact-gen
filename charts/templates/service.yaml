apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe73d4367-6028-4db8-8f7b-88f079123de2.fullname" . }}
  labels:
    {{- include "go-echoe73d4367-6028-4db8-8f7b-88f079123de2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe73d4367-6028-4db8-8f7b-88f079123de2.selectorLabels" . | nindent 6 }}
