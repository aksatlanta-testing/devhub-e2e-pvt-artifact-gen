apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0dba7e35-6f73-4f81-9b1e-685c1c11452f.fullname" . }}
  labels:
    {{- include "go-echo0dba7e35-6f73-4f81-9b1e-685c1c11452f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0dba7e35-6f73-4f81-9b1e-685c1c11452f.selectorLabels" . | nindent 6 }}
