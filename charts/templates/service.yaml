apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8c68df6-9903-46b7-9207-32f21c24b783.fullname" . }}
  labels:
    {{- include "go-echoc8c68df6-9903-46b7-9207-32f21c24b783.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8c68df6-9903-46b7-9207-32f21c24b783.selectorLabels" . | nindent 6 }}
