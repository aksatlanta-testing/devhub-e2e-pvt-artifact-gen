apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodc557b27-fa0f-4cce-aad5-3254f49fd46c.fullname" . }}
  labels:
    {{- include "go-echodc557b27-fa0f-4cce-aad5-3254f49fd46c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodc557b27-fa0f-4cce-aad5-3254f49fd46c.selectorLabels" . | nindent 6 }}
