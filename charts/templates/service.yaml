apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2c62c76d-6932-422d-955d-70c3d290ebf1.fullname" . }}
  labels:
    {{- include "go-echo2c62c76d-6932-422d-955d-70c3d290ebf1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2c62c76d-6932-422d-955d-70c3d290ebf1.selectorLabels" . | nindent 6 }}
