apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa8ef7e03-0b18-4e18-a44a-26ccdcec193a.fullname" . }}
  labels:
    {{- include "go-echoa8ef7e03-0b18-4e18-a44a-26ccdcec193a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa8ef7e03-0b18-4e18-a44a-26ccdcec193a.selectorLabels" . | nindent 6 }}
