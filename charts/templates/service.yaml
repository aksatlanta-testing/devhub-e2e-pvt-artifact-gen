apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9709e1a7-ac87-4c49-ad56-9fc4dd5445db.fullname" . }}
  labels:
    {{- include "go-echo9709e1a7-ac87-4c49-ad56-9fc4dd5445db.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9709e1a7-ac87-4c49-ad56-9fc4dd5445db.selectorLabels" . | nindent 6 }}
