apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8d2faf58-53b5-4996-a026-26d0a2df7963.fullname" . }}
  labels:
    {{- include "go-echo8d2faf58-53b5-4996-a026-26d0a2df7963.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8d2faf58-53b5-4996-a026-26d0a2df7963.selectorLabels" . | nindent 6 }}
