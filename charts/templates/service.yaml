apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod6139a9d-4c63-4088-839b-385d1e87cd0d.fullname" . }}
  labels:
    {{- include "go-echod6139a9d-4c63-4088-839b-385d1e87cd0d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod6139a9d-4c63-4088-839b-385d1e87cd0d.selectorLabels" . | nindent 6 }}
