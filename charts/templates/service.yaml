apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof27aaf41-0b3b-44a6-b5da-0842872436af.fullname" . }}
  labels:
    {{- include "go-echof27aaf41-0b3b-44a6-b5da-0842872436af.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof27aaf41-0b3b-44a6-b5da-0842872436af.selectorLabels" . | nindent 6 }}
