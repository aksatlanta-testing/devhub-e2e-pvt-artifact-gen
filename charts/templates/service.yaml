apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo18726f50-00d2-4c0e-8a59-28fc051ce34e.fullname" . }}
  labels:
    {{- include "go-echo18726f50-00d2-4c0e-8a59-28fc051ce34e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo18726f50-00d2-4c0e-8a59-28fc051ce34e.selectorLabels" . | nindent 6 }}
