apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoba4fdfee-55da-4001-b1c8-6bf9f1e72d8b.fullname" . }}
  labels:
    {{- include "go-echoba4fdfee-55da-4001-b1c8-6bf9f1e72d8b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoba4fdfee-55da-4001-b1c8-6bf9f1e72d8b.selectorLabels" . | nindent 6 }}
