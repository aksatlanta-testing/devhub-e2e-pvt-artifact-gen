apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof10ca14b-028d-4186-ae9e-74b28e9f1879.fullname" . }}
  labels:
    {{- include "go-echof10ca14b-028d-4186-ae9e-74b28e9f1879.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof10ca14b-028d-4186-ae9e-74b28e9f1879.selectorLabels" . | nindent 6 }}
