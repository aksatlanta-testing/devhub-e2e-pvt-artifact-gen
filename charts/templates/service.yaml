apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9ec48737-b43b-4a20-a692-2ac13a24cde1.fullname" . }}
  labels:
    {{- include "go-echo9ec48737-b43b-4a20-a692-2ac13a24cde1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9ec48737-b43b-4a20-a692-2ac13a24cde1.selectorLabels" . | nindent 6 }}
