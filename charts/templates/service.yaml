apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo77849318-8ae2-494e-9412-568e3bb6c48d.fullname" . }}
  labels:
    {{- include "go-echo77849318-8ae2-494e-9412-568e3bb6c48d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo77849318-8ae2-494e-9412-568e3bb6c48d.selectorLabels" . | nindent 6 }}
