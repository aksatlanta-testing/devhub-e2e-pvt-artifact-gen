apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo90fa7b2e-d409-44c7-b113-05b0371ae362.fullname" . }}
  labels:
    {{- include "go-echo90fa7b2e-d409-44c7-b113-05b0371ae362.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo90fa7b2e-d409-44c7-b113-05b0371ae362.selectorLabels" . | nindent 6 }}
