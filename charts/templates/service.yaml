apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9808c76e-9e6d-4170-8f78-3b2a6de27912.fullname" . }}
  labels:
    {{- include "go-echo9808c76e-9e6d-4170-8f78-3b2a6de27912.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9808c76e-9e6d-4170-8f78-3b2a6de27912.selectorLabels" . | nindent 6 }}
