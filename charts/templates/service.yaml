apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8e0db55-e4e8-407a-9e0d-6cb7466df5dd.fullname" . }}
  labels:
    {{- include "go-echoc8e0db55-e4e8-407a-9e0d-6cb7466df5dd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8e0db55-e4e8-407a-9e0d-6cb7466df5dd.selectorLabels" . | nindent 6 }}
