apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8d39d313-9a5b-4880-a5fe-6e5da02015a5.fullname" . }}
  labels:
    {{- include "go-echo8d39d313-9a5b-4880-a5fe-6e5da02015a5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8d39d313-9a5b-4880-a5fe-6e5da02015a5.selectorLabels" . | nindent 6 }}
