apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof97bf2af-c878-4527-8220-b7e462f78388.fullname" . }}
  labels:
    {{- include "go-echof97bf2af-c878-4527-8220-b7e462f78388.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof97bf2af-c878-4527-8220-b7e462f78388.selectorLabels" . | nindent 6 }}
