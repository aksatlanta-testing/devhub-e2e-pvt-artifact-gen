apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6937adb6-3733-475e-8b9f-9dfcca9f9c44.fullname" . }}
  labels:
    {{- include "go-echo6937adb6-3733-475e-8b9f-9dfcca9f9c44.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6937adb6-3733-475e-8b9f-9dfcca9f9c44.selectorLabels" . | nindent 6 }}
