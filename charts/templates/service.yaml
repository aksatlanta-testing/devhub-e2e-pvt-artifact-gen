apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof15fba43-fc43-404a-9a98-8182e276dd3c.fullname" . }}
  labels:
    {{- include "go-echof15fba43-fc43-404a-9a98-8182e276dd3c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof15fba43-fc43-404a-9a98-8182e276dd3c.selectorLabels" . | nindent 6 }}
