apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo035b1eb0-79be-4672-b02a-208442603860.fullname" . }}
  labels:
    {{- include "go-echo035b1eb0-79be-4672-b02a-208442603860.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo035b1eb0-79be-4672-b02a-208442603860.selectorLabels" . | nindent 6 }}
