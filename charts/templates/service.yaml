apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4c5de97f-d5fc-4fa7-bb12-0f9c974443ee.fullname" . }}
  labels:
    {{- include "go-echo4c5de97f-d5fc-4fa7-bb12-0f9c974443ee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4c5de97f-d5fc-4fa7-bb12-0f9c974443ee.selectorLabels" . | nindent 6 }}
