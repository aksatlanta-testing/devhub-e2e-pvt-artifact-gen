apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo167474f9-4485-4d29-a4ba-ad914c05c6e8.fullname" . }}
  labels:
    {{- include "go-echo167474f9-4485-4d29-a4ba-ad914c05c6e8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo167474f9-4485-4d29-a4ba-ad914c05c6e8.selectorLabels" . | nindent 6 }}
