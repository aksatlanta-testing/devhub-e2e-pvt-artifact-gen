apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9fe20dbc-0dd8-474f-b14c-3594fc906e36.fullname" . }}
  labels:
    {{- include "go-echo9fe20dbc-0dd8-474f-b14c-3594fc906e36.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9fe20dbc-0dd8-474f-b14c-3594fc906e36.selectorLabels" . | nindent 6 }}
