apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo44a44a72-5787-420b-b697-16bae2ebe7a9.fullname" . }}
  labels:
    {{- include "go-echo44a44a72-5787-420b-b697-16bae2ebe7a9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo44a44a72-5787-420b-b697-16bae2ebe7a9.selectorLabels" . | nindent 6 }}
