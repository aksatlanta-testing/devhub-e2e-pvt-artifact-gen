apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7f13d40b-05b0-4ef1-9d9d-50072519f055.fullname" . }}
  labels:
    {{- include "go-echo7f13d40b-05b0-4ef1-9d9d-50072519f055.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7f13d40b-05b0-4ef1-9d9d-50072519f055.selectorLabels" . | nindent 6 }}
