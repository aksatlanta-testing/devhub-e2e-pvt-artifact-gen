apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo85691723-df27-47e6-af27-30f025391dea.fullname" . }}
  labels:
    {{- include "go-echo85691723-df27-47e6-af27-30f025391dea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo85691723-df27-47e6-af27-30f025391dea.selectorLabels" . | nindent 6 }}
