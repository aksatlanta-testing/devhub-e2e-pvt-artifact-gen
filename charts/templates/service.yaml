apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoae2a2d7f-e77e-4eba-8207-3d8293a4b409.fullname" . }}
  labels:
    {{- include "go-echoae2a2d7f-e77e-4eba-8207-3d8293a4b409.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoae2a2d7f-e77e-4eba-8207-3d8293a4b409.selectorLabels" . | nindent 6 }}
