apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo13277008-b095-43b1-9d26-5ed2133048b1.fullname" . }}
  labels:
    {{- include "go-echo13277008-b095-43b1-9d26-5ed2133048b1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo13277008-b095-43b1-9d26-5ed2133048b1.selectorLabels" . | nindent 6 }}
