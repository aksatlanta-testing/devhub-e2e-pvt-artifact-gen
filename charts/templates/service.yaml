apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1bd355ff-d2a9-4a96-b9b3-b53f8a401fac.fullname" . }}
  labels:
    {{- include "go-echo1bd355ff-d2a9-4a96-b9b3-b53f8a401fac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1bd355ff-d2a9-4a96-b9b3-b53f8a401fac.selectorLabels" . | nindent 6 }}
