apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo632ab9dd-ed7d-48e2-b8aa-e6652e791937.fullname" . }}
  labels:
    {{- include "go-echo632ab9dd-ed7d-48e2-b8aa-e6652e791937.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo632ab9dd-ed7d-48e2-b8aa-e6652e791937.selectorLabels" . | nindent 6 }}
