apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa6fb41c7-e5e7-4508-80d7-077d2afd5882.fullname" . }}
  labels:
    {{- include "go-echoa6fb41c7-e5e7-4508-80d7-077d2afd5882.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa6fb41c7-e5e7-4508-80d7-077d2afd5882.selectorLabels" . | nindent 6 }}
