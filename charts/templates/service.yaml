apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo54754fc6-8781-455d-b4a5-3d698489023f.fullname" . }}
  labels:
    {{- include "go-echo54754fc6-8781-455d-b4a5-3d698489023f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo54754fc6-8781-455d-b4a5-3d698489023f.selectorLabels" . | nindent 6 }}
