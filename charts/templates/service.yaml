apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa433f974-a74d-43f9-8cd6-07b2e57c4f50.fullname" . }}
  labels:
    {{- include "go-echoa433f974-a74d-43f9-8cd6-07b2e57c4f50.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa433f974-a74d-43f9-8cd6-07b2e57c4f50.selectorLabels" . | nindent 6 }}
