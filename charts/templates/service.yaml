apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodaa745e2-3a25-4a8f-9290-ab9ff4b233e0.fullname" . }}
  labels:
    {{- include "go-echodaa745e2-3a25-4a8f-9290-ab9ff4b233e0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodaa745e2-3a25-4a8f-9290-ab9ff4b233e0.selectorLabels" . | nindent 6 }}
