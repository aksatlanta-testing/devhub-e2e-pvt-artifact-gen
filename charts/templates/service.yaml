apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoae9f53d3-679d-4661-93c4-0ec051dbfad6.fullname" . }}
  labels:
    {{- include "go-echoae9f53d3-679d-4661-93c4-0ec051dbfad6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoae9f53d3-679d-4661-93c4-0ec051dbfad6.selectorLabels" . | nindent 6 }}
