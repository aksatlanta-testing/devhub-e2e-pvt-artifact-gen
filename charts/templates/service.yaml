apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6b4c7649-6946-4707-866f-eaafdc32fceb.fullname" . }}
  labels:
    {{- include "go-echo6b4c7649-6946-4707-866f-eaafdc32fceb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6b4c7649-6946-4707-866f-eaafdc32fceb.selectorLabels" . | nindent 6 }}
