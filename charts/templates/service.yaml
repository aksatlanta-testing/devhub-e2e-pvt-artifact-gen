apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod20128cd-bc94-4b9b-9912-78e5e063cc10.fullname" . }}
  labels:
    {{- include "go-echod20128cd-bc94-4b9b-9912-78e5e063cc10.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod20128cd-bc94-4b9b-9912-78e5e063cc10.selectorLabels" . | nindent 6 }}
