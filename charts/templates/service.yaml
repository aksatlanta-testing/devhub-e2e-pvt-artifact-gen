apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc3c00608-3bd1-4eda-9b9e-e626438b1415.fullname" . }}
  labels:
    {{- include "go-echoc3c00608-3bd1-4eda-9b9e-e626438b1415.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc3c00608-3bd1-4eda-9b9e-e626438b1415.selectorLabels" . | nindent 6 }}
