apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo31f3f51b-214c-479c-adc0-2bf5ae25f845.fullname" . }}
  labels:
    {{- include "go-echo31f3f51b-214c-479c-adc0-2bf5ae25f845.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo31f3f51b-214c-479c-adc0-2bf5ae25f845.selectorLabels" . | nindent 6 }}
