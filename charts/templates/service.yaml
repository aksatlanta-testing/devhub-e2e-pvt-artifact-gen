apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob793f1a7-7aaa-4dde-8c76-e3bdf7c6ee46.fullname" . }}
  labels:
    {{- include "go-echob793f1a7-7aaa-4dde-8c76-e3bdf7c6ee46.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob793f1a7-7aaa-4dde-8c76-e3bdf7c6ee46.selectorLabels" . | nindent 6 }}
