apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo345b7013-7213-47cc-a080-839466891b49.fullname" . }}
  labels:
    {{- include "go-echo345b7013-7213-47cc-a080-839466891b49.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo345b7013-7213-47cc-a080-839466891b49.selectorLabels" . | nindent 6 }}
