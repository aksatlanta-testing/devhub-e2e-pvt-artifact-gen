apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodc0c1ab0-5dcd-447a-96d3-509b965203aa.fullname" . }}
  labels:
    {{- include "go-echodc0c1ab0-5dcd-447a-96d3-509b965203aa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodc0c1ab0-5dcd-447a-96d3-509b965203aa.selectorLabels" . | nindent 6 }}
