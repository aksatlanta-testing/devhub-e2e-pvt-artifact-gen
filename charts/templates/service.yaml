apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo026a0765-9b10-4be3-81e0-026f574fbb85.fullname" . }}
  labels:
    {{- include "go-echo026a0765-9b10-4be3-81e0-026f574fbb85.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo026a0765-9b10-4be3-81e0-026f574fbb85.selectorLabels" . | nindent 6 }}
