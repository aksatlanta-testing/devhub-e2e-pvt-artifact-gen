apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc09c039f-c91f-429d-be32-18bcf056053b.fullname" . }}
  labels:
    {{- include "go-echoc09c039f-c91f-429d-be32-18bcf056053b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc09c039f-c91f-429d-be32-18bcf056053b.selectorLabels" . | nindent 6 }}
