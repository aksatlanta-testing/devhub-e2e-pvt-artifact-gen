apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1e4d95cd-4f77-4d97-8ef2-5aa427877c53.fullname" . }}
  labels:
    {{- include "go-echo1e4d95cd-4f77-4d97-8ef2-5aa427877c53.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1e4d95cd-4f77-4d97-8ef2-5aa427877c53.selectorLabels" . | nindent 6 }}
