apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo48ee2db9-0854-457b-9ccd-cdaa27255374.fullname" . }}
  labels:
    {{- include "go-echo48ee2db9-0854-457b-9ccd-cdaa27255374.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo48ee2db9-0854-457b-9ccd-cdaa27255374.selectorLabels" . | nindent 6 }}
