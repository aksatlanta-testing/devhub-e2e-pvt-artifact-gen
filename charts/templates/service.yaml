apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc75f87ba-6eea-416d-b660-d070b3b2d3e7.fullname" . }}
  labels:
    {{- include "go-echoc75f87ba-6eea-416d-b660-d070b3b2d3e7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc75f87ba-6eea-416d-b660-d070b3b2d3e7.selectorLabels" . | nindent 6 }}
