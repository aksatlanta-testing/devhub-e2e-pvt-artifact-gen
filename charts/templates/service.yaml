apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo294e02a4-f8c1-4aa2-8b34-021e2f3b052d.fullname" . }}
  labels:
    {{- include "go-echo294e02a4-f8c1-4aa2-8b34-021e2f3b052d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo294e02a4-f8c1-4aa2-8b34-021e2f3b052d.selectorLabels" . | nindent 6 }}
