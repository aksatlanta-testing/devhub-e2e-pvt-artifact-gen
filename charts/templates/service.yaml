apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof77ed867-6435-4e9a-83d1-57a0f798a10a.fullname" . }}
  labels:
    {{- include "go-echof77ed867-6435-4e9a-83d1-57a0f798a10a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof77ed867-6435-4e9a-83d1-57a0f798a10a.selectorLabels" . | nindent 6 }}
