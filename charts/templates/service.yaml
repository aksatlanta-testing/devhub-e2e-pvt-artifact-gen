apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5ea4a4ff-ea48-4f82-a5e0-553cfab6174f.fullname" . }}
  labels:
    {{- include "go-echo5ea4a4ff-ea48-4f82-a5e0-553cfab6174f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5ea4a4ff-ea48-4f82-a5e0-553cfab6174f.selectorLabels" . | nindent 6 }}
