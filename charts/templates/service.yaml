apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo02db0452-bc70-4e88-813b-f47637dd47a6.fullname" . }}
  labels:
    {{- include "go-echo02db0452-bc70-4e88-813b-f47637dd47a6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo02db0452-bc70-4e88-813b-f47637dd47a6.selectorLabels" . | nindent 6 }}
