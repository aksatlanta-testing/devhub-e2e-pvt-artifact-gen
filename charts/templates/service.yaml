apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo052fad83-df49-456b-8faf-e9a61211ee53.fullname" . }}
  labels:
    {{- include "go-echo052fad83-df49-456b-8faf-e9a61211ee53.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo052fad83-df49-456b-8faf-e9a61211ee53.selectorLabels" . | nindent 6 }}
