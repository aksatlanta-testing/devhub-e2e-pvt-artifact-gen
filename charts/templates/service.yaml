apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo56d09dbc-f7ec-48a6-a3f9-793d88a5d240.fullname" . }}
  labels:
    {{- include "go-echo56d09dbc-f7ec-48a6-a3f9-793d88a5d240.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo56d09dbc-f7ec-48a6-a3f9-793d88a5d240.selectorLabels" . | nindent 6 }}
