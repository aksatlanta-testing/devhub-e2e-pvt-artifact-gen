apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob0e3dd6e-56c4-489a-ba81-10dc87e23479.fullname" . }}
  labels:
    {{- include "go-echob0e3dd6e-56c4-489a-ba81-10dc87e23479.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob0e3dd6e-56c4-489a-ba81-10dc87e23479.selectorLabels" . | nindent 6 }}
