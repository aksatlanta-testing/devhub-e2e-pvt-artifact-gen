apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3d82d1e4-beb9-4b9e-9e34-98242300fa1e.fullname" . }}
  labels:
    {{- include "go-echo3d82d1e4-beb9-4b9e-9e34-98242300fa1e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3d82d1e4-beb9-4b9e-9e34-98242300fa1e.selectorLabels" . | nindent 6 }}
