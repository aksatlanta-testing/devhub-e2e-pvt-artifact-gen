apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoed214ca7-a836-4184-8e18-65ab376769b7.fullname" . }}
  labels:
    {{- include "go-echoed214ca7-a836-4184-8e18-65ab376769b7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoed214ca7-a836-4184-8e18-65ab376769b7.selectorLabels" . | nindent 6 }}
