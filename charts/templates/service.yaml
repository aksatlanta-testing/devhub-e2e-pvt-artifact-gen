apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoed384222-6b66-449a-a2be-8639c17ddde8.fullname" . }}
  labels:
    {{- include "go-echoed384222-6b66-449a-a2be-8639c17ddde8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoed384222-6b66-449a-a2be-8639c17ddde8.selectorLabels" . | nindent 6 }}
