apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod630006a-333e-4a31-927f-012ae0ce9090.fullname" . }}
  labels:
    {{- include "go-echod630006a-333e-4a31-927f-012ae0ce9090.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod630006a-333e-4a31-927f-012ae0ce9090.selectorLabels" . | nindent 6 }}
