apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7a0213c7-f634-4041-bbea-d32050725c21.fullname" . }}
  labels:
    {{- include "go-echo7a0213c7-f634-4041-bbea-d32050725c21.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7a0213c7-f634-4041-bbea-d32050725c21.selectorLabels" . | nindent 6 }}
