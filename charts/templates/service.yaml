apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo12922902-209e-4864-889b-f24f72d0d632.fullname" . }}
  labels:
    {{- include "go-echo12922902-209e-4864-889b-f24f72d0d632.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo12922902-209e-4864-889b-f24f72d0d632.selectorLabels" . | nindent 6 }}
