apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodc2c8c75-4f42-46cf-ac72-770296db33cf.fullname" . }}
  labels:
    {{- include "go-echodc2c8c75-4f42-46cf-ac72-770296db33cf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodc2c8c75-4f42-46cf-ac72-770296db33cf.selectorLabels" . | nindent 6 }}
