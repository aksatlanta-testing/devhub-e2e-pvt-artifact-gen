apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo18722eaf-a83c-4347-8c4a-1920cbf26506.fullname" . }}
  labels:
    {{- include "go-echo18722eaf-a83c-4347-8c4a-1920cbf26506.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo18722eaf-a83c-4347-8c4a-1920cbf26506.selectorLabels" . | nindent 6 }}
