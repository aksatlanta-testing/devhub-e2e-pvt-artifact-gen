apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo73fb1a5b-a62c-4683-8f34-695beefb5603.fullname" . }}
  labels:
    {{- include "go-echo73fb1a5b-a62c-4683-8f34-695beefb5603.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo73fb1a5b-a62c-4683-8f34-695beefb5603.selectorLabels" . | nindent 6 }}
