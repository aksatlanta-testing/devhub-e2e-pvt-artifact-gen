apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe2d6ec19-6e37-4657-b3cb-25a886bd09ef.fullname" . }}
  labels:
    {{- include "go-echoe2d6ec19-6e37-4657-b3cb-25a886bd09ef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe2d6ec19-6e37-4657-b3cb-25a886bd09ef.selectorLabels" . | nindent 6 }}
