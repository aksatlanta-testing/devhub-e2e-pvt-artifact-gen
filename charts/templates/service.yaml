apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocff1dbca-f9b6-4172-9821-7ac9c6a7a85c.fullname" . }}
  labels:
    {{- include "go-echocff1dbca-f9b6-4172-9821-7ac9c6a7a85c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocff1dbca-f9b6-4172-9821-7ac9c6a7a85c.selectorLabels" . | nindent 6 }}
