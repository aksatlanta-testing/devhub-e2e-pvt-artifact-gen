apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo511776d2-ce7a-4727-bb59-ccae28708575.fullname" . }}
  labels:
    {{- include "go-echo511776d2-ce7a-4727-bb59-ccae28708575.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo511776d2-ce7a-4727-bb59-ccae28708575.selectorLabels" . | nindent 6 }}
