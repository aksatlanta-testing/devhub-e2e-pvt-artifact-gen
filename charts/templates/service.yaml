apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo78488465-d439-4fb6-b6fc-87fba4f90e00.fullname" . }}
  labels:
    {{- include "go-echo78488465-d439-4fb6-b6fc-87fba4f90e00.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo78488465-d439-4fb6-b6fc-87fba4f90e00.selectorLabels" . | nindent 6 }}
