apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob2356a26-6e7c-474b-84cc-2feed8b813d5.fullname" . }}
  labels:
    {{- include "go-echob2356a26-6e7c-474b-84cc-2feed8b813d5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob2356a26-6e7c-474b-84cc-2feed8b813d5.selectorLabels" . | nindent 6 }}
