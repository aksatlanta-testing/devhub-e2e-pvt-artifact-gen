apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo89f4a58f-2779-4ca7-a106-7ac97c03d8d3.fullname" . }}
  labels:
    {{- include "go-echo89f4a58f-2779-4ca7-a106-7ac97c03d8d3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo89f4a58f-2779-4ca7-a106-7ac97c03d8d3.selectorLabels" . | nindent 6 }}
