apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobe40e727-513b-41cc-9140-ff661b29d963.fullname" . }}
  labels:
    {{- include "go-echobe40e727-513b-41cc-9140-ff661b29d963.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobe40e727-513b-41cc-9140-ff661b29d963.selectorLabels" . | nindent 6 }}
