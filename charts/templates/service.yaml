apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo855c8391-0345-4003-a83c-3cdb85939622.fullname" . }}
  labels:
    {{- include "go-echo855c8391-0345-4003-a83c-3cdb85939622.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo855c8391-0345-4003-a83c-3cdb85939622.selectorLabels" . | nindent 6 }}
