apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3c5c9322-da99-4886-9cc8-1be4de47ddac.fullname" . }}
  labels:
    {{- include "go-echo3c5c9322-da99-4886-9cc8-1be4de47ddac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3c5c9322-da99-4886-9cc8-1be4de47ddac.selectorLabels" . | nindent 6 }}
