apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo87206b77-dc8e-4db0-ac1e-1f7bee4d25b9.fullname" . }}
  labels:
    {{- include "go-echo87206b77-dc8e-4db0-ac1e-1f7bee4d25b9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo87206b77-dc8e-4db0-ac1e-1f7bee4d25b9.selectorLabels" . | nindent 6 }}
