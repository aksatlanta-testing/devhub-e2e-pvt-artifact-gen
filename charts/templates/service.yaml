apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo70e56a02-8982-415c-a518-cd45901e0647.fullname" . }}
  labels:
    {{- include "go-echo70e56a02-8982-415c-a518-cd45901e0647.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo70e56a02-8982-415c-a518-cd45901e0647.selectorLabels" . | nindent 6 }}
