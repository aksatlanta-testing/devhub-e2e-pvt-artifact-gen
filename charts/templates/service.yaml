apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo63fc23ac-e63c-4193-b0ad-43db7c7c20cd.fullname" . }}
  labels:
    {{- include "go-echo63fc23ac-e63c-4193-b0ad-43db7c7c20cd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo63fc23ac-e63c-4193-b0ad-43db7c7c20cd.selectorLabels" . | nindent 6 }}
