apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3029e699-c4db-4c54-83b9-bbe5c759ceef.fullname" . }}
  labels:
    {{- include "go-echo3029e699-c4db-4c54-83b9-bbe5c759ceef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3029e699-c4db-4c54-83b9-bbe5c759ceef.selectorLabels" . | nindent 6 }}
