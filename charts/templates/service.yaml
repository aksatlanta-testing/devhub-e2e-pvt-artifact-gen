apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofece1156-f954-47ef-a463-59aaf370706b.fullname" . }}
  labels:
    {{- include "go-echofece1156-f954-47ef-a463-59aaf370706b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofece1156-f954-47ef-a463-59aaf370706b.selectorLabels" . | nindent 6 }}
