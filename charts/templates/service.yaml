apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b88cfdf-5e12-44ee-abdd-01e1509569db.fullname" . }}
  labels:
    {{- include "go-echo0b88cfdf-5e12-44ee-abdd-01e1509569db.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b88cfdf-5e12-44ee-abdd-01e1509569db.selectorLabels" . | nindent 6 }}
