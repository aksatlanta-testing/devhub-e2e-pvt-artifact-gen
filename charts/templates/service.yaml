apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeb6f49b6-dffd-4158-beaa-709dc9f22f17.fullname" . }}
  labels:
    {{- include "go-echoeb6f49b6-dffd-4158-beaa-709dc9f22f17.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeb6f49b6-dffd-4158-beaa-709dc9f22f17.selectorLabels" . | nindent 6 }}
