apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1973636a-02ca-42dc-9a6f-aeb4d9db7ba7.fullname" . }}
  labels:
    {{- include "go-echo1973636a-02ca-42dc-9a6f-aeb4d9db7ba7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1973636a-02ca-42dc-9a6f-aeb4d9db7ba7.selectorLabels" . | nindent 6 }}
