apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoedaa0caa-23f2-4288-90c9-5e68c30ea330.fullname" . }}
  labels:
    {{- include "go-echoedaa0caa-23f2-4288-90c9-5e68c30ea330.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoedaa0caa-23f2-4288-90c9-5e68c30ea330.selectorLabels" . | nindent 6 }}
