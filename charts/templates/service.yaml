apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo63e58d76-f0e9-4cb5-b92b-043e293f70fa.fullname" . }}
  labels:
    {{- include "go-echo63e58d76-f0e9-4cb5-b92b-043e293f70fa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo63e58d76-f0e9-4cb5-b92b-043e293f70fa.selectorLabels" . | nindent 6 }}
