apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo51160a0e-8a1c-44e8-b55b-3e2688120a26.fullname" . }}
  labels:
    {{- include "go-echo51160a0e-8a1c-44e8-b55b-3e2688120a26.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo51160a0e-8a1c-44e8-b55b-3e2688120a26.selectorLabels" . | nindent 6 }}
