apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo28156b59-3bbf-4f96-97be-6cb0fc22766b.fullname" . }}
  labels:
    {{- include "go-echo28156b59-3bbf-4f96-97be-6cb0fc22766b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo28156b59-3bbf-4f96-97be-6cb0fc22766b.selectorLabels" . | nindent 6 }}
