apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo24b2b305-4243-45a3-bd3a-fece51c8bfd5.fullname" . }}
  labels:
    {{- include "go-echo24b2b305-4243-45a3-bd3a-fece51c8bfd5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo24b2b305-4243-45a3-bd3a-fece51c8bfd5.selectorLabels" . | nindent 6 }}
