apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoab1f9cd9-589f-4cde-9ef9-01c7d616df63.fullname" . }}
  labels:
    {{- include "go-echoab1f9cd9-589f-4cde-9ef9-01c7d616df63.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoab1f9cd9-589f-4cde-9ef9-01c7d616df63.selectorLabels" . | nindent 6 }}
