apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo424ea1f8-67f3-4295-9ef9-dc4926e0f308.fullname" . }}
  labels:
    {{- include "go-echo424ea1f8-67f3-4295-9ef9-dc4926e0f308.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo424ea1f8-67f3-4295-9ef9-dc4926e0f308.selectorLabels" . | nindent 6 }}
