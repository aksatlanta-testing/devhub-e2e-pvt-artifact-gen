apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod351c86b-eb8f-4e4c-b2b1-232fb49b7bc6.fullname" . }}
  labels:
    {{- include "go-echod351c86b-eb8f-4e4c-b2b1-232fb49b7bc6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod351c86b-eb8f-4e4c-b2b1-232fb49b7bc6.selectorLabels" . | nindent 6 }}
