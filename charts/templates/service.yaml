apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoae6f2fae-fc06-4da1-9158-0fbbd5f67f93.fullname" . }}
  labels:
    {{- include "go-echoae6f2fae-fc06-4da1-9158-0fbbd5f67f93.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoae6f2fae-fc06-4da1-9158-0fbbd5f67f93.selectorLabels" . | nindent 6 }}
