apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoba1e06e5-01ae-413c-b367-9af33cad2d73.fullname" . }}
  labels:
    {{- include "go-echoba1e06e5-01ae-413c-b367-9af33cad2d73.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoba1e06e5-01ae-413c-b367-9af33cad2d73.selectorLabels" . | nindent 6 }}
