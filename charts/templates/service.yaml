apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6f302670-28c6-48fd-a8a5-487450af0192.fullname" . }}
  labels:
    {{- include "go-echo6f302670-28c6-48fd-a8a5-487450af0192.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6f302670-28c6-48fd-a8a5-487450af0192.selectorLabels" . | nindent 6 }}
