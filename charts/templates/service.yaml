apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2e4aac9b-6bdd-4c0f-96ad-cf0776079a36.fullname" . }}
  labels:
    {{- include "go-echo2e4aac9b-6bdd-4c0f-96ad-cf0776079a36.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2e4aac9b-6bdd-4c0f-96ad-cf0776079a36.selectorLabels" . | nindent 6 }}
