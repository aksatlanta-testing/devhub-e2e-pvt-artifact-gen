apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6077d484-7b41-4c70-95c3-7492aa7b7c86.fullname" . }}
  labels:
    {{- include "go-echo6077d484-7b41-4c70-95c3-7492aa7b7c86.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6077d484-7b41-4c70-95c3-7492aa7b7c86.selectorLabels" . | nindent 6 }}
