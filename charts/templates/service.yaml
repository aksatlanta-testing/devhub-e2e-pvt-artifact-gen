apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob302fd95-d704-454c-a988-40f670218bdd.fullname" . }}
  labels:
    {{- include "go-echob302fd95-d704-454c-a988-40f670218bdd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob302fd95-d704-454c-a988-40f670218bdd.selectorLabels" . | nindent 6 }}
