apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo68cb6671-05b3-49f4-9d90-5b6ab7198856.fullname" . }}
  labels:
    {{- include "go-echo68cb6671-05b3-49f4-9d90-5b6ab7198856.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo68cb6671-05b3-49f4-9d90-5b6ab7198856.selectorLabels" . | nindent 6 }}
