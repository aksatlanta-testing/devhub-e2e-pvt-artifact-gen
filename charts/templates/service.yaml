apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4df5795-b7e3-42e0-b07c-a3512e9c2b72.fullname" . }}
  labels:
    {{- include "go-echoc4df5795-b7e3-42e0-b07c-a3512e9c2b72.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4df5795-b7e3-42e0-b07c-a3512e9c2b72.selectorLabels" . | nindent 6 }}
