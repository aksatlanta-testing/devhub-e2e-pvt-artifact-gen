apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo05c69fb9-2e1d-49f5-8937-e4d622130dfe.fullname" . }}
  labels:
    {{- include "go-echo05c69fb9-2e1d-49f5-8937-e4d622130dfe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo05c69fb9-2e1d-49f5-8937-e4d622130dfe.selectorLabels" . | nindent 6 }}
