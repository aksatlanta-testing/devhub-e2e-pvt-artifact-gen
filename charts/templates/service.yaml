apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo14962f3a-02c8-4481-9670-71f8c29ef58b.fullname" . }}
  labels:
    {{- include "go-echo14962f3a-02c8-4481-9670-71f8c29ef58b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo14962f3a-02c8-4481-9670-71f8c29ef58b.selectorLabels" . | nindent 6 }}
