apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo263c3403-62e4-4e34-830f-d40e2c44bfaa.fullname" . }}
  labels:
    {{- include "go-echo263c3403-62e4-4e34-830f-d40e2c44bfaa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo263c3403-62e4-4e34-830f-d40e2c44bfaa.selectorLabels" . | nindent 6 }}
