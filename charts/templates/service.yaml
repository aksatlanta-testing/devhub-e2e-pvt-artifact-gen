apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoac129a9f-a553-4ea0-bb9f-315fa39f5c55.fullname" . }}
  labels:
    {{- include "go-echoac129a9f-a553-4ea0-bb9f-315fa39f5c55.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoac129a9f-a553-4ea0-bb9f-315fa39f5c55.selectorLabels" . | nindent 6 }}
