apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobf5d9749-7864-4e4e-bb22-c00d70dc7075.fullname" . }}
  labels:
    {{- include "go-echobf5d9749-7864-4e4e-bb22-c00d70dc7075.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobf5d9749-7864-4e4e-bb22-c00d70dc7075.selectorLabels" . | nindent 6 }}
