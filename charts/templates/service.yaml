apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoac2bb82a-bc0b-4df4-a0e7-2d25e123c317.fullname" . }}
  labels:
    {{- include "go-echoac2bb82a-bc0b-4df4-a0e7-2d25e123c317.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoac2bb82a-bc0b-4df4-a0e7-2d25e123c317.selectorLabels" . | nindent 6 }}
