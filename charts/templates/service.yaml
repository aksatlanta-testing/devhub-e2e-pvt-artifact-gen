apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo88a3890d-2baf-4b01-9992-b882343fa019.fullname" . }}
  labels:
    {{- include "go-echo88a3890d-2baf-4b01-9992-b882343fa019.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo88a3890d-2baf-4b01-9992-b882343fa019.selectorLabels" . | nindent 6 }}
