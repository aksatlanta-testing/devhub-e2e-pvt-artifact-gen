apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod36e01e1-a7ec-4c71-9325-e83880fdca1d.fullname" . }}
  labels:
    {{- include "go-echod36e01e1-a7ec-4c71-9325-e83880fdca1d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod36e01e1-a7ec-4c71-9325-e83880fdca1d.selectorLabels" . | nindent 6 }}
