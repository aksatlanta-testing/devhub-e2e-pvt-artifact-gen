apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6ebe1e06-06e8-4fab-9b2c-a4295e972443.fullname" . }}
  labels:
    {{- include "go-echo6ebe1e06-06e8-4fab-9b2c-a4295e972443.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6ebe1e06-06e8-4fab-9b2c-a4295e972443.selectorLabels" . | nindent 6 }}
