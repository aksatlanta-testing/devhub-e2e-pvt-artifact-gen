apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob2d81dcd-07a7-4541-b25c-6a79ea6499a0.fullname" . }}
  labels:
    {{- include "go-echob2d81dcd-07a7-4541-b25c-6a79ea6499a0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob2d81dcd-07a7-4541-b25c-6a79ea6499a0.selectorLabels" . | nindent 6 }}
