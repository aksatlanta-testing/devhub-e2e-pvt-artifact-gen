apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo158abd7f-5daf-4f57-a460-be1548ae6126.fullname" . }}
  labels:
    {{- include "go-echo158abd7f-5daf-4f57-a460-be1548ae6126.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo158abd7f-5daf-4f57-a460-be1548ae6126.selectorLabels" . | nindent 6 }}
