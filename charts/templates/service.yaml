apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3d025d16-fdf3-4165-acba-a74aebe49d6d.fullname" . }}
  labels:
    {{- include "go-echo3d025d16-fdf3-4165-acba-a74aebe49d6d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3d025d16-fdf3-4165-acba-a74aebe49d6d.selectorLabels" . | nindent 6 }}
