apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo08f7e41a-328a-434e-8384-05bf8f337268.fullname" . }}
  labels:
    {{- include "go-echo08f7e41a-328a-434e-8384-05bf8f337268.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo08f7e41a-328a-434e-8384-05bf8f337268.selectorLabels" . | nindent 6 }}
