apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c0ce65f-738a-494b-b68e-58701536991f.fullname" . }}
  labels:
    {{- include "go-echo1c0ce65f-738a-494b-b68e-58701536991f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c0ce65f-738a-494b-b68e-58701536991f.selectorLabels" . | nindent 6 }}
