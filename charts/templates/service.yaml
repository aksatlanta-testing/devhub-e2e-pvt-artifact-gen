apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobebddb78-8bbc-4144-8fb7-408596273be1.fullname" . }}
  labels:
    {{- include "go-echobebddb78-8bbc-4144-8fb7-408596273be1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobebddb78-8bbc-4144-8fb7-408596273be1.selectorLabels" . | nindent 6 }}
