apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod4766d97-28f2-4930-a734-e3076e1988a5.fullname" . }}
  labels:
    {{- include "go-echod4766d97-28f2-4930-a734-e3076e1988a5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod4766d97-28f2-4930-a734-e3076e1988a5.selectorLabels" . | nindent 6 }}
