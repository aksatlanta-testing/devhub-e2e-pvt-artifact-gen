apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1d7c1959-e457-48a9-af9e-b2e2e0cc7b75.fullname" . }}
  labels:
    {{- include "go-echo1d7c1959-e457-48a9-af9e-b2e2e0cc7b75.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1d7c1959-e457-48a9-af9e-b2e2e0cc7b75.selectorLabels" . | nindent 6 }}
