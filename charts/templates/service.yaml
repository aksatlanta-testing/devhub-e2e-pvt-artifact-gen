apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9586111d-1532-45ab-a0e2-405c90126860.fullname" . }}
  labels:
    {{- include "go-echo9586111d-1532-45ab-a0e2-405c90126860.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9586111d-1532-45ab-a0e2-405c90126860.selectorLabels" . | nindent 6 }}
