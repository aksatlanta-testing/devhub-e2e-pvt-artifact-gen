apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof4dc633b-a5a9-4575-936e-5fec69fd5a07.fullname" . }}
  labels:
    {{- include "go-echof4dc633b-a5a9-4575-936e-5fec69fd5a07.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof4dc633b-a5a9-4575-936e-5fec69fd5a07.selectorLabels" . | nindent 6 }}
