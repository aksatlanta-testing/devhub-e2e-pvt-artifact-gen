apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa9c505b1-4ea3-4299-933b-416745bf855b.fullname" . }}
  labels:
    {{- include "go-echoa9c505b1-4ea3-4299-933b-416745bf855b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa9c505b1-4ea3-4299-933b-416745bf855b.selectorLabels" . | nindent 6 }}
