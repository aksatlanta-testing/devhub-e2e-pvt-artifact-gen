apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofd951f9b-713a-469f-94f4-937cff45ffae.fullname" . }}
  labels:
    {{- include "go-echofd951f9b-713a-469f-94f4-937cff45ffae.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofd951f9b-713a-469f-94f4-937cff45ffae.selectorLabels" . | nindent 6 }}
