apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo67f58db3-aea4-44ca-b29c-d592fca634b7.fullname" . }}
  labels:
    {{- include "go-echo67f58db3-aea4-44ca-b29c-d592fca634b7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo67f58db3-aea4-44ca-b29c-d592fca634b7.selectorLabels" . | nindent 6 }}
