apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6ab30695-0a47-47e8-a2f5-c439037bdd01.fullname" . }}
  labels:
    {{- include "go-echo6ab30695-0a47-47e8-a2f5-c439037bdd01.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6ab30695-0a47-47e8-a2f5-c439037bdd01.selectorLabels" . | nindent 6 }}
