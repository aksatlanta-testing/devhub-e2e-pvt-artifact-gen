apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5338e5db-4aab-4961-af96-9166831dadcf.fullname" . }}
  labels:
    {{- include "go-echo5338e5db-4aab-4961-af96-9166831dadcf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5338e5db-4aab-4961-af96-9166831dadcf.selectorLabels" . | nindent 6 }}
