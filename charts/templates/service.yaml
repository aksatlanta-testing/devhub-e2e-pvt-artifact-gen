apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo32786b35-2eb8-42e6-b9a2-64c452a7ec9d.fullname" . }}
  labels:
    {{- include "go-echo32786b35-2eb8-42e6-b9a2-64c452a7ec9d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo32786b35-2eb8-42e6-b9a2-64c452a7ec9d.selectorLabels" . | nindent 6 }}
