apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod6388778-1f03-4e27-a145-7b1fbfab2325.fullname" . }}
  labels:
    {{- include "go-echod6388778-1f03-4e27-a145-7b1fbfab2325.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod6388778-1f03-4e27-a145-7b1fbfab2325.selectorLabels" . | nindent 6 }}
