apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofb25a450-c2f3-4386-9d30-18b9bf04efbb.fullname" . }}
  labels:
    {{- include "go-echofb25a450-c2f3-4386-9d30-18b9bf04efbb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofb25a450-c2f3-4386-9d30-18b9bf04efbb.selectorLabels" . | nindent 6 }}
