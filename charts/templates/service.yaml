apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0f49a62a-e3c6-456d-8722-dc873d7ab9fe.fullname" . }}
  labels:
    {{- include "go-echo0f49a62a-e3c6-456d-8722-dc873d7ab9fe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0f49a62a-e3c6-456d-8722-dc873d7ab9fe.selectorLabels" . | nindent 6 }}
