apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3c04de81-e7e7-409a-aa45-53c7100980b2.fullname" . }}
  labels:
    {{- include "go-echo3c04de81-e7e7-409a-aa45-53c7100980b2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3c04de81-e7e7-409a-aa45-53c7100980b2.selectorLabels" . | nindent 6 }}
