apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5d0ecb0f-8e3c-4e93-843b-2a7ab23d82cb.fullname" . }}
  labels:
    {{- include "go-echo5d0ecb0f-8e3c-4e93-843b-2a7ab23d82cb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5d0ecb0f-8e3c-4e93-843b-2a7ab23d82cb.selectorLabels" . | nindent 6 }}
