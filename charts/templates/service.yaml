apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc2e57250-7f27-4c3e-9161-d922dd9e3d34.fullname" . }}
  labels:
    {{- include "go-echoc2e57250-7f27-4c3e-9161-d922dd9e3d34.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc2e57250-7f27-4c3e-9161-d922dd9e3d34.selectorLabels" . | nindent 6 }}
