apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7f6189d7-8510-4923-aec7-e67133c11409.fullname" . }}
  labels:
    {{- include "go-echo7f6189d7-8510-4923-aec7-e67133c11409.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7f6189d7-8510-4923-aec7-e67133c11409.selectorLabels" . | nindent 6 }}
