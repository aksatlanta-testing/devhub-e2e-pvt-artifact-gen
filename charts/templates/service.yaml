apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8275c923-7230-40e3-97c8-ceb3679b990c.fullname" . }}
  labels:
    {{- include "go-echo8275c923-7230-40e3-97c8-ceb3679b990c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8275c923-7230-40e3-97c8-ceb3679b990c.selectorLabels" . | nindent 6 }}
