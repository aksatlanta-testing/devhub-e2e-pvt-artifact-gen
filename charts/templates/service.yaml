apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2f69e7dc-4062-4787-80e6-28872570f4e4.fullname" . }}
  labels:
    {{- include "go-echo2f69e7dc-4062-4787-80e6-28872570f4e4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2f69e7dc-4062-4787-80e6-28872570f4e4.selectorLabels" . | nindent 6 }}
