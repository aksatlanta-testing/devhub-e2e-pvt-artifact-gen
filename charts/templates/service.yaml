apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo858dfd50-6cc5-42ec-8cbf-fcb9b526b7f9.fullname" . }}
  labels:
    {{- include "go-echo858dfd50-6cc5-42ec-8cbf-fcb9b526b7f9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo858dfd50-6cc5-42ec-8cbf-fcb9b526b7f9.selectorLabels" . | nindent 6 }}
