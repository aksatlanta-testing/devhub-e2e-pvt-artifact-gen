apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo18ee6278-edb5-49d1-af9f-faa54931de12.fullname" . }}
  labels:
    {{- include "go-echo18ee6278-edb5-49d1-af9f-faa54931de12.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo18ee6278-edb5-49d1-af9f-faa54931de12.selectorLabels" . | nindent 6 }}
