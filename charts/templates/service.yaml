apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7bdd1e30-943f-4170-82ed-f1c331b2ef09.fullname" . }}
  labels:
    {{- include "go-echo7bdd1e30-943f-4170-82ed-f1c331b2ef09.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7bdd1e30-943f-4170-82ed-f1c331b2ef09.selectorLabels" . | nindent 6 }}
