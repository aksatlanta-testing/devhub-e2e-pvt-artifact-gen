apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodd97cce0-9800-4db1-96e5-14d18247c31b.fullname" . }}
  labels:
    {{- include "go-echodd97cce0-9800-4db1-96e5-14d18247c31b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodd97cce0-9800-4db1-96e5-14d18247c31b.selectorLabels" . | nindent 6 }}
