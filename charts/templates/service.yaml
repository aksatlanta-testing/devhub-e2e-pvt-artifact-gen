apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2829befe-c012-483b-b4e7-3e09d3493509.fullname" . }}
  labels:
    {{- include "go-echo2829befe-c012-483b-b4e7-3e09d3493509.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2829befe-c012-483b-b4e7-3e09d3493509.selectorLabels" . | nindent 6 }}
