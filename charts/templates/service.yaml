apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5c41452c-f921-4701-ac9f-9f9f9e04cbba.fullname" . }}
  labels:
    {{- include "go-echo5c41452c-f921-4701-ac9f-9f9f9e04cbba.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5c41452c-f921-4701-ac9f-9f9f9e04cbba.selectorLabels" . | nindent 6 }}
