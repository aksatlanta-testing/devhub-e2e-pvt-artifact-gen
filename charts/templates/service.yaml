apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo89d7bd2b-963b-4b3c-a296-5c13e16a9235.fullname" . }}
  labels:
    {{- include "go-echo89d7bd2b-963b-4b3c-a296-5c13e16a9235.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo89d7bd2b-963b-4b3c-a296-5c13e16a9235.selectorLabels" . | nindent 6 }}
