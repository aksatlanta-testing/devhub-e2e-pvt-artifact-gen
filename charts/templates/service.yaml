apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3f1a6c52-cbca-4bfe-a112-7a162e461780.fullname" . }}
  labels:
    {{- include "go-echo3f1a6c52-cbca-4bfe-a112-7a162e461780.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3f1a6c52-cbca-4bfe-a112-7a162e461780.selectorLabels" . | nindent 6 }}
