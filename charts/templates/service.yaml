apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo488c5b57-667f-4022-927e-5c34d1625c83.fullname" . }}
  labels:
    {{- include "go-echo488c5b57-667f-4022-927e-5c34d1625c83.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo488c5b57-667f-4022-927e-5c34d1625c83.selectorLabels" . | nindent 6 }}
