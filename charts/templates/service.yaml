apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod89f74a1-2efd-4fe0-8e42-9d71e6b0ff83.fullname" . }}
  labels:
    {{- include "go-echod89f74a1-2efd-4fe0-8e42-9d71e6b0ff83.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod89f74a1-2efd-4fe0-8e42-9d71e6b0ff83.selectorLabels" . | nindent 6 }}
