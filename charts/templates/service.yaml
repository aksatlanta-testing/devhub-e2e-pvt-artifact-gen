apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobc060fa5-8a9c-4855-bcc5-d925ca12e937.fullname" . }}
  labels:
    {{- include "go-echobc060fa5-8a9c-4855-bcc5-d925ca12e937.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobc060fa5-8a9c-4855-bcc5-d925ca12e937.selectorLabels" . | nindent 6 }}
