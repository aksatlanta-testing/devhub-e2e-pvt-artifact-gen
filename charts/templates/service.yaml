apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo137680cf-5933-4f8c-bc42-9c8722bad1ab.fullname" . }}
  labels:
    {{- include "go-echo137680cf-5933-4f8c-bc42-9c8722bad1ab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo137680cf-5933-4f8c-bc42-9c8722bad1ab.selectorLabels" . | nindent 6 }}
