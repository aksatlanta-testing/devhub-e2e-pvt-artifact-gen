apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c228c67-3f89-4d3f-bb4b-0d2114502ad7.fullname" . }}
  labels:
    {{- include "go-echo1c228c67-3f89-4d3f-bb4b-0d2114502ad7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c228c67-3f89-4d3f-bb4b-0d2114502ad7.selectorLabels" . | nindent 6 }}
