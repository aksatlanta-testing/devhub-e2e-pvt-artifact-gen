apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofc35185d-59ec-47a7-8b11-7f7aa88aeea9.fullname" . }}
  labels:
    {{- include "go-echofc35185d-59ec-47a7-8b11-7f7aa88aeea9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofc35185d-59ec-47a7-8b11-7f7aa88aeea9.selectorLabels" . | nindent 6 }}
