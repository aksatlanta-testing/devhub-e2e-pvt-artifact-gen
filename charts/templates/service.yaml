apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5998afcb-b488-4e10-8be1-75f7ce413e8d.fullname" . }}
  labels:
    {{- include "go-echo5998afcb-b488-4e10-8be1-75f7ce413e8d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5998afcb-b488-4e10-8be1-75f7ce413e8d.selectorLabels" . | nindent 6 }}
