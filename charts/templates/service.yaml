apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobf17f98a-c005-4cea-aab1-97c77b4aea8e.fullname" . }}
  labels:
    {{- include "go-echobf17f98a-c005-4cea-aab1-97c77b4aea8e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobf17f98a-c005-4cea-aab1-97c77b4aea8e.selectorLabels" . | nindent 6 }}
