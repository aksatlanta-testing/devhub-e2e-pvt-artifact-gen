apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob11656d5-2e1b-4d15-bf5d-7865b88549cd.fullname" . }}
  labels:
    {{- include "go-echob11656d5-2e1b-4d15-bf5d-7865b88549cd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob11656d5-2e1b-4d15-bf5d-7865b88549cd.selectorLabels" . | nindent 6 }}
