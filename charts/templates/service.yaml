apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob229a033-13d1-47b7-86cd-2646f063b1d0.fullname" . }}
  labels:
    {{- include "go-echob229a033-13d1-47b7-86cd-2646f063b1d0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob229a033-13d1-47b7-86cd-2646f063b1d0.selectorLabels" . | nindent 6 }}
