apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod90e2950-d66d-4fdf-b50c-598e8924430a.fullname" . }}
  labels:
    {{- include "go-echod90e2950-d66d-4fdf-b50c-598e8924430a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod90e2950-d66d-4fdf-b50c-598e8924430a.selectorLabels" . | nindent 6 }}
