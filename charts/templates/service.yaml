apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc056ba98-92d7-4b7f-a99b-37142fe99621.fullname" . }}
  labels:
    {{- include "go-echoc056ba98-92d7-4b7f-a99b-37142fe99621.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc056ba98-92d7-4b7f-a99b-37142fe99621.selectorLabels" . | nindent 6 }}
