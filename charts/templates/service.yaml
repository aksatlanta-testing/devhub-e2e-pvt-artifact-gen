apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo01e51d95-c843-4568-be2c-92690b9b93b5.fullname" . }}
  labels:
    {{- include "go-echo01e51d95-c843-4568-be2c-92690b9b93b5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo01e51d95-c843-4568-be2c-92690b9b93b5.selectorLabels" . | nindent 6 }}
