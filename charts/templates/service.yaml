apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9e0fd13d-f537-4bde-b440-f84de131e09d.fullname" . }}
  labels:
    {{- include "go-echo9e0fd13d-f537-4bde-b440-f84de131e09d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9e0fd13d-f537-4bde-b440-f84de131e09d.selectorLabels" . | nindent 6 }}
