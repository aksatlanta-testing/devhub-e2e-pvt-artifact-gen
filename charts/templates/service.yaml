apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoce53e8cf-9ed1-4e8b-ade4-97fc4fd69ea1.fullname" . }}
  labels:
    {{- include "go-echoce53e8cf-9ed1-4e8b-ade4-97fc4fd69ea1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoce53e8cf-9ed1-4e8b-ade4-97fc4fd69ea1.selectorLabels" . | nindent 6 }}
