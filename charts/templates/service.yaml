apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo66738012-8eac-4764-8cad-7fb1e510945e.fullname" . }}
  labels:
    {{- include "go-echo66738012-8eac-4764-8cad-7fb1e510945e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo66738012-8eac-4764-8cad-7fb1e510945e.selectorLabels" . | nindent 6 }}
