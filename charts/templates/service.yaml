apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobb2a1267-8cb6-4912-bfd1-c781f60e3ce1.fullname" . }}
  labels:
    {{- include "go-echobb2a1267-8cb6-4912-bfd1-c781f60e3ce1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobb2a1267-8cb6-4912-bfd1-c781f60e3ce1.selectorLabels" . | nindent 6 }}
