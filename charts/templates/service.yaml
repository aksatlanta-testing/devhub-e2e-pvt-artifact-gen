apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6eb72d5b-0372-4d29-b56c-2c7efe5cf96c.fullname" . }}
  labels:
    {{- include "go-echo6eb72d5b-0372-4d29-b56c-2c7efe5cf96c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6eb72d5b-0372-4d29-b56c-2c7efe5cf96c.selectorLabels" . | nindent 6 }}
