apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodeaf03cf-7767-4c87-9779-8e5d3191a9db.fullname" . }}
  labels:
    {{- include "go-echodeaf03cf-7767-4c87-9779-8e5d3191a9db.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodeaf03cf-7767-4c87-9779-8e5d3191a9db.selectorLabels" . | nindent 6 }}
