apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc03f6656-5fc6-46a9-8df4-4fc073e04281.fullname" . }}
  labels:
    {{- include "go-echoc03f6656-5fc6-46a9-8df4-4fc073e04281.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc03f6656-5fc6-46a9-8df4-4fc073e04281.selectorLabels" . | nindent 6 }}
