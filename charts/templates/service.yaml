apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo23fa5f33-9f9d-4994-a17b-2fe4e7579fbd.fullname" . }}
  labels:
    {{- include "go-echo23fa5f33-9f9d-4994-a17b-2fe4e7579fbd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo23fa5f33-9f9d-4994-a17b-2fe4e7579fbd.selectorLabels" . | nindent 6 }}
