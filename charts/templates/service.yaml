apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo268c7d79-c22a-44f1-9d73-83188cc43856.fullname" . }}
  labels:
    {{- include "go-echo268c7d79-c22a-44f1-9d73-83188cc43856.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo268c7d79-c22a-44f1-9d73-83188cc43856.selectorLabels" . | nindent 6 }}
