apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod58a4739-2082-4aa3-bb01-3e48be2133ca.fullname" . }}
  labels:
    {{- include "go-echod58a4739-2082-4aa3-bb01-3e48be2133ca.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod58a4739-2082-4aa3-bb01-3e48be2133ca.selectorLabels" . | nindent 6 }}
