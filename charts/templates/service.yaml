apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa13f6101-34fc-46c2-a846-496d1eb03f23.fullname" . }}
  labels:
    {{- include "go-echoa13f6101-34fc-46c2-a846-496d1eb03f23.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa13f6101-34fc-46c2-a846-496d1eb03f23.selectorLabels" . | nindent 6 }}
