apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5fe11e06-1d5f-4460-b5ab-d8780742a886.fullname" . }}
  labels:
    {{- include "go-echo5fe11e06-1d5f-4460-b5ab-d8780742a886.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5fe11e06-1d5f-4460-b5ab-d8780742a886.selectorLabels" . | nindent 6 }}
