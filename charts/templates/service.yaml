apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofea3fb41-0235-437d-ac06-0666f3ebcdea.fullname" . }}
  labels:
    {{- include "go-echofea3fb41-0235-437d-ac06-0666f3ebcdea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofea3fb41-0235-437d-ac06-0666f3ebcdea.selectorLabels" . | nindent 6 }}
