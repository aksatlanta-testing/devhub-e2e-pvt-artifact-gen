apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo911fd581-c53a-4578-b6b6-d790edc05f26.fullname" . }}
  labels:
    {{- include "go-echo911fd581-c53a-4578-b6b6-d790edc05f26.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo911fd581-c53a-4578-b6b6-d790edc05f26.selectorLabels" . | nindent 6 }}
