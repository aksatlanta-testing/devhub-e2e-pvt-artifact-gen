apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4a2cff3d-45e3-4b0b-8784-7f49c44dfa7c.fullname" . }}
  labels:
    {{- include "go-echo4a2cff3d-45e3-4b0b-8784-7f49c44dfa7c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4a2cff3d-45e3-4b0b-8784-7f49c44dfa7c.selectorLabels" . | nindent 6 }}
