apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo816693ec-4138-4e78-9160-2a675c9db517.fullname" . }}
  labels:
    {{- include "go-echo816693ec-4138-4e78-9160-2a675c9db517.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo816693ec-4138-4e78-9160-2a675c9db517.selectorLabels" . | nindent 6 }}
