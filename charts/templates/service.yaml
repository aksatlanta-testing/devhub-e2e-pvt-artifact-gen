apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa1ad7b46-e2d3-4554-aec8-0367cf55713d.fullname" . }}
  labels:
    {{- include "go-echoa1ad7b46-e2d3-4554-aec8-0367cf55713d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa1ad7b46-e2d3-4554-aec8-0367cf55713d.selectorLabels" . | nindent 6 }}
