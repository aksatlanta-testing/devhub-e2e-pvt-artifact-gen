apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo29583ed7-85c1-4e26-9ef8-52bd1b815f75.fullname" . }}
  labels:
    {{- include "go-echo29583ed7-85c1-4e26-9ef8-52bd1b815f75.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo29583ed7-85c1-4e26-9ef8-52bd1b815f75.selectorLabels" . | nindent 6 }}
