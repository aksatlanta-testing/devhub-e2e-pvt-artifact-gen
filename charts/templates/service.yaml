apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9ffac878-6d7c-461a-9e62-569bdc538e21.fullname" . }}
  labels:
    {{- include "go-echo9ffac878-6d7c-461a-9e62-569bdc538e21.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9ffac878-6d7c-461a-9e62-569bdc538e21.selectorLabels" . | nindent 6 }}
