apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5ef0ec67-d48a-4e4e-8ad2-07fb534f7488.fullname" . }}
  labels:
    {{- include "go-echo5ef0ec67-d48a-4e4e-8ad2-07fb534f7488.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5ef0ec67-d48a-4e4e-8ad2-07fb534f7488.selectorLabels" . | nindent 6 }}
