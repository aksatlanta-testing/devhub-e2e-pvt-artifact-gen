apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7b17f4e4-2558-4352-b7a5-75f2a7823dcc.fullname" . }}
  labels:
    {{- include "go-echo7b17f4e4-2558-4352-b7a5-75f2a7823dcc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7b17f4e4-2558-4352-b7a5-75f2a7823dcc.selectorLabels" . | nindent 6 }}
