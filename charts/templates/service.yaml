apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocd0d5799-ecda-4e2d-b70d-b325dfaebcb4.fullname" . }}
  labels:
    {{- include "go-echocd0d5799-ecda-4e2d-b70d-b325dfaebcb4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocd0d5799-ecda-4e2d-b70d-b325dfaebcb4.selectorLabels" . | nindent 6 }}
