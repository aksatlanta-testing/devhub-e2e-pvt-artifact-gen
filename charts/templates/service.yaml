apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo49188233-2a18-4ff8-9fa2-8eaec5c8c05e.fullname" . }}
  labels:
    {{- include "go-echo49188233-2a18-4ff8-9fa2-8eaec5c8c05e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo49188233-2a18-4ff8-9fa2-8eaec5c8c05e.selectorLabels" . | nindent 6 }}
