apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo315547cf-d709-427d-8176-e3ed95d938f0.fullname" . }}
  labels:
    {{- include "go-echo315547cf-d709-427d-8176-e3ed95d938f0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo315547cf-d709-427d-8176-e3ed95d938f0.selectorLabels" . | nindent 6 }}
