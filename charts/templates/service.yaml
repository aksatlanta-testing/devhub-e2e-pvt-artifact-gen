apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoce3ed80c-fda0-4c47-a8fb-334b9ad262b7.fullname" . }}
  labels:
    {{- include "go-echoce3ed80c-fda0-4c47-a8fb-334b9ad262b7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoce3ed80c-fda0-4c47-a8fb-334b9ad262b7.selectorLabels" . | nindent 6 }}
