apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo907e034b-9b8a-4c92-abb2-c8835d531738.fullname" . }}
  labels:
    {{- include "go-echo907e034b-9b8a-4c92-abb2-c8835d531738.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo907e034b-9b8a-4c92-abb2-c8835d531738.selectorLabels" . | nindent 6 }}
