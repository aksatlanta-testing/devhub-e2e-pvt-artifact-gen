apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo57af0cba-fa09-44e3-84db-3a48e9e6abad.fullname" . }}
  labels:
    {{- include "go-echo57af0cba-fa09-44e3-84db-3a48e9e6abad.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo57af0cba-fa09-44e3-84db-3a48e9e6abad.selectorLabels" . | nindent 6 }}
