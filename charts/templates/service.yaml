apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5a7f9b71-e473-49f2-8a9b-1e9d175e9f8e.fullname" . }}
  labels:
    {{- include "go-echo5a7f9b71-e473-49f2-8a9b-1e9d175e9f8e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5a7f9b71-e473-49f2-8a9b-1e9d175e9f8e.selectorLabels" . | nindent 6 }}
