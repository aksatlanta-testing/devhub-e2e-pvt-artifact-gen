apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo563d3eb4-dd0c-4a3e-a099-e8f2d8ecd78d.fullname" . }}
  labels:
    {{- include "go-echo563d3eb4-dd0c-4a3e-a099-e8f2d8ecd78d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo563d3eb4-dd0c-4a3e-a099-e8f2d8ecd78d.selectorLabels" . | nindent 6 }}
