apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo91c71241-17cf-4312-ad1b-a3e41a298c41.fullname" . }}
  labels:
    {{- include "go-echo91c71241-17cf-4312-ad1b-a3e41a298c41.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo91c71241-17cf-4312-ad1b-a3e41a298c41.selectorLabels" . | nindent 6 }}
