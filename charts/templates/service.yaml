apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe2aa945d-3b32-412c-943d-43606d9146f0.fullname" . }}
  labels:
    {{- include "go-echoe2aa945d-3b32-412c-943d-43606d9146f0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe2aa945d-3b32-412c-943d-43606d9146f0.selectorLabels" . | nindent 6 }}
