apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda8bfc8a-ac7b-4dc1-a07d-9e71d9471c2b.fullname" . }}
  labels:
    {{- include "go-echoda8bfc8a-ac7b-4dc1-a07d-9e71d9471c2b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda8bfc8a-ac7b-4dc1-a07d-9e71d9471c2b.selectorLabels" . | nindent 6 }}
