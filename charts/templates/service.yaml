apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoacdfbf3d-f542-4230-b6fb-5ba688fe1ae0.fullname" . }}
  labels:
    {{- include "go-echoacdfbf3d-f542-4230-b6fb-5ba688fe1ae0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoacdfbf3d-f542-4230-b6fb-5ba688fe1ae0.selectorLabels" . | nindent 6 }}
