apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e6025bd-fc1d-44a0-8a48-9a507806f275.fullname" . }}
  labels:
    {{- include "go-echo0e6025bd-fc1d-44a0-8a48-9a507806f275.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e6025bd-fc1d-44a0-8a48-9a507806f275.selectorLabels" . | nindent 6 }}
