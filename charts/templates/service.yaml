apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob6bc1457-57e9-4a25-9649-2c5aac09f131.fullname" . }}
  labels:
    {{- include "go-echob6bc1457-57e9-4a25-9649-2c5aac09f131.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob6bc1457-57e9-4a25-9649-2c5aac09f131.selectorLabels" . | nindent 6 }}
