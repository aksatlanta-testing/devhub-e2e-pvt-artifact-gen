apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2c13fa27-50ec-4aaa-bd3b-bda8118724a1.fullname" . }}
  labels:
    {{- include "go-echo2c13fa27-50ec-4aaa-bd3b-bda8118724a1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2c13fa27-50ec-4aaa-bd3b-bda8118724a1.selectorLabels" . | nindent 6 }}
