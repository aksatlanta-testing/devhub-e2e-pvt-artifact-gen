apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob1dc3f9d-58e3-4473-8b7c-5f81e9444a57.fullname" . }}
  labels:
    {{- include "go-echob1dc3f9d-58e3-4473-8b7c-5f81e9444a57.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob1dc3f9d-58e3-4473-8b7c-5f81e9444a57.selectorLabels" . | nindent 6 }}
