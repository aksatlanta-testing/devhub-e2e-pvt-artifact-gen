apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5522a4b6-98a8-46d4-a319-00d7294abad9.fullname" . }}
  labels:
    {{- include "go-echo5522a4b6-98a8-46d4-a319-00d7294abad9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5522a4b6-98a8-46d4-a319-00d7294abad9.selectorLabels" . | nindent 6 }}
