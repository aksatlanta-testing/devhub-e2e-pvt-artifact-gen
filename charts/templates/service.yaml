apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe2d2fa13-d172-4c0e-a1fc-f086649165bc.fullname" . }}
  labels:
    {{- include "go-echoe2d2fa13-d172-4c0e-a1fc-f086649165bc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe2d2fa13-d172-4c0e-a1fc-f086649165bc.selectorLabels" . | nindent 6 }}
