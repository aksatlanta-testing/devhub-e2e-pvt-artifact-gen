apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4faca4d4-aaba-48e5-bf83-2580f2e3d255.fullname" . }}
  labels:
    {{- include "go-echo4faca4d4-aaba-48e5-bf83-2580f2e3d255.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4faca4d4-aaba-48e5-bf83-2580f2e3d255.selectorLabels" . | nindent 6 }}
