apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo26d1b417-e26d-41b2-a55d-b008492bbc55.fullname" . }}
  labels:
    {{- include "go-echo26d1b417-e26d-41b2-a55d-b008492bbc55.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo26d1b417-e26d-41b2-a55d-b008492bbc55.selectorLabels" . | nindent 6 }}
