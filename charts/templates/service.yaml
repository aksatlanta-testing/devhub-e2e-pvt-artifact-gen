apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4b5d67e9-f2b2-47c0-b33a-56bc7d5cc782.fullname" . }}
  labels:
    {{- include "go-echo4b5d67e9-f2b2-47c0-b33a-56bc7d5cc782.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4b5d67e9-f2b2-47c0-b33a-56bc7d5cc782.selectorLabels" . | nindent 6 }}
