apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1d9c5260-425e-4b2e-8513-70b2e48927c8.fullname" . }}
  labels:
    {{- include "go-echo1d9c5260-425e-4b2e-8513-70b2e48927c8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1d9c5260-425e-4b2e-8513-70b2e48927c8.selectorLabels" . | nindent 6 }}
