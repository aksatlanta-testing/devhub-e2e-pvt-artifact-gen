apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo31c763c7-186a-4cb8-9d33-45983d289611.fullname" . }}
  labels:
    {{- include "go-echo31c763c7-186a-4cb8-9d33-45983d289611.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
