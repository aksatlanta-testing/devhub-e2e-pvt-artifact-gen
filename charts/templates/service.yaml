apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa50ae4b6-7354-403e-8018-24fef4ba52cf.fullname" . }}
  labels:
    {{- include "go-echoa50ae4b6-7354-403e-8018-24fef4ba52cf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa50ae4b6-7354-403e-8018-24fef4ba52cf.selectorLabels" . | nindent 6 }}
