apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1acd8dcf-5690-420a-8c31-bba64b54033c.fullname" . }}
  labels:
    {{- include "go-echo1acd8dcf-5690-420a-8c31-bba64b54033c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1acd8dcf-5690-420a-8c31-bba64b54033c.selectorLabels" . | nindent 6 }}
