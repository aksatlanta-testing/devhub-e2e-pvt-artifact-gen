apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo36930dc4-15fb-45ca-9ccb-e1fbc0c8a1f3.fullname" . }}
  labels:
    {{- include "go-echo36930dc4-15fb-45ca-9ccb-e1fbc0c8a1f3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo36930dc4-15fb-45ca-9ccb-e1fbc0c8a1f3.selectorLabels" . | nindent 6 }}
