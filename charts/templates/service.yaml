apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo479e979b-1e76-41d0-8c7a-fad9a209f8a3.fullname" . }}
  labels:
    {{- include "go-echo479e979b-1e76-41d0-8c7a-fad9a209f8a3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo479e979b-1e76-41d0-8c7a-fad9a209f8a3.selectorLabels" . | nindent 6 }}
