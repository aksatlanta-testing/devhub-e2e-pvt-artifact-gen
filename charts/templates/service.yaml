apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob71c17e1-1b94-43e6-827b-69a46704f45e.fullname" . }}
  labels:
    {{- include "go-echob71c17e1-1b94-43e6-827b-69a46704f45e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob71c17e1-1b94-43e6-827b-69a46704f45e.selectorLabels" . | nindent 6 }}
