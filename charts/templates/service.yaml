apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9d8cfdcb-15ce-440b-8df6-f33faecd268b.fullname" . }}
  labels:
    {{- include "go-echo9d8cfdcb-15ce-440b-8df6-f33faecd268b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9d8cfdcb-15ce-440b-8df6-f33faecd268b.selectorLabels" . | nindent 6 }}
