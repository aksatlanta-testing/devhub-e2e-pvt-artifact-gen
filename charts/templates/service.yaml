apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo39be62c7-30d9-47cd-9b0c-7a99197503d8.fullname" . }}
  labels:
    {{- include "go-echo39be62c7-30d9-47cd-9b0c-7a99197503d8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo39be62c7-30d9-47cd-9b0c-7a99197503d8.selectorLabels" . | nindent 6 }}
