apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2d85f4db-2bd8-41d3-961a-835d327a7178.fullname" . }}
  labels:
    {{- include "go-echo2d85f4db-2bd8-41d3-961a-835d327a7178.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2d85f4db-2bd8-41d3-961a-835d327a7178.selectorLabels" . | nindent 6 }}
