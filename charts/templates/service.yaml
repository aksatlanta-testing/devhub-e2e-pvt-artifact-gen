apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd89e62b-5802-4be7-ae98-0e11b8e060dd.fullname" . }}
  labels:
    {{- include "go-echobd89e62b-5802-4be7-ae98-0e11b8e060dd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd89e62b-5802-4be7-ae98-0e11b8e060dd.selectorLabels" . | nindent 6 }}
