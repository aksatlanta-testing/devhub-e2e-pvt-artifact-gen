apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4abf48f9-accc-44c5-af3f-1cdfb3292c2d.fullname" . }}
  labels:
    {{- include "go-echo4abf48f9-accc-44c5-af3f-1cdfb3292c2d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4abf48f9-accc-44c5-af3f-1cdfb3292c2d.selectorLabels" . | nindent 6 }}
