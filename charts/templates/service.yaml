apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9e97a43c-609c-4fcb-bc3e-ef82fcd1fcde.fullname" . }}
  labels:
    {{- include "go-echo9e97a43c-609c-4fcb-bc3e-ef82fcd1fcde.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9e97a43c-609c-4fcb-bc3e-ef82fcd1fcde.selectorLabels" . | nindent 6 }}
