apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe97e0654-55cc-4408-bee8-24522622c4a0.fullname" . }}
  labels:
    {{- include "go-echoe97e0654-55cc-4408-bee8-24522622c4a0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe97e0654-55cc-4408-bee8-24522622c4a0.selectorLabels" . | nindent 6 }}
