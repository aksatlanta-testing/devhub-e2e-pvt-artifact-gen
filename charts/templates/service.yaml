apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod776e3c0-68e2-416c-8551-c46e90b69400.fullname" . }}
  labels:
    {{- include "go-echod776e3c0-68e2-416c-8551-c46e90b69400.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod776e3c0-68e2-416c-8551-c46e90b69400.selectorLabels" . | nindent 6 }}
