apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8b50afaa-b0f5-47fc-8a9b-39008d995fca.fullname" . }}
  labels:
    {{- include "go-echo8b50afaa-b0f5-47fc-8a9b-39008d995fca.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8b50afaa-b0f5-47fc-8a9b-39008d995fca.selectorLabels" . | nindent 6 }}
