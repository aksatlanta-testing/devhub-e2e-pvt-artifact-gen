apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo49aa656e-1268-4749-bfe4-d8cc3b3da66d.fullname" . }}
  labels:
    {{- include "go-echo49aa656e-1268-4749-bfe4-d8cc3b3da66d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo49aa656e-1268-4749-bfe4-d8cc3b3da66d.selectorLabels" . | nindent 6 }}
