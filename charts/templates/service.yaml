apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc9bb30f-2e69-40a6-9370-510f04f7667a.fullname" . }}
  labels:
    {{- include "go-echocc9bb30f-2e69-40a6-9370-510f04f7667a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc9bb30f-2e69-40a6-9370-510f04f7667a.selectorLabels" . | nindent 6 }}
