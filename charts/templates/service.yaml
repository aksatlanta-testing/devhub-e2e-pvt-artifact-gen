apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc3a355f0-290a-46d3-8590-9d68420adbfc.fullname" . }}
  labels:
    {{- include "go-echoc3a355f0-290a-46d3-8590-9d68420adbfc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc3a355f0-290a-46d3-8590-9d68420adbfc.selectorLabels" . | nindent 6 }}
