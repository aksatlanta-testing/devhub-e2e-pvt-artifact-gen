apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocf40dbc0-2f77-4c28-89b7-d462b5afd35d.fullname" . }}
  labels:
    {{- include "go-echocf40dbc0-2f77-4c28-89b7-d462b5afd35d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocf40dbc0-2f77-4c28-89b7-d462b5afd35d.selectorLabels" . | nindent 6 }}
