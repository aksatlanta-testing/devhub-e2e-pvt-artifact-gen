apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof945743c-0058-469f-a36c-8ba43f58fb82.fullname" . }}
  labels:
    {{- include "go-echof945743c-0058-469f-a36c-8ba43f58fb82.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof945743c-0058-469f-a36c-8ba43f58fb82.selectorLabels" . | nindent 6 }}
