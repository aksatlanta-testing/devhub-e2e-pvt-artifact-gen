apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8ccb5ade-84be-4fa9-8a10-9e60d8857571.fullname" . }}
  labels:
    {{- include "go-echo8ccb5ade-84be-4fa9-8a10-9e60d8857571.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8ccb5ade-84be-4fa9-8a10-9e60d8857571.selectorLabels" . | nindent 6 }}
