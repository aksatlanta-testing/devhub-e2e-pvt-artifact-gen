apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe11283aa-4af1-4086-8e90-fc08be1e2705.fullname" . }}
  labels:
    {{- include "go-echoe11283aa-4af1-4086-8e90-fc08be1e2705.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe11283aa-4af1-4086-8e90-fc08be1e2705.selectorLabels" . | nindent 6 }}
