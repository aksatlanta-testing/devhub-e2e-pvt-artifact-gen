apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3cbcca7f-c5e5-432b-a8f8-359540068bf4.fullname" . }}
  labels:
    {{- include "go-echo3cbcca7f-c5e5-432b-a8f8-359540068bf4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3cbcca7f-c5e5-432b-a8f8-359540068bf4.selectorLabels" . | nindent 6 }}
