apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobafd8e57-555e-4a98-9e4e-74637568edc1.fullname" . }}
  labels:
    {{- include "go-echobafd8e57-555e-4a98-9e4e-74637568edc1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobafd8e57-555e-4a98-9e4e-74637568edc1.selectorLabels" . | nindent 6 }}
