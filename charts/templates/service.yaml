apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4e6dc8d-cd47-46d1-8883-5fa31b4a76b0.fullname" . }}
  labels:
    {{- include "go-echoc4e6dc8d-cd47-46d1-8883-5fa31b4a76b0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4e6dc8d-cd47-46d1-8883-5fa31b4a76b0.selectorLabels" . | nindent 6 }}
