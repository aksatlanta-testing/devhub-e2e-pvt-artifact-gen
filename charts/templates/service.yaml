apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9787b59d-c1f8-4179-b281-c83a8b56d848.fullname" . }}
  labels:
    {{- include "go-echo9787b59d-c1f8-4179-b281-c83a8b56d848.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9787b59d-c1f8-4179-b281-c83a8b56d848.selectorLabels" . | nindent 6 }}
