apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo059471df-99e8-4831-88f6-86da937e75d6.fullname" . }}
  labels:
    {{- include "go-echo059471df-99e8-4831-88f6-86da937e75d6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo059471df-99e8-4831-88f6-86da937e75d6.selectorLabels" . | nindent 6 }}
