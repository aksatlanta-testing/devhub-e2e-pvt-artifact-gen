apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo26994ed2-9709-4069-96b0-4119f139a9a1.fullname" . }}
  labels:
    {{- include "go-echo26994ed2-9709-4069-96b0-4119f139a9a1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo26994ed2-9709-4069-96b0-4119f139a9a1.selectorLabels" . | nindent 6 }}
