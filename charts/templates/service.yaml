apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo83426845-f6d2-4e1f-89d5-3cfc72f6b868.fullname" . }}
  labels:
    {{- include "go-echo83426845-f6d2-4e1f-89d5-3cfc72f6b868.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo83426845-f6d2-4e1f-89d5-3cfc72f6b868.selectorLabels" . | nindent 6 }}
