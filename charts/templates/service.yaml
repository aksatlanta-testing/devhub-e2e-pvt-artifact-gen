apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeccc3c18-b03a-491e-8ca0-e077a6e73961.fullname" . }}
  labels:
    {{- include "go-echoeccc3c18-b03a-491e-8ca0-e077a6e73961.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeccc3c18-b03a-491e-8ca0-e077a6e73961.selectorLabels" . | nindent 6 }}
