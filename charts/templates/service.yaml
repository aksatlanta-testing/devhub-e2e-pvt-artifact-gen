apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4d565aae-70f7-490a-aaa8-a6a8f7c10413.fullname" . }}
  labels:
    {{- include "go-echo4d565aae-70f7-490a-aaa8-a6a8f7c10413.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4d565aae-70f7-490a-aaa8-a6a8f7c10413.selectorLabels" . | nindent 6 }}
