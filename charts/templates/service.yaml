apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc15c5c25-3334-492a-b9ba-69eebdc5b25a.fullname" . }}
  labels:
    {{- include "go-echoc15c5c25-3334-492a-b9ba-69eebdc5b25a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc15c5c25-3334-492a-b9ba-69eebdc5b25a.selectorLabels" . | nindent 6 }}
