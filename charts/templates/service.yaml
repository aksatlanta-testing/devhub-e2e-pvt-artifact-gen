apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9f168e8f-15da-44b0-a7fe-e0b31f605fda.fullname" . }}
  labels:
    {{- include "go-echo9f168e8f-15da-44b0-a7fe-e0b31f605fda.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9f168e8f-15da-44b0-a7fe-e0b31f605fda.selectorLabels" . | nindent 6 }}
