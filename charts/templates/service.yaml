apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod2a2ad5c-b3d2-4ace-8e44-9a00fe6a490b.fullname" . }}
  labels:
    {{- include "go-echod2a2ad5c-b3d2-4ace-8e44-9a00fe6a490b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod2a2ad5c-b3d2-4ace-8e44-9a00fe6a490b.selectorLabels" . | nindent 6 }}
