apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobf794eca-8ae9-4704-bc6c-291f70e54dac.fullname" . }}
  labels:
    {{- include "go-echobf794eca-8ae9-4704-bc6c-291f70e54dac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobf794eca-8ae9-4704-bc6c-291f70e54dac.selectorLabels" . | nindent 6 }}
