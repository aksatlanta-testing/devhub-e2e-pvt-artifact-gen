apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2a0698fe-f249-4790-8935-8ddc92a3679f.fullname" . }}
  labels:
    {{- include "go-echo2a0698fe-f249-4790-8935-8ddc92a3679f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2a0698fe-f249-4790-8935-8ddc92a3679f.selectorLabels" . | nindent 6 }}
