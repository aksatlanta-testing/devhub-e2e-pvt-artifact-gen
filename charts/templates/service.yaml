apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodda31a59-a3da-47e6-9185-907638170c23.fullname" . }}
  labels:
    {{- include "go-echodda31a59-a3da-47e6-9185-907638170c23.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodda31a59-a3da-47e6-9185-907638170c23.selectorLabels" . | nindent 6 }}
