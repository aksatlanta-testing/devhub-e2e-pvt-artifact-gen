apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoba9dc411-d6a6-415f-9e0c-77acdeddec6a.fullname" . }}
  labels:
    {{- include "go-echoba9dc411-d6a6-415f-9e0c-77acdeddec6a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoba9dc411-d6a6-415f-9e0c-77acdeddec6a.selectorLabels" . | nindent 6 }}
