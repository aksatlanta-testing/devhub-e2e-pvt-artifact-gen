apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo34a00aff-47dc-4ecf-86d4-62e8e9a46c3a.fullname" . }}
  labels:
    {{- include "go-echo34a00aff-47dc-4ecf-86d4-62e8e9a46c3a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo34a00aff-47dc-4ecf-86d4-62e8e9a46c3a.selectorLabels" . | nindent 6 }}
