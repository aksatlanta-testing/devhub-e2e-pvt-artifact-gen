apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2809006e-3b45-46c5-b155-1b3aba148b50.fullname" . }}
  labels:
    {{- include "go-echo2809006e-3b45-46c5-b155-1b3aba148b50.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2809006e-3b45-46c5-b155-1b3aba148b50.selectorLabels" . | nindent 6 }}
