apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo75c045ab-398f-42fe-9cc3-410221faed45.fullname" . }}
  labels:
    {{- include "go-echo75c045ab-398f-42fe-9cc3-410221faed45.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo75c045ab-398f-42fe-9cc3-410221faed45.selectorLabels" . | nindent 6 }}
