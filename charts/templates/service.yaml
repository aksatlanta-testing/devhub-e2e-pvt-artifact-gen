apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob25a1e45-f558-4b14-8640-e3f361fd69ec.fullname" . }}
  labels:
    {{- include "go-echob25a1e45-f558-4b14-8640-e3f361fd69ec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob25a1e45-f558-4b14-8640-e3f361fd69ec.selectorLabels" . | nindent 6 }}
