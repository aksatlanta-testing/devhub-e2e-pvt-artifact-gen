apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8c3f7f9-20f0-48ca-8433-ccf6599961e6.fullname" . }}
  labels:
    {{- include "go-echoc8c3f7f9-20f0-48ca-8433-ccf6599961e6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8c3f7f9-20f0-48ca-8433-ccf6599961e6.selectorLabels" . | nindent 6 }}
