apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc55e5665-3cce-43ed-9862-ba7ee444c6fa.fullname" . }}
  labels:
    {{- include "go-echoc55e5665-3cce-43ed-9862-ba7ee444c6fa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc55e5665-3cce-43ed-9862-ba7ee444c6fa.selectorLabels" . | nindent 6 }}
