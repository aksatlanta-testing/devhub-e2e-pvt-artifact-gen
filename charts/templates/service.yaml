apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo21283d69-42c6-4ccb-abd8-26aefc002c66.fullname" . }}
  labels:
    {{- include "go-echo21283d69-42c6-4ccb-abd8-26aefc002c66.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo21283d69-42c6-4ccb-abd8-26aefc002c66.selectorLabels" . | nindent 6 }}
