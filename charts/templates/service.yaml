apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod9e06530-17ae-44dc-8372-e5e957cc4d61.fullname" . }}
  labels:
    {{- include "go-echod9e06530-17ae-44dc-8372-e5e957cc4d61.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod9e06530-17ae-44dc-8372-e5e957cc4d61.selectorLabels" . | nindent 6 }}
