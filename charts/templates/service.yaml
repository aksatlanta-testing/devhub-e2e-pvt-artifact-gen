apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9b3cf6a7-7984-444a-b87c-0e37d33d3f75.fullname" . }}
  labels:
    {{- include "go-echo9b3cf6a7-7984-444a-b87c-0e37d33d3f75.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9b3cf6a7-7984-444a-b87c-0e37d33d3f75.selectorLabels" . | nindent 6 }}
