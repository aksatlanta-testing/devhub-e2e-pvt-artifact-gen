apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8de490e5-5354-41a7-be24-5f1e898aaba2.fullname" . }}
  labels:
    {{- include "go-echo8de490e5-5354-41a7-be24-5f1e898aaba2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8de490e5-5354-41a7-be24-5f1e898aaba2.selectorLabels" . | nindent 6 }}
