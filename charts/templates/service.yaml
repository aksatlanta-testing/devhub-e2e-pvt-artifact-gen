apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodba075ca-4e94-4b8e-861a-1c259799c883.fullname" . }}
  labels:
    {{- include "go-echodba075ca-4e94-4b8e-861a-1c259799c883.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodba075ca-4e94-4b8e-861a-1c259799c883.selectorLabels" . | nindent 6 }}
