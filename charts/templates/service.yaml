apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9e0400f9-fc45-4885-901d-6ab4e0a04aed.fullname" . }}
  labels:
    {{- include "go-echo9e0400f9-fc45-4885-901d-6ab4e0a04aed.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9e0400f9-fc45-4885-901d-6ab4e0a04aed.selectorLabels" . | nindent 6 }}
