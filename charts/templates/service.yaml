apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo59abf1ca-8eea-497b-a869-780607b3c05b.fullname" . }}
  labels:
    {{- include "go-echo59abf1ca-8eea-497b-a869-780607b3c05b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo59abf1ca-8eea-497b-a869-780607b3c05b.selectorLabels" . | nindent 6 }}
