apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo758aee40-f71f-4b6a-a2dc-979b190d734d.fullname" . }}
  labels:
    {{- include "go-echo758aee40-f71f-4b6a-a2dc-979b190d734d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo758aee40-f71f-4b6a-a2dc-979b190d734d.selectorLabels" . | nindent 6 }}
