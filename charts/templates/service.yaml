apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8922305c-168c-4ff3-bc87-edab15b7f54f.fullname" . }}
  labels:
    {{- include "go-echo8922305c-168c-4ff3-bc87-edab15b7f54f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8922305c-168c-4ff3-bc87-edab15b7f54f.selectorLabels" . | nindent 6 }}
