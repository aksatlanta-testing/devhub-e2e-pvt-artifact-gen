apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2d3ea82a-64ef-490b-9521-40cd89273007.fullname" . }}
  labels:
    {{- include "go-echo2d3ea82a-64ef-490b-9521-40cd89273007.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2d3ea82a-64ef-490b-9521-40cd89273007.selectorLabels" . | nindent 6 }}
