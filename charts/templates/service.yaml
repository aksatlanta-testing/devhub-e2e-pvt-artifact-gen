apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa90f6f33-4373-453d-9268-4ce7ec95295b.fullname" . }}
  labels:
    {{- include "go-echoa90f6f33-4373-453d-9268-4ce7ec95295b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa90f6f33-4373-453d-9268-4ce7ec95295b.selectorLabels" . | nindent 6 }}
