apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofb1df142-8bf5-48af-9429-2d954f077cd9.fullname" . }}
  labels:
    {{- include "go-echofb1df142-8bf5-48af-9429-2d954f077cd9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofb1df142-8bf5-48af-9429-2d954f077cd9.selectorLabels" . | nindent 6 }}
