apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo68da7405-2538-4e44-8ab3-dd84793a292f.fullname" . }}
  labels:
    {{- include "go-echo68da7405-2538-4e44-8ab3-dd84793a292f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo68da7405-2538-4e44-8ab3-dd84793a292f.selectorLabels" . | nindent 6 }}
