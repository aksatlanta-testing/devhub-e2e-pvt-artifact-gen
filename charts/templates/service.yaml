apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc0cc6adb-74f5-46a9-9d4d-c3f527280913.fullname" . }}
  labels:
    {{- include "go-echoc0cc6adb-74f5-46a9-9d4d-c3f527280913.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc0cc6adb-74f5-46a9-9d4d-c3f527280913.selectorLabels" . | nindent 6 }}
