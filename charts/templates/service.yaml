apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod906eb37-564b-4c09-ac76-b0c679debe64.fullname" . }}
  labels:
    {{- include "go-echod906eb37-564b-4c09-ac76-b0c679debe64.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod906eb37-564b-4c09-ac76-b0c679debe64.selectorLabels" . | nindent 6 }}
