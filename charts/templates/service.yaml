apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodec1fb54-0f8a-4e7b-a48d-fa3e7b26e934.fullname" . }}
  labels:
    {{- include "go-echodec1fb54-0f8a-4e7b-a48d-fa3e7b26e934.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodec1fb54-0f8a-4e7b-a48d-fa3e7b26e934.selectorLabels" . | nindent 6 }}
