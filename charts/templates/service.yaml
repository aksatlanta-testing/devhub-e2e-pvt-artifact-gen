apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3bbc3de9-deff-4516-b71f-0c5df3aad08f.fullname" . }}
  labels:
    {{- include "go-echo3bbc3de9-deff-4516-b71f-0c5df3aad08f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3bbc3de9-deff-4516-b71f-0c5df3aad08f.selectorLabels" . | nindent 6 }}
