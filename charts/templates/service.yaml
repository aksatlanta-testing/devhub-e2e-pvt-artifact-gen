apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoebcc4b67-03a7-42f9-bbd4-d176c98d41b8.fullname" . }}
  labels:
    {{- include "go-echoebcc4b67-03a7-42f9-bbd4-d176c98d41b8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoebcc4b67-03a7-42f9-bbd4-d176c98d41b8.selectorLabels" . | nindent 6 }}
