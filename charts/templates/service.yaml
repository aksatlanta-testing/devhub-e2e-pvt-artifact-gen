apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe2f6eb87-f606-45d1-85de-89dc7e7f7bac.fullname" . }}
  labels:
    {{- include "go-echoe2f6eb87-f606-45d1-85de-89dc7e7f7bac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe2f6eb87-f606-45d1-85de-89dc7e7f7bac.selectorLabels" . | nindent 6 }}
