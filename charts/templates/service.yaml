apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda9a357e-8da9-443a-b45e-d59f1cf1b107.fullname" . }}
  labels:
    {{- include "go-echoda9a357e-8da9-443a-b45e-d59f1cf1b107.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda9a357e-8da9-443a-b45e-d59f1cf1b107.selectorLabels" . | nindent 6 }}
