apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo20c4f66f-edea-4210-9093-db6bfae7fccc.fullname" . }}
  labels:
    {{- include "go-echo20c4f66f-edea-4210-9093-db6bfae7fccc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo20c4f66f-edea-4210-9093-db6bfae7fccc.selectorLabels" . | nindent 6 }}
