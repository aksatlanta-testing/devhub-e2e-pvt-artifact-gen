apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob6789332-0856-4bf8-81ec-c87f6503181c.fullname" . }}
  labels:
    {{- include "go-echob6789332-0856-4bf8-81ec-c87f6503181c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob6789332-0856-4bf8-81ec-c87f6503181c.selectorLabels" . | nindent 6 }}
