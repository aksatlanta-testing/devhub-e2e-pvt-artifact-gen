apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0565695a-2c56-4b5c-b872-b8f2e91c40a1.fullname" . }}
  labels:
    {{- include "go-echo0565695a-2c56-4b5c-b872-b8f2e91c40a1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0565695a-2c56-4b5c-b872-b8f2e91c40a1.selectorLabels" . | nindent 6 }}
