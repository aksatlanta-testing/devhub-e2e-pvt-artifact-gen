apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo55fd80cb-7e98-4ef3-a094-e1a80f367b40.fullname" . }}
  labels:
    {{- include "go-echo55fd80cb-7e98-4ef3-a094-e1a80f367b40.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo55fd80cb-7e98-4ef3-a094-e1a80f367b40.selectorLabels" . | nindent 6 }}
