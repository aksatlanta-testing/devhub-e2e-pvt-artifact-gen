apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1bab1f87-8e9c-4e1d-b919-ceca13693068.fullname" . }}
  labels:
    {{- include "go-echo1bab1f87-8e9c-4e1d-b919-ceca13693068.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1bab1f87-8e9c-4e1d-b919-ceca13693068.selectorLabels" . | nindent 6 }}
