apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo005c46cb-dbc8-4b4f-b193-b70f4b494b80.fullname" . }}
  labels:
    {{- include "go-echo005c46cb-dbc8-4b4f-b193-b70f4b494b80.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo005c46cb-dbc8-4b4f-b193-b70f4b494b80.selectorLabels" . | nindent 6 }}
