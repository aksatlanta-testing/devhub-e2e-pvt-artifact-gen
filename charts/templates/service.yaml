apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob933c546-152b-4ac7-97ab-d033f9832df5.fullname" . }}
  labels:
    {{- include "go-echob933c546-152b-4ac7-97ab-d033f9832df5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob933c546-152b-4ac7-97ab-d033f9832df5.selectorLabels" . | nindent 6 }}
