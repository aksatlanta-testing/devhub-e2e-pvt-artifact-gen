apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoea947e54-70ac-44ca-b7b0-1bef605a1b09.fullname" . }}
  labels:
    {{- include "go-echoea947e54-70ac-44ca-b7b0-1bef605a1b09.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoea947e54-70ac-44ca-b7b0-1bef605a1b09.selectorLabels" . | nindent 6 }}
