apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo51670e25-6337-4845-ab13-a2f7071357e4.fullname" . }}
  labels:
    {{- include "go-echo51670e25-6337-4845-ab13-a2f7071357e4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo51670e25-6337-4845-ab13-a2f7071357e4.selectorLabels" . | nindent 6 }}
