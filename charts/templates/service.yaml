apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo24a68d77-3e3c-43b2-b6a9-5ae7f884703c.fullname" . }}
  labels:
    {{- include "go-echo24a68d77-3e3c-43b2-b6a9-5ae7f884703c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo24a68d77-3e3c-43b2-b6a9-5ae7f884703c.selectorLabels" . | nindent 6 }}
