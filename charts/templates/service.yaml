apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1481c477-f180-4226-967f-71eb468ce42a.fullname" . }}
  labels:
    {{- include "go-echo1481c477-f180-4226-967f-71eb468ce42a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1481c477-f180-4226-967f-71eb468ce42a.selectorLabels" . | nindent 6 }}
