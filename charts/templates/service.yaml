apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2b078331-ed0e-4b9a-8a71-297e4682f8e5.fullname" . }}
  labels:
    {{- include "go-echo2b078331-ed0e-4b9a-8a71-297e4682f8e5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2b078331-ed0e-4b9a-8a71-297e4682f8e5.selectorLabels" . | nindent 6 }}
