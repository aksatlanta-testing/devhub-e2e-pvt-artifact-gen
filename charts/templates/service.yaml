apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc1e3229c-8116-4bd7-9825-a1db61677670.fullname" . }}
  labels:
    {{- include "go-echoc1e3229c-8116-4bd7-9825-a1db61677670.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc1e3229c-8116-4bd7-9825-a1db61677670.selectorLabels" . | nindent 6 }}
