apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa6103f40-e9e2-43fa-97f8-702999637467.fullname" . }}
  labels:
    {{- include "go-echoa6103f40-e9e2-43fa-97f8-702999637467.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa6103f40-e9e2-43fa-97f8-702999637467.selectorLabels" . | nindent 6 }}
