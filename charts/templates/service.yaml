apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo738bad14-8ace-4f2e-a90d-72082b5f80e8.fullname" . }}
  labels:
    {{- include "go-echo738bad14-8ace-4f2e-a90d-72082b5f80e8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo738bad14-8ace-4f2e-a90d-72082b5f80e8.selectorLabels" . | nindent 6 }}
