apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0dce4f83-6a23-4bfe-9e3e-c476cee5af78.fullname" . }}
  labels:
    {{- include "go-echo0dce4f83-6a23-4bfe-9e3e-c476cee5af78.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0dce4f83-6a23-4bfe-9e3e-c476cee5af78.selectorLabels" . | nindent 6 }}
