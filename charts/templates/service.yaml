apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd25d213-069d-4f7f-839e-9909434582f6.fullname" . }}
  labels:
    {{- include "go-echobd25d213-069d-4f7f-839e-9909434582f6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd25d213-069d-4f7f-839e-9909434582f6.selectorLabels" . | nindent 6 }}
