apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa92a57c6-3729-4dd5-9e61-db9e99fc6064.fullname" . }}
  labels:
    {{- include "go-echoa92a57c6-3729-4dd5-9e61-db9e99fc6064.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa92a57c6-3729-4dd5-9e61-db9e99fc6064.selectorLabels" . | nindent 6 }}
