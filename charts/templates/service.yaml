apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0371f638-73af-4b2b-b31c-246cc717afa3.fullname" . }}
  labels:
    {{- include "go-echo0371f638-73af-4b2b-b31c-246cc717afa3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0371f638-73af-4b2b-b31c-246cc717afa3.selectorLabels" . | nindent 6 }}
