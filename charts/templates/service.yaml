apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob6f36ea5-0597-4dd5-a61b-424742ed901b.fullname" . }}
  labels:
    {{- include "go-echob6f36ea5-0597-4dd5-a61b-424742ed901b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob6f36ea5-0597-4dd5-a61b-424742ed901b.selectorLabels" . | nindent 6 }}
