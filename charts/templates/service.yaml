apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9cde0572-9e34-4a40-9489-e750defa6be5.fullname" . }}
  labels:
    {{- include "go-echo9cde0572-9e34-4a40-9489-e750defa6be5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9cde0572-9e34-4a40-9489-e750defa6be5.selectorLabels" . | nindent 6 }}
