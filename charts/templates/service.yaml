apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo64d693fd-a3c3-44a3-bfbc-f886cabc26a2.fullname" . }}
  labels:
    {{- include "go-echo64d693fd-a3c3-44a3-bfbc-f886cabc26a2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo64d693fd-a3c3-44a3-bfbc-f886cabc26a2.selectorLabels" . | nindent 6 }}
