apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod1d6d67d-d9a1-4954-abfa-4477ec9c5f4c.fullname" . }}
  labels:
    {{- include "go-echod1d6d67d-d9a1-4954-abfa-4477ec9c5f4c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod1d6d67d-d9a1-4954-abfa-4477ec9c5f4c.selectorLabels" . | nindent 6 }}
