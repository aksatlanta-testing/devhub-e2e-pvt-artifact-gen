apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo98a4deba-2c16-42b6-99c6-76dd68391d07.fullname" . }}
  labels:
    {{- include "go-echo98a4deba-2c16-42b6-99c6-76dd68391d07.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo98a4deba-2c16-42b6-99c6-76dd68391d07.selectorLabels" . | nindent 6 }}
