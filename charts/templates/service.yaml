apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo546c398f-e76b-4da9-941c-d8026bc3b090.fullname" . }}
  labels:
    {{- include "go-echo546c398f-e76b-4da9-941c-d8026bc3b090.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo546c398f-e76b-4da9-941c-d8026bc3b090.selectorLabels" . | nindent 6 }}
