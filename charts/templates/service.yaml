apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1601242d-7e6f-4898-b86b-b55d3675a7c4.fullname" . }}
  labels:
    {{- include "go-echo1601242d-7e6f-4898-b86b-b55d3675a7c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1601242d-7e6f-4898-b86b-b55d3675a7c4.selectorLabels" . | nindent 6 }}
