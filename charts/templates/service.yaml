apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8c9eb3c4-bf92-4cc4-b66e-716bd95795be.fullname" . }}
  labels:
    {{- include "go-echo8c9eb3c4-bf92-4cc4-b66e-716bd95795be.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8c9eb3c4-bf92-4cc4-b66e-716bd95795be.selectorLabels" . | nindent 6 }}
