apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob6012519-9794-4f5e-9c02-f8a25f24892e.fullname" . }}
  labels:
    {{- include "go-echob6012519-9794-4f5e-9c02-f8a25f24892e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob6012519-9794-4f5e-9c02-f8a25f24892e.selectorLabels" . | nindent 6 }}
