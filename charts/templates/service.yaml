apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo72e3c0c4-191b-4a6f-abee-c256f7ad62ea.fullname" . }}
  labels:
    {{- include "go-echo72e3c0c4-191b-4a6f-abee-c256f7ad62ea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo72e3c0c4-191b-4a6f-abee-c256f7ad62ea.selectorLabels" . | nindent 6 }}
