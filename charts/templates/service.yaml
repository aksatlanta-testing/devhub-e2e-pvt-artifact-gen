apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3146513d-af7a-4b09-b9b5-c55bd3efe777.fullname" . }}
  labels:
    {{- include "go-echo3146513d-af7a-4b09-b9b5-c55bd3efe777.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3146513d-af7a-4b09-b9b5-c55bd3efe777.selectorLabels" . | nindent 6 }}
