apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5431e805-7442-4d67-9067-c660972d1bfb.fullname" . }}
  labels:
    {{- include "go-echo5431e805-7442-4d67-9067-c660972d1bfb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5431e805-7442-4d67-9067-c660972d1bfb.selectorLabels" . | nindent 6 }}
