apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo783d8bce-b7f9-437d-a9c9-61081018bf58.fullname" . }}
  labels:
    {{- include "go-echo783d8bce-b7f9-437d-a9c9-61081018bf58.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo783d8bce-b7f9-437d-a9c9-61081018bf58.selectorLabels" . | nindent 6 }}
