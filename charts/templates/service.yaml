apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5e956704-ca46-425b-8d62-d9153bf49030.fullname" . }}
  labels:
    {{- include "go-echo5e956704-ca46-425b-8d62-d9153bf49030.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5e956704-ca46-425b-8d62-d9153bf49030.selectorLabels" . | nindent 6 }}
