apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3e95f690-3aba-4550-97bc-47b32b6d1f73.fullname" . }}
  labels:
    {{- include "go-echo3e95f690-3aba-4550-97bc-47b32b6d1f73.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3e95f690-3aba-4550-97bc-47b32b6d1f73.selectorLabels" . | nindent 6 }}
