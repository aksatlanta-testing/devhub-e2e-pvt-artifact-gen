apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaea616ba-79d0-4295-9782-848187ea51ea.fullname" . }}
  labels:
    {{- include "go-echoaea616ba-79d0-4295-9782-848187ea51ea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaea616ba-79d0-4295-9782-848187ea51ea.selectorLabels" . | nindent 6 }}
