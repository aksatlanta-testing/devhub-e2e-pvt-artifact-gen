apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc4873ea-6f96-49f4-ad86-6698a65eafc8.fullname" . }}
  labels:
    {{- include "go-echocc4873ea-6f96-49f4-ad86-6698a65eafc8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc4873ea-6f96-49f4-ad86-6698a65eafc8.selectorLabels" . | nindent 6 }}
