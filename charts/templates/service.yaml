apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf3ae36a-774e-4183-a713-583c1b9b7dcd.fullname" . }}
  labels:
    {{- include "go-echoaf3ae36a-774e-4183-a713-583c1b9b7dcd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf3ae36a-774e-4183-a713-583c1b9b7dcd.selectorLabels" . | nindent 6 }}
