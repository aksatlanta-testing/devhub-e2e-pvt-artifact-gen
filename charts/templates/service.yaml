apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo25073032-0e94-4e56-95a5-94a43a440b75.fullname" . }}
  labels:
    {{- include "go-echo25073032-0e94-4e56-95a5-94a43a440b75.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo25073032-0e94-4e56-95a5-94a43a440b75.selectorLabels" . | nindent 6 }}
