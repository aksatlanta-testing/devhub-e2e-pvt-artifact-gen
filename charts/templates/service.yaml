apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3557015b-02be-4546-926e-909dfbf1ed28.fullname" . }}
  labels:
    {{- include "go-echo3557015b-02be-4546-926e-909dfbf1ed28.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3557015b-02be-4546-926e-909dfbf1ed28.selectorLabels" . | nindent 6 }}
