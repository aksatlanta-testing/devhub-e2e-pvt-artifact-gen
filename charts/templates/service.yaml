apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo084bcde9-af65-44ba-893e-a51379f4d386.fullname" . }}
  labels:
    {{- include "go-echo084bcde9-af65-44ba-893e-a51379f4d386.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo084bcde9-af65-44ba-893e-a51379f4d386.selectorLabels" . | nindent 6 }}
