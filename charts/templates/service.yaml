apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo978bb740-05f3-45c8-a6ff-dc88571b4694.fullname" . }}
  labels:
    {{- include "go-echo978bb740-05f3-45c8-a6ff-dc88571b4694.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo978bb740-05f3-45c8-a6ff-dc88571b4694.selectorLabels" . | nindent 6 }}
