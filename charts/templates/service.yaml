apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4574e5b-3095-44ba-a237-f0b67d15160b.fullname" . }}
  labels:
    {{- include "go-echoc4574e5b-3095-44ba-a237-f0b67d15160b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4574e5b-3095-44ba-a237-f0b67d15160b.selectorLabels" . | nindent 6 }}
