apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo88a580a2-ab84-49d1-97b6-c0db600be594.fullname" . }}
  labels:
    {{- include "go-echo88a580a2-ab84-49d1-97b6-c0db600be594.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo88a580a2-ab84-49d1-97b6-c0db600be594.selectorLabels" . | nindent 6 }}
