apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoca021346-701b-4961-b620-ee028c9a3386.fullname" . }}
  labels:
    {{- include "go-echoca021346-701b-4961-b620-ee028c9a3386.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoca021346-701b-4961-b620-ee028c9a3386.selectorLabels" . | nindent 6 }}
