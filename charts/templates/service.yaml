apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8b4889b4-c29e-4673-89ef-d2cf7baf4365.fullname" . }}
  labels:
    {{- include "go-echo8b4889b4-c29e-4673-89ef-d2cf7baf4365.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8b4889b4-c29e-4673-89ef-d2cf7baf4365.selectorLabels" . | nindent 6 }}
