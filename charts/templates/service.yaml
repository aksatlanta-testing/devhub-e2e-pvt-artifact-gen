apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod5205a7a-2fef-45a5-b3f8-ad86a975cef8.fullname" . }}
  labels:
    {{- include "go-echod5205a7a-2fef-45a5-b3f8-ad86a975cef8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod5205a7a-2fef-45a5-b3f8-ad86a975cef8.selectorLabels" . | nindent 6 }}
