apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo694475b9-8595-4063-8e41-e07e188dbc51.fullname" . }}
  labels:
    {{- include "go-echo694475b9-8595-4063-8e41-e07e188dbc51.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo694475b9-8595-4063-8e41-e07e188dbc51.selectorLabels" . | nindent 6 }}
