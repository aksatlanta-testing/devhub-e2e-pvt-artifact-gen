apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo146e4a85-adb5-4c07-a8ff-5f63d3076ddf.fullname" . }}
  labels:
    {{- include "go-echo146e4a85-adb5-4c07-a8ff-5f63d3076ddf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo146e4a85-adb5-4c07-a8ff-5f63d3076ddf.selectorLabels" . | nindent 6 }}
