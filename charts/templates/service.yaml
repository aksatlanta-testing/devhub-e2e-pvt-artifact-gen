apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo78ccc9d4-916d-4418-b45d-3d50596cfe81.fullname" . }}
  labels:
    {{- include "go-echo78ccc9d4-916d-4418-b45d-3d50596cfe81.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo78ccc9d4-916d-4418-b45d-3d50596cfe81.selectorLabels" . | nindent 6 }}
