apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo00b98707-1b8e-4e00-b3c1-6b35cb66f717.fullname" . }}
  labels:
    {{- include "go-echo00b98707-1b8e-4e00-b3c1-6b35cb66f717.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
