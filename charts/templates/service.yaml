apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoac991ab9-a463-4777-b624-b03444e0f48c.fullname" . }}
  labels:
    {{- include "go-echoac991ab9-a463-4777-b624-b03444e0f48c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoac991ab9-a463-4777-b624-b03444e0f48c.selectorLabels" . | nindent 6 }}
