apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3031f840-0d65-4221-98fd-37deeaeec25c.fullname" . }}
  labels:
    {{- include "go-echo3031f840-0d65-4221-98fd-37deeaeec25c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3031f840-0d65-4221-98fd-37deeaeec25c.selectorLabels" . | nindent 6 }}
