apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3c9e2d75-ffb1-4a9b-a21c-6b8256dc6100.fullname" . }}
  labels:
    {{- include "go-echo3c9e2d75-ffb1-4a9b-a21c-6b8256dc6100.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3c9e2d75-ffb1-4a9b-a21c-6b8256dc6100.selectorLabels" . | nindent 6 }}
