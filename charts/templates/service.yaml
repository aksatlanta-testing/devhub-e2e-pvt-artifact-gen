apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodf670104-24d8-4bfc-9cd5-32a32fcd1a32.fullname" . }}
  labels:
    {{- include "go-echodf670104-24d8-4bfc-9cd5-32a32fcd1a32.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodf670104-24d8-4bfc-9cd5-32a32fcd1a32.selectorLabels" . | nindent 6 }}
