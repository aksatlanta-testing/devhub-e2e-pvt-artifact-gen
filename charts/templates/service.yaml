apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3083c2cd-5895-444f-82a4-c1a1a3c50238.fullname" . }}
  labels:
    {{- include "go-echo3083c2cd-5895-444f-82a4-c1a1a3c50238.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3083c2cd-5895-444f-82a4-c1a1a3c50238.selectorLabels" . | nindent 6 }}
