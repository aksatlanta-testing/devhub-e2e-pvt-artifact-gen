apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo957e4619-57d6-4e23-8437-2f2ac8f550a1.fullname" . }}
  labels:
    {{- include "go-echo957e4619-57d6-4e23-8437-2f2ac8f550a1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo957e4619-57d6-4e23-8437-2f2ac8f550a1.selectorLabels" . | nindent 6 }}
