apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofabdeec7-5484-48a9-a272-5e1c9550cfe8.fullname" . }}
  labels:
    {{- include "go-echofabdeec7-5484-48a9-a272-5e1c9550cfe8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofabdeec7-5484-48a9-a272-5e1c9550cfe8.selectorLabels" . | nindent 6 }}
