apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo94612c59-3c48-42d2-998b-00cebe1e1fc0.fullname" . }}
  labels:
    {{- include "go-echo94612c59-3c48-42d2-998b-00cebe1e1fc0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo94612c59-3c48-42d2-998b-00cebe1e1fc0.selectorLabels" . | nindent 6 }}
