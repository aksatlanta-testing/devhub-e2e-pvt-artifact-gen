apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc9132099-eb0e-49eb-b85d-6955d46241b6.fullname" . }}
  labels:
    {{- include "go-echoc9132099-eb0e-49eb-b85d-6955d46241b6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc9132099-eb0e-49eb-b85d-6955d46241b6.selectorLabels" . | nindent 6 }}
