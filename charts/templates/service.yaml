apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe2a16b09-9d14-440f-996c-f44e4d8be998.fullname" . }}
  labels:
    {{- include "go-echoe2a16b09-9d14-440f-996c-f44e4d8be998.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe2a16b09-9d14-440f-996c-f44e4d8be998.selectorLabels" . | nindent 6 }}
