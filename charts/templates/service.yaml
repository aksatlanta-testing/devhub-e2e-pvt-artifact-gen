apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob2e47f61-dc83-454a-8096-a8c86c04f391.fullname" . }}
  labels:
    {{- include "go-echob2e47f61-dc83-454a-8096-a8c86c04f391.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob2e47f61-dc83-454a-8096-a8c86c04f391.selectorLabels" . | nindent 6 }}
