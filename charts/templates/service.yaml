apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo31b3da4a-4c7c-4a67-9eea-5a0e6c85d57f.fullname" . }}
  labels:
    {{- include "go-echo31b3da4a-4c7c-4a67-9eea-5a0e6c85d57f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo31b3da4a-4c7c-4a67-9eea-5a0e6c85d57f.selectorLabels" . | nindent 6 }}
