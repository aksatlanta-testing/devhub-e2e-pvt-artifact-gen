apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2d6ef89f-a989-4013-b761-6fcf2222c001.fullname" . }}
  labels:
    {{- include "go-echo2d6ef89f-a989-4013-b761-6fcf2222c001.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2d6ef89f-a989-4013-b761-6fcf2222c001.selectorLabels" . | nindent 6 }}
