apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo098d9eea-f641-428d-9628-a822f02703d4.fullname" . }}
  labels:
    {{- include "go-echo098d9eea-f641-428d-9628-a822f02703d4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo098d9eea-f641-428d-9628-a822f02703d4.selectorLabels" . | nindent 6 }}
