apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b3eb68f-56ea-4a28-b531-e4045d6064f4.fullname" . }}
  labels:
    {{- include "go-echo0b3eb68f-56ea-4a28-b531-e4045d6064f4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b3eb68f-56ea-4a28-b531-e4045d6064f4.selectorLabels" . | nindent 6 }}
