apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc1afa41-8a7c-4ac8-9b80-7d75a98b5248.fullname" . }}
  labels:
    {{- include "go-echocc1afa41-8a7c-4ac8-9b80-7d75a98b5248.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc1afa41-8a7c-4ac8-9b80-7d75a98b5248.selectorLabels" . | nindent 6 }}
