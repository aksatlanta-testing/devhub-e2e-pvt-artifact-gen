apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3752f34f-0e9d-4325-8e2f-dae1ec7f819a.fullname" . }}
  labels:
    {{- include "go-echo3752f34f-0e9d-4325-8e2f-dae1ec7f819a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3752f34f-0e9d-4325-8e2f-dae1ec7f819a.selectorLabels" . | nindent 6 }}
