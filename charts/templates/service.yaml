apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9ae85d9e-6fca-49d1-bc65-f74a2eb8d85f.fullname" . }}
  labels:
    {{- include "go-echo9ae85d9e-6fca-49d1-bc65-f74a2eb8d85f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9ae85d9e-6fca-49d1-bc65-f74a2eb8d85f.selectorLabels" . | nindent 6 }}
