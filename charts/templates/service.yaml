apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocfe94d16-6bad-484d-bd03-6c910010d52e.fullname" . }}
  labels:
    {{- include "go-echocfe94d16-6bad-484d-bd03-6c910010d52e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocfe94d16-6bad-484d-bd03-6c910010d52e.selectorLabels" . | nindent 6 }}
