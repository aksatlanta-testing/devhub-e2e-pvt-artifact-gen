apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob7a8ef42-54d9-432f-b4c9-575457da5a6e.fullname" . }}
  labels:
    {{- include "go-echob7a8ef42-54d9-432f-b4c9-575457da5a6e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob7a8ef42-54d9-432f-b4c9-575457da5a6e.selectorLabels" . | nindent 6 }}
