apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa6918124-e094-4be0-b61e-fb7c94b5d381.fullname" . }}
  labels:
    {{- include "go-echoa6918124-e094-4be0-b61e-fb7c94b5d381.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa6918124-e094-4be0-b61e-fb7c94b5d381.selectorLabels" . | nindent 6 }}
