apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2d9ceea2-cec4-4ea6-b8cc-fe59f17c895e.fullname" . }}
  labels:
    {{- include "go-echo2d9ceea2-cec4-4ea6-b8cc-fe59f17c895e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2d9ceea2-cec4-4ea6-b8cc-fe59f17c895e.selectorLabels" . | nindent 6 }}
