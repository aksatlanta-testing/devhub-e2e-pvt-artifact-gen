apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo075001d8-a8da-41f6-9ce6-b3b92b2b7a75.fullname" . }}
  labels:
    {{- include "go-echo075001d8-a8da-41f6-9ce6-b3b92b2b7a75.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo075001d8-a8da-41f6-9ce6-b3b92b2b7a75.selectorLabels" . | nindent 6 }}
