apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod02023d2-7fde-4ff1-a645-fa373dd2a4e6.fullname" . }}
  labels:
    {{- include "go-echod02023d2-7fde-4ff1-a645-fa373dd2a4e6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod02023d2-7fde-4ff1-a645-fa373dd2a4e6.selectorLabels" . | nindent 6 }}
