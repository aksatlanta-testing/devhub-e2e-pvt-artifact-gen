apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3e287de6-d52e-41dc-9032-2230e00ce53f.fullname" . }}
  labels:
    {{- include "go-echo3e287de6-d52e-41dc-9032-2230e00ce53f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3e287de6-d52e-41dc-9032-2230e00ce53f.selectorLabels" . | nindent 6 }}
