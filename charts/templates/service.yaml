apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8d0881ba-cc34-4c3a-b5fb-f045a2e9950e.fullname" . }}
  labels:
    {{- include "go-echo8d0881ba-cc34-4c3a-b5fb-f045a2e9950e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8d0881ba-cc34-4c3a-b5fb-f045a2e9950e.selectorLabels" . | nindent 6 }}
