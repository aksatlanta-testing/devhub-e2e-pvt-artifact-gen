apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8eafaeef-42b8-4a91-aafc-17604a5814ad.fullname" . }}
  labels:
    {{- include "go-echo8eafaeef-42b8-4a91-aafc-17604a5814ad.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8eafaeef-42b8-4a91-aafc-17604a5814ad.selectorLabels" . | nindent 6 }}
