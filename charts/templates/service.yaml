apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo890a84ab-7d34-4742-b4c7-451ec2fb03c5.fullname" . }}
  labels:
    {{- include "go-echo890a84ab-7d34-4742-b4c7-451ec2fb03c5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo890a84ab-7d34-4742-b4c7-451ec2fb03c5.selectorLabels" . | nindent 6 }}
