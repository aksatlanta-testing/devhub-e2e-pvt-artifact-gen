apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5b196c28-40a2-42a7-ac47-ff7c58fca4b2.fullname" . }}
  labels:
    {{- include "go-echo5b196c28-40a2-42a7-ac47-ff7c58fca4b2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5b196c28-40a2-42a7-ac47-ff7c58fca4b2.selectorLabels" . | nindent 6 }}
