apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo694263fc-c568-4d47-95d2-74232e9d17ed.fullname" . }}
  labels:
    {{- include "go-echo694263fc-c568-4d47-95d2-74232e9d17ed.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo694263fc-c568-4d47-95d2-74232e9d17ed.selectorLabels" . | nindent 6 }}
