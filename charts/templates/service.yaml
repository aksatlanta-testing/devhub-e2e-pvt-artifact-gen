apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo501320ed-672a-44a3-ac09-fdf5128e76ec.fullname" . }}
  labels:
    {{- include "go-echo501320ed-672a-44a3-ac09-fdf5128e76ec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo501320ed-672a-44a3-ac09-fdf5128e76ec.selectorLabels" . | nindent 6 }}
