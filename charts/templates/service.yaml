apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe42a004b-9103-48ea-9c8d-7bd5d9069654.fullname" . }}
  labels:
    {{- include "go-echoe42a004b-9103-48ea-9c8d-7bd5d9069654.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe42a004b-9103-48ea-9c8d-7bd5d9069654.selectorLabels" . | nindent 6 }}
