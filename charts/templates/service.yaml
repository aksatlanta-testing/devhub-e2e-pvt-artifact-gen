apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo72ca1a9a-343a-4841-b112-70a49a59deb9.fullname" . }}
  labels:
    {{- include "go-echo72ca1a9a-343a-4841-b112-70a49a59deb9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo72ca1a9a-343a-4841-b112-70a49a59deb9.selectorLabels" . | nindent 6 }}
