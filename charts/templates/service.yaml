apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7149a984-8278-4f5a-a10d-8ebca051e52b.fullname" . }}
  labels:
    {{- include "go-echo7149a984-8278-4f5a-a10d-8ebca051e52b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7149a984-8278-4f5a-a10d-8ebca051e52b.selectorLabels" . | nindent 6 }}
