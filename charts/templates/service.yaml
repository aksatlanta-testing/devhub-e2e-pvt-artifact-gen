apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo95da7133-b8df-4cf4-9b7f-1de83a5d1b61.fullname" . }}
  labels:
    {{- include "go-echo95da7133-b8df-4cf4-9b7f-1de83a5d1b61.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo95da7133-b8df-4cf4-9b7f-1de83a5d1b61.selectorLabels" . | nindent 6 }}
