apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoefddb3ea-ce69-462c-b583-79243d2c8a5a.fullname" . }}
  labels:
    {{- include "go-echoefddb3ea-ce69-462c-b583-79243d2c8a5a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoefddb3ea-ce69-462c-b583-79243d2c8a5a.selectorLabels" . | nindent 6 }}
