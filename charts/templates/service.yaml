apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo041aed6c-4df2-447d-a83d-2fffeb6eba4c.fullname" . }}
  labels:
    {{- include "go-echo041aed6c-4df2-447d-a83d-2fffeb6eba4c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo041aed6c-4df2-447d-a83d-2fffeb6eba4c.selectorLabels" . | nindent 6 }}
