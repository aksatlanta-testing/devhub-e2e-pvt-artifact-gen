apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod262ca44-3456-4254-a057-9a13f022f989.fullname" . }}
  labels:
    {{- include "go-echod262ca44-3456-4254-a057-9a13f022f989.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod262ca44-3456-4254-a057-9a13f022f989.selectorLabels" . | nindent 6 }}
