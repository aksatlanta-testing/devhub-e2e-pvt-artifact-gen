apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo43195e75-350c-49bc-b9c0-eb79a08c7d97.fullname" . }}
  labels:
    {{- include "go-echo43195e75-350c-49bc-b9c0-eb79a08c7d97.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo43195e75-350c-49bc-b9c0-eb79a08c7d97.selectorLabels" . | nindent 6 }}
