apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo757c5df8-f9f9-4edc-bf1e-d8ba5ec132d9.fullname" . }}
  labels:
    {{- include "go-echo757c5df8-f9f9-4edc-bf1e-d8ba5ec132d9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo757c5df8-f9f9-4edc-bf1e-d8ba5ec132d9.selectorLabels" . | nindent 6 }}
