apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echode84813c-c4f9-4bbd-be9a-5739171025c0.fullname" . }}
  labels:
    {{- include "go-echode84813c-c4f9-4bbd-be9a-5739171025c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echode84813c-c4f9-4bbd-be9a-5739171025c0.selectorLabels" . | nindent 6 }}
