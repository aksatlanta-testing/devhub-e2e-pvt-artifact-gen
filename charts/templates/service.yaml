apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa583618f-88a2-445a-8596-33ea768e83f8.fullname" . }}
  labels:
    {{- include "go-echoa583618f-88a2-445a-8596-33ea768e83f8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa583618f-88a2-445a-8596-33ea768e83f8.selectorLabels" . | nindent 6 }}
