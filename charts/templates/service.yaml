apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo42a2abba-03bc-4e61-903d-0077b2ab07e6.fullname" . }}
  labels:
    {{- include "go-echo42a2abba-03bc-4e61-903d-0077b2ab07e6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo42a2abba-03bc-4e61-903d-0077b2ab07e6.selectorLabels" . | nindent 6 }}
