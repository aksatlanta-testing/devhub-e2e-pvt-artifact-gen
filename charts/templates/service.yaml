apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo13f75786-47ab-4887-b1ca-1979a88c81af.fullname" . }}
  labels:
    {{- include "go-echo13f75786-47ab-4887-b1ca-1979a88c81af.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo13f75786-47ab-4887-b1ca-1979a88c81af.selectorLabels" . | nindent 6 }}
