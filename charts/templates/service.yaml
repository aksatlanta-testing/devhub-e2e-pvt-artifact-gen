apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7528137a-3362-4b2e-8bfd-03b716215bb8.fullname" . }}
  labels:
    {{- include "go-echo7528137a-3362-4b2e-8bfd-03b716215bb8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7528137a-3362-4b2e-8bfd-03b716215bb8.selectorLabels" . | nindent 6 }}
