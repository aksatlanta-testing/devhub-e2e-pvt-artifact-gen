apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3e6139f0-929f-440b-8726-f451a89c98d7.fullname" . }}
  labels:
    {{- include "go-echo3e6139f0-929f-440b-8726-f451a89c98d7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3e6139f0-929f-440b-8726-f451a89c98d7.selectorLabels" . | nindent 6 }}
