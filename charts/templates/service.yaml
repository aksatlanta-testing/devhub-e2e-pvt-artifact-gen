apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2358787d-cb42-42eb-bcd7-f36646fd242b.fullname" . }}
  labels:
    {{- include "go-echo2358787d-cb42-42eb-bcd7-f36646fd242b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2358787d-cb42-42eb-bcd7-f36646fd242b.selectorLabels" . | nindent 6 }}
