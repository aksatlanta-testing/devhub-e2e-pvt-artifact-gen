apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa858badb-cb94-4a84-b740-9ae0297a71f7.fullname" . }}
  labels:
    {{- include "go-echoa858badb-cb94-4a84-b740-9ae0297a71f7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa858badb-cb94-4a84-b740-9ae0297a71f7.selectorLabels" . | nindent 6 }}
