apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe8c4e4f5-3002-437b-b922-ea88bdea32f9.fullname" . }}
  labels:
    {{- include "go-echoe8c4e4f5-3002-437b-b922-ea88bdea32f9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe8c4e4f5-3002-437b-b922-ea88bdea32f9.selectorLabels" . | nindent 6 }}
