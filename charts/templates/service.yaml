apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo758c42a6-3599-4587-a2be-8da0e6d2f2ef.fullname" . }}
  labels:
    {{- include "go-echo758c42a6-3599-4587-a2be-8da0e6d2f2ef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo758c42a6-3599-4587-a2be-8da0e6d2f2ef.selectorLabels" . | nindent 6 }}
