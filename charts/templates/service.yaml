apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo641b740a-247a-46b5-934f-bfa34b96e704.fullname" . }}
  labels:
    {{- include "go-echo641b740a-247a-46b5-934f-bfa34b96e704.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo641b740a-247a-46b5-934f-bfa34b96e704.selectorLabels" . | nindent 6 }}
