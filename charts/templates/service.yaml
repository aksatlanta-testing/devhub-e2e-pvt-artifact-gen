apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe8afb0b6-7a1d-426a-9a13-53469fa2ef70.fullname" . }}
  labels:
    {{- include "go-echoe8afb0b6-7a1d-426a-9a13-53469fa2ef70.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe8afb0b6-7a1d-426a-9a13-53469fa2ef70.selectorLabels" . | nindent 6 }}
