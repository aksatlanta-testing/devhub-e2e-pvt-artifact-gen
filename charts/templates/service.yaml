apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo66eb5061-cf70-464c-b836-085710087154.fullname" . }}
  labels:
    {{- include "go-echo66eb5061-cf70-464c-b836-085710087154.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo66eb5061-cf70-464c-b836-085710087154.selectorLabels" . | nindent 6 }}
