apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo984cbda0-fd47-4ffd-9a33-e23046de018d.fullname" . }}
  labels:
    {{- include "go-echo984cbda0-fd47-4ffd-9a33-e23046de018d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo984cbda0-fd47-4ffd-9a33-e23046de018d.selectorLabels" . | nindent 6 }}
