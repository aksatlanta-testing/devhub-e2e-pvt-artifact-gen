apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0aaa1418-d2c0-4ebc-9648-dff6a92a9108.fullname" . }}
  labels:
    {{- include "go-echo0aaa1418-d2c0-4ebc-9648-dff6a92a9108.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0aaa1418-d2c0-4ebc-9648-dff6a92a9108.selectorLabels" . | nindent 6 }}
