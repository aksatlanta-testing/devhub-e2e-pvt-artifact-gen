apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa6cfc912-f862-4a8e-8d99-5726ba742a9f.fullname" . }}
  labels:
    {{- include "go-echoa6cfc912-f862-4a8e-8d99-5726ba742a9f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa6cfc912-f862-4a8e-8d99-5726ba742a9f.selectorLabels" . | nindent 6 }}
