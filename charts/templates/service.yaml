apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc0be3893-caff-4d4d-815e-481cee1dbc1c.fullname" . }}
  labels:
    {{- include "go-echoc0be3893-caff-4d4d-815e-481cee1dbc1c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc0be3893-caff-4d4d-815e-481cee1dbc1c.selectorLabels" . | nindent 6 }}
