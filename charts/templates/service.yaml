apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe56d412e-b5ee-41bd-808a-5106afe5a2f5.fullname" . }}
  labels:
    {{- include "go-echoe56d412e-b5ee-41bd-808a-5106afe5a2f5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe56d412e-b5ee-41bd-808a-5106afe5a2f5.selectorLabels" . | nindent 6 }}
