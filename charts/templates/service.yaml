apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo31aeaba7-2af3-4174-9a72-472c2149510a.fullname" . }}
  labels:
    {{- include "go-echo31aeaba7-2af3-4174-9a72-472c2149510a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo31aeaba7-2af3-4174-9a72-472c2149510a.selectorLabels" . | nindent 6 }}
