apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7a75fe8f-c99e-4690-8224-a28b19e75cba.fullname" . }}
  labels:
    {{- include "go-echo7a75fe8f-c99e-4690-8224-a28b19e75cba.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7a75fe8f-c99e-4690-8224-a28b19e75cba.selectorLabels" . | nindent 6 }}
