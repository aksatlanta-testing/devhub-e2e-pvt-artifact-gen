apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9907db63-43ca-4e45-844b-8cd7e2b94dee.fullname" . }}
  labels:
    {{- include "go-echo9907db63-43ca-4e45-844b-8cd7e2b94dee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9907db63-43ca-4e45-844b-8cd7e2b94dee.selectorLabels" . | nindent 6 }}
