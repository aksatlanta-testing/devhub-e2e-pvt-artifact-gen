apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod80a1b3b-5502-496a-9b07-5e9dac58c71e.fullname" . }}
  labels:
    {{- include "go-echod80a1b3b-5502-496a-9b07-5e9dac58c71e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod80a1b3b-5502-496a-9b07-5e9dac58c71e.selectorLabels" . | nindent 6 }}
