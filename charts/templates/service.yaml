apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo48dcc6d8-6299-48a7-b6e8-1d69fd8aa61f.fullname" . }}
  labels:
    {{- include "go-echo48dcc6d8-6299-48a7-b6e8-1d69fd8aa61f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo48dcc6d8-6299-48a7-b6e8-1d69fd8aa61f.selectorLabels" . | nindent 6 }}
