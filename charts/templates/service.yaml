apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9935ea08-60df-4f5a-b1d9-8c3898865424.fullname" . }}
  labels:
    {{- include "go-echo9935ea08-60df-4f5a-b1d9-8c3898865424.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9935ea08-60df-4f5a-b1d9-8c3898865424.selectorLabels" . | nindent 6 }}
