apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo49ee64a1-e961-4661-8e98-7af017ba96de.fullname" . }}
  labels:
    {{- include "go-echo49ee64a1-e961-4661-8e98-7af017ba96de.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo49ee64a1-e961-4661-8e98-7af017ba96de.selectorLabels" . | nindent 6 }}
