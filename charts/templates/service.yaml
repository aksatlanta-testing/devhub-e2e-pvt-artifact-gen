apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ec1b132-123a-43b4-8286-dce29d85c4e9.fullname" . }}
  labels:
    {{- include "go-echo3ec1b132-123a-43b4-8286-dce29d85c4e9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ec1b132-123a-43b4-8286-dce29d85c4e9.selectorLabels" . | nindent 6 }}
