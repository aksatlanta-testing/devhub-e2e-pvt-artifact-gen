apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo39403860-0990-4f9b-af6d-46d50a0c6f26.fullname" . }}
  labels:
    {{- include "go-echo39403860-0990-4f9b-af6d-46d50a0c6f26.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo39403860-0990-4f9b-af6d-46d50a0c6f26.selectorLabels" . | nindent 6 }}
