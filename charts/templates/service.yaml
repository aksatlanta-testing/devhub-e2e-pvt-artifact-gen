apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofac9990e-83c5-4c5a-81ca-9cafe022aabe.fullname" . }}
  labels:
    {{- include "go-echofac9990e-83c5-4c5a-81ca-9cafe022aabe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofac9990e-83c5-4c5a-81ca-9cafe022aabe.selectorLabels" . | nindent 6 }}
