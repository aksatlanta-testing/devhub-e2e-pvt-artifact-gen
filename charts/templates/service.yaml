apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo07944eaa-ba9f-48ab-a496-b4f7ece9b93e.fullname" . }}
  labels:
    {{- include "go-echo07944eaa-ba9f-48ab-a496-b4f7ece9b93e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo07944eaa-ba9f-48ab-a496-b4f7ece9b93e.selectorLabels" . | nindent 6 }}
