apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1d6fc458-7f49-42cb-adf6-f0d77522d59a.fullname" . }}
  labels:
    {{- include "go-echo1d6fc458-7f49-42cb-adf6-f0d77522d59a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1d6fc458-7f49-42cb-adf6-f0d77522d59a.selectorLabels" . | nindent 6 }}
