apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof2ba641f-37af-4f71-9425-9d0dbb5d8d2c.fullname" . }}
  labels:
    {{- include "go-echof2ba641f-37af-4f71-9425-9d0dbb5d8d2c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof2ba641f-37af-4f71-9425-9d0dbb5d8d2c.selectorLabels" . | nindent 6 }}
