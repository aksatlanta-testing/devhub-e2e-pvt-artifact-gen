apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8807f396-f661-450c-a951-2269f86b2fbd.fullname" . }}
  labels:
    {{- include "go-echo8807f396-f661-450c-a951-2269f86b2fbd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8807f396-f661-450c-a951-2269f86b2fbd.selectorLabels" . | nindent 6 }}
