apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8d2c77dc-f3d7-4676-8725-e89b105a1173.fullname" . }}
  labels:
    {{- include "go-echo8d2c77dc-f3d7-4676-8725-e89b105a1173.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8d2c77dc-f3d7-4676-8725-e89b105a1173.selectorLabels" . | nindent 6 }}
