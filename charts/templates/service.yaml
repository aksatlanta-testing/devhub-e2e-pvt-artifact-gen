apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa9c3470d-e561-47ac-be21-e6c600ef609e.fullname" . }}
  labels:
    {{- include "go-echoa9c3470d-e561-47ac-be21-e6c600ef609e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa9c3470d-e561-47ac-be21-e6c600ef609e.selectorLabels" . | nindent 6 }}
