apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofc91d097-ad06-48ea-958a-1920d7293882.fullname" . }}
  labels:
    {{- include "go-echofc91d097-ad06-48ea-958a-1920d7293882.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofc91d097-ad06-48ea-958a-1920d7293882.selectorLabels" . | nindent 6 }}
