apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof0a0ea49-ecc1-4f1e-9fcf-78625f87bf86.fullname" . }}
  labels:
    {{- include "go-echof0a0ea49-ecc1-4f1e-9fcf-78625f87bf86.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof0a0ea49-ecc1-4f1e-9fcf-78625f87bf86.selectorLabels" . | nindent 6 }}
