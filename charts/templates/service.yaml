apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodd78b7ed-e36b-494c-b0ca-959a526dc2d3.fullname" . }}
  labels:
    {{- include "go-echodd78b7ed-e36b-494c-b0ca-959a526dc2d3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodd78b7ed-e36b-494c-b0ca-959a526dc2d3.selectorLabels" . | nindent 6 }}
