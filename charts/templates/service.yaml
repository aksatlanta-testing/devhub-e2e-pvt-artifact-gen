apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd53453e-b822-4af5-9c55-1f92d3405a3f.fullname" . }}
  labels:
    {{- include "go-echobd53453e-b822-4af5-9c55-1f92d3405a3f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd53453e-b822-4af5-9c55-1f92d3405a3f.selectorLabels" . | nindent 6 }}
