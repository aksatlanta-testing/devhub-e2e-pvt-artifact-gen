apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofbc91539-d4eb-462d-b09d-db6c30b31f0f.fullname" . }}
  labels:
    {{- include "go-echofbc91539-d4eb-462d-b09d-db6c30b31f0f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofbc91539-d4eb-462d-b09d-db6c30b31f0f.selectorLabels" . | nindent 6 }}
