apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c90ae8d-860a-48c7-b74a-d2617f943d1e.fullname" . }}
  labels:
    {{- include "go-echo1c90ae8d-860a-48c7-b74a-d2617f943d1e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c90ae8d-860a-48c7-b74a-d2617f943d1e.selectorLabels" . | nindent 6 }}
