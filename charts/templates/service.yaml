apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaaaa6bad-f157-4735-b580-a4640f49dd07.fullname" . }}
  labels:
    {{- include "go-echoaaaa6bad-f157-4735-b580-a4640f49dd07.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaaaa6bad-f157-4735-b580-a4640f49dd07.selectorLabels" . | nindent 6 }}
