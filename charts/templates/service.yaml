apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod14109b2-8149-4163-ab5e-a6d15d5d1ea7.fullname" . }}
  labels:
    {{- include "go-echod14109b2-8149-4163-ab5e-a6d15d5d1ea7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod14109b2-8149-4163-ab5e-a6d15d5d1ea7.selectorLabels" . | nindent 6 }}
