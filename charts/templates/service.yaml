apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe7089cd7-0be6-410d-b82a-797f89253e26.fullname" . }}
  labels:
    {{- include "go-echoe7089cd7-0be6-410d-b82a-797f89253e26.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe7089cd7-0be6-410d-b82a-797f89253e26.selectorLabels" . | nindent 6 }}
