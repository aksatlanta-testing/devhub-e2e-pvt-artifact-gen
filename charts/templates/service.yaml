apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo525cd8a6-4af7-44cd-ac11-c2f4b932c78b.fullname" . }}
  labels:
    {{- include "go-echo525cd8a6-4af7-44cd-ac11-c2f4b932c78b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo525cd8a6-4af7-44cd-ac11-c2f4b932c78b.selectorLabels" . | nindent 6 }}
