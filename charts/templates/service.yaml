apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod7076468-be9e-4177-8df3-0eb236871a48.fullname" . }}
  labels:
    {{- include "go-echod7076468-be9e-4177-8df3-0eb236871a48.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod7076468-be9e-4177-8df3-0eb236871a48.selectorLabels" . | nindent 6 }}
