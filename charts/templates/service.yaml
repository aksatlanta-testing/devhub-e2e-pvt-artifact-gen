apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2b20866c-5f9b-4d3b-aa02-36e0806fb3de.fullname" . }}
  labels:
    {{- include "go-echo2b20866c-5f9b-4d3b-aa02-36e0806fb3de.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2b20866c-5f9b-4d3b-aa02-36e0806fb3de.selectorLabels" . | nindent 6 }}
