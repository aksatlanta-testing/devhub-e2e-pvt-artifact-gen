apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4c01170e-48d9-49d8-a171-0df4f3f4467f.fullname" . }}
  labels:
    {{- include "go-echo4c01170e-48d9-49d8-a171-0df4f3f4467f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4c01170e-48d9-49d8-a171-0df4f3f4467f.selectorLabels" . | nindent 6 }}
