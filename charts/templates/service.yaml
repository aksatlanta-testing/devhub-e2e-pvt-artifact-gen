apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2fa5aed5-c460-450a-96d2-eadf954a7cce.fullname" . }}
  labels:
    {{- include "go-echo2fa5aed5-c460-450a-96d2-eadf954a7cce.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2fa5aed5-c460-450a-96d2-eadf954a7cce.selectorLabels" . | nindent 6 }}
