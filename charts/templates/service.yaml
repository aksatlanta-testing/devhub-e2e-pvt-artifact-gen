apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo88a16f56-cf28-43c6-96b9-d9a4e9b03a7e.fullname" . }}
  labels:
    {{- include "go-echo88a16f56-cf28-43c6-96b9-d9a4e9b03a7e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo88a16f56-cf28-43c6-96b9-d9a4e9b03a7e.selectorLabels" . | nindent 6 }}
