apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob54ded0c-fc03-451f-80ef-439ae5e08c46.fullname" . }}
  labels:
    {{- include "go-echob54ded0c-fc03-451f-80ef-439ae5e08c46.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob54ded0c-fc03-451f-80ef-439ae5e08c46.selectorLabels" . | nindent 6 }}
