apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo281e89f4-1387-41a2-9500-cbfcb292ebbf.fullname" . }}
  labels:
    {{- include "go-echo281e89f4-1387-41a2-9500-cbfcb292ebbf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo281e89f4-1387-41a2-9500-cbfcb292ebbf.selectorLabels" . | nindent 6 }}
