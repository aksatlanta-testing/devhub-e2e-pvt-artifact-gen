apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9cb40fa3-66f4-45f2-988a-938be693ca15.fullname" . }}
  labels:
    {{- include "go-echo9cb40fa3-66f4-45f2-988a-938be693ca15.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9cb40fa3-66f4-45f2-988a-938be693ca15.selectorLabels" . | nindent 6 }}
