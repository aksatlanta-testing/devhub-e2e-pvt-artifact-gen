apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo239935a8-7b54-40f0-9ec5-17c99e4f865a.fullname" . }}
  labels:
    {{- include "go-echo239935a8-7b54-40f0-9ec5-17c99e4f865a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo239935a8-7b54-40f0-9ec5-17c99e4f865a.selectorLabels" . | nindent 6 }}
