apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof80d1769-6bf7-4539-9327-af256ad45f85.fullname" . }}
  labels:
    {{- include "go-echof80d1769-6bf7-4539-9327-af256ad45f85.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof80d1769-6bf7-4539-9327-af256ad45f85.selectorLabels" . | nindent 6 }}
