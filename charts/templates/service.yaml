apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo22231c12-c6e4-4356-b3d0-a778a814abe6.fullname" . }}
  labels:
    {{- include "go-echo22231c12-c6e4-4356-b3d0-a778a814abe6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo22231c12-c6e4-4356-b3d0-a778a814abe6.selectorLabels" . | nindent 6 }}
