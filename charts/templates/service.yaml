apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod8ed43b5-33e4-40fc-a581-3f871cc134c5.fullname" . }}
  labels:
    {{- include "go-echod8ed43b5-33e4-40fc-a581-3f871cc134c5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod8ed43b5-33e4-40fc-a581-3f871cc134c5.selectorLabels" . | nindent 6 }}
