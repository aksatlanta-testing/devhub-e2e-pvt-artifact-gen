apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocd58f333-8a37-47ec-b04c-240006752db0.fullname" . }}
  labels:
    {{- include "go-echocd58f333-8a37-47ec-b04c-240006752db0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocd58f333-8a37-47ec-b04c-240006752db0.selectorLabels" . | nindent 6 }}
