apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo080886ea-81cb-4415-b83d-3171d570808a.fullname" . }}
  labels:
    {{- include "go-echo080886ea-81cb-4415-b83d-3171d570808a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo080886ea-81cb-4415-b83d-3171d570808a.selectorLabels" . | nindent 6 }}
