apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofcb600ee-dec9-4678-be5c-6fd7ad58783a.fullname" . }}
  labels:
    {{- include "go-echofcb600ee-dec9-4678-be5c-6fd7ad58783a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofcb600ee-dec9-4678-be5c-6fd7ad58783a.selectorLabels" . | nindent 6 }}
