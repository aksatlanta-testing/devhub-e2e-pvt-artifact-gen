apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9b91cf2a-33c9-4ea4-aa50-68e19a70dbfa.fullname" . }}
  labels:
    {{- include "go-echo9b91cf2a-33c9-4ea4-aa50-68e19a70dbfa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9b91cf2a-33c9-4ea4-aa50-68e19a70dbfa.selectorLabels" . | nindent 6 }}
