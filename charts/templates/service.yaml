apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6c66076f-74b9-4bb7-be23-82cc71957a01.fullname" . }}
  labels:
    {{- include "go-echo6c66076f-74b9-4bb7-be23-82cc71957a01.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6c66076f-74b9-4bb7-be23-82cc71957a01.selectorLabels" . | nindent 6 }}
