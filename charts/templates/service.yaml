apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo453eb2cf-1816-4e5f-b7d7-f10b49815215.fullname" . }}
  labels:
    {{- include "go-echo453eb2cf-1816-4e5f-b7d7-f10b49815215.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo453eb2cf-1816-4e5f-b7d7-f10b49815215.selectorLabels" . | nindent 6 }}
