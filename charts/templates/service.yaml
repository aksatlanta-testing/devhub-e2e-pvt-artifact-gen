apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2297677a-e58b-4529-b5b5-a8e8407aab18.fullname" . }}
  labels:
    {{- include "go-echo2297677a-e58b-4529-b5b5-a8e8407aab18.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2297677a-e58b-4529-b5b5-a8e8407aab18.selectorLabels" . | nindent 6 }}
