apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo27a2ec14-6832-4c14-b88d-07e1528e6322.fullname" . }}
  labels:
    {{- include "go-echo27a2ec14-6832-4c14-b88d-07e1528e6322.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo27a2ec14-6832-4c14-b88d-07e1528e6322.selectorLabels" . | nindent 6 }}
