apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof68bfdfc-e76c-4169-a023-3302d6241565.fullname" . }}
  labels:
    {{- include "go-echof68bfdfc-e76c-4169-a023-3302d6241565.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof68bfdfc-e76c-4169-a023-3302d6241565.selectorLabels" . | nindent 6 }}
