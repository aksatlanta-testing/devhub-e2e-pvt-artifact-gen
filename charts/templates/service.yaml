apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4a58904a-1b8b-4021-9e98-2f29fb7f87bf.fullname" . }}
  labels:
    {{- include "go-echo4a58904a-1b8b-4021-9e98-2f29fb7f87bf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4a58904a-1b8b-4021-9e98-2f29fb7f87bf.selectorLabels" . | nindent 6 }}
