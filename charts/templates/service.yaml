apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo137fccff-3ea8-4d79-939d-22c22b232c2d.fullname" . }}
  labels:
    {{- include "go-echo137fccff-3ea8-4d79-939d-22c22b232c2d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo137fccff-3ea8-4d79-939d-22c22b232c2d.selectorLabels" . | nindent 6 }}
