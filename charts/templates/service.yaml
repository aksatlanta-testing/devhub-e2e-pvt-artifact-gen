apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda84ccd8-164b-4b08-a858-c7c0a20af803.fullname" . }}
  labels:
    {{- include "go-echoda84ccd8-164b-4b08-a858-c7c0a20af803.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda84ccd8-164b-4b08-a858-c7c0a20af803.selectorLabels" . | nindent 6 }}
