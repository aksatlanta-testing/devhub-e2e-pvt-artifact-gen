apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1185132e-de03-4984-a91b-4281bf271fcc.fullname" . }}
  labels:
    {{- include "go-echo1185132e-de03-4984-a91b-4281bf271fcc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1185132e-de03-4984-a91b-4281bf271fcc.selectorLabels" . | nindent 6 }}
