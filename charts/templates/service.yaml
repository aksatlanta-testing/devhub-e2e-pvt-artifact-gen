apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9bd488b4-09b3-4f6d-adb3-f264f0193cf3.fullname" . }}
  labels:
    {{- include "go-echo9bd488b4-09b3-4f6d-adb3-f264f0193cf3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9bd488b4-09b3-4f6d-adb3-f264f0193cf3.selectorLabels" . | nindent 6 }}
