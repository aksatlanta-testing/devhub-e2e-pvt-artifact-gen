apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo00a33c8a-c28a-459a-a0f3-870a131a1b32.fullname" . }}
  labels:
    {{- include "go-echo00a33c8a-c28a-459a-a0f3-870a131a1b32.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo00a33c8a-c28a-459a-a0f3-870a131a1b32.selectorLabels" . | nindent 6 }}
