apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo388a58d3-9de5-47e0-91ed-f87fe58e0fc9.fullname" . }}
  labels:
    {{- include "go-echo388a58d3-9de5-47e0-91ed-f87fe58e0fc9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo388a58d3-9de5-47e0-91ed-f87fe58e0fc9.selectorLabels" . | nindent 6 }}
