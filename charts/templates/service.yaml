apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9af66957-41b7-4b1b-af31-6d09531a7ec9.fullname" . }}
  labels:
    {{- include "go-echo9af66957-41b7-4b1b-af31-6d09531a7ec9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9af66957-41b7-4b1b-af31-6d09531a7ec9.selectorLabels" . | nindent 6 }}
