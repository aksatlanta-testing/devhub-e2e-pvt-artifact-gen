apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5b9be230-195a-473e-af2b-14001b33fbc2.fullname" . }}
  labels:
    {{- include "go-echo5b9be230-195a-473e-af2b-14001b33fbc2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5b9be230-195a-473e-af2b-14001b33fbc2.selectorLabels" . | nindent 6 }}
