apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe15a3bc7-b81c-464b-b42c-92a920a3ddf1.fullname" . }}
  labels:
    {{- include "go-echoe15a3bc7-b81c-464b-b42c-92a920a3ddf1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe15a3bc7-b81c-464b-b42c-92a920a3ddf1.selectorLabels" . | nindent 6 }}
