apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod05f4ebf-3af3-4bb7-a6c2-56f0bc52e6d1.fullname" . }}
  labels:
    {{- include "go-echod05f4ebf-3af3-4bb7-a6c2-56f0bc52e6d1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod05f4ebf-3af3-4bb7-a6c2-56f0bc52e6d1.selectorLabels" . | nindent 6 }}
