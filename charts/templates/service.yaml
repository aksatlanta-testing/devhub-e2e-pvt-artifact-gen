apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1cb9d2b6-441e-473f-8459-3b93dddb6ed6.fullname" . }}
  labels:
    {{- include "go-echo1cb9d2b6-441e-473f-8459-3b93dddb6ed6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1cb9d2b6-441e-473f-8459-3b93dddb6ed6.selectorLabels" . | nindent 6 }}
