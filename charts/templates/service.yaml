apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5859a27f-875b-43f1-8bd3-8cefa287d9a6.fullname" . }}
  labels:
    {{- include "go-echo5859a27f-875b-43f1-8bd3-8cefa287d9a6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5859a27f-875b-43f1-8bd3-8cefa287d9a6.selectorLabels" . | nindent 6 }}
