apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob57a1605-86a2-4901-a832-fb0bf6eb3486.fullname" . }}
  labels:
    {{- include "go-echob57a1605-86a2-4901-a832-fb0bf6eb3486.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob57a1605-86a2-4901-a832-fb0bf6eb3486.selectorLabels" . | nindent 6 }}
