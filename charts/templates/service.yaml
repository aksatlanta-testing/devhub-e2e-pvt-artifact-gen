apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ab68794-f7d2-4ded-bd9b-006b5d2dbbd6.fullname" . }}
  labels:
    {{- include "go-echo3ab68794-f7d2-4ded-bd9b-006b5d2dbbd6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ab68794-f7d2-4ded-bd9b-006b5d2dbbd6.selectorLabels" . | nindent 6 }}
