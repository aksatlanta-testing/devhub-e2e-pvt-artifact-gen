apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob26cb273-19e2-4979-8fb9-794ddb2c0a50.fullname" . }}
  labels:
    {{- include "go-echob26cb273-19e2-4979-8fb9-794ddb2c0a50.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob26cb273-19e2-4979-8fb9-794ddb2c0a50.selectorLabels" . | nindent 6 }}
