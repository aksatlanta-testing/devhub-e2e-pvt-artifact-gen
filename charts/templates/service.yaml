apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo86dc20c1-25f0-4f2f-95e2-ec3b724d9869.fullname" . }}
  labels:
    {{- include "go-echo86dc20c1-25f0-4f2f-95e2-ec3b724d9869.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo86dc20c1-25f0-4f2f-95e2-ec3b724d9869.selectorLabels" . | nindent 6 }}
