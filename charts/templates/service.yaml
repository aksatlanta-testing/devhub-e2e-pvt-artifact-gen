apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo47268ad2-c15f-416c-883b-f158cd7f98e5.fullname" . }}
  labels:
    {{- include "go-echo47268ad2-c15f-416c-883b-f158cd7f98e5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo47268ad2-c15f-416c-883b-f158cd7f98e5.selectorLabels" . | nindent 6 }}
