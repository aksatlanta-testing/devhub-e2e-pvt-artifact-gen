apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofb102016-f19b-4eaa-a45f-46537a1ec13b.fullname" . }}
  labels:
    {{- include "go-echofb102016-f19b-4eaa-a45f-46537a1ec13b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofb102016-f19b-4eaa-a45f-46537a1ec13b.selectorLabels" . | nindent 6 }}
