apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa8048240-5b08-4fc1-86b6-a791e1f80c13.fullname" . }}
  labels:
    {{- include "go-echoa8048240-5b08-4fc1-86b6-a791e1f80c13.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa8048240-5b08-4fc1-86b6-a791e1f80c13.selectorLabels" . | nindent 6 }}
