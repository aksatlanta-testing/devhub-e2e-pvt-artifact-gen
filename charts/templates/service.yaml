apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6243ae3a-bf38-4f44-8353-ac57590befa6.fullname" . }}
  labels:
    {{- include "go-echo6243ae3a-bf38-4f44-8353-ac57590befa6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6243ae3a-bf38-4f44-8353-ac57590befa6.selectorLabels" . | nindent 6 }}
