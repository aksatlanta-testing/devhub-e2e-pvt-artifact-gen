apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodd0a3b43-0bf5-4797-b143-c372beb4fc2c.fullname" . }}
  labels:
    {{- include "go-echodd0a3b43-0bf5-4797-b143-c372beb4fc2c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodd0a3b43-0bf5-4797-b143-c372beb4fc2c.selectorLabels" . | nindent 6 }}
