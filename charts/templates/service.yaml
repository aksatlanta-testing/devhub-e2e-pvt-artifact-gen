apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo46037d1a-b5ee-4fe1-9c15-ccd27f0c95cc.fullname" . }}
  labels:
    {{- include "go-echo46037d1a-b5ee-4fe1-9c15-ccd27f0c95cc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo46037d1a-b5ee-4fe1-9c15-ccd27f0c95cc.selectorLabels" . | nindent 6 }}
