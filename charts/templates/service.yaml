apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob5625403-9c2c-4dcb-a122-f86086479692.fullname" . }}
  labels:
    {{- include "go-echob5625403-9c2c-4dcb-a122-f86086479692.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob5625403-9c2c-4dcb-a122-f86086479692.selectorLabels" . | nindent 6 }}
