apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2af8c429-bef4-4d29-ae55-2b5d1d1e8da7.fullname" . }}
  labels:
    {{- include "go-echo2af8c429-bef4-4d29-ae55-2b5d1d1e8da7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2af8c429-bef4-4d29-ae55-2b5d1d1e8da7.selectorLabels" . | nindent 6 }}
