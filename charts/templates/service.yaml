apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo77750062-48c9-4e3a-8285-559ea7594ae1.fullname" . }}
  labels:
    {{- include "go-echo77750062-48c9-4e3a-8285-559ea7594ae1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo77750062-48c9-4e3a-8285-559ea7594ae1.selectorLabels" . | nindent 6 }}
