apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob99cf2a4-9853-4e0d-908e-6adbaf6fb7ae.fullname" . }}
  labels:
    {{- include "go-echob99cf2a4-9853-4e0d-908e-6adbaf6fb7ae.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob99cf2a4-9853-4e0d-908e-6adbaf6fb7ae.selectorLabels" . | nindent 6 }}
