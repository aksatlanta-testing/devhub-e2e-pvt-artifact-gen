apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob336167b-a602-4f3d-b92f-7cea66b3cb70.fullname" . }}
  labels:
    {{- include "go-echob336167b-a602-4f3d-b92f-7cea66b3cb70.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob336167b-a602-4f3d-b92f-7cea66b3cb70.selectorLabels" . | nindent 6 }}
