apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoab4bb888-1441-42c1-9d36-369eece391e1.fullname" . }}
  labels:
    {{- include "go-echoab4bb888-1441-42c1-9d36-369eece391e1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoab4bb888-1441-42c1-9d36-369eece391e1.selectorLabels" . | nindent 6 }}
