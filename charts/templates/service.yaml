apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo14cbcd37-4633-4b05-9c62-5fa9b2a1666e.fullname" . }}
  labels:
    {{- include "go-echo14cbcd37-4633-4b05-9c62-5fa9b2a1666e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo14cbcd37-4633-4b05-9c62-5fa9b2a1666e.selectorLabels" . | nindent 6 }}
