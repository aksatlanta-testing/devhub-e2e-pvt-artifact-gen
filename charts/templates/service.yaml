apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2aa79e33-ca58-44a3-a6df-0b91ab2d5eb7.fullname" . }}
  labels:
    {{- include "go-echo2aa79e33-ca58-44a3-a6df-0b91ab2d5eb7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2aa79e33-ca58-44a3-a6df-0b91ab2d5eb7.selectorLabels" . | nindent 6 }}
