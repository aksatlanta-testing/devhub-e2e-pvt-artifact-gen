apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa0e1f3e0-d50e-4b30-8802-9a5a59db6f42.fullname" . }}
  labels:
    {{- include "go-echoa0e1f3e0-d50e-4b30-8802-9a5a59db6f42.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa0e1f3e0-d50e-4b30-8802-9a5a59db6f42.selectorLabels" . | nindent 6 }}
