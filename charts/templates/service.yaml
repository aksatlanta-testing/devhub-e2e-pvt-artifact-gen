apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2dc74cb3-54d3-488f-85a3-25fb0116b702.fullname" . }}
  labels:
    {{- include "go-echo2dc74cb3-54d3-488f-85a3-25fb0116b702.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2dc74cb3-54d3-488f-85a3-25fb0116b702.selectorLabels" . | nindent 6 }}
