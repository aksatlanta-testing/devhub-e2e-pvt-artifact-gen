apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4e274705-043b-43cb-a040-881a685c8a30.fullname" . }}
  labels:
    {{- include "go-echo4e274705-043b-43cb-a040-881a685c8a30.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4e274705-043b-43cb-a040-881a685c8a30.selectorLabels" . | nindent 6 }}
