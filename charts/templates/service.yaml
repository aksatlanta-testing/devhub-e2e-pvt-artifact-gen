apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo11b4a809-6373-456e-b5aa-751b526496be.fullname" . }}
  labels:
    {{- include "go-echo11b4a809-6373-456e-b5aa-751b526496be.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo11b4a809-6373-456e-b5aa-751b526496be.selectorLabels" . | nindent 6 }}
