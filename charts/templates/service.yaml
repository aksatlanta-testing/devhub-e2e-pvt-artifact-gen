apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7ed087f3-1fa1-4d39-aafa-2b83557398ab.fullname" . }}
  labels:
    {{- include "go-echo7ed087f3-1fa1-4d39-aafa-2b83557398ab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7ed087f3-1fa1-4d39-aafa-2b83557398ab.selectorLabels" . | nindent 6 }}
