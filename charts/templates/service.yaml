apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc7070987-1b8d-4c82-88f4-dba3a2dba71d.fullname" . }}
  labels:
    {{- include "go-echoc7070987-1b8d-4c82-88f4-dba3a2dba71d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc7070987-1b8d-4c82-88f4-dba3a2dba71d.selectorLabels" . | nindent 6 }}
