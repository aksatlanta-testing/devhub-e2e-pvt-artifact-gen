apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa3306ae6-a7ca-4c63-88c7-718ee5ec4080.fullname" . }}
  labels:
    {{- include "go-echoa3306ae6-a7ca-4c63-88c7-718ee5ec4080.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa3306ae6-a7ca-4c63-88c7-718ee5ec4080.selectorLabels" . | nindent 6 }}
