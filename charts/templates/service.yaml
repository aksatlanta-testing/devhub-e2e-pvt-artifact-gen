apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo51f816bc-88d7-40dd-8d51-191c0fc32ed7.fullname" . }}
  labels:
    {{- include "go-echo51f816bc-88d7-40dd-8d51-191c0fc32ed7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo51f816bc-88d7-40dd-8d51-191c0fc32ed7.selectorLabels" . | nindent 6 }}
