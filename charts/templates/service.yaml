apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod4ed0352-8aa3-4794-b576-ebec2bc5d994.fullname" . }}
  labels:
    {{- include "go-echod4ed0352-8aa3-4794-b576-ebec2bc5d994.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod4ed0352-8aa3-4794-b576-ebec2bc5d994.selectorLabels" . | nindent 6 }}
