apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2e245453-123b-4f33-877e-37d0af826815.fullname" . }}
  labels:
    {{- include "go-echo2e245453-123b-4f33-877e-37d0af826815.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2e245453-123b-4f33-877e-37d0af826815.selectorLabels" . | nindent 6 }}
