apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo18fddfc6-4079-42e5-a456-9c7f9f608db5.fullname" . }}
  labels:
    {{- include "go-echo18fddfc6-4079-42e5-a456-9c7f9f608db5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo18fddfc6-4079-42e5-a456-9c7f9f608db5.selectorLabels" . | nindent 6 }}
