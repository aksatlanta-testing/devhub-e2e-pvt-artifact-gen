apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe26321ae-1023-4039-b1d4-cfe04d5454f5.fullname" . }}
  labels:
    {{- include "go-echoe26321ae-1023-4039-b1d4-cfe04d5454f5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe26321ae-1023-4039-b1d4-cfe04d5454f5.selectorLabels" . | nindent 6 }}
