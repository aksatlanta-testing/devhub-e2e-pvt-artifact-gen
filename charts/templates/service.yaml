apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5e2fcb5a-0229-4804-88e2-d95120ba1198.fullname" . }}
  labels:
    {{- include "go-echo5e2fcb5a-0229-4804-88e2-d95120ba1198.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5e2fcb5a-0229-4804-88e2-d95120ba1198.selectorLabels" . | nindent 6 }}
