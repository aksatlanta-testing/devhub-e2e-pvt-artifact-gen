apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofad5b95a-dd51-4b5a-b228-3db7bdc312cc.fullname" . }}
  labels:
    {{- include "go-echofad5b95a-dd51-4b5a-b228-3db7bdc312cc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofad5b95a-dd51-4b5a-b228-3db7bdc312cc.selectorLabels" . | nindent 6 }}
