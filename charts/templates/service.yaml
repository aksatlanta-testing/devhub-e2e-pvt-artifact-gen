apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo850cc536-9404-43ca-ba3e-2bab3146cbcd.fullname" . }}
  labels:
    {{- include "go-echo850cc536-9404-43ca-ba3e-2bab3146cbcd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo850cc536-9404-43ca-ba3e-2bab3146cbcd.selectorLabels" . | nindent 6 }}
