apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof03fd1bf-fc3c-4404-bf01-469242ea0a48.fullname" . }}
  labels:
    {{- include "go-echof03fd1bf-fc3c-4404-bf01-469242ea0a48.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof03fd1bf-fc3c-4404-bf01-469242ea0a48.selectorLabels" . | nindent 6 }}
