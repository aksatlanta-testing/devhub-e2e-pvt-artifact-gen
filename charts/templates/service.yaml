apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo25e9ceff-f866-452c-a774-85ab996601f4.fullname" . }}
  labels:
    {{- include "go-echo25e9ceff-f866-452c-a774-85ab996601f4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo25e9ceff-f866-452c-a774-85ab996601f4.selectorLabels" . | nindent 6 }}
