apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo335de2b7-009d-414a-8805-e857f48e9846.fullname" . }}
  labels:
    {{- include "go-echo335de2b7-009d-414a-8805-e857f48e9846.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo335de2b7-009d-414a-8805-e857f48e9846.selectorLabels" . | nindent 6 }}
