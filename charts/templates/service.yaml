apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo30a3d0c0-5940-4066-8419-efe356177e53.fullname" . }}
  labels:
    {{- include "go-echo30a3d0c0-5940-4066-8419-efe356177e53.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo30a3d0c0-5940-4066-8419-efe356177e53.selectorLabels" . | nindent 6 }}
