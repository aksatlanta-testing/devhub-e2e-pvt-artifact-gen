apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo84950bcb-ed80-4939-8a11-6ed5ee8e7b35.fullname" . }}
  labels:
    {{- include "go-echo84950bcb-ed80-4939-8a11-6ed5ee8e7b35.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo84950bcb-ed80-4939-8a11-6ed5ee8e7b35.selectorLabels" . | nindent 6 }}
