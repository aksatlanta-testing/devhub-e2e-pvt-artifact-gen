apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo71ca265f-8fe4-42ae-83bb-78a76665349f.fullname" . }}
  labels:
    {{- include "go-echo71ca265f-8fe4-42ae-83bb-78a76665349f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo71ca265f-8fe4-42ae-83bb-78a76665349f.selectorLabels" . | nindent 6 }}
