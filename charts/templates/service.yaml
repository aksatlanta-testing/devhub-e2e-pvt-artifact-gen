apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod5b7aeec-0e96-4fa7-87ac-74f69a2dce4b.fullname" . }}
  labels:
    {{- include "go-echod5b7aeec-0e96-4fa7-87ac-74f69a2dce4b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod5b7aeec-0e96-4fa7-87ac-74f69a2dce4b.selectorLabels" . | nindent 6 }}
