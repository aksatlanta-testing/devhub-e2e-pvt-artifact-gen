apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo925a9539-2893-47c9-a3d6-d9a7e1e534ec.fullname" . }}
  labels:
    {{- include "go-echo925a9539-2893-47c9-a3d6-d9a7e1e534ec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo925a9539-2893-47c9-a3d6-d9a7e1e534ec.selectorLabels" . | nindent 6 }}
