apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo677aa080-3636-4d19-adc0-0bee13070c84.fullname" . }}
  labels:
    {{- include "go-echo677aa080-3636-4d19-adc0-0bee13070c84.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo677aa080-3636-4d19-adc0-0bee13070c84.selectorLabels" . | nindent 6 }}
