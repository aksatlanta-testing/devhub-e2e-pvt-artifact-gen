apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6e61279d-1ca6-48d6-9030-6d2323857e8c.fullname" . }}
  labels:
    {{- include "go-echo6e61279d-1ca6-48d6-9030-6d2323857e8c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6e61279d-1ca6-48d6-9030-6d2323857e8c.selectorLabels" . | nindent 6 }}
