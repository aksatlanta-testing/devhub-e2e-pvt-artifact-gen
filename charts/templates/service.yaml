apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod6a2b4b7-aa17-42c2-9c25-a199a49ce340.fullname" . }}
  labels:
    {{- include "go-echod6a2b4b7-aa17-42c2-9c25-a199a49ce340.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod6a2b4b7-aa17-42c2-9c25-a199a49ce340.selectorLabels" . | nindent 6 }}
