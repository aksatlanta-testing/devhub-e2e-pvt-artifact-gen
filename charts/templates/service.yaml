apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoea9c42a5-08a8-4ec0-9c94-379a5d6a8bdf.fullname" . }}
  labels:
    {{- include "go-echoea9c42a5-08a8-4ec0-9c94-379a5d6a8bdf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoea9c42a5-08a8-4ec0-9c94-379a5d6a8bdf.selectorLabels" . | nindent 6 }}
