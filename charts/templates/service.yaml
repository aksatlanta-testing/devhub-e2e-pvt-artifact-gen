apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo746343a7-16d9-44bd-895c-3ca61e20da60.fullname" . }}
  labels:
    {{- include "go-echo746343a7-16d9-44bd-895c-3ca61e20da60.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo746343a7-16d9-44bd-895c-3ca61e20da60.selectorLabels" . | nindent 6 }}
