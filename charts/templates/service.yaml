apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1066f1c6-b539-4b10-9e3f-8c205efb12ce.fullname" . }}
  labels:
    {{- include "go-echo1066f1c6-b539-4b10-9e3f-8c205efb12ce.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1066f1c6-b539-4b10-9e3f-8c205efb12ce.selectorLabels" . | nindent 6 }}
