apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo69b39e9d-21e9-4a0c-875c-9cdf8b1edc01.fullname" . }}
  labels:
    {{- include "go-echo69b39e9d-21e9-4a0c-875c-9cdf8b1edc01.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo69b39e9d-21e9-4a0c-875c-9cdf8b1edc01.selectorLabels" . | nindent 6 }}
