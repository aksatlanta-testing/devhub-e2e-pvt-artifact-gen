apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod1ae5d53-63ba-457a-a543-e443c31a57e0.fullname" . }}
  labels:
    {{- include "go-echod1ae5d53-63ba-457a-a543-e443c31a57e0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod1ae5d53-63ba-457a-a543-e443c31a57e0.selectorLabels" . | nindent 6 }}
