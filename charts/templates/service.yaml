apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0886fd6e-aacb-480c-84f8-58e4ed700eb8.fullname" . }}
  labels:
    {{- include "go-echo0886fd6e-aacb-480c-84f8-58e4ed700eb8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0886fd6e-aacb-480c-84f8-58e4ed700eb8.selectorLabels" . | nindent 6 }}
