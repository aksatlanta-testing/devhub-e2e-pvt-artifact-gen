apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0547a724-0064-4bfc-ae91-8ab060f3c5f5.fullname" . }}
  labels:
    {{- include "go-echo0547a724-0064-4bfc-ae91-8ab060f3c5f5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0547a724-0064-4bfc-ae91-8ab060f3c5f5.selectorLabels" . | nindent 6 }}
