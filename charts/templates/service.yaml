apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodd1329ff-bc90-4367-86d0-6976adc8e8bb.fullname" . }}
  labels:
    {{- include "go-echodd1329ff-bc90-4367-86d0-6976adc8e8bb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodd1329ff-bc90-4367-86d0-6976adc8e8bb.selectorLabels" . | nindent 6 }}
