apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo30fc7208-c8b2-4248-9181-2c83beb6ef8a.fullname" . }}
  labels:
    {{- include "go-echo30fc7208-c8b2-4248-9181-2c83beb6ef8a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo30fc7208-c8b2-4248-9181-2c83beb6ef8a.selectorLabels" . | nindent 6 }}
