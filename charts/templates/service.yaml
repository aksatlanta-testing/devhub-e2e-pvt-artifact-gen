apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo57c45b6c-81d1-4366-8206-0a33b510c317.fullname" . }}
  labels:
    {{- include "go-echo57c45b6c-81d1-4366-8206-0a33b510c317.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo57c45b6c-81d1-4366-8206-0a33b510c317.selectorLabels" . | nindent 6 }}
