apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod1b8fda7-885b-49e1-b026-a54e97960cb4.fullname" . }}
  labels:
    {{- include "go-echod1b8fda7-885b-49e1-b026-a54e97960cb4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod1b8fda7-885b-49e1-b026-a54e97960cb4.selectorLabels" . | nindent 6 }}
