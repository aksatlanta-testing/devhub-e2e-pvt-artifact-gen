apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ab1d1cb-2b9e-4ea1-9cc5-b68bfeaef684.fullname" . }}
  labels:
    {{- include "go-echo3ab1d1cb-2b9e-4ea1-9cc5-b68bfeaef684.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ab1d1cb-2b9e-4ea1-9cc5-b68bfeaef684.selectorLabels" . | nindent 6 }}
