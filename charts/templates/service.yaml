apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod977e2fa-1f45-4a88-b3eb-5b32ee5f01bb.fullname" . }}
  labels:
    {{- include "go-echod977e2fa-1f45-4a88-b3eb-5b32ee5f01bb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod977e2fa-1f45-4a88-b3eb-5b32ee5f01bb.selectorLabels" . | nindent 6 }}
