apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo73c22031-df97-4242-ba70-1e6c4ef2bf16.fullname" . }}
  labels:
    {{- include "go-echo73c22031-df97-4242-ba70-1e6c4ef2bf16.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo73c22031-df97-4242-ba70-1e6c4ef2bf16.selectorLabels" . | nindent 6 }}
