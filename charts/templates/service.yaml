apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo368236ab-faa1-46a3-820d-52a1af972482.fullname" . }}
  labels:
    {{- include "go-echo368236ab-faa1-46a3-820d-52a1af972482.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo368236ab-faa1-46a3-820d-52a1af972482.selectorLabels" . | nindent 6 }}
