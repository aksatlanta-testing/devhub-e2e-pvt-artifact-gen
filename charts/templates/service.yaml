apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoae389e5b-e921-4ec5-9bf2-f25c0da76721.fullname" . }}
  labels:
    {{- include "go-echoae389e5b-e921-4ec5-9bf2-f25c0da76721.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoae389e5b-e921-4ec5-9bf2-f25c0da76721.selectorLabels" . | nindent 6 }}
