apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6f7347c9-4488-41d5-b37e-e5508fb7bf1a.fullname" . }}
  labels:
    {{- include "go-echo6f7347c9-4488-41d5-b37e-e5508fb7bf1a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6f7347c9-4488-41d5-b37e-e5508fb7bf1a.selectorLabels" . | nindent 6 }}
