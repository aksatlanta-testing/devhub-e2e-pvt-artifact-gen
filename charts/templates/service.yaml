apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda0cb0ab-f64a-4074-9a98-89c2bec2e209.fullname" . }}
  labels:
    {{- include "go-echoda0cb0ab-f64a-4074-9a98-89c2bec2e209.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda0cb0ab-f64a-4074-9a98-89c2bec2e209.selectorLabels" . | nindent 6 }}
