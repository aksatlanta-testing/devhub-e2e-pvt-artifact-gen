apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa797277c-c8c1-4b65-95d7-589a50ec1d4e.fullname" . }}
  labels:
    {{- include "go-echoa797277c-c8c1-4b65-95d7-589a50ec1d4e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa797277c-c8c1-4b65-95d7-589a50ec1d4e.selectorLabels" . | nindent 6 }}
