apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo90590f80-cd07-4f46-bb24-45c93d38f7f1.fullname" . }}
  labels:
    {{- include "go-echo90590f80-cd07-4f46-bb24-45c93d38f7f1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo90590f80-cd07-4f46-bb24-45c93d38f7f1.selectorLabels" . | nindent 6 }}
