apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6798a947-39bc-404e-8026-efd43cbc3138.fullname" . }}
  labels:
    {{- include "go-echo6798a947-39bc-404e-8026-efd43cbc3138.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6798a947-39bc-404e-8026-efd43cbc3138.selectorLabels" . | nindent 6 }}
