apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofbfedd48-0ba2-4bf7-9372-47e409b83eed.fullname" . }}
  labels:
    {{- include "go-echofbfedd48-0ba2-4bf7-9372-47e409b83eed.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofbfedd48-0ba2-4bf7-9372-47e409b83eed.selectorLabels" . | nindent 6 }}
