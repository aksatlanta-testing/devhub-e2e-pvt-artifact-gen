apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3a7f42bb-4463-40a8-a8c8-b6f03903b953.fullname" . }}
  labels:
    {{- include "go-echo3a7f42bb-4463-40a8-a8c8-b6f03903b953.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3a7f42bb-4463-40a8-a8c8-b6f03903b953.selectorLabels" . | nindent 6 }}
