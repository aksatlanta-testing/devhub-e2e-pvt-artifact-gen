apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe8be93d5-6287-4924-89f9-9cab865eff8e.fullname" . }}
  labels:
    {{- include "go-echoe8be93d5-6287-4924-89f9-9cab865eff8e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe8be93d5-6287-4924-89f9-9cab865eff8e.selectorLabels" . | nindent 6 }}
