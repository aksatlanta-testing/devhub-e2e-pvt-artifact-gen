apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe049d25b-fcda-4344-8e20-a05933d56534.fullname" . }}
  labels:
    {{- include "go-echoe049d25b-fcda-4344-8e20-a05933d56534.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe049d25b-fcda-4344-8e20-a05933d56534.selectorLabels" . | nindent 6 }}
