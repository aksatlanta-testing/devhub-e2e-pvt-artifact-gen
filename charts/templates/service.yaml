apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoce31eb56-d267-4aea-9a7c-8dda2abe5589.fullname" . }}
  labels:
    {{- include "go-echoce31eb56-d267-4aea-9a7c-8dda2abe5589.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoce31eb56-d267-4aea-9a7c-8dda2abe5589.selectorLabels" . | nindent 6 }}
