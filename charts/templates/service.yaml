apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo461cccbe-6805-4ccf-bc7b-e3a1e048eb48.fullname" . }}
  labels:
    {{- include "go-echo461cccbe-6805-4ccf-bc7b-e3a1e048eb48.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo461cccbe-6805-4ccf-bc7b-e3a1e048eb48.selectorLabels" . | nindent 6 }}
