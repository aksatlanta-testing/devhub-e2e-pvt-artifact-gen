apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoad727e8f-1ec8-4c77-a409-2893a963ad2d.fullname" . }}
  labels:
    {{- include "go-echoad727e8f-1ec8-4c77-a409-2893a963ad2d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoad727e8f-1ec8-4c77-a409-2893a963ad2d.selectorLabels" . | nindent 6 }}
