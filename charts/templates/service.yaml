apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo97d2ba3f-9be9-4028-9228-f936c4668bcf.fullname" . }}
  labels:
    {{- include "go-echo97d2ba3f-9be9-4028-9228-f936c4668bcf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo97d2ba3f-9be9-4028-9228-f936c4668bcf.selectorLabels" . | nindent 6 }}
