apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocddf87e9-2ebd-4b66-83b2-260f27546976.fullname" . }}
  labels:
    {{- include "go-echocddf87e9-2ebd-4b66-83b2-260f27546976.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocddf87e9-2ebd-4b66-83b2-260f27546976.selectorLabels" . | nindent 6 }}
