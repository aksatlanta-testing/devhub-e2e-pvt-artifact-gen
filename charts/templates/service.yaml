apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof00ee945-4a3f-4244-8997-a675fc2ece54.fullname" . }}
  labels:
    {{- include "go-echof00ee945-4a3f-4244-8997-a675fc2ece54.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof00ee945-4a3f-4244-8997-a675fc2ece54.selectorLabels" . | nindent 6 }}
