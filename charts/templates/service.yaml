apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe43ef489-07f4-4661-a907-7057f5570e81.fullname" . }}
  labels:
    {{- include "go-echoe43ef489-07f4-4661-a907-7057f5570e81.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe43ef489-07f4-4661-a907-7057f5570e81.selectorLabels" . | nindent 6 }}
