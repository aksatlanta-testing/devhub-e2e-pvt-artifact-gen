apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2d043f4f-3d30-4be6-b8da-0dfa44d6316c.fullname" . }}
  labels:
    {{- include "go-echo2d043f4f-3d30-4be6-b8da-0dfa44d6316c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2d043f4f-3d30-4be6-b8da-0dfa44d6316c.selectorLabels" . | nindent 6 }}
