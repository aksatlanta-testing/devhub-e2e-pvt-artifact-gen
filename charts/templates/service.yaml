apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9294a90f-f79d-4a03-a26d-43e918dda112.fullname" . }}
  labels:
    {{- include "go-echo9294a90f-f79d-4a03-a26d-43e918dda112.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9294a90f-f79d-4a03-a26d-43e918dda112.selectorLabels" . | nindent 6 }}
