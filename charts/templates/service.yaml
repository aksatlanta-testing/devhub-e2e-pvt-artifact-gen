apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo262804c8-84b5-473d-a816-4fcf7d62c3b9.fullname" . }}
  labels:
    {{- include "go-echo262804c8-84b5-473d-a816-4fcf7d62c3b9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo262804c8-84b5-473d-a816-4fcf7d62c3b9.selectorLabels" . | nindent 6 }}
