apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4f8b60e4-64d7-4c3f-ad5b-53a33928ca5d.fullname" . }}
  labels:
    {{- include "go-echo4f8b60e4-64d7-4c3f-ad5b-53a33928ca5d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4f8b60e4-64d7-4c3f-ad5b-53a33928ca5d.selectorLabels" . | nindent 6 }}
