apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo57c970e4-bc80-4d03-966c-0d3f7a7ca21f.fullname" . }}
  labels:
    {{- include "go-echo57c970e4-bc80-4d03-966c-0d3f7a7ca21f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo57c970e4-bc80-4d03-966c-0d3f7a7ca21f.selectorLabels" . | nindent 6 }}
