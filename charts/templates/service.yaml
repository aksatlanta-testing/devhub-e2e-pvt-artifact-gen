apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod7431286-4f2c-4e96-9f04-e8670b8cda79.fullname" . }}
  labels:
    {{- include "go-echod7431286-4f2c-4e96-9f04-e8670b8cda79.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod7431286-4f2c-4e96-9f04-e8670b8cda79.selectorLabels" . | nindent 6 }}
