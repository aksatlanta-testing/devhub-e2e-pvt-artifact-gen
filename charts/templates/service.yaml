apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaca5f341-0664-419e-8f15-af1918cce828.fullname" . }}
  labels:
    {{- include "go-echoaca5f341-0664-419e-8f15-af1918cce828.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaca5f341-0664-419e-8f15-af1918cce828.selectorLabels" . | nindent 6 }}
