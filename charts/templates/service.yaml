apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7824e153-43d8-4545-a5ea-6d931355b17c.fullname" . }}
  labels:
    {{- include "go-echo7824e153-43d8-4545-a5ea-6d931355b17c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7824e153-43d8-4545-a5ea-6d931355b17c.selectorLabels" . | nindent 6 }}
