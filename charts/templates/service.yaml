apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof32d8bcc-ae06-4e7f-8588-4f6cb1efc073.fullname" . }}
  labels:
    {{- include "go-echof32d8bcc-ae06-4e7f-8588-4f6cb1efc073.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof32d8bcc-ae06-4e7f-8588-4f6cb1efc073.selectorLabels" . | nindent 6 }}
