apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6210c252-b9fe-406a-a186-cb1406a2be61.fullname" . }}
  labels:
    {{- include "go-echo6210c252-b9fe-406a-a186-cb1406a2be61.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6210c252-b9fe-406a-a186-cb1406a2be61.selectorLabels" . | nindent 6 }}
