apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo92410cd6-6d1a-414f-bec2-ced14014ecb4.fullname" . }}
  labels:
    {{- include "go-echo92410cd6-6d1a-414f-bec2-ced14014ecb4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo92410cd6-6d1a-414f-bec2-ced14014ecb4.selectorLabels" . | nindent 6 }}
