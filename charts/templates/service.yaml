apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc71e2acd-b54c-4a40-9824-8d6369298973.fullname" . }}
  labels:
    {{- include "go-echoc71e2acd-b54c-4a40-9824-8d6369298973.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc71e2acd-b54c-4a40-9824-8d6369298973.selectorLabels" . | nindent 6 }}
