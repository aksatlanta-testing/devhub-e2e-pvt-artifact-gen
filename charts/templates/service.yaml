apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo58975f01-2c6d-4bd9-92b6-363f37206e42.fullname" . }}
  labels:
    {{- include "go-echo58975f01-2c6d-4bd9-92b6-363f37206e42.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo58975f01-2c6d-4bd9-92b6-363f37206e42.selectorLabels" . | nindent 6 }}
