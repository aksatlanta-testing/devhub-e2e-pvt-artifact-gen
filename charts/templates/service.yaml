apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeebb66c0-71cd-4d30-a9dc-c0998c1c751b.fullname" . }}
  labels:
    {{- include "go-echoeebb66c0-71cd-4d30-a9dc-c0998c1c751b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeebb66c0-71cd-4d30-a9dc-c0998c1c751b.selectorLabels" . | nindent 6 }}
