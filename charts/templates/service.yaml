apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo86375db5-1fb6-4868-9ece-4e25f9dd2e77.fullname" . }}
  labels:
    {{- include "go-echo86375db5-1fb6-4868-9ece-4e25f9dd2e77.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo86375db5-1fb6-4868-9ece-4e25f9dd2e77.selectorLabels" . | nindent 6 }}
