apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo58717826-e88c-4ae6-a9c3-f3edc54c8163.fullname" . }}
  labels:
    {{- include "go-echo58717826-e88c-4ae6-a9c3-f3edc54c8163.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo58717826-e88c-4ae6-a9c3-f3edc54c8163.selectorLabels" . | nindent 6 }}
