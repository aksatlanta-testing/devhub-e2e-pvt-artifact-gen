apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo06024afd-0834-4064-a23d-5fcf0a873bf4.fullname" . }}
  labels:
    {{- include "go-echo06024afd-0834-4064-a23d-5fcf0a873bf4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo06024afd-0834-4064-a23d-5fcf0a873bf4.selectorLabels" . | nindent 6 }}
