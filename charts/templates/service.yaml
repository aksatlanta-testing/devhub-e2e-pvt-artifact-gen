apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobe325fed-18fe-4a69-b1f9-74aaec97cef1.fullname" . }}
  labels:
    {{- include "go-echobe325fed-18fe-4a69-b1f9-74aaec97cef1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobe325fed-18fe-4a69-b1f9-74aaec97cef1.selectorLabels" . | nindent 6 }}
