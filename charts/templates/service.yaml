apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof22efb32-0102-4e08-ab46-9018236392d3.fullname" . }}
  labels:
    {{- include "go-echof22efb32-0102-4e08-ab46-9018236392d3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof22efb32-0102-4e08-ab46-9018236392d3.selectorLabels" . | nindent 6 }}
