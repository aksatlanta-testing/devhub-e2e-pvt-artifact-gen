apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo560b3d5a-9e27-4cca-8af2-548c8095a740.fullname" . }}
  labels:
    {{- include "go-echo560b3d5a-9e27-4cca-8af2-548c8095a740.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo560b3d5a-9e27-4cca-8af2-548c8095a740.selectorLabels" . | nindent 6 }}
