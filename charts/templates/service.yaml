apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo12844340-92a4-4a66-86ac-c9648e313f0b.fullname" . }}
  labels:
    {{- include "go-echo12844340-92a4-4a66-86ac-c9648e313f0b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo12844340-92a4-4a66-86ac-c9648e313f0b.selectorLabels" . | nindent 6 }}
