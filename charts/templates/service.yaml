apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo54bc60fd-be93-47b0-bcef-cea7fefbd1e5.fullname" . }}
  labels:
    {{- include "go-echo54bc60fd-be93-47b0-bcef-cea7fefbd1e5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo54bc60fd-be93-47b0-bcef-cea7fefbd1e5.selectorLabels" . | nindent 6 }}
