apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2b7e6388-677f-4061-b77f-99ea5e8a5cc6.fullname" . }}
  labels:
    {{- include "go-echo2b7e6388-677f-4061-b77f-99ea5e8a5cc6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2b7e6388-677f-4061-b77f-99ea5e8a5cc6.selectorLabels" . | nindent 6 }}
