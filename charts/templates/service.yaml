apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2a2cd65a-684b-4b24-a811-2ba06356b1e2.fullname" . }}
  labels:
    {{- include "go-echo2a2cd65a-684b-4b24-a811-2ba06356b1e2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2a2cd65a-684b-4b24-a811-2ba06356b1e2.selectorLabels" . | nindent 6 }}
