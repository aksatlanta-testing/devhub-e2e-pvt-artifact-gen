apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8cc6bc98-b9e2-493c-81a6-1801262d7f59.fullname" . }}
  labels:
    {{- include "go-echo8cc6bc98-b9e2-493c-81a6-1801262d7f59.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8cc6bc98-b9e2-493c-81a6-1801262d7f59.selectorLabels" . | nindent 6 }}
