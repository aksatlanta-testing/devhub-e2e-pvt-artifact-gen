apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod89ccf58-1c8e-44ed-a8ac-d3bf3227ec76.fullname" . }}
  labels:
    {{- include "go-echod89ccf58-1c8e-44ed-a8ac-d3bf3227ec76.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod89ccf58-1c8e-44ed-a8ac-d3bf3227ec76.selectorLabels" . | nindent 6 }}
