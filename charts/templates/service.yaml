apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1bb90617-393a-4844-8b0e-2d344040f256.fullname" . }}
  labels:
    {{- include "go-echo1bb90617-393a-4844-8b0e-2d344040f256.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
