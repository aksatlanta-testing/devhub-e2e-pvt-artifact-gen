apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5a9c8097-8b5f-46fc-a219-4f9e1598ddb0.fullname" . }}
  labels:
    {{- include "go-echo5a9c8097-8b5f-46fc-a219-4f9e1598ddb0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5a9c8097-8b5f-46fc-a219-4f9e1598ddb0.selectorLabels" . | nindent 6 }}
