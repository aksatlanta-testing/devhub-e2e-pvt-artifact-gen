apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda03a2e5-eafb-4ee6-8df3-31cfc8d4c98b.fullname" . }}
  labels:
    {{- include "go-echoda03a2e5-eafb-4ee6-8df3-31cfc8d4c98b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda03a2e5-eafb-4ee6-8df3-31cfc8d4c98b.selectorLabels" . | nindent 6 }}
