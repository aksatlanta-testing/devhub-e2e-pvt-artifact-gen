apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5a76853d-291e-4d3e-87ee-80cfe4504ed2.fullname" . }}
  labels:
    {{- include "go-echo5a76853d-291e-4d3e-87ee-80cfe4504ed2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5a76853d-291e-4d3e-87ee-80cfe4504ed2.selectorLabels" . | nindent 6 }}
