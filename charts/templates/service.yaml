apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo061e7be8-33e1-4ca0-89f6-66370b8ea02b.fullname" . }}
  labels:
    {{- include "go-echo061e7be8-33e1-4ca0-89f6-66370b8ea02b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo061e7be8-33e1-4ca0-89f6-66370b8ea02b.selectorLabels" . | nindent 6 }}
