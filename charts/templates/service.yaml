apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo332b8aa5-16ec-421f-96fa-05008f3411a1.fullname" . }}
  labels:
    {{- include "go-echo332b8aa5-16ec-421f-96fa-05008f3411a1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo332b8aa5-16ec-421f-96fa-05008f3411a1.selectorLabels" . | nindent 6 }}
