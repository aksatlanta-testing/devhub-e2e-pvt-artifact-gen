apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof755fb97-2a23-414f-a32a-5621dad53b3c.fullname" . }}
  labels:
    {{- include "go-echof755fb97-2a23-414f-a32a-5621dad53b3c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof755fb97-2a23-414f-a32a-5621dad53b3c.selectorLabels" . | nindent 6 }}
