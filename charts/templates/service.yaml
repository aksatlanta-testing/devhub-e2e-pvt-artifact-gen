apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo38b4527a-a9fc-43a6-a498-808ec2be8ad9.fullname" . }}
  labels:
    {{- include "go-echo38b4527a-a9fc-43a6-a498-808ec2be8ad9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo38b4527a-a9fc-43a6-a498-808ec2be8ad9.selectorLabels" . | nindent 6 }}
