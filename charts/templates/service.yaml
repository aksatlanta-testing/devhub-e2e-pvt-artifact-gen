apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo22e91701-82ba-4aa1-89ec-3bb38e1a80fc.fullname" . }}
  labels:
    {{- include "go-echo22e91701-82ba-4aa1-89ec-3bb38e1a80fc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo22e91701-82ba-4aa1-89ec-3bb38e1a80fc.selectorLabels" . | nindent 6 }}
