apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5eb33fa0-c548-4451-b166-36ed93dfb4bf.fullname" . }}
  labels:
    {{- include "go-echo5eb33fa0-c548-4451-b166-36ed93dfb4bf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5eb33fa0-c548-4451-b166-36ed93dfb4bf.selectorLabels" . | nindent 6 }}
