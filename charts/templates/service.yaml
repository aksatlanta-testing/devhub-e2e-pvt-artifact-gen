apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1753c0e5-8ed5-4f30-ad75-015a55362b3d.fullname" . }}
  labels:
    {{- include "go-echo1753c0e5-8ed5-4f30-ad75-015a55362b3d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1753c0e5-8ed5-4f30-ad75-015a55362b3d.selectorLabels" . | nindent 6 }}
