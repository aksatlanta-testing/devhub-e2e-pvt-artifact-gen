apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4a95b605-ff71-49fa-92fb-9d254c1363f3.fullname" . }}
  labels:
    {{- include "go-echo4a95b605-ff71-49fa-92fb-9d254c1363f3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4a95b605-ff71-49fa-92fb-9d254c1363f3.selectorLabels" . | nindent 6 }}
