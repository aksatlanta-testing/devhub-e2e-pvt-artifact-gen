apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod9c78e10-6f7e-48cf-8f34-f388ee861de5.fullname" . }}
  labels:
    {{- include "go-echod9c78e10-6f7e-48cf-8f34-f388ee861de5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod9c78e10-6f7e-48cf-8f34-f388ee861de5.selectorLabels" . | nindent 6 }}
