apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo30893721-466a-4abb-8309-8e47f724f6ef.fullname" . }}
  labels:
    {{- include "go-echo30893721-466a-4abb-8309-8e47f724f6ef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo30893721-466a-4abb-8309-8e47f724f6ef.selectorLabels" . | nindent 6 }}
