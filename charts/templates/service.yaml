apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf9e26e3-559a-4d93-922f-9b3fcd56b05b.fullname" . }}
  labels:
    {{- include "go-echoaf9e26e3-559a-4d93-922f-9b3fcd56b05b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf9e26e3-559a-4d93-922f-9b3fcd56b05b.selectorLabels" . | nindent 6 }}
