apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo519e2798-f041-476b-83ae-b69203d3662a.fullname" . }}
  labels:
    {{- include "go-echo519e2798-f041-476b-83ae-b69203d3662a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo519e2798-f041-476b-83ae-b69203d3662a.selectorLabels" . | nindent 6 }}
