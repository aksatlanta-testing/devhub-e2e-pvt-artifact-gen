apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof224d66e-19eb-4db6-91de-f64d56fc5978.fullname" . }}
  labels:
    {{- include "go-echof224d66e-19eb-4db6-91de-f64d56fc5978.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof224d66e-19eb-4db6-91de-f64d56fc5978.selectorLabels" . | nindent 6 }}
