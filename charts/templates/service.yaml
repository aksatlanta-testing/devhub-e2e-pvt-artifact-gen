apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa69b7710-f875-4cba-b2f5-bf17522e3256.fullname" . }}
  labels:
    {{- include "go-echoa69b7710-f875-4cba-b2f5-bf17522e3256.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa69b7710-f875-4cba-b2f5-bf17522e3256.selectorLabels" . | nindent 6 }}
