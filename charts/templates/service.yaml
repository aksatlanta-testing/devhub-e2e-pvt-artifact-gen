apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo19b876a4-71cc-44cc-9f7e-acb66b802311.fullname" . }}
  labels:
    {{- include "go-echo19b876a4-71cc-44cc-9f7e-acb66b802311.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo19b876a4-71cc-44cc-9f7e-acb66b802311.selectorLabels" . | nindent 6 }}
