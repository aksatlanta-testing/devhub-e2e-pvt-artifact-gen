apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8d07fa6-fe5a-4fce-a572-994457987644.fullname" . }}
  labels:
    {{- include "go-echoc8d07fa6-fe5a-4fce-a572-994457987644.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8d07fa6-fe5a-4fce-a572-994457987644.selectorLabels" . | nindent 6 }}
