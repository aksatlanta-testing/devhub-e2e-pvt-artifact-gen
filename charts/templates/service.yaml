apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa95980ab-41fd-4a51-8f57-289a4aa9ecdc.fullname" . }}
  labels:
    {{- include "go-echoa95980ab-41fd-4a51-8f57-289a4aa9ecdc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa95980ab-41fd-4a51-8f57-289a4aa9ecdc.selectorLabels" . | nindent 6 }}
