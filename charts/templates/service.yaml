apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo118d0caa-d8b0-4100-a21c-77bfc7f5b053.fullname" . }}
  labels:
    {{- include "go-echo118d0caa-d8b0-4100-a21c-77bfc7f5b053.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo118d0caa-d8b0-4100-a21c-77bfc7f5b053.selectorLabels" . | nindent 6 }}
