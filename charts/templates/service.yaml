apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8e340089-35bf-4168-ae93-9332441bb26b.fullname" . }}
  labels:
    {{- include "go-echo8e340089-35bf-4168-ae93-9332441bb26b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
