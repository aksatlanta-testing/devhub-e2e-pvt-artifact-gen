apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo639ec90d-95a1-4198-b952-36f419a26803.fullname" . }}
  labels:
    {{- include "go-echo639ec90d-95a1-4198-b952-36f419a26803.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo639ec90d-95a1-4198-b952-36f419a26803.selectorLabels" . | nindent 6 }}
