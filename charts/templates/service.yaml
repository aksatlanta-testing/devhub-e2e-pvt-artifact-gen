apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo25884cb8-ebc5-4c2f-8b21-f96abf05fcd8.fullname" . }}
  labels:
    {{- include "go-echo25884cb8-ebc5-4c2f-8b21-f96abf05fcd8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo25884cb8-ebc5-4c2f-8b21-f96abf05fcd8.selectorLabels" . | nindent 6 }}
