apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2b6f513c-4729-4179-8a71-3a59755d6544.fullname" . }}
  labels:
    {{- include "go-echo2b6f513c-4729-4179-8a71-3a59755d6544.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2b6f513c-4729-4179-8a71-3a59755d6544.selectorLabels" . | nindent 6 }}
