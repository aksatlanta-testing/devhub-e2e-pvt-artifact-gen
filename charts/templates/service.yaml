apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo86fc284d-11ff-4c1c-9572-b8baf378471c.fullname" . }}
  labels:
    {{- include "go-echo86fc284d-11ff-4c1c-9572-b8baf378471c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo86fc284d-11ff-4c1c-9572-b8baf378471c.selectorLabels" . | nindent 6 }}
