apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9dd4458f-303d-413d-af2f-9736243de79b.fullname" . }}
  labels:
    {{- include "go-echo9dd4458f-303d-413d-af2f-9736243de79b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9dd4458f-303d-413d-af2f-9736243de79b.selectorLabels" . | nindent 6 }}
