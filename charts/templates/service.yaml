apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo837c4462-a9aa-4278-8f12-f11edc843621.fullname" . }}
  labels:
    {{- include "go-echo837c4462-a9aa-4278-8f12-f11edc843621.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo837c4462-a9aa-4278-8f12-f11edc843621.selectorLabels" . | nindent 6 }}
