apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo10b42159-fb5f-4377-9e56-d627ac5418ba.fullname" . }}
  labels:
    {{- include "go-echo10b42159-fb5f-4377-9e56-d627ac5418ba.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo10b42159-fb5f-4377-9e56-d627ac5418ba.selectorLabels" . | nindent 6 }}
