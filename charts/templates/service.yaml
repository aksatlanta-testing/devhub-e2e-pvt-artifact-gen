apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4526edbf-0e20-4690-9cd2-c357a2e2b3d4.fullname" . }}
  labels:
    {{- include "go-echo4526edbf-0e20-4690-9cd2-c357a2e2b3d4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4526edbf-0e20-4690-9cd2-c357a2e2b3d4.selectorLabels" . | nindent 6 }}
