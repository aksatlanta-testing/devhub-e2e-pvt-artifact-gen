apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo55cb0041-c63e-4923-b7b4-d462da78bce8.fullname" . }}
  labels:
    {{- include "go-echo55cb0041-c63e-4923-b7b4-d462da78bce8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo55cb0041-c63e-4923-b7b4-d462da78bce8.selectorLabels" . | nindent 6 }}
