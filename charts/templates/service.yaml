apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5a9f29e4-270e-400a-b471-dfb8d7fa5d32.fullname" . }}
  labels:
    {{- include "go-echo5a9f29e4-270e-400a-b471-dfb8d7fa5d32.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5a9f29e4-270e-400a-b471-dfb8d7fa5d32.selectorLabels" . | nindent 6 }}
