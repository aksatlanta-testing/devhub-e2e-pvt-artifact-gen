apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3ba69cdf-558e-4738-813d-1447ad6798b2.fullname" . }}
  labels:
    {{- include "go-echo3ba69cdf-558e-4738-813d-1447ad6798b2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3ba69cdf-558e-4738-813d-1447ad6798b2.selectorLabels" . | nindent 6 }}
