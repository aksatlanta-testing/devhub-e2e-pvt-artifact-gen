apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9e138aef-b591-4f46-8ec7-b1e88eb0b548.fullname" . }}
  labels:
    {{- include "go-echo9e138aef-b591-4f46-8ec7-b1e88eb0b548.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9e138aef-b591-4f46-8ec7-b1e88eb0b548.selectorLabels" . | nindent 6 }}
