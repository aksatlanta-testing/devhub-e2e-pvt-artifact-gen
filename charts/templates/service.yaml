apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa27e4952-f629-4f63-bae4-eb5151432548.fullname" . }}
  labels:
    {{- include "go-echoa27e4952-f629-4f63-bae4-eb5151432548.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa27e4952-f629-4f63-bae4-eb5151432548.selectorLabels" . | nindent 6 }}
