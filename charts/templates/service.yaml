apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo701c71ff-5bef-4875-9ba2-75c60ecafeb2.fullname" . }}
  labels:
    {{- include "go-echo701c71ff-5bef-4875-9ba2-75c60ecafeb2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo701c71ff-5bef-4875-9ba2-75c60ecafeb2.selectorLabels" . | nindent 6 }}
