apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod156917d-8aae-474a-9ff1-f0a607256ad6.fullname" . }}
  labels:
    {{- include "go-echod156917d-8aae-474a-9ff1-f0a607256ad6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod156917d-8aae-474a-9ff1-f0a607256ad6.selectorLabels" . | nindent 6 }}
