apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1b4b7653-4062-4b61-b5f4-4439e909a354.fullname" . }}
  labels:
    {{- include "go-echo1b4b7653-4062-4b61-b5f4-4439e909a354.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1b4b7653-4062-4b61-b5f4-4439e909a354.selectorLabels" . | nindent 6 }}
