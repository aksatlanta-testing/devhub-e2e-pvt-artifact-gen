apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob18db19b-93c9-4471-8e55-6a6a185c1815.fullname" . }}
  labels:
    {{- include "go-echob18db19b-93c9-4471-8e55-6a6a185c1815.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob18db19b-93c9-4471-8e55-6a6a185c1815.selectorLabels" . | nindent 6 }}
