apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo77de83a7-5082-4e42-aa56-6b47b1cae7cc.fullname" . }}
  labels:
    {{- include "go-echo77de83a7-5082-4e42-aa56-6b47b1cae7cc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo77de83a7-5082-4e42-aa56-6b47b1cae7cc.selectorLabels" . | nindent 6 }}
