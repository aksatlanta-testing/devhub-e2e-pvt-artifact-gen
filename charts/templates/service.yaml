apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo87c00e13-2ce7-4eb9-9cb6-2c9a0888c41c.fullname" . }}
  labels:
    {{- include "go-echo87c00e13-2ce7-4eb9-9cb6-2c9a0888c41c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo87c00e13-2ce7-4eb9-9cb6-2c9a0888c41c.selectorLabels" . | nindent 6 }}
