apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo52f98dfc-4541-4974-803b-2d12152ab508.fullname" . }}
  labels:
    {{- include "go-echo52f98dfc-4541-4974-803b-2d12152ab508.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo52f98dfc-4541-4974-803b-2d12152ab508.selectorLabels" . | nindent 6 }}
