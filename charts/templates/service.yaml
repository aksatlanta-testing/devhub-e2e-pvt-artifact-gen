apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo29b395c5-0c25-4323-8a17-794fafa08b58.fullname" . }}
  labels:
    {{- include "go-echo29b395c5-0c25-4323-8a17-794fafa08b58.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo29b395c5-0c25-4323-8a17-794fafa08b58.selectorLabels" . | nindent 6 }}
