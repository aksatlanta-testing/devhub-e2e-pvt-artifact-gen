apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoad5ad3fc-424c-4388-afc4-6e2ce97c7740.fullname" . }}
  labels:
    {{- include "go-echoad5ad3fc-424c-4388-afc4-6e2ce97c7740.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoad5ad3fc-424c-4388-afc4-6e2ce97c7740.selectorLabels" . | nindent 6 }}
