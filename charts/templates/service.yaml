apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0037f2de-48b4-41d4-9143-973409162679.fullname" . }}
  labels:
    {{- include "go-echo0037f2de-48b4-41d4-9143-973409162679.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0037f2de-48b4-41d4-9143-973409162679.selectorLabels" . | nindent 6 }}
