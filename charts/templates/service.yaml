apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7b47bb8b-95be-48cb-bd47-5059b42aa933.fullname" . }}
  labels:
    {{- include "go-echo7b47bb8b-95be-48cb-bd47-5059b42aa933.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7b47bb8b-95be-48cb-bd47-5059b42aa933.selectorLabels" . | nindent 6 }}
