apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod986fdc2-0297-42cb-9d75-62b7fef8614d.fullname" . }}
  labels:
    {{- include "go-echod986fdc2-0297-42cb-9d75-62b7fef8614d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod986fdc2-0297-42cb-9d75-62b7fef8614d.selectorLabels" . | nindent 6 }}
