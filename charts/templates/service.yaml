apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8acd7d7c-aa97-4a5c-bce3-975324d67ff3.fullname" . }}
  labels:
    {{- include "go-echo8acd7d7c-aa97-4a5c-bce3-975324d67ff3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8acd7d7c-aa97-4a5c-bce3-975324d67ff3.selectorLabels" . | nindent 6 }}
