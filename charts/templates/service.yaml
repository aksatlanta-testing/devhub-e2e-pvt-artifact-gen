apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa6abd9e3-961f-4de7-91dd-e8b796b51fc0.fullname" . }}
  labels:
    {{- include "go-echoa6abd9e3-961f-4de7-91dd-e8b796b51fc0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa6abd9e3-961f-4de7-91dd-e8b796b51fc0.selectorLabels" . | nindent 6 }}
