apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5acb3cf9-9037-4f48-9254-c19c450847da.fullname" . }}
  labels:
    {{- include "go-echo5acb3cf9-9037-4f48-9254-c19c450847da.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5acb3cf9-9037-4f48-9254-c19c450847da.selectorLabels" . | nindent 6 }}
