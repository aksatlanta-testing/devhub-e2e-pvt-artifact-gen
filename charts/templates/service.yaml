apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe1b9a98d-df39-4e2d-95ab-f924b5929fac.fullname" . }}
  labels:
    {{- include "go-echoe1b9a98d-df39-4e2d-95ab-f924b5929fac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe1b9a98d-df39-4e2d-95ab-f924b5929fac.selectorLabels" . | nindent 6 }}
