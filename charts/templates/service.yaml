apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5230d3bc-e182-4090-8f54-01805e8d0c37.fullname" . }}
  labels:
    {{- include "go-echo5230d3bc-e182-4090-8f54-01805e8d0c37.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5230d3bc-e182-4090-8f54-01805e8d0c37.selectorLabels" . | nindent 6 }}
