apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe7fc940c-6d40-49d8-a1ac-70015d30f967.fullname" . }}
  labels:
    {{- include "go-echoe7fc940c-6d40-49d8-a1ac-70015d30f967.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe7fc940c-6d40-49d8-a1ac-70015d30f967.selectorLabels" . | nindent 6 }}
