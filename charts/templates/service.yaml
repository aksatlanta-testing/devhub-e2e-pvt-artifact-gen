apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5c2b6d56-5768-4c13-a8a4-600414093691.fullname" . }}
  labels:
    {{- include "go-echo5c2b6d56-5768-4c13-a8a4-600414093691.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5c2b6d56-5768-4c13-a8a4-600414093691.selectorLabels" . | nindent 6 }}
