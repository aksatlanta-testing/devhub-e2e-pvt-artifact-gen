apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeed02d8d-b649-4b32-a024-feba3c71ed9c.fullname" . }}
  labels:
    {{- include "go-echoeed02d8d-b649-4b32-a024-feba3c71ed9c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeed02d8d-b649-4b32-a024-feba3c71ed9c.selectorLabels" . | nindent 6 }}
