apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa655c312-f622-4366-abff-410b32076a12.fullname" . }}
  labels:
    {{- include "go-echoa655c312-f622-4366-abff-410b32076a12.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa655c312-f622-4366-abff-410b32076a12.selectorLabels" . | nindent 6 }}
