apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda7ddc3d-b14c-4fa4-a13c-1e320fcdbdc9.fullname" . }}
  labels:
    {{- include "go-echoda7ddc3d-b14c-4fa4-a13c-1e320fcdbdc9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda7ddc3d-b14c-4fa4-a13c-1e320fcdbdc9.selectorLabels" . | nindent 6 }}
