apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob2544d59-9c2b-47db-9b19-375070fa0792.fullname" . }}
  labels:
    {{- include "go-echob2544d59-9c2b-47db-9b19-375070fa0792.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob2544d59-9c2b-47db-9b19-375070fa0792.selectorLabels" . | nindent 6 }}
