apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo88ce931c-82ee-4caf-9d0d-c9dc9c391087.fullname" . }}
  labels:
    {{- include "go-echo88ce931c-82ee-4caf-9d0d-c9dc9c391087.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo88ce931c-82ee-4caf-9d0d-c9dc9c391087.selectorLabels" . | nindent 6 }}
