apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof885e727-e183-4f28-b73b-47deba678efa.fullname" . }}
  labels:
    {{- include "go-echof885e727-e183-4f28-b73b-47deba678efa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof885e727-e183-4f28-b73b-47deba678efa.selectorLabels" . | nindent 6 }}
