apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocd244c0b-e778-4325-bbb0-2f4f95770fe1.fullname" . }}
  labels:
    {{- include "go-echocd244c0b-e778-4325-bbb0-2f4f95770fe1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocd244c0b-e778-4325-bbb0-2f4f95770fe1.selectorLabels" . | nindent 6 }}
