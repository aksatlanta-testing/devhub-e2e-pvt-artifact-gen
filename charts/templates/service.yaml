apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7f1eff83-a34d-4e6c-b310-62debafbc714.fullname" . }}
  labels:
    {{- include "go-echo7f1eff83-a34d-4e6c-b310-62debafbc714.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7f1eff83-a34d-4e6c-b310-62debafbc714.selectorLabels" . | nindent 6 }}
