apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof2632818-feab-4ffe-a479-02ab60574be2.fullname" . }}
  labels:
    {{- include "go-echof2632818-feab-4ffe-a479-02ab60574be2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof2632818-feab-4ffe-a479-02ab60574be2.selectorLabels" . | nindent 6 }}
