apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoffbb2f49-1169-4940-a1ea-c8b175c21af8.fullname" . }}
  labels:
    {{- include "go-echoffbb2f49-1169-4940-a1ea-c8b175c21af8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoffbb2f49-1169-4940-a1ea-c8b175c21af8.selectorLabels" . | nindent 6 }}
