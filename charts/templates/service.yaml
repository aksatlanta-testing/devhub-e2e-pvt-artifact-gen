apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof0cfe01b-53c9-4164-a91c-016cbe1b2615.fullname" . }}
  labels:
    {{- include "go-echof0cfe01b-53c9-4164-a91c-016cbe1b2615.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof0cfe01b-53c9-4164-a91c-016cbe1b2615.selectorLabels" . | nindent 6 }}
