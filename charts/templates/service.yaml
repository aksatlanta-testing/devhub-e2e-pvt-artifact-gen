apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoae1c7bea-8234-4e46-82c3-34b5f9fa30b2.fullname" . }}
  labels:
    {{- include "go-echoae1c7bea-8234-4e46-82c3-34b5f9fa30b2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoae1c7bea-8234-4e46-82c3-34b5f9fa30b2.selectorLabels" . | nindent 6 }}
