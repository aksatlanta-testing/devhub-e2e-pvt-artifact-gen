apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7e2b0eb0-b65a-4747-9bb3-d073388a687c.fullname" . }}
  labels:
    {{- include "go-echo7e2b0eb0-b65a-4747-9bb3-d073388a687c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7e2b0eb0-b65a-4747-9bb3-d073388a687c.selectorLabels" . | nindent 6 }}
