apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobc039cfa-360d-4753-aaf7-3499f8b70717.fullname" . }}
  labels:
    {{- include "go-echobc039cfa-360d-4753-aaf7-3499f8b70717.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobc039cfa-360d-4753-aaf7-3499f8b70717.selectorLabels" . | nindent 6 }}
