apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9c81bcec-8dbd-4d3c-a6ba-cc7118345aa7.fullname" . }}
  labels:
    {{- include "go-echo9c81bcec-8dbd-4d3c-a6ba-cc7118345aa7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9c81bcec-8dbd-4d3c-a6ba-cc7118345aa7.selectorLabels" . | nindent 6 }}
