apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6400d9aa-0a8d-46a8-bb33-b97936cf833a.fullname" . }}
  labels:
    {{- include "go-echo6400d9aa-0a8d-46a8-bb33-b97936cf833a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6400d9aa-0a8d-46a8-bb33-b97936cf833a.selectorLabels" . | nindent 6 }}
