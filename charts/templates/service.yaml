apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa88032b7-a384-42cd-810b-c1a69e25b0c0.fullname" . }}
  labels:
    {{- include "go-echoa88032b7-a384-42cd-810b-c1a69e25b0c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa88032b7-a384-42cd-810b-c1a69e25b0c0.selectorLabels" . | nindent 6 }}
