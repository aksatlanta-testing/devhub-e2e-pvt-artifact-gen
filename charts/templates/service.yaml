apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo64a06f4b-b2d7-46b8-a663-e08f9318c6f3.fullname" . }}
  labels:
    {{- include "go-echo64a06f4b-b2d7-46b8-a663-e08f9318c6f3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo64a06f4b-b2d7-46b8-a663-e08f9318c6f3.selectorLabels" . | nindent 6 }}
