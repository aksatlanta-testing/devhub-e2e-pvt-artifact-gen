apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2fba1abc-eaeb-46c9-b8be-30b02c6d4cfb.fullname" . }}
  labels:
    {{- include "go-echo2fba1abc-eaeb-46c9-b8be-30b02c6d4cfb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2fba1abc-eaeb-46c9-b8be-30b02c6d4cfb.selectorLabels" . | nindent 6 }}
