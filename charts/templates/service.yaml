apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3da04ed2-b9a0-4f85-aca8-76ad241b757d.fullname" . }}
  labels:
    {{- include "go-echo3da04ed2-b9a0-4f85-aca8-76ad241b757d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3da04ed2-b9a0-4f85-aca8-76ad241b757d.selectorLabels" . | nindent 6 }}
