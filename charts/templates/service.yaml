apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof6d26f72-47b0-4c9a-8baa-9704e6fd4d54.fullname" . }}
  labels:
    {{- include "go-echof6d26f72-47b0-4c9a-8baa-9704e6fd4d54.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof6d26f72-47b0-4c9a-8baa-9704e6fd4d54.selectorLabels" . | nindent 6 }}
