apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b1412dd-66b3-46a2-afb1-824b1d092c1b.fullname" . }}
  labels:
    {{- include "go-echo0b1412dd-66b3-46a2-afb1-824b1d092c1b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b1412dd-66b3-46a2-afb1-824b1d092c1b.selectorLabels" . | nindent 6 }}
