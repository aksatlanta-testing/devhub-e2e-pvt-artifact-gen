apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob40deb37-2710-4be8-9b83-795ddbc4c768.fullname" . }}
  labels:
    {{- include "go-echob40deb37-2710-4be8-9b83-795ddbc4c768.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob40deb37-2710-4be8-9b83-795ddbc4c768.selectorLabels" . | nindent 6 }}
