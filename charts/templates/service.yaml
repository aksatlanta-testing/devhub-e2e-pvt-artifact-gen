apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc7261a5-97a3-4bd7-b0c6-c0e1ab86699f.fullname" . }}
  labels:
    {{- include "go-echocc7261a5-97a3-4bd7-b0c6-c0e1ab86699f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc7261a5-97a3-4bd7-b0c6-c0e1ab86699f.selectorLabels" . | nindent 6 }}
