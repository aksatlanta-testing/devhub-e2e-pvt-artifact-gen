apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo27eedd39-3c2a-4f25-9cd6-ddbeffaeb0f8.fullname" . }}
  labels:
    {{- include "go-echo27eedd39-3c2a-4f25-9cd6-ddbeffaeb0f8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo27eedd39-3c2a-4f25-9cd6-ddbeffaeb0f8.selectorLabels" . | nindent 6 }}
