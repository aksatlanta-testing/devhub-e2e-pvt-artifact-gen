apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoef8e5b5b-0d33-4577-a55c-d86885683e28.fullname" . }}
  labels:
    {{- include "go-echoef8e5b5b-0d33-4577-a55c-d86885683e28.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoef8e5b5b-0d33-4577-a55c-d86885683e28.selectorLabels" . | nindent 6 }}
