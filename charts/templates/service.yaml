apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod8819e71-6bf3-4380-9f41-a65c2091c44c.fullname" . }}
  labels:
    {{- include "go-echod8819e71-6bf3-4380-9f41-a65c2091c44c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod8819e71-6bf3-4380-9f41-a65c2091c44c.selectorLabels" . | nindent 6 }}
