apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo60ea9b67-8622-467e-b508-5b20804c7001.fullname" . }}
  labels:
    {{- include "go-echo60ea9b67-8622-467e-b508-5b20804c7001.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo60ea9b67-8622-467e-b508-5b20804c7001.selectorLabels" . | nindent 6 }}
