apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3945b194-0658-4f2a-8cd2-d89587ac21bb.fullname" . }}
  labels:
    {{- include "go-echo3945b194-0658-4f2a-8cd2-d89587ac21bb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3945b194-0658-4f2a-8cd2-d89587ac21bb.selectorLabels" . | nindent 6 }}
