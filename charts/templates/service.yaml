apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofd09dd0a-0fb6-46bc-9b45-da1f670a18e2.fullname" . }}
  labels:
    {{- include "go-echofd09dd0a-0fb6-46bc-9b45-da1f670a18e2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofd09dd0a-0fb6-46bc-9b45-da1f670a18e2.selectorLabels" . | nindent 6 }}
