apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoea10ab9e-1843-4e0c-82c6-1e33b6e62cdf.fullname" . }}
  labels:
    {{- include "go-echoea10ab9e-1843-4e0c-82c6-1e33b6e62cdf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoea10ab9e-1843-4e0c-82c6-1e33b6e62cdf.selectorLabels" . | nindent 6 }}
