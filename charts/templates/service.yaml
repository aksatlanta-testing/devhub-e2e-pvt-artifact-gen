apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4f06628c-a897-4a43-b546-5cb16318ef3a.fullname" . }}
  labels:
    {{- include "go-echo4f06628c-a897-4a43-b546-5cb16318ef3a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4f06628c-a897-4a43-b546-5cb16318ef3a.selectorLabels" . | nindent 6 }}
