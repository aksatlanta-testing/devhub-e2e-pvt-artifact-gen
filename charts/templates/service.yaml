apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo30f0b080-27f1-4416-8ae0-12cfa8647529.fullname" . }}
  labels:
    {{- include "go-echo30f0b080-27f1-4416-8ae0-12cfa8647529.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo30f0b080-27f1-4416-8ae0-12cfa8647529.selectorLabels" . | nindent 6 }}
