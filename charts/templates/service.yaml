apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc841b4d7-1957-4657-8e02-9a1f65aace2e.fullname" . }}
  labels:
    {{- include "go-echoc841b4d7-1957-4657-8e02-9a1f65aace2e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc841b4d7-1957-4657-8e02-9a1f65aace2e.selectorLabels" . | nindent 6 }}
