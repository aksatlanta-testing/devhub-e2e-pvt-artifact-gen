apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo69e52b16-6843-4e0a-990c-0241c0733a08.fullname" . }}
  labels:
    {{- include "go-echo69e52b16-6843-4e0a-990c-0241c0733a08.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo69e52b16-6843-4e0a-990c-0241c0733a08.selectorLabels" . | nindent 6 }}
