apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8a4bac9-4add-4524-9621-c99c43e9f2a5.fullname" . }}
  labels:
    {{- include "go-echoc8a4bac9-4add-4524-9621-c99c43e9f2a5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8a4bac9-4add-4524-9621-c99c43e9f2a5.selectorLabels" . | nindent 6 }}
