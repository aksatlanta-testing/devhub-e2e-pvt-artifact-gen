apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo42389a19-0c4f-467f-a2f8-ebd69c34ddcd.fullname" . }}
  labels:
    {{- include "go-echo42389a19-0c4f-467f-a2f8-ebd69c34ddcd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo42389a19-0c4f-467f-a2f8-ebd69c34ddcd.selectorLabels" . | nindent 6 }}
