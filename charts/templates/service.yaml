apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo93ee5600-f7b9-4cb3-9d59-0c5a0cb93b61.fullname" . }}
  labels:
    {{- include "go-echo93ee5600-f7b9-4cb3-9d59-0c5a0cb93b61.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo93ee5600-f7b9-4cb3-9d59-0c5a0cb93b61.selectorLabels" . | nindent 6 }}
