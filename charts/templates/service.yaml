apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo848e9160-5af6-4950-87ac-bdd77c7938ab.fullname" . }}
  labels:
    {{- include "go-echo848e9160-5af6-4950-87ac-bdd77c7938ab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo848e9160-5af6-4950-87ac-bdd77c7938ab.selectorLabels" . | nindent 6 }}
