apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo15bca0fa-4510-42e8-9f2e-8f9cee3eb1f0.fullname" . }}
  labels:
    {{- include "go-echo15bca0fa-4510-42e8-9f2e-8f9cee3eb1f0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo15bca0fa-4510-42e8-9f2e-8f9cee3eb1f0.selectorLabels" . | nindent 6 }}
