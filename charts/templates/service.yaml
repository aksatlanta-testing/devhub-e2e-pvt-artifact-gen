apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo738f92fe-d872-4511-bf84-b33b524648d2.fullname" . }}
  labels:
    {{- include "go-echo738f92fe-d872-4511-bf84-b33b524648d2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo738f92fe-d872-4511-bf84-b33b524648d2.selectorLabels" . | nindent 6 }}
