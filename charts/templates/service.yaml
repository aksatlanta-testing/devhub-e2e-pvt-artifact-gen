apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo07fdea02-36fa-4a82-ab4e-75c7e9d0dbac.fullname" . }}
  labels:
    {{- include "go-echo07fdea02-36fa-4a82-ab4e-75c7e9d0dbac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo07fdea02-36fa-4a82-ab4e-75c7e9d0dbac.selectorLabels" . | nindent 6 }}
