apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa4bf7f41-e51a-4d4a-b63d-e356d0a0d2b1.fullname" . }}
  labels:
    {{- include "go-echoa4bf7f41-e51a-4d4a-b63d-e356d0a0d2b1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa4bf7f41-e51a-4d4a-b63d-e356d0a0d2b1.selectorLabels" . | nindent 6 }}
