apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo69991274-505e-4d09-9650-f0eb5e344998.fullname" . }}
  labels:
    {{- include "go-echo69991274-505e-4d09-9650-f0eb5e344998.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo69991274-505e-4d09-9650-f0eb5e344998.selectorLabels" . | nindent 6 }}
