apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo07b736a3-7a34-475b-a097-4f02fdecb968.fullname" . }}
  labels:
    {{- include "go-echo07b736a3-7a34-475b-a097-4f02fdecb968.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo07b736a3-7a34-475b-a097-4f02fdecb968.selectorLabels" . | nindent 6 }}
