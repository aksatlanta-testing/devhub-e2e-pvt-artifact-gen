apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa6ef39b5-42fe-42e0-84b6-be851444e718.fullname" . }}
  labels:
    {{- include "go-echoa6ef39b5-42fe-42e0-84b6-be851444e718.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa6ef39b5-42fe-42e0-84b6-be851444e718.selectorLabels" . | nindent 6 }}
