apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo70d05e66-274b-47ed-88fa-82d193aea27c.fullname" . }}
  labels:
    {{- include "go-echo70d05e66-274b-47ed-88fa-82d193aea27c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo70d05e66-274b-47ed-88fa-82d193aea27c.selectorLabels" . | nindent 6 }}
