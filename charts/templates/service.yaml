apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe1734adf-2331-427e-9e14-d4c959c4b6af.fullname" . }}
  labels:
    {{- include "go-echoe1734adf-2331-427e-9e14-d4c959c4b6af.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe1734adf-2331-427e-9e14-d4c959c4b6af.selectorLabels" . | nindent 6 }}
