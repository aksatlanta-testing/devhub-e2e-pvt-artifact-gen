apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof166faae-a2e7-4f58-b5ec-89ead8431a45.fullname" . }}
  labels:
    {{- include "go-echof166faae-a2e7-4f58-b5ec-89ead8431a45.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof166faae-a2e7-4f58-b5ec-89ead8431a45.selectorLabels" . | nindent 6 }}
