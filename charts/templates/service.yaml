apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo262592b7-dd83-469a-8415-61f02fa18527.fullname" . }}
  labels:
    {{- include "go-echo262592b7-dd83-469a-8415-61f02fa18527.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo262592b7-dd83-469a-8415-61f02fa18527.selectorLabels" . | nindent 6 }}
