apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo64ebcb2d-e6e5-4756-86e4-bd12c2b08df8.fullname" . }}
  labels:
    {{- include "go-echo64ebcb2d-e6e5-4756-86e4-bd12c2b08df8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo64ebcb2d-e6e5-4756-86e4-bd12c2b08df8.selectorLabels" . | nindent 6 }}
