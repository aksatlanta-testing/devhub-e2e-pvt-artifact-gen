apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4418f6b-7e16-47fa-87b6-9c0d76e38ee0.fullname" . }}
  labels:
    {{- include "go-echoc4418f6b-7e16-47fa-87b6-9c0d76e38ee0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4418f6b-7e16-47fa-87b6-9c0d76e38ee0.selectorLabels" . | nindent 6 }}
