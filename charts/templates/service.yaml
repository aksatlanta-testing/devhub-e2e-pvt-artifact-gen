apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8e5ffe06-4dfc-4ab0-8172-121100304caa.fullname" . }}
  labels:
    {{- include "go-echo8e5ffe06-4dfc-4ab0-8172-121100304caa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8e5ffe06-4dfc-4ab0-8172-121100304caa.selectorLabels" . | nindent 6 }}
