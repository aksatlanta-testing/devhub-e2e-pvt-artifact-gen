apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofb53a077-579a-4171-9918-3e0a4fa72f8e.fullname" . }}
  labels:
    {{- include "go-echofb53a077-579a-4171-9918-3e0a4fa72f8e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofb53a077-579a-4171-9918-3e0a4fa72f8e.selectorLabels" . | nindent 6 }}
