apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod7dec1f3-4b7e-45cd-bf8b-d69a73dc0699.fullname" . }}
  labels:
    {{- include "go-echod7dec1f3-4b7e-45cd-bf8b-d69a73dc0699.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod7dec1f3-4b7e-45cd-bf8b-d69a73dc0699.selectorLabels" . | nindent 6 }}
