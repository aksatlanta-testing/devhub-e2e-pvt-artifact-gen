apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa43a732d-d87d-4886-8ccf-5b38089be6ab.fullname" . }}
  labels:
    {{- include "go-echoa43a732d-d87d-4886-8ccf-5b38089be6ab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa43a732d-d87d-4886-8ccf-5b38089be6ab.selectorLabels" . | nindent 6 }}
