apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof8970d13-908e-427a-b5c7-506101e8d995.fullname" . }}
  labels:
    {{- include "go-echof8970d13-908e-427a-b5c7-506101e8d995.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof8970d13-908e-427a-b5c7-506101e8d995.selectorLabels" . | nindent 6 }}
