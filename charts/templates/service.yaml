apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2b1ff44e-6deb-44d9-85e3-dc00933ea1ee.fullname" . }}
  labels:
    {{- include "go-echo2b1ff44e-6deb-44d9-85e3-dc00933ea1ee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2b1ff44e-6deb-44d9-85e3-dc00933ea1ee.selectorLabels" . | nindent 6 }}
