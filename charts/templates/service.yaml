apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa010ef80-e2d2-4e65-baa5-5aca0840435d.fullname" . }}
  labels:
    {{- include "go-echoa010ef80-e2d2-4e65-baa5-5aca0840435d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa010ef80-e2d2-4e65-baa5-5aca0840435d.selectorLabels" . | nindent 6 }}
