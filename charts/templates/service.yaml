apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobec7f6d3-048f-4558-aa12-8f20c0accb37.fullname" . }}
  labels:
    {{- include "go-echobec7f6d3-048f-4558-aa12-8f20c0accb37.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobec7f6d3-048f-4558-aa12-8f20c0accb37.selectorLabels" . | nindent 6 }}
