apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeab332d1-f0ec-4b74-a004-d05f801a862f.fullname" . }}
  labels:
    {{- include "go-echoeab332d1-f0ec-4b74-a004-d05f801a862f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeab332d1-f0ec-4b74-a004-d05f801a862f.selectorLabels" . | nindent 6 }}
