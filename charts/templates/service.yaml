apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodc68a4b8-1be4-4289-9e66-d7bb7b437335.fullname" . }}
  labels:
    {{- include "go-echodc68a4b8-1be4-4289-9e66-d7bb7b437335.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodc68a4b8-1be4-4289-9e66-d7bb7b437335.selectorLabels" . | nindent 6 }}
