apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1ad1504d-6ea6-4490-95ff-eadba2c4a74c.fullname" . }}
  labels:
    {{- include "go-echo1ad1504d-6ea6-4490-95ff-eadba2c4a74c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1ad1504d-6ea6-4490-95ff-eadba2c4a74c.selectorLabels" . | nindent 6 }}
