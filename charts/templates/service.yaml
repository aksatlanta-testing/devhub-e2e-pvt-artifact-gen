apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo19792f20-c8df-4715-bb8f-cf1d01d6ccfe.fullname" . }}
  labels:
    {{- include "go-echo19792f20-c8df-4715-bb8f-cf1d01d6ccfe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo19792f20-c8df-4715-bb8f-cf1d01d6ccfe.selectorLabels" . | nindent 6 }}
