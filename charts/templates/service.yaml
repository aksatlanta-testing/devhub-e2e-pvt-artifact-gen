apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo28643982-3ff8-444a-925f-584391345842.fullname" . }}
  labels:
    {{- include "go-echo28643982-3ff8-444a-925f-584391345842.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo28643982-3ff8-444a-925f-584391345842.selectorLabels" . | nindent 6 }}
