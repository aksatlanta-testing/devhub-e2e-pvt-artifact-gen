apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo00abd4ec-128b-433b-a139-98ea062dfe8c.fullname" . }}
  labels:
    {{- include "go-echo00abd4ec-128b-433b-a139-98ea062dfe8c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo00abd4ec-128b-433b-a139-98ea062dfe8c.selectorLabels" . | nindent 6 }}
