apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofaae2c61-8877-4611-b85d-6a90927345fe.fullname" . }}
  labels:
    {{- include "go-echofaae2c61-8877-4611-b85d-6a90927345fe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofaae2c61-8877-4611-b85d-6a90927345fe.selectorLabels" . | nindent 6 }}
