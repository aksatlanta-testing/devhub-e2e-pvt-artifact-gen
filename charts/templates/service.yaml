apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo839f951d-7c8d-4219-a21e-466d36700f36.fullname" . }}
  labels:
    {{- include "go-echo839f951d-7c8d-4219-a21e-466d36700f36.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo839f951d-7c8d-4219-a21e-466d36700f36.selectorLabels" . | nindent 6 }}
