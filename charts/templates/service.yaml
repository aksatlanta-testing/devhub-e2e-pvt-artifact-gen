apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo202e3a90-6b9d-4f7c-ab2b-c1f34eb98202.fullname" . }}
  labels:
    {{- include "go-echo202e3a90-6b9d-4f7c-ab2b-c1f34eb98202.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo202e3a90-6b9d-4f7c-ab2b-c1f34eb98202.selectorLabels" . | nindent 6 }}
