apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo49332a1a-c3b7-450d-8bf7-f99711e4f6cb.fullname" . }}
  labels:
    {{- include "go-echo49332a1a-c3b7-450d-8bf7-f99711e4f6cb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo49332a1a-c3b7-450d-8bf7-f99711e4f6cb.selectorLabels" . | nindent 6 }}
