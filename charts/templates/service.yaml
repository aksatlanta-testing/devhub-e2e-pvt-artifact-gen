apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4141e743-2b48-485a-946a-2c7de5b84b69.fullname" . }}
  labels:
    {{- include "go-echo4141e743-2b48-485a-946a-2c7de5b84b69.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4141e743-2b48-485a-946a-2c7de5b84b69.selectorLabels" . | nindent 6 }}
