apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe88d2983-3736-48d3-9649-54e8705878e1.fullname" . }}
  labels:
    {{- include "go-echoe88d2983-3736-48d3-9649-54e8705878e1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe88d2983-3736-48d3-9649-54e8705878e1.selectorLabels" . | nindent 6 }}
