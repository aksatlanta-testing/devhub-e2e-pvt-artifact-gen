apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8f125694-6a39-4c56-9c5d-0a393c164a7d.fullname" . }}
  labels:
    {{- include "go-echo8f125694-6a39-4c56-9c5d-0a393c164a7d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8f125694-6a39-4c56-9c5d-0a393c164a7d.selectorLabels" . | nindent 6 }}
