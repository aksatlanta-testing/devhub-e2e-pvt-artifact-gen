apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob9a0853c-9c38-42ef-ac09-66d6dd3195ef.fullname" . }}
  labels:
    {{- include "go-echob9a0853c-9c38-42ef-ac09-66d6dd3195ef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob9a0853c-9c38-42ef-ac09-66d6dd3195ef.selectorLabels" . | nindent 6 }}
