apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo972516ed-901d-436d-9833-c9439c97baaf.fullname" . }}
  labels:
    {{- include "go-echo972516ed-901d-436d-9833-c9439c97baaf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo972516ed-901d-436d-9833-c9439c97baaf.selectorLabels" . | nindent 6 }}
