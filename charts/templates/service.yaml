apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo84558d25-bfab-43e7-8bd0-0c9f552c45f6.fullname" . }}
  labels:
    {{- include "go-echo84558d25-bfab-43e7-8bd0-0c9f552c45f6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo84558d25-bfab-43e7-8bd0-0c9f552c45f6.selectorLabels" . | nindent 6 }}
