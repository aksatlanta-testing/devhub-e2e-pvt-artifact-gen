apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe7ee91bc-9eb7-43e6-aeae-3e234ce6f6bb.fullname" . }}
  labels:
    {{- include "go-echoe7ee91bc-9eb7-43e6-aeae-3e234ce6f6bb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe7ee91bc-9eb7-43e6-aeae-3e234ce6f6bb.selectorLabels" . | nindent 6 }}
