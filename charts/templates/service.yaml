apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3e284e83-e594-490a-8a98-2c194b08262f.fullname" . }}
  labels:
    {{- include "go-echo3e284e83-e594-490a-8a98-2c194b08262f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3e284e83-e594-490a-8a98-2c194b08262f.selectorLabels" . | nindent 6 }}
