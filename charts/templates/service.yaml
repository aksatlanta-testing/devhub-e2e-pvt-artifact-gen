apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe60dfb1b-86f6-4e8e-904e-5e3b74a2688b.fullname" . }}
  labels:
    {{- include "go-echoe60dfb1b-86f6-4e8e-904e-5e3b74a2688b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe60dfb1b-86f6-4e8e-904e-5e3b74a2688b.selectorLabels" . | nindent 6 }}
