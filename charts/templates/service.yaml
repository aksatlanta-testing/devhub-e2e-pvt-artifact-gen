apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo145bdf87-e8ce-4553-9764-e5cac1d444a7.fullname" . }}
  labels:
    {{- include "go-echo145bdf87-e8ce-4553-9764-e5cac1d444a7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo145bdf87-e8ce-4553-9764-e5cac1d444a7.selectorLabels" . | nindent 6 }}
