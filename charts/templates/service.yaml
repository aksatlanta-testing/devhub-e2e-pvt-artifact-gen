apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9b9fb006-9a64-47da-a106-cb560a8d743a.fullname" . }}
  labels:
    {{- include "go-echo9b9fb006-9a64-47da-a106-cb560a8d743a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9b9fb006-9a64-47da-a106-cb560a8d743a.selectorLabels" . | nindent 6 }}
