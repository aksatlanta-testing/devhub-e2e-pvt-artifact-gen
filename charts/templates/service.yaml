apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo00fab5e1-82f8-4884-88a9-b98dcec069c6.fullname" . }}
  labels:
    {{- include "go-echo00fab5e1-82f8-4884-88a9-b98dcec069c6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo00fab5e1-82f8-4884-88a9-b98dcec069c6.selectorLabels" . | nindent 6 }}
