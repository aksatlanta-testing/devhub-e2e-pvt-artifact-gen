apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofac64b0c-2aa2-4165-806e-6dfe874b1a99.fullname" . }}
  labels:
    {{- include "go-echofac64b0c-2aa2-4165-806e-6dfe874b1a99.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofac64b0c-2aa2-4165-806e-6dfe874b1a99.selectorLabels" . | nindent 6 }}
