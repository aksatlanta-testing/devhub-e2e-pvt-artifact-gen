apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1288a3b4-ccba-4a49-988e-d67fe43eb0a9.fullname" . }}
  labels:
    {{- include "go-echo1288a3b4-ccba-4a49-988e-d67fe43eb0a9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1288a3b4-ccba-4a49-988e-d67fe43eb0a9.selectorLabels" . | nindent 6 }}
