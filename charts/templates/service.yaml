apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo233e2dc5-431f-4b3d-ad48-30ce3f037a0d.fullname" . }}
  labels:
    {{- include "go-echo233e2dc5-431f-4b3d-ad48-30ce3f037a0d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo233e2dc5-431f-4b3d-ad48-30ce3f037a0d.selectorLabels" . | nindent 6 }}
