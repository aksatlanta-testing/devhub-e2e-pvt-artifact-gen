apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo785cb711-8df8-4a04-b7f2-2e39869e2d83.fullname" . }}
  labels:
    {{- include "go-echo785cb711-8df8-4a04-b7f2-2e39869e2d83.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo785cb711-8df8-4a04-b7f2-2e39869e2d83.selectorLabels" . | nindent 6 }}
