apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf2694f6-d527-44af-bb0e-e050df173a88.fullname" . }}
  labels:
    {{- include "go-echoaf2694f6-d527-44af-bb0e-e050df173a88.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf2694f6-d527-44af-bb0e-e050df173a88.selectorLabels" . | nindent 6 }}
