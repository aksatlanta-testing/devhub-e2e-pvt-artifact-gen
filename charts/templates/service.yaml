apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1da1767f-fb19-471e-8f34-80fa1c172e95.fullname" . }}
  labels:
    {{- include "go-echo1da1767f-fb19-471e-8f34-80fa1c172e95.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1da1767f-fb19-471e-8f34-80fa1c172e95.selectorLabels" . | nindent 6 }}
