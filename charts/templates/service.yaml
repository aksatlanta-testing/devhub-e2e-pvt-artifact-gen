apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo132802c6-f819-477c-8bed-93bed9ce1728.fullname" . }}
  labels:
    {{- include "go-echo132802c6-f819-477c-8bed-93bed9ce1728.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo132802c6-f819-477c-8bed-93bed9ce1728.selectorLabels" . | nindent 6 }}
