apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8dc017f3-8c4b-4cf3-820f-e5a2ae5dd05d.fullname" . }}
  labels:
    {{- include "go-echo8dc017f3-8c4b-4cf3-820f-e5a2ae5dd05d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8dc017f3-8c4b-4cf3-820f-e5a2ae5dd05d.selectorLabels" . | nindent 6 }}
