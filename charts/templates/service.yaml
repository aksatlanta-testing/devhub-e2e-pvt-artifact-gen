apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob4673e2d-a88c-4f83-af96-2a45ea738f4f.fullname" . }}
  labels:
    {{- include "go-echob4673e2d-a88c-4f83-af96-2a45ea738f4f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob4673e2d-a88c-4f83-af96-2a45ea738f4f.selectorLabels" . | nindent 6 }}
