apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6e164be3-628d-42f2-95ea-1a27e69ac619.fullname" . }}
  labels:
    {{- include "go-echo6e164be3-628d-42f2-95ea-1a27e69ac619.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6e164be3-628d-42f2-95ea-1a27e69ac619.selectorLabels" . | nindent 6 }}
