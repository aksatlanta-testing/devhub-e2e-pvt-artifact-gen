apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8ecbbdb0-de93-408b-bcca-25dbf0af8951.fullname" . }}
  labels:
    {{- include "go-echo8ecbbdb0-de93-408b-bcca-25dbf0af8951.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8ecbbdb0-de93-408b-bcca-25dbf0af8951.selectorLabels" . | nindent 6 }}
