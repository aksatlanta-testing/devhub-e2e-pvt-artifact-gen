apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo63c185b2-907b-478d-9620-dd453ff2df77.fullname" . }}
  labels:
    {{- include "go-echo63c185b2-907b-478d-9620-dd453ff2df77.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo63c185b2-907b-478d-9620-dd453ff2df77.selectorLabels" . | nindent 6 }}
