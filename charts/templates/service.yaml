apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod6bc4933-e459-4ed3-af09-51b157e774c4.fullname" . }}
  labels:
    {{- include "go-echod6bc4933-e459-4ed3-af09-51b157e774c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod6bc4933-e459-4ed3-af09-51b157e774c4.selectorLabels" . | nindent 6 }}
