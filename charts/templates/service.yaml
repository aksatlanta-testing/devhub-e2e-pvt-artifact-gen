apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3d1fd850-7a84-482b-907a-ea84d1120700.fullname" . }}
  labels:
    {{- include "go-echo3d1fd850-7a84-482b-907a-ea84d1120700.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3d1fd850-7a84-482b-907a-ea84d1120700.selectorLabels" . | nindent 6 }}
