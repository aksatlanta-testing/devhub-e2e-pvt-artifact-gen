apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2adc28fb-5e28-485f-b409-a99f653953a2.fullname" . }}
  labels:
    {{- include "go-echo2adc28fb-5e28-485f-b409-a99f653953a2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2adc28fb-5e28-485f-b409-a99f653953a2.selectorLabels" . | nindent 6 }}
