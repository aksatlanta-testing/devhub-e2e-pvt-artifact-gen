apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo999e23a6-95de-46be-aec3-21cfe7a25cff.fullname" . }}
  labels:
    {{- include "go-echo999e23a6-95de-46be-aec3-21cfe7a25cff.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo999e23a6-95de-46be-aec3-21cfe7a25cff.selectorLabels" . | nindent 6 }}
