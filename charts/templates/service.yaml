apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa8d81eb6-1562-4b05-aec1-e989a800710f.fullname" . }}
  labels:
    {{- include "go-echoa8d81eb6-1562-4b05-aec1-e989a800710f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa8d81eb6-1562-4b05-aec1-e989a800710f.selectorLabels" . | nindent 6 }}
