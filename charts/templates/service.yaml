apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob9e6bf84-567d-4322-a5f1-2554903ddecb.fullname" . }}
  labels:
    {{- include "go-echob9e6bf84-567d-4322-a5f1-2554903ddecb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob9e6bf84-567d-4322-a5f1-2554903ddecb.selectorLabels" . | nindent 6 }}
