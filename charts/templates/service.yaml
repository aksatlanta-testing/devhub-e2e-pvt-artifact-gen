apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo871df301-d0a4-49bf-b2df-97f856eb2628.fullname" . }}
  labels:
    {{- include "go-echo871df301-d0a4-49bf-b2df-97f856eb2628.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo871df301-d0a4-49bf-b2df-97f856eb2628.selectorLabels" . | nindent 6 }}
