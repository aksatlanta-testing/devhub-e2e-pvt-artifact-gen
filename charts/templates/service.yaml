apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoff68841c-6927-4415-b3ca-4afa37665359.fullname" . }}
  labels:
    {{- include "go-echoff68841c-6927-4415-b3ca-4afa37665359.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoff68841c-6927-4415-b3ca-4afa37665359.selectorLabels" . | nindent 6 }}
