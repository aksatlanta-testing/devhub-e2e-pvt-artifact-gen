apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobbd17660-b71c-437f-b0a9-2e0366b46399.fullname" . }}
  labels:
    {{- include "go-echobbd17660-b71c-437f-b0a9-2e0366b46399.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobbd17660-b71c-437f-b0a9-2e0366b46399.selectorLabels" . | nindent 6 }}
