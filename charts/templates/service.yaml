apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9b1c9a11-3be9-4140-8b80-def0b52a5462.fullname" . }}
  labels:
    {{- include "go-echo9b1c9a11-3be9-4140-8b80-def0b52a5462.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9b1c9a11-3be9-4140-8b80-def0b52a5462.selectorLabels" . | nindent 6 }}
