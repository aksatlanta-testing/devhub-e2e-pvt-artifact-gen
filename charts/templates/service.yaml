apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofd037820-c6d6-4710-8b22-b15a7ca54ed2.fullname" . }}
  labels:
    {{- include "go-echofd037820-c6d6-4710-8b22-b15a7ca54ed2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofd037820-c6d6-4710-8b22-b15a7ca54ed2.selectorLabels" . | nindent 6 }}
