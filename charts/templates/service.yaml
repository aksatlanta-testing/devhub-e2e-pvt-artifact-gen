apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobf298e3e-4abe-410f-a26c-aa2936ebee1a.fullname" . }}
  labels:
    {{- include "go-echobf298e3e-4abe-410f-a26c-aa2936ebee1a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobf298e3e-4abe-410f-a26c-aa2936ebee1a.selectorLabels" . | nindent 6 }}
