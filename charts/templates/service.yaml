apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo580575c5-acc1-4653-87ef-fb32bdf219bb.fullname" . }}
  labels:
    {{- include "go-echo580575c5-acc1-4653-87ef-fb32bdf219bb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo580575c5-acc1-4653-87ef-fb32bdf219bb.selectorLabels" . | nindent 6 }}
