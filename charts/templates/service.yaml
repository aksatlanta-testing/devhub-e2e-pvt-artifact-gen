apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2a1ac922-88cb-4463-9e29-c286c9017e3b.fullname" . }}
  labels:
    {{- include "go-echo2a1ac922-88cb-4463-9e29-c286c9017e3b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2a1ac922-88cb-4463-9e29-c286c9017e3b.selectorLabels" . | nindent 6 }}
