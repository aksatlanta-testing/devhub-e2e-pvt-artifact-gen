apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo86fc13de-efbc-4158-83ad-a3fcbd5e36aa.fullname" . }}
  labels:
    {{- include "go-echo86fc13de-efbc-4158-83ad-a3fcbd5e36aa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo86fc13de-efbc-4158-83ad-a3fcbd5e36aa.selectorLabels" . | nindent 6 }}
