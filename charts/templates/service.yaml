apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7de7b265-8098-4aba-827c-f6da58f1af76.fullname" . }}
  labels:
    {{- include "go-echo7de7b265-8098-4aba-827c-f6da58f1af76.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7de7b265-8098-4aba-827c-f6da58f1af76.selectorLabels" . | nindent 6 }}
