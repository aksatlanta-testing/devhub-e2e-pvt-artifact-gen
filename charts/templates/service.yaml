apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6683bca9-fdab-4002-8e32-1181fe46badd.fullname" . }}
  labels:
    {{- include "go-echo6683bca9-fdab-4002-8e32-1181fe46badd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6683bca9-fdab-4002-8e32-1181fe46badd.selectorLabels" . | nindent 6 }}
