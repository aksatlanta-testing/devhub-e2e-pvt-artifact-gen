apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7705948b-5099-4bbe-9f72-3c08404a9613.fullname" . }}
  labels:
    {{- include "go-echo7705948b-5099-4bbe-9f72-3c08404a9613.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7705948b-5099-4bbe-9f72-3c08404a9613.selectorLabels" . | nindent 6 }}
