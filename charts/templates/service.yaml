apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5e4ffbb3-8e4d-494b-a54c-01fdcbdacd33.fullname" . }}
  labels:
    {{- include "go-echo5e4ffbb3-8e4d-494b-a54c-01fdcbdacd33.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5e4ffbb3-8e4d-494b-a54c-01fdcbdacd33.selectorLabels" . | nindent 6 }}
