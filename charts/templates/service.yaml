apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd9d2d14-facf-4631-a44a-d698ec3acd15.fullname" . }}
  labels:
    {{- include "go-echobd9d2d14-facf-4631-a44a-d698ec3acd15.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd9d2d14-facf-4631-a44a-d698ec3acd15.selectorLabels" . | nindent 6 }}
