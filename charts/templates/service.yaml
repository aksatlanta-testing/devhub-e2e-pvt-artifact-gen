apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo44009e40-52c8-43b4-8ae4-279b43c49244.fullname" . }}
  labels:
    {{- include "go-echo44009e40-52c8-43b4-8ae4-279b43c49244.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo44009e40-52c8-43b4-8ae4-279b43c49244.selectorLabels" . | nindent 6 }}
