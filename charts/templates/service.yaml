apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodf8eda33-f0e3-4037-bb87-166e32bc388c.fullname" . }}
  labels:
    {{- include "go-echodf8eda33-f0e3-4037-bb87-166e32bc388c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodf8eda33-f0e3-4037-bb87-166e32bc388c.selectorLabels" . | nindent 6 }}
