apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5be8d3ca-f29f-4cd9-9a6b-14850f853943.fullname" . }}
  labels:
    {{- include "go-echo5be8d3ca-f29f-4cd9-9a6b-14850f853943.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5be8d3ca-f29f-4cd9-9a6b-14850f853943.selectorLabels" . | nindent 6 }}
