apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof9a345a3-b234-4af9-94c0-3fee08c486f1.fullname" . }}
  labels:
    {{- include "go-echof9a345a3-b234-4af9-94c0-3fee08c486f1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof9a345a3-b234-4af9-94c0-3fee08c486f1.selectorLabels" . | nindent 6 }}
