apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc080f2c9-ea8d-4c7d-9e26-0973b23f5fd2.fullname" . }}
  labels:
    {{- include "go-echoc080f2c9-ea8d-4c7d-9e26-0973b23f5fd2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc080f2c9-ea8d-4c7d-9e26-0973b23f5fd2.selectorLabels" . | nindent 6 }}
