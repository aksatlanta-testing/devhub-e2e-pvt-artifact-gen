apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof48152ad-1f3d-4710-8e97-dd1331fd4f87.fullname" . }}
  labels:
    {{- include "go-echof48152ad-1f3d-4710-8e97-dd1331fd4f87.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof48152ad-1f3d-4710-8e97-dd1331fd4f87.selectorLabels" . | nindent 6 }}
