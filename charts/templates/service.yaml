apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc56e2e1a-4547-48b5-930c-a4cf0a5b8e22.fullname" . }}
  labels:
    {{- include "go-echoc56e2e1a-4547-48b5-930c-a4cf0a5b8e22.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc56e2e1a-4547-48b5-930c-a4cf0a5b8e22.selectorLabels" . | nindent 6 }}
