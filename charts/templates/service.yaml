apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoad10fe50-4afc-44d1-91b0-885b0eb37a05.fullname" . }}
  labels:
    {{- include "go-echoad10fe50-4afc-44d1-91b0-885b0eb37a05.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoad10fe50-4afc-44d1-91b0-885b0eb37a05.selectorLabels" . | nindent 6 }}
