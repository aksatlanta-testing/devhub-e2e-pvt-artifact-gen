apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0859a602-e8d7-44ad-a821-8518e178914c.fullname" . }}
  labels:
    {{- include "go-echo0859a602-e8d7-44ad-a821-8518e178914c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0859a602-e8d7-44ad-a821-8518e178914c.selectorLabels" . | nindent 6 }}
