apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo959bcd21-d5f5-49c1-a556-f313fd0cf01a.fullname" . }}
  labels:
    {{- include "go-echo959bcd21-d5f5-49c1-a556-f313fd0cf01a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo959bcd21-d5f5-49c1-a556-f313fd0cf01a.selectorLabels" . | nindent 6 }}
