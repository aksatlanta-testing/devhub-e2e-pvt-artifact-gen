apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo905a9865-2e07-44a0-88fe-9f6449695626.fullname" . }}
  labels:
    {{- include "go-echo905a9865-2e07-44a0-88fe-9f6449695626.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo905a9865-2e07-44a0-88fe-9f6449695626.selectorLabels" . | nindent 6 }}
