apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0753c747-d096-493d-9e39-d52384f470c7.fullname" . }}
  labels:
    {{- include "go-echo0753c747-d096-493d-9e39-d52384f470c7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0753c747-d096-493d-9e39-d52384f470c7.selectorLabels" . | nindent 6 }}
