apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodbddac14-df45-48ce-9b92-a14c87436083.fullname" . }}
  labels:
    {{- include "go-echodbddac14-df45-48ce-9b92-a14c87436083.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodbddac14-df45-48ce-9b92-a14c87436083.selectorLabels" . | nindent 6 }}
