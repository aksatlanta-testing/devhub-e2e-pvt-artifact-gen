apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3155d25b-e50b-40c0-ba5f-ea4f2fad99d8.fullname" . }}
  labels:
    {{- include "go-echo3155d25b-e50b-40c0-ba5f-ea4f2fad99d8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3155d25b-e50b-40c0-ba5f-ea4f2fad99d8.selectorLabels" . | nindent 6 }}
