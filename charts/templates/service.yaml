apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob6b31998-3202-419e-80bf-ca6bb95f0c3c.fullname" . }}
  labels:
    {{- include "go-echob6b31998-3202-419e-80bf-ca6bb95f0c3c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob6b31998-3202-419e-80bf-ca6bb95f0c3c.selectorLabels" . | nindent 6 }}
