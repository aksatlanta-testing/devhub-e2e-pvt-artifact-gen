apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3930c49c-fad1-494e-9cfe-613d88fe6bbc.fullname" . }}
  labels:
    {{- include "go-echo3930c49c-fad1-494e-9cfe-613d88fe6bbc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3930c49c-fad1-494e-9cfe-613d88fe6bbc.selectorLabels" . | nindent 6 }}
