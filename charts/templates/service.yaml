apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2a5dad35-be94-49bf-8499-29aef28042d8.fullname" . }}
  labels:
    {{- include "go-echo2a5dad35-be94-49bf-8499-29aef28042d8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2a5dad35-be94-49bf-8499-29aef28042d8.selectorLabels" . | nindent 6 }}
