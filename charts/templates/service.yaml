apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod592189a-bda6-4cab-96d2-423a343ff9c9.fullname" . }}
  labels:
    {{- include "go-echod592189a-bda6-4cab-96d2-423a343ff9c9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod592189a-bda6-4cab-96d2-423a343ff9c9.selectorLabels" . | nindent 6 }}
