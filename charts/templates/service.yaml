apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7a601cea-cb9c-447f-91b0-b93dce8ed9c4.fullname" . }}
  labels:
    {{- include "go-echo7a601cea-cb9c-447f-91b0-b93dce8ed9c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7a601cea-cb9c-447f-91b0-b93dce8ed9c4.selectorLabels" . | nindent 6 }}
