apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoead1228f-1c1a-4010-badc-61e6945762d7.fullname" . }}
  labels:
    {{- include "go-echoead1228f-1c1a-4010-badc-61e6945762d7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoead1228f-1c1a-4010-badc-61e6945762d7.selectorLabels" . | nindent 6 }}
