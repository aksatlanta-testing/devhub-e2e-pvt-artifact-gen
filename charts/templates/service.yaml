apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5a638148-432c-4813-8652-fce503ef611a.fullname" . }}
  labels:
    {{- include "go-echo5a638148-432c-4813-8652-fce503ef611a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5a638148-432c-4813-8652-fce503ef611a.selectorLabels" . | nindent 6 }}
