apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobe5a0ea8-aa30-4595-b777-1b544d620dc0.fullname" . }}
  labels:
    {{- include "go-echobe5a0ea8-aa30-4595-b777-1b544d620dc0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobe5a0ea8-aa30-4595-b777-1b544d620dc0.selectorLabels" . | nindent 6 }}
