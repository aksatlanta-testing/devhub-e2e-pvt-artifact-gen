apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd1982d5-8c6b-4fba-9e14-2d1f1c63efbe.fullname" . }}
  labels:
    {{- include "go-echobd1982d5-8c6b-4fba-9e14-2d1f1c63efbe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd1982d5-8c6b-4fba-9e14-2d1f1c63efbe.selectorLabels" . | nindent 6 }}
