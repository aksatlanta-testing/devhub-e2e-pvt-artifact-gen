apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4cdb28aa-fa5f-401b-91b2-20153fcc5b19.fullname" . }}
  labels:
    {{- include "go-echo4cdb28aa-fa5f-401b-91b2-20153fcc5b19.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4cdb28aa-fa5f-401b-91b2-20153fcc5b19.selectorLabels" . | nindent 6 }}
