apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo903f0d57-b37f-4822-bb4a-0904c3e80f10.fullname" . }}
  labels:
    {{- include "go-echo903f0d57-b37f-4822-bb4a-0904c3e80f10.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo903f0d57-b37f-4822-bb4a-0904c3e80f10.selectorLabels" . | nindent 6 }}
