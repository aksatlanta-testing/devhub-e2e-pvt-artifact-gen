apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo18f5f7fe-3ff6-4354-a4fb-bce0fa57328e.fullname" . }}
  labels:
    {{- include "go-echo18f5f7fe-3ff6-4354-a4fb-bce0fa57328e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo18f5f7fe-3ff6-4354-a4fb-bce0fa57328e.selectorLabels" . | nindent 6 }}
