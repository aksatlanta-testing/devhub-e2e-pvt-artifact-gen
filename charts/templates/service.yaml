apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8dfdac2-08be-473d-a2e1-998e04e71dfe.fullname" . }}
  labels:
    {{- include "go-echoc8dfdac2-08be-473d-a2e1-998e04e71dfe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8dfdac2-08be-473d-a2e1-998e04e71dfe.selectorLabels" . | nindent 6 }}
