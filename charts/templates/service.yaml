apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo868a48b0-5dde-4e9b-8d89-b7820fb2c152.fullname" . }}
  labels:
    {{- include "go-echo868a48b0-5dde-4e9b-8d89-b7820fb2c152.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo868a48b0-5dde-4e9b-8d89-b7820fb2c152.selectorLabels" . | nindent 6 }}
