apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo39e0c21c-b9e2-4cea-b651-09540324f2ea.fullname" . }}
  labels:
    {{- include "go-echo39e0c21c-b9e2-4cea-b651-09540324f2ea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo39e0c21c-b9e2-4cea-b651-09540324f2ea.selectorLabels" . | nindent 6 }}
