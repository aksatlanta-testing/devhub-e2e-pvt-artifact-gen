apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3263c6d9-2842-47f8-aa0b-c6a73b000a53.fullname" . }}
  labels:
    {{- include "go-echo3263c6d9-2842-47f8-aa0b-c6a73b000a53.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3263c6d9-2842-47f8-aa0b-c6a73b000a53.selectorLabels" . | nindent 6 }}
