apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo07e3c024-1d7e-4adf-8dcd-4bbfa83e20d7.fullname" . }}
  labels:
    {{- include "go-echo07e3c024-1d7e-4adf-8dcd-4bbfa83e20d7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo07e3c024-1d7e-4adf-8dcd-4bbfa83e20d7.selectorLabels" . | nindent 6 }}
