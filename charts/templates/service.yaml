apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4efea30e-f47f-41e3-92fc-c98999e1833d.fullname" . }}
  labels:
    {{- include "go-echo4efea30e-f47f-41e3-92fc-c98999e1833d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4efea30e-f47f-41e3-92fc-c98999e1833d.selectorLabels" . | nindent 6 }}
