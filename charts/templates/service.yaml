apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3326f411-2e31-4dce-ab80-98f7291b6034.fullname" . }}
  labels:
    {{- include "go-echo3326f411-2e31-4dce-ab80-98f7291b6034.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3326f411-2e31-4dce-ab80-98f7291b6034.selectorLabels" . | nindent 6 }}
