apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo63081524-00ed-4f7c-8a3b-441be2ce9db1.fullname" . }}
  labels:
    {{- include "go-echo63081524-00ed-4f7c-8a3b-441be2ce9db1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo63081524-00ed-4f7c-8a3b-441be2ce9db1.selectorLabels" . | nindent 6 }}
