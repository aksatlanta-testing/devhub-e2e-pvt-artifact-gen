apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8c59a5ac-e60b-4e92-bf64-c77b40439f22.fullname" . }}
  labels:
    {{- include "go-echo8c59a5ac-e60b-4e92-bf64-c77b40439f22.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8c59a5ac-e60b-4e92-bf64-c77b40439f22.selectorLabels" . | nindent 6 }}
