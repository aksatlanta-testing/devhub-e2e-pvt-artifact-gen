apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8b5aa93e-54c6-4f50-9513-562dceffc916.fullname" . }}
  labels:
    {{- include "go-echo8b5aa93e-54c6-4f50-9513-562dceffc916.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8b5aa93e-54c6-4f50-9513-562dceffc916.selectorLabels" . | nindent 6 }}
