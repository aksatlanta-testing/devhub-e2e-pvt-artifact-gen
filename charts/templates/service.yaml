apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1b9617fb-3ab5-44da-90eb-a65210c8c3c8.fullname" . }}
  labels:
    {{- include "go-echo1b9617fb-3ab5-44da-90eb-a65210c8c3c8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1b9617fb-3ab5-44da-90eb-a65210c8c3c8.selectorLabels" . | nindent 6 }}
