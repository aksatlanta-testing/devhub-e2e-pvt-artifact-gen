apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodad6ad5a-0d97-431b-87d2-b7d7c5de9fcb.fullname" . }}
  labels:
    {{- include "go-echodad6ad5a-0d97-431b-87d2-b7d7c5de9fcb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodad6ad5a-0d97-431b-87d2-b7d7c5de9fcb.selectorLabels" . | nindent 6 }}
