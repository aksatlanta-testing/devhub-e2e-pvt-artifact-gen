apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8da98ae1-0e2a-4685-9552-e0dd9a2b2638.fullname" . }}
  labels:
    {{- include "go-echo8da98ae1-0e2a-4685-9552-e0dd9a2b2638.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8da98ae1-0e2a-4685-9552-e0dd9a2b2638.selectorLabels" . | nindent 6 }}
