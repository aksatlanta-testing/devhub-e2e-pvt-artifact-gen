apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo55fa0c84-cd22-4b39-9380-f12c4f905a3d.fullname" . }}
  labels:
    {{- include "go-echo55fa0c84-cd22-4b39-9380-f12c4f905a3d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo55fa0c84-cd22-4b39-9380-f12c4f905a3d.selectorLabels" . | nindent 6 }}
