apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo41715b86-c788-4f9e-87e5-7eb8f52dbe3b.fullname" . }}
  labels:
    {{- include "go-echo41715b86-c788-4f9e-87e5-7eb8f52dbe3b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo41715b86-c788-4f9e-87e5-7eb8f52dbe3b.selectorLabels" . | nindent 6 }}
