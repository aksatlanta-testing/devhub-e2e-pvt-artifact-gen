apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo094d59c3-f465-446a-8e67-f25276610cb7.fullname" . }}
  labels:
    {{- include "go-echo094d59c3-f465-446a-8e67-f25276610cb7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo094d59c3-f465-446a-8e67-f25276610cb7.selectorLabels" . | nindent 6 }}
