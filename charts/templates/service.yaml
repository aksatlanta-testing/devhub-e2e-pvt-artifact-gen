apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofb2536f3-0478-4681-868e-a025d81ca01a.fullname" . }}
  labels:
    {{- include "go-echofb2536f3-0478-4681-868e-a025d81ca01a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofb2536f3-0478-4681-868e-a025d81ca01a.selectorLabels" . | nindent 6 }}
