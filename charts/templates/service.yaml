apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa902def1-b1ed-4577-a863-2d0e21292d67.fullname" . }}
  labels:
    {{- include "go-echoa902def1-b1ed-4577-a863-2d0e21292d67.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa902def1-b1ed-4577-a863-2d0e21292d67.selectorLabels" . | nindent 6 }}
