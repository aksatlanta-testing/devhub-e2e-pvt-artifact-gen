apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo681bd3c8-fafb-4c4e-a1a9-a5fcab4b3d65.fullname" . }}
  labels:
    {{- include "go-echo681bd3c8-fafb-4c4e-a1a9-a5fcab4b3d65.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo681bd3c8-fafb-4c4e-a1a9-a5fcab4b3d65.selectorLabels" . | nindent 6 }}
