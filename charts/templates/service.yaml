apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b75837b-ced1-4c78-b37b-a2ca199d7d99.fullname" . }}
  labels:
    {{- include "go-echo0b75837b-ced1-4c78-b37b-a2ca199d7d99.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b75837b-ced1-4c78-b37b-a2ca199d7d99.selectorLabels" . | nindent 6 }}
