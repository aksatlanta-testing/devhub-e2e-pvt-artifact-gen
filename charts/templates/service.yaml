apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod86f6dbb-9af0-480f-ab7b-5ec8a16e3869.fullname" . }}
  labels:
    {{- include "go-echod86f6dbb-9af0-480f-ab7b-5ec8a16e3869.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod86f6dbb-9af0-480f-ab7b-5ec8a16e3869.selectorLabels" . | nindent 6 }}
