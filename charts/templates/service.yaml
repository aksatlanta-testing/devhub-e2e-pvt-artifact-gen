apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocf758902-f251-4e86-986b-a295f7b6aa8f.fullname" . }}
  labels:
    {{- include "go-echocf758902-f251-4e86-986b-a295f7b6aa8f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocf758902-f251-4e86-986b-a295f7b6aa8f.selectorLabels" . | nindent 6 }}
