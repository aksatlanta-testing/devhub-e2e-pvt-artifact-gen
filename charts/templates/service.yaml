apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe887265e-3f05-4933-a892-f8510b37dfa1.fullname" . }}
  labels:
    {{- include "go-echoe887265e-3f05-4933-a892-f8510b37dfa1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe887265e-3f05-4933-a892-f8510b37dfa1.selectorLabels" . | nindent 6 }}
