apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4ebed8ed-4ac8-487d-a315-d1271bc1661c.fullname" . }}
  labels:
    {{- include "go-echo4ebed8ed-4ac8-487d-a315-d1271bc1661c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4ebed8ed-4ac8-487d-a315-d1271bc1661c.selectorLabels" . | nindent 6 }}
