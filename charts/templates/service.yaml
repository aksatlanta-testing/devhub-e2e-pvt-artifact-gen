apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc35f92d9-857d-4e0c-9ae3-8a2f62520153.fullname" . }}
  labels:
    {{- include "go-echoc35f92d9-857d-4e0c-9ae3-8a2f62520153.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc35f92d9-857d-4e0c-9ae3-8a2f62520153.selectorLabels" . | nindent 6 }}
