apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc4ca16f7-1dd7-43ca-828c-bea41b7e2124.fullname" . }}
  labels:
    {{- include "go-echoc4ca16f7-1dd7-43ca-828c-bea41b7e2124.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc4ca16f7-1dd7-43ca-828c-bea41b7e2124.selectorLabels" . | nindent 6 }}
