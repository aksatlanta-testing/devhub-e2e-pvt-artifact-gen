apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod69c0497-8e81-4615-8a71-ed12c3aa0ca8.fullname" . }}
  labels:
    {{- include "go-echod69c0497-8e81-4615-8a71-ed12c3aa0ca8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod69c0497-8e81-4615-8a71-ed12c3aa0ca8.selectorLabels" . | nindent 6 }}
