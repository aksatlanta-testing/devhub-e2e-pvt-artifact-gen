apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod42e83b4-506e-4a42-9dd0-aa73a3be383b.fullname" . }}
  labels:
    {{- include "go-echod42e83b4-506e-4a42-9dd0-aa73a3be383b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod42e83b4-506e-4a42-9dd0-aa73a3be383b.selectorLabels" . | nindent 6 }}
