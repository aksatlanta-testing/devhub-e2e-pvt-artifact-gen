apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofd3cfa11-5e95-4f38-83fc-a95db44f2efd.fullname" . }}
  labels:
    {{- include "go-echofd3cfa11-5e95-4f38-83fc-a95db44f2efd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofd3cfa11-5e95-4f38-83fc-a95db44f2efd.selectorLabels" . | nindent 6 }}
