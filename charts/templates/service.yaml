apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo425696e8-9b2d-40d1-b375-8a0dd10e91d1.fullname" . }}
  labels:
    {{- include "go-echo425696e8-9b2d-40d1-b375-8a0dd10e91d1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo425696e8-9b2d-40d1-b375-8a0dd10e91d1.selectorLabels" . | nindent 6 }}
