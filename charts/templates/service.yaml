apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo13fb4f46-fc8a-4e68-9ac8-430c582e2481.fullname" . }}
  labels:
    {{- include "go-echo13fb4f46-fc8a-4e68-9ac8-430c582e2481.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo13fb4f46-fc8a-4e68-9ac8-430c582e2481.selectorLabels" . | nindent 6 }}
