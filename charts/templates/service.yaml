apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo82cfa29a-a130-4ad0-8064-6d7140e545b7.fullname" . }}
  labels:
    {{- include "go-echo82cfa29a-a130-4ad0-8064-6d7140e545b7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo82cfa29a-a130-4ad0-8064-6d7140e545b7.selectorLabels" . | nindent 6 }}
