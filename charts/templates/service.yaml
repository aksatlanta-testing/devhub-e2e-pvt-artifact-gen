apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo518bd1df-a625-4a2b-bbc0-ae2db1b7e146.fullname" . }}
  labels:
    {{- include "go-echo518bd1df-a625-4a2b-bbc0-ae2db1b7e146.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo518bd1df-a625-4a2b-bbc0-ae2db1b7e146.selectorLabels" . | nindent 6 }}
