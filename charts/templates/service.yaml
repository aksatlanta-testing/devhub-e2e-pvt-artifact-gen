apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2178a646-8c50-4187-9a11-5643f21a441e.fullname" . }}
  labels:
    {{- include "go-echo2178a646-8c50-4187-9a11-5643f21a441e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2178a646-8c50-4187-9a11-5643f21a441e.selectorLabels" . | nindent 6 }}
