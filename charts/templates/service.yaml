apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7388e3cf-f80f-403a-bf23-e6a6a7f6cb21.fullname" . }}
  labels:
    {{- include "go-echo7388e3cf-f80f-403a-bf23-e6a6a7f6cb21.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7388e3cf-f80f-403a-bf23-e6a6a7f6cb21.selectorLabels" . | nindent 6 }}
