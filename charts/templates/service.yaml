apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5677958f-29a9-47cd-a78c-1c432d407852.fullname" . }}
  labels:
    {{- include "go-echo5677958f-29a9-47cd-a78c-1c432d407852.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5677958f-29a9-47cd-a78c-1c432d407852.selectorLabels" . | nindent 6 }}
