apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc45d89c2-7a30-43ee-b8e3-1fde8bc85461.fullname" . }}
  labels:
    {{- include "go-echoc45d89c2-7a30-43ee-b8e3-1fde8bc85461.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc45d89c2-7a30-43ee-b8e3-1fde8bc85461.selectorLabels" . | nindent 6 }}
