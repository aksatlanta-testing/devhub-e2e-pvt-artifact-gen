apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2fac76ce-d9bf-419a-84cb-09cc6893c423.fullname" . }}
  labels:
    {{- include "go-echo2fac76ce-d9bf-419a-84cb-09cc6893c423.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2fac76ce-d9bf-419a-84cb-09cc6893c423.selectorLabels" . | nindent 6 }}
