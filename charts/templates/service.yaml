apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof339ea27-09db-461d-a3e4-c7f5e8e62c6f.fullname" . }}
  labels:
    {{- include "go-echof339ea27-09db-461d-a3e4-c7f5e8e62c6f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof339ea27-09db-461d-a3e4-c7f5e8e62c6f.selectorLabels" . | nindent 6 }}
