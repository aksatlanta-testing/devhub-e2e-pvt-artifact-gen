apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9d48067d-448f-4b0f-b5a3-ba27cfb68a79.fullname" . }}
  labels:
    {{- include "go-echo9d48067d-448f-4b0f-b5a3-ba27cfb68a79.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9d48067d-448f-4b0f-b5a3-ba27cfb68a79.selectorLabels" . | nindent 6 }}
