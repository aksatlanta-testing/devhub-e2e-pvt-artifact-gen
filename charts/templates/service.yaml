apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob8d1c2cf-064c-4b43-972c-d61897880214.fullname" . }}
  labels:
    {{- include "go-echob8d1c2cf-064c-4b43-972c-d61897880214.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob8d1c2cf-064c-4b43-972c-d61897880214.selectorLabels" . | nindent 6 }}
