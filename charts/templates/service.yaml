apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo90a20137-a77b-432c-90b0-03ee25340be0.fullname" . }}
  labels:
    {{- include "go-echo90a20137-a77b-432c-90b0-03ee25340be0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo90a20137-a77b-432c-90b0-03ee25340be0.selectorLabels" . | nindent 6 }}
