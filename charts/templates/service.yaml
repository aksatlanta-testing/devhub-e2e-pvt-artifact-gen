apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe7bb8105-08f8-486f-9e5f-0a7b47a7b3ab.fullname" . }}
  labels:
    {{- include "go-echoe7bb8105-08f8-486f-9e5f-0a7b47a7b3ab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe7bb8105-08f8-486f-9e5f-0a7b47a7b3ab.selectorLabels" . | nindent 6 }}
