apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocb97bbfd-b0f5-4cf0-a3d5-86bbfca31b81.fullname" . }}
  labels:
    {{- include "go-echocb97bbfd-b0f5-4cf0-a3d5-86bbfca31b81.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocb97bbfd-b0f5-4cf0-a3d5-86bbfca31b81.selectorLabels" . | nindent 6 }}
