apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8dd1bbba-fd6b-45c0-9cad-7324c097594f.fullname" . }}
  labels:
    {{- include "go-echo8dd1bbba-fd6b-45c0-9cad-7324c097594f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8dd1bbba-fd6b-45c0-9cad-7324c097594f.selectorLabels" . | nindent 6 }}
