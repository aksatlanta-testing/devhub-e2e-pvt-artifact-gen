apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa90ca421-1a7f-48e3-bb95-c4703aa6a92b.fullname" . }}
  labels:
    {{- include "go-echoa90ca421-1a7f-48e3-bb95-c4703aa6a92b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa90ca421-1a7f-48e3-bb95-c4703aa6a92b.selectorLabels" . | nindent 6 }}
