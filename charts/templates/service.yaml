apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7faef075-feb5-4409-9685-27a716add030.fullname" . }}
  labels:
    {{- include "go-echo7faef075-feb5-4409-9685-27a716add030.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7faef075-feb5-4409-9685-27a716add030.selectorLabels" . | nindent 6 }}
