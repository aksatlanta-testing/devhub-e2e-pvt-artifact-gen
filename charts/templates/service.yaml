apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe82e713b-fdb9-4414-9850-0a57c8e57cef.fullname" . }}
  labels:
    {{- include "go-echoe82e713b-fdb9-4414-9850-0a57c8e57cef.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe82e713b-fdb9-4414-9850-0a57c8e57cef.selectorLabels" . | nindent 6 }}
