apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo28355050-d270-43c7-a263-7255c7f729b1.fullname" . }}
  labels:
    {{- include "go-echo28355050-d270-43c7-a263-7255c7f729b1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo28355050-d270-43c7-a263-7255c7f729b1.selectorLabels" . | nindent 6 }}
