apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo01f17a28-e4bc-4c58-8aba-ac909ec4f2fc.fullname" . }}
  labels:
    {{- include "go-echo01f17a28-e4bc-4c58-8aba-ac909ec4f2fc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo01f17a28-e4bc-4c58-8aba-ac909ec4f2fc.selectorLabels" . | nindent 6 }}
