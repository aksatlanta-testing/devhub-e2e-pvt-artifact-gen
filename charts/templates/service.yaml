apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof42353b3-95c2-4a62-a54f-cf618ca8d1ec.fullname" . }}
  labels:
    {{- include "go-echof42353b3-95c2-4a62-a54f-cf618ca8d1ec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof42353b3-95c2-4a62-a54f-cf618ca8d1ec.selectorLabels" . | nindent 6 }}
