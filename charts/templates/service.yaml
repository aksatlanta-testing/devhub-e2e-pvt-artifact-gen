apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo366f6405-d9f1-4ae4-ae0d-021601ef1bc4.fullname" . }}
  labels:
    {{- include "go-echo366f6405-d9f1-4ae4-ae0d-021601ef1bc4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo366f6405-d9f1-4ae4-ae0d-021601ef1bc4.selectorLabels" . | nindent 6 }}
