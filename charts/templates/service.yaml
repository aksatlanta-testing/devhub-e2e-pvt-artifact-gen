apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo301fd3c1-dadb-457d-882e-f9519efd9729.fullname" . }}
  labels:
    {{- include "go-echo301fd3c1-dadb-457d-882e-f9519efd9729.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo301fd3c1-dadb-457d-882e-f9519efd9729.selectorLabels" . | nindent 6 }}
