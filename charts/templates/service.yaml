apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof831fbd5-707a-4c1a-b19e-89bf9a9ca1ee.fullname" . }}
  labels:
    {{- include "go-echof831fbd5-707a-4c1a-b19e-89bf9a9ca1ee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof831fbd5-707a-4c1a-b19e-89bf9a9ca1ee.selectorLabels" . | nindent 6 }}
