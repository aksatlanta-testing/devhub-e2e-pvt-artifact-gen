apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo38c57e16-ab81-44e7-9c1d-e54a4071b823.fullname" . }}
  labels:
    {{- include "go-echo38c57e16-ab81-44e7-9c1d-e54a4071b823.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo38c57e16-ab81-44e7-9c1d-e54a4071b823.selectorLabels" . | nindent 6 }}
