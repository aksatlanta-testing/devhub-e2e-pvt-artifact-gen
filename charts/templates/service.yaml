apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoecfebcb9-d92d-4227-ab6e-380fc685fbf7.fullname" . }}
  labels:
    {{- include "go-echoecfebcb9-d92d-4227-ab6e-380fc685fbf7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoecfebcb9-d92d-4227-ab6e-380fc685fbf7.selectorLabels" . | nindent 6 }}
