apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo59522ba0-1589-430c-9a0a-c46eaf4b57f7.fullname" . }}
  labels:
    {{- include "go-echo59522ba0-1589-430c-9a0a-c46eaf4b57f7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo59522ba0-1589-430c-9a0a-c46eaf4b57f7.selectorLabels" . | nindent 6 }}
