apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4be1f4b0-132d-4190-8378-9bab60f622cd.fullname" . }}
  labels:
    {{- include "go-echo4be1f4b0-132d-4190-8378-9bab60f622cd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4be1f4b0-132d-4190-8378-9bab60f622cd.selectorLabels" . | nindent 6 }}
