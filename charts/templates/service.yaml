apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9e6101aa-9378-4357-a157-404a40755c4c.fullname" . }}
  labels:
    {{- include "go-echo9e6101aa-9378-4357-a157-404a40755c4c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9e6101aa-9378-4357-a157-404a40755c4c.selectorLabels" . | nindent 6 }}
