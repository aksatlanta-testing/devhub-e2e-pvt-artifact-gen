apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe6f09f1e-7027-4154-8841-61cb0646aacf.fullname" . }}
  labels:
    {{- include "go-echoe6f09f1e-7027-4154-8841-61cb0646aacf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe6f09f1e-7027-4154-8841-61cb0646aacf.selectorLabels" . | nindent 6 }}
