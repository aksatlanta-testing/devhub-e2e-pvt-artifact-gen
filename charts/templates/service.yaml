apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa46d19ec-90a1-48b0-8fdd-2872b34be07d.fullname" . }}
  labels:
    {{- include "go-echoa46d19ec-90a1-48b0-8fdd-2872b34be07d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa46d19ec-90a1-48b0-8fdd-2872b34be07d.selectorLabels" . | nindent 6 }}
