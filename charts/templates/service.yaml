apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocaf4b0a9-5606-47af-8206-681def4c1007.fullname" . }}
  labels:
    {{- include "go-echocaf4b0a9-5606-47af-8206-681def4c1007.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocaf4b0a9-5606-47af-8206-681def4c1007.selectorLabels" . | nindent 6 }}
