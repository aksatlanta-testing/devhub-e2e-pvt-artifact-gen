apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobafdccaa-6b85-44fc-a14d-418653dacbd0.fullname" . }}
  labels:
    {{- include "go-echobafdccaa-6b85-44fc-a14d-418653dacbd0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobafdccaa-6b85-44fc-a14d-418653dacbd0.selectorLabels" . | nindent 6 }}
