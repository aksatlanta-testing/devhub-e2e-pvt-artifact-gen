apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo780c6985-2124-496c-8d35-256a004bd48f.fullname" . }}
  labels:
    {{- include "go-echo780c6985-2124-496c-8d35-256a004bd48f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo780c6985-2124-496c-8d35-256a004bd48f.selectorLabels" . | nindent 6 }}
