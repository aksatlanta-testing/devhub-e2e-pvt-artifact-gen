apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4021f4ae-e401-47ac-8819-b7e6f63d2c98.fullname" . }}
  labels:
    {{- include "go-echo4021f4ae-e401-47ac-8819-b7e6f63d2c98.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4021f4ae-e401-47ac-8819-b7e6f63d2c98.selectorLabels" . | nindent 6 }}
