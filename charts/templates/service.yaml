apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6717f565-0e08-427f-a625-20565901336b.fullname" . }}
  labels:
    {{- include "go-echo6717f565-0e08-427f-a625-20565901336b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6717f565-0e08-427f-a625-20565901336b.selectorLabels" . | nindent 6 }}
