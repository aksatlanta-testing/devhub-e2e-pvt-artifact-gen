apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob4796ab9-574c-487a-911a-cdce14d0e29d.fullname" . }}
  labels:
    {{- include "go-echob4796ab9-574c-487a-911a-cdce14d0e29d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob4796ab9-574c-487a-911a-cdce14d0e29d.selectorLabels" . | nindent 6 }}
