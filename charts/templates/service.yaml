apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe3aa9072-a580-4fd3-a9a2-4ace2eb84af9.fullname" . }}
  labels:
    {{- include "go-echoe3aa9072-a580-4fd3-a9a2-4ace2eb84af9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe3aa9072-a580-4fd3-a9a2-4ace2eb84af9.selectorLabels" . | nindent 6 }}
