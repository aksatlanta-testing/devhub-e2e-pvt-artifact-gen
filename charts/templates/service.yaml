apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod9ea261d-9e9b-4e9f-92c7-af17dc70531d.fullname" . }}
  labels:
    {{- include "go-echod9ea261d-9e9b-4e9f-92c7-af17dc70531d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod9ea261d-9e9b-4e9f-92c7-af17dc70531d.selectorLabels" . | nindent 6 }}
