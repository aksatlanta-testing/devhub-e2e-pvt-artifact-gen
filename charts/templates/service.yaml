apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod1d98d9f-b6f2-42b0-a6b0-9616a92c0dec.fullname" . }}
  labels:
    {{- include "go-echod1d98d9f-b6f2-42b0-a6b0-9616a92c0dec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod1d98d9f-b6f2-42b0-a6b0-9616a92c0dec.selectorLabels" . | nindent 6 }}
