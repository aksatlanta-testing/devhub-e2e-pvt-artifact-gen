apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo693937c9-66a8-4587-b626-b8429eb5f7ec.fullname" . }}
  labels:
    {{- include "go-echo693937c9-66a8-4587-b626-b8429eb5f7ec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo693937c9-66a8-4587-b626-b8429eb5f7ec.selectorLabels" . | nindent 6 }}
