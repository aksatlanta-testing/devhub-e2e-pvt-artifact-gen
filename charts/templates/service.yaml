apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04689289-98af-4ae3-a0c1-6855a9fe747f.fullname" . }}
  labels:
    {{- include "go-echo04689289-98af-4ae3-a0c1-6855a9fe747f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04689289-98af-4ae3-a0c1-6855a9fe747f.selectorLabels" . | nindent 6 }}
