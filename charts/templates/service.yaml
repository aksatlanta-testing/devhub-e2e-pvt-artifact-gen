apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo698ddc27-8ea7-4caa-ad5d-132d4c8f5317.fullname" . }}
  labels:
    {{- include "go-echo698ddc27-8ea7-4caa-ad5d-132d4c8f5317.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo698ddc27-8ea7-4caa-ad5d-132d4c8f5317.selectorLabels" . | nindent 6 }}
