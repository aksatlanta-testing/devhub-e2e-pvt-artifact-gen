apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo34bfcc8c-25f2-4306-b818-0636fca90b39.fullname" . }}
  labels:
    {{- include "go-echo34bfcc8c-25f2-4306-b818-0636fca90b39.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo34bfcc8c-25f2-4306-b818-0636fca90b39.selectorLabels" . | nindent 6 }}
