apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo028abf08-9b96-4150-8dac-4fd58a71e148.fullname" . }}
  labels:
    {{- include "go-echo028abf08-9b96-4150-8dac-4fd58a71e148.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo028abf08-9b96-4150-8dac-4fd58a71e148.selectorLabels" . | nindent 6 }}
