apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo415edf57-cd6c-4366-87ce-cb947343e0ee.fullname" . }}
  labels:
    {{- include "go-echo415edf57-cd6c-4366-87ce-cb947343e0ee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo415edf57-cd6c-4366-87ce-cb947343e0ee.selectorLabels" . | nindent 6 }}
