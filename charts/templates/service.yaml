apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo61714299-826e-4a2b-91c7-e4a0543cb4d2.fullname" . }}
  labels:
    {{- include "go-echo61714299-826e-4a2b-91c7-e4a0543cb4d2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo61714299-826e-4a2b-91c7-e4a0543cb4d2.selectorLabels" . | nindent 6 }}
