apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocb05bd7e-0079-43cd-a791-9282f5e78954.fullname" . }}
  labels:
    {{- include "go-echocb05bd7e-0079-43cd-a791-9282f5e78954.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocb05bd7e-0079-43cd-a791-9282f5e78954.selectorLabels" . | nindent 6 }}
