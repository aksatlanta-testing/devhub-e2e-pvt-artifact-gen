apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2b24b15e-15b1-4013-a02f-c0610d7b24b8.fullname" . }}
  labels:
    {{- include "go-echo2b24b15e-15b1-4013-a02f-c0610d7b24b8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2b24b15e-15b1-4013-a02f-c0610d7b24b8.selectorLabels" . | nindent 6 }}
