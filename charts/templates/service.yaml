apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc5adf0d4-c0f1-4940-9a3f-78133a19ac14.fullname" . }}
  labels:
    {{- include "go-echoc5adf0d4-c0f1-4940-9a3f-78133a19ac14.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc5adf0d4-c0f1-4940-9a3f-78133a19ac14.selectorLabels" . | nindent 6 }}
