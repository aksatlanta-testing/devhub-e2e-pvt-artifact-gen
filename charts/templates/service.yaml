apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe0f287b9-1a16-449d-93e6-663cda4d7bf8.fullname" . }}
  labels:
    {{- include "go-echoe0f287b9-1a16-449d-93e6-663cda4d7bf8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe0f287b9-1a16-449d-93e6-663cda4d7bf8.selectorLabels" . | nindent 6 }}
