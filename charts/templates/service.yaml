apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoeaf078ca-427f-4a90-9855-bc0c70267698.fullname" . }}
  labels:
    {{- include "go-echoeaf078ca-427f-4a90-9855-bc0c70267698.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoeaf078ca-427f-4a90-9855-bc0c70267698.selectorLabels" . | nindent 6 }}
