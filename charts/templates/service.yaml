apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo157e9180-6525-4163-b87a-b50013cd1247.fullname" . }}
  labels:
    {{- include "go-echo157e9180-6525-4163-b87a-b50013cd1247.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo157e9180-6525-4163-b87a-b50013cd1247.selectorLabels" . | nindent 6 }}
