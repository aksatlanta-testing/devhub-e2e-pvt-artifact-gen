apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa4f784b1-52fc-4d3c-9a55-d4d833d2826d.fullname" . }}
  labels:
    {{- include "go-echoa4f784b1-52fc-4d3c-9a55-d4d833d2826d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa4f784b1-52fc-4d3c-9a55-d4d833d2826d.selectorLabels" . | nindent 6 }}
