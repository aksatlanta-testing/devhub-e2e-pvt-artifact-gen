apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo85aeb966-9b15-47e5-9488-6bd1710119bb.fullname" . }}
  labels:
    {{- include "go-echo85aeb966-9b15-47e5-9488-6bd1710119bb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo85aeb966-9b15-47e5-9488-6bd1710119bb.selectorLabels" . | nindent 6 }}
