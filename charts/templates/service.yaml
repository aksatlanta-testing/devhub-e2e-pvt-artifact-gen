apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo215c2d97-42e7-4f01-9f31-477a1083d039.fullname" . }}
  labels:
    {{- include "go-echo215c2d97-42e7-4f01-9f31-477a1083d039.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo215c2d97-42e7-4f01-9f31-477a1083d039.selectorLabels" . | nindent 6 }}
