apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob528b3e6-c5f0-47a4-9b66-01a6468cf4dc.fullname" . }}
  labels:
    {{- include "go-echob528b3e6-c5f0-47a4-9b66-01a6468cf4dc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob528b3e6-c5f0-47a4-9b66-01a6468cf4dc.selectorLabels" . | nindent 6 }}
