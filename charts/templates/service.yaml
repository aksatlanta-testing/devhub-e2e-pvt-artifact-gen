apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc6dbea8a-ca8b-4b98-b1dd-ac4e99436023.fullname" . }}
  labels:
    {{- include "go-echoc6dbea8a-ca8b-4b98-b1dd-ac4e99436023.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc6dbea8a-ca8b-4b98-b1dd-ac4e99436023.selectorLabels" . | nindent 6 }}
