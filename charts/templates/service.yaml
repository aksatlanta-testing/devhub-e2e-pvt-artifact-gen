apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo913b8438-b364-4032-881d-dee7dff39350.fullname" . }}
  labels:
    {{- include "go-echo913b8438-b364-4032-881d-dee7dff39350.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo913b8438-b364-4032-881d-dee7dff39350.selectorLabels" . | nindent 6 }}
