apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3a64d927-1436-42b2-ace8-9151a3771f3e.fullname" . }}
  labels:
    {{- include "go-echo3a64d927-1436-42b2-ace8-9151a3771f3e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3a64d927-1436-42b2-ace8-9151a3771f3e.selectorLabels" . | nindent 6 }}
