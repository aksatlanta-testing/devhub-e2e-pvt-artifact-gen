apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6a5f75b6-9bad-49e6-b4a8-81b1cf44542c.fullname" . }}
  labels:
    {{- include "go-echo6a5f75b6-9bad-49e6-b4a8-81b1cf44542c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6a5f75b6-9bad-49e6-b4a8-81b1cf44542c.selectorLabels" . | nindent 6 }}
