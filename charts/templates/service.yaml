apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2bf0e901-863f-4156-a9af-3f4f564d0de0.fullname" . }}
  labels:
    {{- include "go-echo2bf0e901-863f-4156-a9af-3f4f564d0de0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2bf0e901-863f-4156-a9af-3f4f564d0de0.selectorLabels" . | nindent 6 }}
