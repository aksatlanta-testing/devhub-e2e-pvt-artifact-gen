apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa2518887-5476-45ba-862d-1e9e378b7f96.fullname" . }}
  labels:
    {{- include "go-echoa2518887-5476-45ba-862d-1e9e378b7f96.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa2518887-5476-45ba-862d-1e9e378b7f96.selectorLabels" . | nindent 6 }}
