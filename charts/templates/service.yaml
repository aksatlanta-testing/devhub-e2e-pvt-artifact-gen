apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobf6c5b66-aff6-4cf1-acc1-d36fdf6afbc1.fullname" . }}
  labels:
    {{- include "go-echobf6c5b66-aff6-4cf1-acc1-d36fdf6afbc1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobf6c5b66-aff6-4cf1-acc1-d36fdf6afbc1.selectorLabels" . | nindent 6 }}
