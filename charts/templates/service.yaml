apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobb9e095c-158c-43e3-96c7-15fecba7bc55.fullname" . }}
  labels:
    {{- include "go-echobb9e095c-158c-43e3-96c7-15fecba7bc55.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobb9e095c-158c-43e3-96c7-15fecba7bc55.selectorLabels" . | nindent 6 }}
