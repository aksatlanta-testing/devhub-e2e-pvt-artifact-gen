apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc5f2291c-1a5c-4f11-9a7a-e835adb75efe.fullname" . }}
  labels:
    {{- include "go-echoc5f2291c-1a5c-4f11-9a7a-e835adb75efe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc5f2291c-1a5c-4f11-9a7a-e835adb75efe.selectorLabels" . | nindent 6 }}
