apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoddab9ddb-43c5-4701-a159-98fc0b4fbafb.fullname" . }}
  labels:
    {{- include "go-echoddab9ddb-43c5-4701-a159-98fc0b4fbafb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoddab9ddb-43c5-4701-a159-98fc0b4fbafb.selectorLabels" . | nindent 6 }}
