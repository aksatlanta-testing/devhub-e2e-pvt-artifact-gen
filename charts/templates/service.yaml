apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod7c5c774-489f-4c12-912c-7e0043b1bed2.fullname" . }}
  labels:
    {{- include "go-echod7c5c774-489f-4c12-912c-7e0043b1bed2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod7c5c774-489f-4c12-912c-7e0043b1bed2.selectorLabels" . | nindent 6 }}
