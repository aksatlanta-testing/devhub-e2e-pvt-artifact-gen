apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6f9ef073-5af3-4670-be88-1afb5bb0a6dc.fullname" . }}
  labels:
    {{- include "go-echo6f9ef073-5af3-4670-be88-1afb5bb0a6dc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6f9ef073-5af3-4670-be88-1afb5bb0a6dc.selectorLabels" . | nindent 6 }}
