apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoed13cf28-b5fa-4d4b-8921-9ea46a03d1f5.fullname" . }}
  labels:
    {{- include "go-echoed13cf28-b5fa-4d4b-8921-9ea46a03d1f5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoed13cf28-b5fa-4d4b-8921-9ea46a03d1f5.selectorLabels" . | nindent 6 }}
