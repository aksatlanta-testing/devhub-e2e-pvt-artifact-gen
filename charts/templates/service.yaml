apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc76fd730-efae-49ec-8068-91e96326db1e.fullname" . }}
  labels:
    {{- include "go-echoc76fd730-efae-49ec-8068-91e96326db1e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc76fd730-efae-49ec-8068-91e96326db1e.selectorLabels" . | nindent 6 }}
