apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob9b93341-58f2-40fb-ad6c-1de2d479798f.fullname" . }}
  labels:
    {{- include "go-echob9b93341-58f2-40fb-ad6c-1de2d479798f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob9b93341-58f2-40fb-ad6c-1de2d479798f.selectorLabels" . | nindent 6 }}
