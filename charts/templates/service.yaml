apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocf8279c5-94a7-429e-ba16-8dfd4eb4c466.fullname" . }}
  labels:
    {{- include "go-echocf8279c5-94a7-429e-ba16-8dfd4eb4c466.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocf8279c5-94a7-429e-ba16-8dfd4eb4c466.selectorLabels" . | nindent 6 }}
