apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4fb28425-85f7-46c8-bc34-79241db520af.fullname" . }}
  labels:
    {{- include "go-echo4fb28425-85f7-46c8-bc34-79241db520af.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4fb28425-85f7-46c8-bc34-79241db520af.selectorLabels" . | nindent 6 }}
