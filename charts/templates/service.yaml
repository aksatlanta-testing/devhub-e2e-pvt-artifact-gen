apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3a8672cf-6825-4284-bcf2-48ca62747ad7.fullname" . }}
  labels:
    {{- include "go-echo3a8672cf-6825-4284-bcf2-48ca62747ad7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3a8672cf-6825-4284-bcf2-48ca62747ad7.selectorLabels" . | nindent 6 }}
