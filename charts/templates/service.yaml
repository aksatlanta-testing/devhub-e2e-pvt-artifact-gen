apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodc136c42-885f-4119-8a6d-d24016cb220d.fullname" . }}
  labels:
    {{- include "go-echodc136c42-885f-4119-8a6d-d24016cb220d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodc136c42-885f-4119-8a6d-d24016cb220d.selectorLabels" . | nindent 6 }}
