apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf300f80-819a-4aa1-a368-f8e9e661ca1b.fullname" . }}
  labels:
    {{- include "go-echoaf300f80-819a-4aa1-a368-f8e9e661ca1b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf300f80-819a-4aa1-a368-f8e9e661ca1b.selectorLabels" . | nindent 6 }}
