apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1699691b-acae-4f76-b3d1-590936bda84e.fullname" . }}
  labels:
    {{- include "go-echo1699691b-acae-4f76-b3d1-590936bda84e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1699691b-acae-4f76-b3d1-590936bda84e.selectorLabels" . | nindent 6 }}
