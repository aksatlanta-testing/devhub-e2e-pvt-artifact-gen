apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0a1feaf1-e98b-4c9c-b743-feac8bbd14f6.fullname" . }}
  labels:
    {{- include "go-echo0a1feaf1-e98b-4c9c-b743-feac8bbd14f6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0a1feaf1-e98b-4c9c-b743-feac8bbd14f6.selectorLabels" . | nindent 6 }}
