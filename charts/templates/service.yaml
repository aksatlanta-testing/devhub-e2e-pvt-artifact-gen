apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo93f6157b-cbdc-4e6f-bc4a-5a308c44668a.fullname" . }}
  labels:
    {{- include "go-echo93f6157b-cbdc-4e6f-bc4a-5a308c44668a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo93f6157b-cbdc-4e6f-bc4a-5a308c44668a.selectorLabels" . | nindent 6 }}
