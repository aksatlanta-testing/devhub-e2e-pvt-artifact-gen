apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc8c29558-2879-47ff-a4bd-8f65b4f57cf6.fullname" . }}
  labels:
    {{- include "go-echoc8c29558-2879-47ff-a4bd-8f65b4f57cf6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc8c29558-2879-47ff-a4bd-8f65b4f57cf6.selectorLabels" . | nindent 6 }}
