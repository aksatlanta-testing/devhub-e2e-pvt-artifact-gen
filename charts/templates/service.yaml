apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo538dec4f-5fae-4f4c-bb07-674f839cc77d.fullname" . }}
  labels:
    {{- include "go-echo538dec4f-5fae-4f4c-bb07-674f839cc77d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo538dec4f-5fae-4f4c-bb07-674f839cc77d.selectorLabels" . | nindent 6 }}
