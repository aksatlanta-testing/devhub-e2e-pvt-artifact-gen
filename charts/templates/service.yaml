apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5fcfbb69-bab8-43a1-8a6d-ecb5dc357442.fullname" . }}
  labels:
    {{- include "go-echo5fcfbb69-bab8-43a1-8a6d-ecb5dc357442.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5fcfbb69-bab8-43a1-8a6d-ecb5dc357442.selectorLabels" . | nindent 6 }}
