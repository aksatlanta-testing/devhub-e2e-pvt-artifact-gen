apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo769ff41a-571d-4022-97b5-8b0e87f5e63f.fullname" . }}
  labels:
    {{- include "go-echo769ff41a-571d-4022-97b5-8b0e87f5e63f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo769ff41a-571d-4022-97b5-8b0e87f5e63f.selectorLabels" . | nindent 6 }}
