apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod3edd038-aed6-443a-99db-755e95d29981.fullname" . }}
  labels:
    {{- include "go-echod3edd038-aed6-443a-99db-755e95d29981.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
