apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe78a2041-2439-4946-82c7-1377d4357fce.fullname" . }}
  labels:
    {{- include "go-echoe78a2041-2439-4946-82c7-1377d4357fce.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe78a2041-2439-4946-82c7-1377d4357fce.selectorLabels" . | nindent 6 }}
