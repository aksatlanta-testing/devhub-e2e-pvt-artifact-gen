apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofa2017e4-bd72-4a0d-80c2-83a489056528.fullname" . }}
  labels:
    {{- include "go-echofa2017e4-bd72-4a0d-80c2-83a489056528.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofa2017e4-bd72-4a0d-80c2-83a489056528.selectorLabels" . | nindent 6 }}
