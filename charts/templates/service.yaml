apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo72e26e56-fe20-42b8-a0a3-b56e06cd576a.fullname" . }}
  labels:
    {{- include "go-echo72e26e56-fe20-42b8-a0a3-b56e06cd576a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo72e26e56-fe20-42b8-a0a3-b56e06cd576a.selectorLabels" . | nindent 6 }}
