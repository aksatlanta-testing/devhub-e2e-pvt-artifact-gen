apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa9828711-cf56-4258-8554-dded02ae3fe7.fullname" . }}
  labels:
    {{- include "go-echoa9828711-cf56-4258-8554-dded02ae3fe7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa9828711-cf56-4258-8554-dded02ae3fe7.selectorLabels" . | nindent 6 }}
