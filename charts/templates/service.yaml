apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa9b547ae-cf50-4c45-8146-0cf72b70fc2d.fullname" . }}
  labels:
    {{- include "go-echoa9b547ae-cf50-4c45-8146-0cf72b70fc2d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa9b547ae-cf50-4c45-8146-0cf72b70fc2d.selectorLabels" . | nindent 6 }}
