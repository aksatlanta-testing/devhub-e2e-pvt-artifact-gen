apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo40941ceb-aa55-4fb0-8412-7c2e33090914.fullname" . }}
  labels:
    {{- include "go-echo40941ceb-aa55-4fb0-8412-7c2e33090914.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo40941ceb-aa55-4fb0-8412-7c2e33090914.selectorLabels" . | nindent 6 }}
