apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5bd9e925-2348-45ca-b823-58ac8cdbf7eb.fullname" . }}
  labels:
    {{- include "go-echo5bd9e925-2348-45ca-b823-58ac8cdbf7eb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5bd9e925-2348-45ca-b823-58ac8cdbf7eb.selectorLabels" . | nindent 6 }}
