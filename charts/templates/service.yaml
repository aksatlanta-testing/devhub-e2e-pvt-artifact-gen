apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofc792002-b6c6-495e-9875-ae3297c83dd1.fullname" . }}
  labels:
    {{- include "go-echofc792002-b6c6-495e-9875-ae3297c83dd1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofc792002-b6c6-495e-9875-ae3297c83dd1.selectorLabels" . | nindent 6 }}
