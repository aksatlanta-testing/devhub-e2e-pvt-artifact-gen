apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofd0b5c7c-2880-4d0a-924d-02e9afc5da9b.fullname" . }}
  labels:
    {{- include "go-echofd0b5c7c-2880-4d0a-924d-02e9afc5da9b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofd0b5c7c-2880-4d0a-924d-02e9afc5da9b.selectorLabels" . | nindent 6 }}
