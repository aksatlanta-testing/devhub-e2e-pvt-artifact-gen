apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0bb5f256-83cd-4449-8807-2ffcb71c8d33.fullname" . }}
  labels:
    {{- include "go-echo0bb5f256-83cd-4449-8807-2ffcb71c8d33.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0bb5f256-83cd-4449-8807-2ffcb71c8d33.selectorLabels" . | nindent 6 }}
