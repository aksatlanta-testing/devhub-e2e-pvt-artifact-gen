apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6958a1c4-bac9-41ff-91bb-9bc740da0f47.fullname" . }}
  labels:
    {{- include "go-echo6958a1c4-bac9-41ff-91bb-9bc740da0f47.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6958a1c4-bac9-41ff-91bb-9bc740da0f47.selectorLabels" . | nindent 6 }}
