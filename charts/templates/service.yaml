apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa9587d4b-3be8-4d5f-bc64-c0b65a09662e.fullname" . }}
  labels:
    {{- include "go-echoa9587d4b-3be8-4d5f-bc64-c0b65a09662e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa9587d4b-3be8-4d5f-bc64-c0b65a09662e.selectorLabels" . | nindent 6 }}
