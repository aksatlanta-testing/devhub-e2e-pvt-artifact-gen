apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo39cf7c9f-9594-43cd-bbee-c8e7bd02e1c7.fullname" . }}
  labels:
    {{- include "go-echo39cf7c9f-9594-43cd-bbee-c8e7bd02e1c7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo39cf7c9f-9594-43cd-bbee-c8e7bd02e1c7.selectorLabels" . | nindent 6 }}
