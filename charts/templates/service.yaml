apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc82ea71a-aaff-46c5-933b-3021ff56fe55.fullname" . }}
  labels:
    {{- include "go-echoc82ea71a-aaff-46c5-933b-3021ff56fe55.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc82ea71a-aaff-46c5-933b-3021ff56fe55.selectorLabels" . | nindent 6 }}
