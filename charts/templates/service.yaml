apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7169f165-274f-4f24-9fdd-56a0f1319e40.fullname" . }}
  labels:
    {{- include "go-echo7169f165-274f-4f24-9fdd-56a0f1319e40.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7169f165-274f-4f24-9fdd-56a0f1319e40.selectorLabels" . | nindent 6 }}
