apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo37d06e08-1135-4b72-8efd-8fb53a90391a.fullname" . }}
  labels:
    {{- include "go-echo37d06e08-1135-4b72-8efd-8fb53a90391a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo37d06e08-1135-4b72-8efd-8fb53a90391a.selectorLabels" . | nindent 6 }}
