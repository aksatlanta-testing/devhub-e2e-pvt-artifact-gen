apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7040dfd1-ea74-4a87-9135-7b200847c069.fullname" . }}
  labels:
    {{- include "go-echo7040dfd1-ea74-4a87-9135-7b200847c069.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7040dfd1-ea74-4a87-9135-7b200847c069.selectorLabels" . | nindent 6 }}
