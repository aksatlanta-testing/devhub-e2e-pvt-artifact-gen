apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf750a56-169d-44cc-9ede-a8fc142e0e0b.fullname" . }}
  labels:
    {{- include "go-echoaf750a56-169d-44cc-9ede-a8fc142e0e0b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf750a56-169d-44cc-9ede-a8fc142e0e0b.selectorLabels" . | nindent 6 }}
