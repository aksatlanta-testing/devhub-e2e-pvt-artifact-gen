apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe104a9a8-bdd2-4b48-82a0-05e2de4bc4ed.fullname" . }}
  labels:
    {{- include "go-echoe104a9a8-bdd2-4b48-82a0-05e2de4bc4ed.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe104a9a8-bdd2-4b48-82a0-05e2de4bc4ed.selectorLabels" . | nindent 6 }}
