apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo368dea0d-29f1-46a0-96c0-ec1eca69d9ce.fullname" . }}
  labels:
    {{- include "go-echo368dea0d-29f1-46a0-96c0-ec1eca69d9ce.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo368dea0d-29f1-46a0-96c0-ec1eca69d9ce.selectorLabels" . | nindent 6 }}
