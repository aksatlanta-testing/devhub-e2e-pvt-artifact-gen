apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo97abff33-66b2-4694-a960-481444db8038.fullname" . }}
  labels:
    {{- include "go-echo97abff33-66b2-4694-a960-481444db8038.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo97abff33-66b2-4694-a960-481444db8038.selectorLabels" . | nindent 6 }}
