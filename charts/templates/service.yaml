apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo95f57ef8-0647-49f2-a11d-5114fd519955.fullname" . }}
  labels:
    {{- include "go-echo95f57ef8-0647-49f2-a11d-5114fd519955.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo95f57ef8-0647-49f2-a11d-5114fd519955.selectorLabels" . | nindent 6 }}
