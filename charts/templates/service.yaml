apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe21afa60-7803-4e43-8bda-1527bed2990e.fullname" . }}
  labels:
    {{- include "go-echoe21afa60-7803-4e43-8bda-1527bed2990e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe21afa60-7803-4e43-8bda-1527bed2990e.selectorLabels" . | nindent 6 }}
