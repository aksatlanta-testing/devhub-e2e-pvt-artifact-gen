apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6dc31c30-3566-4532-9e5a-cc86b2d2336a.fullname" . }}
  labels:
    {{- include "go-echo6dc31c30-3566-4532-9e5a-cc86b2d2336a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6dc31c30-3566-4532-9e5a-cc86b2d2336a.selectorLabels" . | nindent 6 }}
