apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoec1aa32d-8121-4d0e-8b7b-740d8df9c9a6.fullname" . }}
  labels:
    {{- include "go-echoec1aa32d-8121-4d0e-8b7b-740d8df9c9a6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoec1aa32d-8121-4d0e-8b7b-740d8df9c9a6.selectorLabels" . | nindent 6 }}
