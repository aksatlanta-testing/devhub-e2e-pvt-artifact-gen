apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof129fa2d-0822-4cbd-a0ea-44e47df0bca2.fullname" . }}
  labels:
    {{- include "go-echof129fa2d-0822-4cbd-a0ea-44e47df0bca2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof129fa2d-0822-4cbd-a0ea-44e47df0bca2.selectorLabels" . | nindent 6 }}
