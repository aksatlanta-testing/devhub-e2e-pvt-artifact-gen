apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc5b86140-6431-4ac6-8694-1ba2778c25dd.fullname" . }}
  labels:
    {{- include "go-echoc5b86140-6431-4ac6-8694-1ba2778c25dd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc5b86140-6431-4ac6-8694-1ba2778c25dd.selectorLabels" . | nindent 6 }}
