apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2afe7db3-dc61-4f19-ab64-c0bc6d2d6e0f.fullname" . }}
  labels:
    {{- include "go-echo2afe7db3-dc61-4f19-ab64-c0bc6d2d6e0f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2afe7db3-dc61-4f19-ab64-c0bc6d2d6e0f.selectorLabels" . | nindent 6 }}
