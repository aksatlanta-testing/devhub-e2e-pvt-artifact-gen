apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodf0f39a9-9bc3-4fe8-afa9-fa7c34828d02.fullname" . }}
  labels:
    {{- include "go-echodf0f39a9-9bc3-4fe8-afa9-fa7c34828d02.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodf0f39a9-9bc3-4fe8-afa9-fa7c34828d02.selectorLabels" . | nindent 6 }}
