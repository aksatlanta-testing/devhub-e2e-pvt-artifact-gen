apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob3d43364-0e42-4d9a-91f3-36d6f867c784.fullname" . }}
  labels:
    {{- include "go-echob3d43364-0e42-4d9a-91f3-36d6f867c784.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob3d43364-0e42-4d9a-91f3-36d6f867c784.selectorLabels" . | nindent 6 }}
