apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof0fccb30-c74d-489c-886e-bbc444784793.fullname" . }}
  labels:
    {{- include "go-echof0fccb30-c74d-489c-886e-bbc444784793.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof0fccb30-c74d-489c-886e-bbc444784793.selectorLabels" . | nindent 6 }}
