apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo63f338ac-7fbe-4a60-9eab-2da8e9a60921.fullname" . }}
  labels:
    {{- include "go-echo63f338ac-7fbe-4a60-9eab-2da8e9a60921.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo63f338ac-7fbe-4a60-9eab-2da8e9a60921.selectorLabels" . | nindent 6 }}
