apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo21156cc2-75c3-47d8-91a6-2f75ed5954a3.fullname" . }}
  labels:
    {{- include "go-echo21156cc2-75c3-47d8-91a6-2f75ed5954a3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo21156cc2-75c3-47d8-91a6-2f75ed5954a3.selectorLabels" . | nindent 6 }}
