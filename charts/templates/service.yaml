apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa532d33d-cc65-4e5f-8bf3-e0b04596464d.fullname" . }}
  labels:
    {{- include "go-echoa532d33d-cc65-4e5f-8bf3-e0b04596464d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa532d33d-cc65-4e5f-8bf3-e0b04596464d.selectorLabels" . | nindent 6 }}
