apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7ecb97c2-280f-4b9a-a40e-b6eaa0bd8246.fullname" . }}
  labels:
    {{- include "go-echo7ecb97c2-280f-4b9a-a40e-b6eaa0bd8246.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7ecb97c2-280f-4b9a-a40e-b6eaa0bd8246.selectorLabels" . | nindent 6 }}
