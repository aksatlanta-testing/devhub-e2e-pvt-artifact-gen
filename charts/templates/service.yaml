apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6ed53e2f-c563-4340-8bd1-9d7a62b665c8.fullname" . }}
  labels:
    {{- include "go-echo6ed53e2f-c563-4340-8bd1-9d7a62b665c8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6ed53e2f-c563-4340-8bd1-9d7a62b665c8.selectorLabels" . | nindent 6 }}
