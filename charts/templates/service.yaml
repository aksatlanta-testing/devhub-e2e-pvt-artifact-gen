apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof9d1cd9d-f2f5-4f02-ad3c-ff1405a70278.fullname" . }}
  labels:
    {{- include "go-echof9d1cd9d-f2f5-4f02-ad3c-ff1405a70278.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof9d1cd9d-f2f5-4f02-ad3c-ff1405a70278.selectorLabels" . | nindent 6 }}
