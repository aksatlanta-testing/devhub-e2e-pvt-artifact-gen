apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaa69d226-cf93-4239-8b34-a432c95c9c4c.fullname" . }}
  labels:
    {{- include "go-echoaa69d226-cf93-4239-8b34-a432c95c9c4c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaa69d226-cf93-4239-8b34-a432c95c9c4c.selectorLabels" . | nindent 6 }}
