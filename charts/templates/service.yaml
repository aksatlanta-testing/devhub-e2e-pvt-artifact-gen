apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc7e4cb12-58e1-431a-bc6d-e7be620dfcba.fullname" . }}
  labels:
    {{- include "go-echoc7e4cb12-58e1-431a-bc6d-e7be620dfcba.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc7e4cb12-58e1-431a-bc6d-e7be620dfcba.selectorLabels" . | nindent 6 }}
