apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo03141906-60c0-4690-982a-3cc77a6e4601.fullname" . }}
  labels:
    {{- include "go-echo03141906-60c0-4690-982a-3cc77a6e4601.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo03141906-60c0-4690-982a-3cc77a6e4601.selectorLabels" . | nindent 6 }}
