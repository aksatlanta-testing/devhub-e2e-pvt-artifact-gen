apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1cec3fc0-151b-4553-84d3-44f0b188b7ec.fullname" . }}
  labels:
    {{- include "go-echo1cec3fc0-151b-4553-84d3-44f0b188b7ec.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1cec3fc0-151b-4553-84d3-44f0b188b7ec.selectorLabels" . | nindent 6 }}
