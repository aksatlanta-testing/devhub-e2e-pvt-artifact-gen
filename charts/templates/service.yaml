apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo90f4b0a1-0a88-4b8d-a1fc-ef9c52831999.fullname" . }}
  labels:
    {{- include "go-echo90f4b0a1-0a88-4b8d-a1fc-ef9c52831999.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo90f4b0a1-0a88-4b8d-a1fc-ef9c52831999.selectorLabels" . | nindent 6 }}
