apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo57bc44a0-ba27-4ea3-a4ab-4f48150bc3fb.fullname" . }}
  labels:
    {{- include "go-echo57bc44a0-ba27-4ea3-a4ab-4f48150bc3fb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo57bc44a0-ba27-4ea3-a4ab-4f48150bc3fb.selectorLabels" . | nindent 6 }}
