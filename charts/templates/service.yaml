apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof1a9f869-5dca-4c70-bcd2-55e9a70931a1.fullname" . }}
  labels:
    {{- include "go-echof1a9f869-5dca-4c70-bcd2-55e9a70931a1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof1a9f869-5dca-4c70-bcd2-55e9a70931a1.selectorLabels" . | nindent 6 }}
