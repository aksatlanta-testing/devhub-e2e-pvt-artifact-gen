apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo729d79bc-2fb6-4176-a62c-726da137efa8.fullname" . }}
  labels:
    {{- include "go-echo729d79bc-2fb6-4176-a62c-726da137efa8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo729d79bc-2fb6-4176-a62c-726da137efa8.selectorLabels" . | nindent 6 }}
