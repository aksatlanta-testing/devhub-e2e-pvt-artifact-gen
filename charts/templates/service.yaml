apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo13513349-8564-4ce1-82ab-a14a0e8136e8.fullname" . }}
  labels:
    {{- include "go-echo13513349-8564-4ce1-82ab-a14a0e8136e8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo13513349-8564-4ce1-82ab-a14a0e8136e8.selectorLabels" . | nindent 6 }}
