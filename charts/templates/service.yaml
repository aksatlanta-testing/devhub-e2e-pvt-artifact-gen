apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo084d7308-3cea-416f-96f0-42b021d593dc.fullname" . }}
  labels:
    {{- include "go-echo084d7308-3cea-416f-96f0-42b021d593dc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo084d7308-3cea-416f-96f0-42b021d593dc.selectorLabels" . | nindent 6 }}
