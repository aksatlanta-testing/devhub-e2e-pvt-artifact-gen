apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo161c6756-ac0f-43bb-9129-66643e3b692e.fullname" . }}
  labels:
    {{- include "go-echo161c6756-ac0f-43bb-9129-66643e3b692e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo161c6756-ac0f-43bb-9129-66643e3b692e.selectorLabels" . | nindent 6 }}
