apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3f8ae951-0d79-4ce1-ba88-5d0843fa482c.fullname" . }}
  labels:
    {{- include "go-echo3f8ae951-0d79-4ce1-ba88-5d0843fa482c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3f8ae951-0d79-4ce1-ba88-5d0843fa482c.selectorLabels" . | nindent 6 }}
