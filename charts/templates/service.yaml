apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo351f6d20-5388-461f-89c7-b1afd580cc93.fullname" . }}
  labels:
    {{- include "go-echo351f6d20-5388-461f-89c7-b1afd580cc93.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo351f6d20-5388-461f-89c7-b1afd580cc93.selectorLabels" . | nindent 6 }}
