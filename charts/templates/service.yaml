apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo32e31b93-a2b4-4d46-ac50-590d20ecd1bb.fullname" . }}
  labels:
    {{- include "go-echo32e31b93-a2b4-4d46-ac50-590d20ecd1bb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo32e31b93-a2b4-4d46-ac50-590d20ecd1bb.selectorLabels" . | nindent 6 }}
