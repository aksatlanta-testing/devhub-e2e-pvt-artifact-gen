apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo11028868-5a9f-4613-a362-2e439b758438.fullname" . }}
  labels:
    {{- include "go-echo11028868-5a9f-4613-a362-2e439b758438.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo11028868-5a9f-4613-a362-2e439b758438.selectorLabels" . | nindent 6 }}
