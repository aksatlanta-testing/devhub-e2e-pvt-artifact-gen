apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof84be942-facd-45bf-b6fd-957da7a1086b.fullname" . }}
  labels:
    {{- include "go-echof84be942-facd-45bf-b6fd-957da7a1086b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof84be942-facd-45bf-b6fd-957da7a1086b.selectorLabels" . | nindent 6 }}
