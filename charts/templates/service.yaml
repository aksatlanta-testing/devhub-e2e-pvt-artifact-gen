apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc27b78d6-8a19-40fd-9068-41149aa3afb8.fullname" . }}
  labels:
    {{- include "go-echoc27b78d6-8a19-40fd-9068-41149aa3afb8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc27b78d6-8a19-40fd-9068-41149aa3afb8.selectorLabels" . | nindent 6 }}
