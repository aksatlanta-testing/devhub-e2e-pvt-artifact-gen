apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe30cade-9fde-4820-983b-16c72d725fd5.fullname" . }}
  labels:
    {{- include "go-echofe30cade-9fde-4820-983b-16c72d725fd5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe30cade-9fde-4820-983b-16c72d725fd5.selectorLabels" . | nindent 6 }}
