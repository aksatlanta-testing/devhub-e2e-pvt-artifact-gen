apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo953d4886-a268-4c8d-a9c7-b7f513effab7.fullname" . }}
  labels:
    {{- include "go-echo953d4886-a268-4c8d-a9c7-b7f513effab7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo953d4886-a268-4c8d-a9c7-b7f513effab7.selectorLabels" . | nindent 6 }}
