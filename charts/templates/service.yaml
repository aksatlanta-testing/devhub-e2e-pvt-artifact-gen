apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7b600b20-0a9c-4a18-8c5e-85c527607a2b.fullname" . }}
  labels:
    {{- include "go-echo7b600b20-0a9c-4a18-8c5e-85c527607a2b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7b600b20-0a9c-4a18-8c5e-85c527607a2b.selectorLabels" . | nindent 6 }}
