apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b36465c-9c8c-466e-9613-01c417a7d023.fullname" . }}
  labels:
    {{- include "go-echo0b36465c-9c8c-466e-9613-01c417a7d023.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b36465c-9c8c-466e-9613-01c417a7d023.selectorLabels" . | nindent 6 }}
