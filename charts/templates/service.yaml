apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8da00506-f02c-43fd-b3a5-19c995428480.fullname" . }}
  labels:
    {{- include "go-echo8da00506-f02c-43fd-b3a5-19c995428480.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8da00506-f02c-43fd-b3a5-19c995428480.selectorLabels" . | nindent 6 }}
