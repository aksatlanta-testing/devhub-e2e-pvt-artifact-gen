apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof3c9bf28-8239-4796-80ca-f90c6e3592d5.fullname" . }}
  labels:
    {{- include "go-echof3c9bf28-8239-4796-80ca-f90c6e3592d5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof3c9bf28-8239-4796-80ca-f90c6e3592d5.selectorLabels" . | nindent 6 }}
