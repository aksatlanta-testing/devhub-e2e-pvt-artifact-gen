apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo74b998f5-6e52-4fd9-95d1-c378f5942b1c.fullname" . }}
  labels:
    {{- include "go-echo74b998f5-6e52-4fd9-95d1-c378f5942b1c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo74b998f5-6e52-4fd9-95d1-c378f5942b1c.selectorLabels" . | nindent 6 }}
