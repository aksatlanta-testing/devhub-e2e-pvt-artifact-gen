apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe84328d4-2c08-4ee8-900e-03ec4e10e4f4.fullname" . }}
  labels:
    {{- include "go-echoe84328d4-2c08-4ee8-900e-03ec4e10e4f4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe84328d4-2c08-4ee8-900e-03ec4e10e4f4.selectorLabels" . | nindent 6 }}
