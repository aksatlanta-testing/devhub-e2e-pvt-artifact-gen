apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc794ed5f-4dc0-49ed-ac3d-ef7bee8f66b9.fullname" . }}
  labels:
    {{- include "go-echoc794ed5f-4dc0-49ed-ac3d-ef7bee8f66b9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc794ed5f-4dc0-49ed-ac3d-ef7bee8f66b9.selectorLabels" . | nindent 6 }}
