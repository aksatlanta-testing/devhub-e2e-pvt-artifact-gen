apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4b3b6c0b-13c4-4c4f-aaae-60c228d455b0.fullname" . }}
  labels:
    {{- include "go-echo4b3b6c0b-13c4-4c4f-aaae-60c228d455b0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4b3b6c0b-13c4-4c4f-aaae-60c228d455b0.selectorLabels" . | nindent 6 }}
