apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo069306d2-8825-40d6-8d42-55897ab5476c.fullname" . }}
  labels:
    {{- include "go-echo069306d2-8825-40d6-8d42-55897ab5476c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo069306d2-8825-40d6-8d42-55897ab5476c.selectorLabels" . | nindent 6 }}
