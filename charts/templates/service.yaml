apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoedb39c0e-0682-4dc3-9cb4-abb644348755.fullname" . }}
  labels:
    {{- include "go-echoedb39c0e-0682-4dc3-9cb4-abb644348755.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoedb39c0e-0682-4dc3-9cb4-abb644348755.selectorLabels" . | nindent 6 }}
