apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobeabae6c-6528-4068-a24b-b0f802035828.fullname" . }}
  labels:
    {{- include "go-echobeabae6c-6528-4068-a24b-b0f802035828.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobeabae6c-6528-4068-a24b-b0f802035828.selectorLabels" . | nindent 6 }}
