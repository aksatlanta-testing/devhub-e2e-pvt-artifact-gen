apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo84a1641e-0bb9-4067-a3f9-27964da17d69.fullname" . }}
  labels:
    {{- include "go-echo84a1641e-0bb9-4067-a3f9-27964da17d69.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo84a1641e-0bb9-4067-a3f9-27964da17d69.selectorLabels" . | nindent 6 }}
