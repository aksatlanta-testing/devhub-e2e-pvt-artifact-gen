apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo42408f42-bf08-4cfe-8602-36abc4ddbe67.fullname" . }}
  labels:
    {{- include "go-echo42408f42-bf08-4cfe-8602-36abc4ddbe67.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo42408f42-bf08-4cfe-8602-36abc4ddbe67.selectorLabels" . | nindent 6 }}
