apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9f6d2509-25af-4ae2-a5bb-ec3f9291700b.fullname" . }}
  labels:
    {{- include "go-echo9f6d2509-25af-4ae2-a5bb-ec3f9291700b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9f6d2509-25af-4ae2-a5bb-ec3f9291700b.selectorLabels" . | nindent 6 }}
