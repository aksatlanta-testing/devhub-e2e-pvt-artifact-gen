apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo14964f46-7369-4b2c-a0eb-2ff34bf1e149.fullname" . }}
  labels:
    {{- include "go-echo14964f46-7369-4b2c-a0eb-2ff34bf1e149.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo14964f46-7369-4b2c-a0eb-2ff34bf1e149.selectorLabels" . | nindent 6 }}
