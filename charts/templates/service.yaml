apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof5e40a24-d473-458b-9477-9c8c577f5b25.fullname" . }}
  labels:
    {{- include "go-echof5e40a24-d473-458b-9477-9c8c577f5b25.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof5e40a24-d473-458b-9477-9c8c577f5b25.selectorLabels" . | nindent 6 }}
