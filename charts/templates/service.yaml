apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo61e030b2-befa-441a-a021-56fbcddc0bac.fullname" . }}
  labels:
    {{- include "go-echo61e030b2-befa-441a-a021-56fbcddc0bac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo61e030b2-befa-441a-a021-56fbcddc0bac.selectorLabels" . | nindent 6 }}
