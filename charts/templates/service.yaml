apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoec7b1c52-c00f-4daf-89a1-78ae3006d39c.fullname" . }}
  labels:
    {{- include "go-echoec7b1c52-c00f-4daf-89a1-78ae3006d39c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoec7b1c52-c00f-4daf-89a1-78ae3006d39c.selectorLabels" . | nindent 6 }}
