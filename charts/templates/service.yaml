apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5b98ba78-7b04-42f7-bf07-a5d7caf49347.fullname" . }}
  labels:
    {{- include "go-echo5b98ba78-7b04-42f7-bf07-a5d7caf49347.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5b98ba78-7b04-42f7-bf07-a5d7caf49347.selectorLabels" . | nindent 6 }}
