apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo660f7dd7-b749-4f7e-bba4-d789dd21e44b.fullname" . }}
  labels:
    {{- include "go-echo660f7dd7-b749-4f7e-bba4-d789dd21e44b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo660f7dd7-b749-4f7e-bba4-d789dd21e44b.selectorLabels" . | nindent 6 }}
