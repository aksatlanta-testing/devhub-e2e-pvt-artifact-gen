apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo36437991-b79a-4115-9d18-30061108717f.fullname" . }}
  labels:
    {{- include "go-echo36437991-b79a-4115-9d18-30061108717f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo36437991-b79a-4115-9d18-30061108717f.selectorLabels" . | nindent 6 }}
