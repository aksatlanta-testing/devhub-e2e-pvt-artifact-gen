apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8d630d41-85f8-4550-ae69-22866f6a69e5.fullname" . }}
  labels:
    {{- include "go-echo8d630d41-85f8-4550-ae69-22866f6a69e5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8d630d41-85f8-4550-ae69-22866f6a69e5.selectorLabels" . | nindent 6 }}
