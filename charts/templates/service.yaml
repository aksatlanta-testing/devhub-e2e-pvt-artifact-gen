apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo28893050-4897-4a2c-90c7-2233a55b1b3f.fullname" . }}
  labels:
    {{- include "go-echo28893050-4897-4a2c-90c7-2233a55b1b3f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo28893050-4897-4a2c-90c7-2233a55b1b3f.selectorLabels" . | nindent 6 }}
