apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc08bbaf6-c6f7-41d8-b4e5-034f3205c3c1.fullname" . }}
  labels:
    {{- include "go-echoc08bbaf6-c6f7-41d8-b4e5-034f3205c3c1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc08bbaf6-c6f7-41d8-b4e5-034f3205c3c1.selectorLabels" . | nindent 6 }}
