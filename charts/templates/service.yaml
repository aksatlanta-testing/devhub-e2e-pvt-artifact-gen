apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0d551a44-22d6-473b-b200-8521494ca85f.fullname" . }}
  labels:
    {{- include "go-echo0d551a44-22d6-473b-b200-8521494ca85f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0d551a44-22d6-473b-b200-8521494ca85f.selectorLabels" . | nindent 6 }}
