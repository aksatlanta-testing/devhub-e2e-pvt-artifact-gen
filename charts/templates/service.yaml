apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo56e709dc-1f78-4a7e-b2d7-357a27b3c656.fullname" . }}
  labels:
    {{- include "go-echo56e709dc-1f78-4a7e-b2d7-357a27b3c656.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo56e709dc-1f78-4a7e-b2d7-357a27b3c656.selectorLabels" . | nindent 6 }}
