apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo77159f9a-9c63-4efb-a617-32875ce77a75.fullname" . }}
  labels:
    {{- include "go-echo77159f9a-9c63-4efb-a617-32875ce77a75.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo77159f9a-9c63-4efb-a617-32875ce77a75.selectorLabels" . | nindent 6 }}
