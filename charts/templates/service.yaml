apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo76f5988c-4bca-42bd-8923-fa33ea4fe8fa.fullname" . }}
  labels:
    {{- include "go-echo76f5988c-4bca-42bd-8923-fa33ea4fe8fa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo76f5988c-4bca-42bd-8923-fa33ea4fe8fa.selectorLabels" . | nindent 6 }}
