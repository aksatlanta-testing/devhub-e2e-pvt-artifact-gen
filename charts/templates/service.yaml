apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6376d80f-84d9-4b99-9f31-a2ee41b9cda5.fullname" . }}
  labels:
    {{- include "go-echo6376d80f-84d9-4b99-9f31-a2ee41b9cda5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6376d80f-84d9-4b99-9f31-a2ee41b9cda5.selectorLabels" . | nindent 6 }}
