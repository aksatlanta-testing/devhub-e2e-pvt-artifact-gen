apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc0d33cfc-25fc-4703-a5ba-43a8f6eedcb7.fullname" . }}
  labels:
    {{- include "go-echoc0d33cfc-25fc-4703-a5ba-43a8f6eedcb7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc0d33cfc-25fc-4703-a5ba-43a8f6eedcb7.selectorLabels" . | nindent 6 }}
