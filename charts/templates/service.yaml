apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4bb42887-50ea-4903-82b7-f4b169b7211c.fullname" . }}
  labels:
    {{- include "go-echo4bb42887-50ea-4903-82b7-f4b169b7211c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4bb42887-50ea-4903-82b7-f4b169b7211c.selectorLabels" . | nindent 6 }}
