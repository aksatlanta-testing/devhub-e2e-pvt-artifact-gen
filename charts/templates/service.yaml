apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaa7d8a3c-5cc5-4499-b87a-0576f31fed06.fullname" . }}
  labels:
    {{- include "go-echoaa7d8a3c-5cc5-4499-b87a-0576f31fed06.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaa7d8a3c-5cc5-4499-b87a-0576f31fed06.selectorLabels" . | nindent 6 }}
