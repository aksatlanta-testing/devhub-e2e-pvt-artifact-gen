apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo30cb62e6-3c25-4ba4-afff-252071ef4ec2.fullname" . }}
  labels:
    {{- include "go-echo30cb62e6-3c25-4ba4-afff-252071ef4ec2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo30cb62e6-3c25-4ba4-afff-252071ef4ec2.selectorLabels" . | nindent 6 }}
