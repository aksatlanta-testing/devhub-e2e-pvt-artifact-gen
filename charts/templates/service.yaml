apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo37d1d356-c213-43e0-9ef7-60f5df86d696.fullname" . }}
  labels:
    {{- include "go-echo37d1d356-c213-43e0-9ef7-60f5df86d696.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo37d1d356-c213-43e0-9ef7-60f5df86d696.selectorLabels" . | nindent 6 }}
