apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9ba88ed1-0d4d-46f6-ab8b-2ce317b8730f.fullname" . }}
  labels:
    {{- include "go-echo9ba88ed1-0d4d-46f6-ab8b-2ce317b8730f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9ba88ed1-0d4d-46f6-ab8b-2ce317b8730f.selectorLabels" . | nindent 6 }}
