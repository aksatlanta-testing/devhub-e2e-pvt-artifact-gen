apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7dc7438b-cb74-4cc7-9c0d-13f13ba91740.fullname" . }}
  labels:
    {{- include "go-echo7dc7438b-cb74-4cc7-9c0d-13f13ba91740.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7dc7438b-cb74-4cc7-9c0d-13f13ba91740.selectorLabels" . | nindent 6 }}
