apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo84c342b2-19c4-4dcc-a9e3-f3dc20137de9.fullname" . }}
  labels:
    {{- include "go-echo84c342b2-19c4-4dcc-a9e3-f3dc20137de9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo84c342b2-19c4-4dcc-a9e3-f3dc20137de9.selectorLabels" . | nindent 6 }}
