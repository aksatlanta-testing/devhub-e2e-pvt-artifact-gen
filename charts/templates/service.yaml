apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo50a74b67-053d-4522-ac50-c3f1e415e2b1.fullname" . }}
  labels:
    {{- include "go-echo50a74b67-053d-4522-ac50-c3f1e415e2b1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo50a74b67-053d-4522-ac50-c3f1e415e2b1.selectorLabels" . | nindent 6 }}
