apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0a96f153-e6e4-4b50-a54c-11dbede43e47.fullname" . }}
  labels:
    {{- include "go-echo0a96f153-e6e4-4b50-a54c-11dbede43e47.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0a96f153-e6e4-4b50-a54c-11dbede43e47.selectorLabels" . | nindent 6 }}
