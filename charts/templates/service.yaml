apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo475a4794-4f6f-448e-bd5f-65b126a45ee1.fullname" . }}
  labels:
    {{- include "go-echo475a4794-4f6f-448e-bd5f-65b126a45ee1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo475a4794-4f6f-448e-bd5f-65b126a45ee1.selectorLabels" . | nindent 6 }}
