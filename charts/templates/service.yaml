apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob422c239-c91e-4d0c-957b-ec75d2488ce4.fullname" . }}
  labels:
    {{- include "go-echob422c239-c91e-4d0c-957b-ec75d2488ce4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob422c239-c91e-4d0c-957b-ec75d2488ce4.selectorLabels" . | nindent 6 }}
