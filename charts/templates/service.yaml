apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo57c8be34-135f-4ee7-86cf-c87dc14792ea.fullname" . }}
  labels:
    {{- include "go-echo57c8be34-135f-4ee7-86cf-c87dc14792ea.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo57c8be34-135f-4ee7-86cf-c87dc14792ea.selectorLabels" . | nindent 6 }}
