apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2bf666e9-3a2b-4787-8efe-5706f3b98a68.fullname" . }}
  labels:
    {{- include "go-echo2bf666e9-3a2b-4787-8efe-5706f3b98a68.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2bf666e9-3a2b-4787-8efe-5706f3b98a68.selectorLabels" . | nindent 6 }}
