apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo76703798-e149-42ec-87f2-db1e7e58a739.fullname" . }}
  labels:
    {{- include "go-echo76703798-e149-42ec-87f2-db1e7e58a739.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo76703798-e149-42ec-87f2-db1e7e58a739.selectorLabels" . | nindent 6 }}
