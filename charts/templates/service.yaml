apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc9741025-d7e8-4bab-a84a-d7988d6bd5e9.fullname" . }}
  labels:
    {{- include "go-echoc9741025-d7e8-4bab-a84a-d7988d6bd5e9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc9741025-d7e8-4bab-a84a-d7988d6bd5e9.selectorLabels" . | nindent 6 }}
