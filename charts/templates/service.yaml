apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo43bb879f-c7cf-4da0-a919-92ad25887088.fullname" . }}
  labels:
    {{- include "go-echo43bb879f-c7cf-4da0-a919-92ad25887088.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo43bb879f-c7cf-4da0-a919-92ad25887088.selectorLabels" . | nindent 6 }}
