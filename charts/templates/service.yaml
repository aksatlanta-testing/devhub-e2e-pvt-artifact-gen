apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8e40e51c-28ba-4f71-b38b-c303e2570c99.fullname" . }}
  labels:
    {{- include "go-echo8e40e51c-28ba-4f71-b38b-c303e2570c99.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8e40e51c-28ba-4f71-b38b-c303e2570c99.selectorLabels" . | nindent 6 }}
