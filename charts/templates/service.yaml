apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6e30f1ae-6bec-443a-a1a3-54c013bf0b04.fullname" . }}
  labels:
    {{- include "go-echo6e30f1ae-6bec-443a-a1a3-54c013bf0b04.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6e30f1ae-6bec-443a-a1a3-54c013bf0b04.selectorLabels" . | nindent 6 }}
