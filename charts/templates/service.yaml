apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9d7afec7-dc9e-46d0-8871-cbf5f5b1b4d7.fullname" . }}
  labels:
    {{- include "go-echo9d7afec7-dc9e-46d0-8871-cbf5f5b1b4d7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9d7afec7-dc9e-46d0-8871-cbf5f5b1b4d7.selectorLabels" . | nindent 6 }}
