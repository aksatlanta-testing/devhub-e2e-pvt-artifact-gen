apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo74d232cb-9202-457a-a926-93fd3c0013c4.fullname" . }}
  labels:
    {{- include "go-echo74d232cb-9202-457a-a926-93fd3c0013c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo74d232cb-9202-457a-a926-93fd3c0013c4.selectorLabels" . | nindent 6 }}
