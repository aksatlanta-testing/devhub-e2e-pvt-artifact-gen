apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo28eb583a-c811-4683-bd60-32dfc5574d7c.fullname" . }}
  labels:
    {{- include "go-echo28eb583a-c811-4683-bd60-32dfc5574d7c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo28eb583a-c811-4683-bd60-32dfc5574d7c.selectorLabels" . | nindent 6 }}
