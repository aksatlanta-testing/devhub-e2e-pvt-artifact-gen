apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo957aa4ff-d36c-4c83-ba68-aa44b98213a3.fullname" . }}
  labels:
    {{- include "go-echo957aa4ff-d36c-4c83-ba68-aa44b98213a3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo957aa4ff-d36c-4c83-ba68-aa44b98213a3.selectorLabels" . | nindent 6 }}
