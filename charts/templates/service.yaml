apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe0b894b5-7525-4f7d-8e7f-f532f5fc9a1b.fullname" . }}
  labels:
    {{- include "go-echoe0b894b5-7525-4f7d-8e7f-f532f5fc9a1b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe0b894b5-7525-4f7d-8e7f-f532f5fc9a1b.selectorLabels" . | nindent 6 }}
