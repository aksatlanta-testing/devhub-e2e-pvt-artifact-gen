apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo01d2af42-896c-4672-9e3b-71a2ffae35cb.fullname" . }}
  labels:
    {{- include "go-echo01d2af42-896c-4672-9e3b-71a2ffae35cb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo01d2af42-896c-4672-9e3b-71a2ffae35cb.selectorLabels" . | nindent 6 }}
