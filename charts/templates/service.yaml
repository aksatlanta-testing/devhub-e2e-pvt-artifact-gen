apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob6f731ab-9b63-4e55-a270-6fbb053002f2.fullname" . }}
  labels:
    {{- include "go-echob6f731ab-9b63-4e55-a270-6fbb053002f2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob6f731ab-9b63-4e55-a270-6fbb053002f2.selectorLabels" . | nindent 6 }}
