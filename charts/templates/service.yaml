apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4650e857-7f0e-4c3f-8ed2-ce14e354f691.fullname" . }}
  labels:
    {{- include "go-echo4650e857-7f0e-4c3f-8ed2-ce14e354f691.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4650e857-7f0e-4c3f-8ed2-ce14e354f691.selectorLabels" . | nindent 6 }}
