apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4bc4eebd-1f9d-4d47-8528-e26a16cd70a4.fullname" . }}
  labels:
    {{- include "go-echo4bc4eebd-1f9d-4d47-8528-e26a16cd70a4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4bc4eebd-1f9d-4d47-8528-e26a16cd70a4.selectorLabels" . | nindent 6 }}
