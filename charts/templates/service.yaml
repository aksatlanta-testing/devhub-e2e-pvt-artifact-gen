apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5702e54d-93b5-45aa-a3ff-343f1389acd0.fullname" . }}
  labels:
    {{- include "go-echo5702e54d-93b5-45aa-a3ff-343f1389acd0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5702e54d-93b5-45aa-a3ff-343f1389acd0.selectorLabels" . | nindent 6 }}
