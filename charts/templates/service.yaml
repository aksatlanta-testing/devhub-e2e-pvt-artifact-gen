apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo531068af-5c8d-4132-886b-d0dd300576e5.fullname" . }}
  labels:
    {{- include "go-echo531068af-5c8d-4132-886b-d0dd300576e5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo531068af-5c8d-4132-886b-d0dd300576e5.selectorLabels" . | nindent 6 }}
