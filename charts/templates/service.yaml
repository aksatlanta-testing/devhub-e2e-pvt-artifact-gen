apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3aba32cd-c7b0-4002-923e-65eae3d43877.fullname" . }}
  labels:
    {{- include "go-echo3aba32cd-c7b0-4002-923e-65eae3d43877.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3aba32cd-c7b0-4002-923e-65eae3d43877.selectorLabels" . | nindent 6 }}
