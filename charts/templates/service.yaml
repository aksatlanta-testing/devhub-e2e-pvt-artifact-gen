apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7161c733-2421-4eb7-bdcb-4f7ea94f1bc3.fullname" . }}
  labels:
    {{- include "go-echo7161c733-2421-4eb7-bdcb-4f7ea94f1bc3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7161c733-2421-4eb7-bdcb-4f7ea94f1bc3.selectorLabels" . | nindent 6 }}
