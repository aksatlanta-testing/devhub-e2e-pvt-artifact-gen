apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9fd847d1-c1ce-4a1b-8e58-9e2e6ea780f8.fullname" . }}
  labels:
    {{- include "go-echo9fd847d1-c1ce-4a1b-8e58-9e2e6ea780f8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9fd847d1-c1ce-4a1b-8e58-9e2e6ea780f8.selectorLabels" . | nindent 6 }}
