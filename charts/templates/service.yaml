apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod4d24de7-eaf6-4d72-b72d-3ad7500ee66a.fullname" . }}
  labels:
    {{- include "go-echod4d24de7-eaf6-4d72-b72d-3ad7500ee66a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod4d24de7-eaf6-4d72-b72d-3ad7500ee66a.selectorLabels" . | nindent 6 }}
