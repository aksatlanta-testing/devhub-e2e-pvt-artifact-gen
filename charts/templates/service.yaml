apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo28cd9901-ce24-4abf-bb66-2f149e87e605.fullname" . }}
  labels:
    {{- include "go-echo28cd9901-ce24-4abf-bb66-2f149e87e605.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo28cd9901-ce24-4abf-bb66-2f149e87e605.selectorLabels" . | nindent 6 }}
