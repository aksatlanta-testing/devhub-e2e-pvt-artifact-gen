apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo064b8278-7b94-4432-a380-4dcb180361aa.fullname" . }}
  labels:
    {{- include "go-echo064b8278-7b94-4432-a380-4dcb180361aa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo064b8278-7b94-4432-a380-4dcb180361aa.selectorLabels" . | nindent 6 }}
