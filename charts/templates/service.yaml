apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo69eb2b4d-5850-4207-bedc-ac49a300ea09.fullname" . }}
  labels:
    {{- include "go-echo69eb2b4d-5850-4207-bedc-ac49a300ea09.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo69eb2b4d-5850-4207-bedc-ac49a300ea09.selectorLabels" . | nindent 6 }}
