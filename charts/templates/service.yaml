apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo94abbaf6-3011-4183-801d-49decc910081.fullname" . }}
  labels:
    {{- include "go-echo94abbaf6-3011-4183-801d-49decc910081.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo94abbaf6-3011-4183-801d-49decc910081.selectorLabels" . | nindent 6 }}
