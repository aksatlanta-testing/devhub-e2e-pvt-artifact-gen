apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3859dc59-4d43-43ee-a4bd-b91c3a0fce89.fullname" . }}
  labels:
    {{- include "go-echo3859dc59-4d43-43ee-a4bd-b91c3a0fce89.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3859dc59-4d43-43ee-a4bd-b91c3a0fce89.selectorLabels" . | nindent 6 }}
