apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo608153a9-f372-4acb-96dc-93165822b7f0.fullname" . }}
  labels:
    {{- include "go-echo608153a9-f372-4acb-96dc-93165822b7f0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo608153a9-f372-4acb-96dc-93165822b7f0.selectorLabels" . | nindent 6 }}
