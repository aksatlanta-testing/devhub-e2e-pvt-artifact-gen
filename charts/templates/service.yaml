apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob6169030-3f9b-4a81-bf0b-24530c7b124c.fullname" . }}
  labels:
    {{- include "go-echob6169030-3f9b-4a81-bf0b-24530c7b124c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob6169030-3f9b-4a81-bf0b-24530c7b124c.selectorLabels" . | nindent 6 }}
