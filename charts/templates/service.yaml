apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1dbf3cc0-477d-40f5-b81f-e966f39c6aee.fullname" . }}
  labels:
    {{- include "go-echo1dbf3cc0-477d-40f5-b81f-e966f39c6aee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1dbf3cc0-477d-40f5-b81f-e966f39c6aee.selectorLabels" . | nindent 6 }}
