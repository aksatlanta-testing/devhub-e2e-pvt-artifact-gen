apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod343f884-e0c7-40ec-a03a-f09eab445d7f.fullname" . }}
  labels:
    {{- include "go-echod343f884-e0c7-40ec-a03a-f09eab445d7f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod343f884-e0c7-40ec-a03a-f09eab445d7f.selectorLabels" . | nindent 6 }}
