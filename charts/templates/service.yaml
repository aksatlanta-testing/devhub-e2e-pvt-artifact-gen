apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa4d00710-8afb-457c-b480-d9dcc0ecb7a1.fullname" . }}
  labels:
    {{- include "go-echoa4d00710-8afb-457c-b480-d9dcc0ecb7a1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa4d00710-8afb-457c-b480-d9dcc0ecb7a1.selectorLabels" . | nindent 6 }}
