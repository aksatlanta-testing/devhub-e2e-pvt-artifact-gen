apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4cef8279-83a2-4f40-9dc5-adc709d45ba4.fullname" . }}
  labels:
    {{- include "go-echo4cef8279-83a2-4f40-9dc5-adc709d45ba4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4cef8279-83a2-4f40-9dc5-adc709d45ba4.selectorLabels" . | nindent 6 }}
