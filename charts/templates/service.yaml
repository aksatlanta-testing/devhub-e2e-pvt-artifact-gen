apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7fceddd7-830f-48af-b8ca-4e66fb9a7bf7.fullname" . }}
  labels:
    {{- include "go-echo7fceddd7-830f-48af-b8ca-4e66fb9a7bf7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7fceddd7-830f-48af-b8ca-4e66fb9a7bf7.selectorLabels" . | nindent 6 }}
