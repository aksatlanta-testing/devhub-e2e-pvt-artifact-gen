apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo396e1059-3e02-4eaa-99b5-82fab74a44af.fullname" . }}
  labels:
    {{- include "go-echo396e1059-3e02-4eaa-99b5-82fab74a44af.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo396e1059-3e02-4eaa-99b5-82fab74a44af.selectorLabels" . | nindent 6 }}
