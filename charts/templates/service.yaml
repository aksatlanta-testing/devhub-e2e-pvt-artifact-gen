apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4d726fe4-a624-41a9-b328-bdd9f0604032.fullname" . }}
  labels:
    {{- include "go-echo4d726fe4-a624-41a9-b328-bdd9f0604032.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4d726fe4-a624-41a9-b328-bdd9f0604032.selectorLabels" . | nindent 6 }}
