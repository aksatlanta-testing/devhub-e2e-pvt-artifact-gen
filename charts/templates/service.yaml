apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodb99ec1c-7d2c-4000-8ac9-af0b5583dd60.fullname" . }}
  labels:
    {{- include "go-echodb99ec1c-7d2c-4000-8ac9-af0b5583dd60.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodb99ec1c-7d2c-4000-8ac9-af0b5583dd60.selectorLabels" . | nindent 6 }}
