apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa3b4228e-55a4-4974-a191-0cf0807a6c11.fullname" . }}
  labels:
    {{- include "go-echoa3b4228e-55a4-4974-a191-0cf0807a6c11.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa3b4228e-55a4-4974-a191-0cf0807a6c11.selectorLabels" . | nindent 6 }}
