apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo960d052e-69e8-424e-8182-96681e3a0fa7.fullname" . }}
  labels:
    {{- include "go-echo960d052e-69e8-424e-8182-96681e3a0fa7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo960d052e-69e8-424e-8182-96681e3a0fa7.selectorLabels" . | nindent 6 }}
