apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa53e5c5e-f793-4d1c-9b4c-cb77aa9846cd.fullname" . }}
  labels:
    {{- include "go-echoa53e5c5e-f793-4d1c-9b4c-cb77aa9846cd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa53e5c5e-f793-4d1c-9b4c-cb77aa9846cd.selectorLabels" . | nindent 6 }}
