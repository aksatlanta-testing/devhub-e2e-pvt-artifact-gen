apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4d26479a-419b-417a-86a3-04ac39851673.fullname" . }}
  labels:
    {{- include "go-echo4d26479a-419b-417a-86a3-04ac39851673.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4d26479a-419b-417a-86a3-04ac39851673.selectorLabels" . | nindent 6 }}
