apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocb74395d-7b66-4f84-9598-8cdb8a1ead13.fullname" . }}
  labels:
    {{- include "go-echocb74395d-7b66-4f84-9598-8cdb8a1ead13.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocb74395d-7b66-4f84-9598-8cdb8a1ead13.selectorLabels" . | nindent 6 }}
