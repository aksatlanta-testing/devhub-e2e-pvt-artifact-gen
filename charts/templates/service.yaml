apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e975c0d-f9b5-46c5-9160-2dfc72a4e85a.fullname" . }}
  labels:
    {{- include "go-echo0e975c0d-f9b5-46c5-9160-2dfc72a4e85a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e975c0d-f9b5-46c5-9160-2dfc72a4e85a.selectorLabels" . | nindent 6 }}
