apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodf094614-7143-4002-a196-7186585a2eac.fullname" . }}
  labels:
    {{- include "go-echodf094614-7143-4002-a196-7186585a2eac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodf094614-7143-4002-a196-7186585a2eac.selectorLabels" . | nindent 6 }}
