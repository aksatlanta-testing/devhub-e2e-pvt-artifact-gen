apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobac73018-1583-4c5b-a4e9-2e46cbb4b00f.fullname" . }}
  labels:
    {{- include "go-echobac73018-1583-4c5b-a4e9-2e46cbb4b00f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobac73018-1583-4c5b-a4e9-2e46cbb4b00f.selectorLabels" . | nindent 6 }}
