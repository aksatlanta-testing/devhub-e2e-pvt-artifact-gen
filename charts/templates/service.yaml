apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0196543b-a12a-4c66-8281-1bd3e12b89d2.fullname" . }}
  labels:
    {{- include "go-echo0196543b-a12a-4c66-8281-1bd3e12b89d2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0196543b-a12a-4c66-8281-1bd3e12b89d2.selectorLabels" . | nindent 6 }}
