apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoec88cc59-ad1c-4088-b66a-3024a8432faa.fullname" . }}
  labels:
    {{- include "go-echoec88cc59-ad1c-4088-b66a-3024a8432faa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoec88cc59-ad1c-4088-b66a-3024a8432faa.selectorLabels" . | nindent 6 }}
