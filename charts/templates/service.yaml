apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobbd0c402-bb7c-4f96-8e45-50ee11c849ed.fullname" . }}
  labels:
    {{- include "go-echobbd0c402-bb7c-4f96-8e45-50ee11c849ed.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobbd0c402-bb7c-4f96-8e45-50ee11c849ed.selectorLabels" . | nindent 6 }}
