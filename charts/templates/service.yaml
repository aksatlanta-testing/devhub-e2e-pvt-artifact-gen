apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe8288a82-4281-41e9-9e88-6521b8678d29.fullname" . }}
  labels:
    {{- include "go-echoe8288a82-4281-41e9-9e88-6521b8678d29.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe8288a82-4281-41e9-9e88-6521b8678d29.selectorLabels" . | nindent 6 }}
