apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5a48acce-604c-49ae-8064-98f726d3c079.fullname" . }}
  labels:
    {{- include "go-echo5a48acce-604c-49ae-8064-98f726d3c079.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5a48acce-604c-49ae-8064-98f726d3c079.selectorLabels" . | nindent 6 }}
