apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0de5d7e6-902d-4b6c-a226-09c2346e61e2.fullname" . }}
  labels:
    {{- include "go-echo0de5d7e6-902d-4b6c-a226-09c2346e61e2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0de5d7e6-902d-4b6c-a226-09c2346e61e2.selectorLabels" . | nindent 6 }}
