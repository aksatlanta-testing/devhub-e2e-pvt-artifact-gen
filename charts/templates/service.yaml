apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob90c9e10-a691-4861-948e-b0e6f991968c.fullname" . }}
  labels:
    {{- include "go-echob90c9e10-a691-4861-948e-b0e6f991968c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob90c9e10-a691-4861-948e-b0e6f991968c.selectorLabels" . | nindent 6 }}
