apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaacad10f-ce00-4887-af2c-104e23478a40.fullname" . }}
  labels:
    {{- include "go-echoaacad10f-ce00-4887-af2c-104e23478a40.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaacad10f-ce00-4887-af2c-104e23478a40.selectorLabels" . | nindent 6 }}
