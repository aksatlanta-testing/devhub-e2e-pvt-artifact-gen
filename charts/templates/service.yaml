apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9ee7361d-b50c-4a2f-89c9-d7cb08854576.fullname" . }}
  labels:
    {{- include "go-echo9ee7361d-b50c-4a2f-89c9-d7cb08854576.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9ee7361d-b50c-4a2f-89c9-d7cb08854576.selectorLabels" . | nindent 6 }}
