apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0fe73197-73ad-444b-adf4-28bcb5babb95.fullname" . }}
  labels:
    {{- include "go-echo0fe73197-73ad-444b-adf4-28bcb5babb95.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0fe73197-73ad-444b-adf4-28bcb5babb95.selectorLabels" . | nindent 6 }}
