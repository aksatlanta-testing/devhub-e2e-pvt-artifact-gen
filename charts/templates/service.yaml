apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa46086cf-dc2c-4e6a-aea3-db03f92c668c.fullname" . }}
  labels:
    {{- include "go-echoa46086cf-dc2c-4e6a-aea3-db03f92c668c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa46086cf-dc2c-4e6a-aea3-db03f92c668c.selectorLabels" . | nindent 6 }}
