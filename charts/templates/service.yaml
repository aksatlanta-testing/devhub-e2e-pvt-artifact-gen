apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa3bc8b73-6480-4aca-9003-a3119985ebde.fullname" . }}
  labels:
    {{- include "go-echoa3bc8b73-6480-4aca-9003-a3119985ebde.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa3bc8b73-6480-4aca-9003-a3119985ebde.selectorLabels" . | nindent 6 }}
