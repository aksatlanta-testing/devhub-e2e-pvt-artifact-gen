apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5b2edebe-3dfa-4e03-a6f1-f061e12f9860.fullname" . }}
  labels:
    {{- include "go-echo5b2edebe-3dfa-4e03-a6f1-f061e12f9860.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5b2edebe-3dfa-4e03-a6f1-f061e12f9860.selectorLabels" . | nindent 6 }}
