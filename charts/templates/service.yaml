apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoce319545-06f5-4c2c-80e7-2aa4c7073b59.fullname" . }}
  labels:
    {{- include "go-echoce319545-06f5-4c2c-80e7-2aa4c7073b59.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoce319545-06f5-4c2c-80e7-2aa4c7073b59.selectorLabels" . | nindent 6 }}
