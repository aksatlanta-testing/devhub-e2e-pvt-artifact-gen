apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8f20c64d-8322-474d-8ffc-101c4c022b75.fullname" . }}
  labels:
    {{- include "go-echo8f20c64d-8322-474d-8ffc-101c4c022b75.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8f20c64d-8322-474d-8ffc-101c4c022b75.selectorLabels" . | nindent 6 }}
