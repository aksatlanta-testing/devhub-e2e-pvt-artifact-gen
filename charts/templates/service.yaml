apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2dcec470-0cc8-4ca6-af67-b9ee72fcb7df.fullname" . }}
  labels:
    {{- include "go-echo2dcec470-0cc8-4ca6-af67-b9ee72fcb7df.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2dcec470-0cc8-4ca6-af67-b9ee72fcb7df.selectorLabels" . | nindent 6 }}
