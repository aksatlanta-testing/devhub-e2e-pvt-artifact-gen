apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf7cd776-7733-4112-a3e5-22ef515e6104.fullname" . }}
  labels:
    {{- include "go-echoaf7cd776-7733-4112-a3e5-22ef515e6104.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf7cd776-7733-4112-a3e5-22ef515e6104.selectorLabels" . | nindent 6 }}
