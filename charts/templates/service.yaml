apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofdef9d2d-ba3c-4385-92f1-9898d8836f22.fullname" . }}
  labels:
    {{- include "go-echofdef9d2d-ba3c-4385-92f1-9898d8836f22.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofdef9d2d-ba3c-4385-92f1-9898d8836f22.selectorLabels" . | nindent 6 }}
