apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobdf7befc-f553-415d-9d1b-6be902337723.fullname" . }}
  labels:
    {{- include "go-echobdf7befc-f553-415d-9d1b-6be902337723.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobdf7befc-f553-415d-9d1b-6be902337723.selectorLabels" . | nindent 6 }}
