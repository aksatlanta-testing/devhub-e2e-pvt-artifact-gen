apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9719a41b-50a5-4341-9bf0-2adff72e9987.fullname" . }}
  labels:
    {{- include "go-echo9719a41b-50a5-4341-9bf0-2adff72e9987.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9719a41b-50a5-4341-9bf0-2adff72e9987.selectorLabels" . | nindent 6 }}
