apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc5661936-239d-4ebf-a11a-466ce5ba2bf8.fullname" . }}
  labels:
    {{- include "go-echoc5661936-239d-4ebf-a11a-466ce5ba2bf8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc5661936-239d-4ebf-a11a-466ce5ba2bf8.selectorLabels" . | nindent 6 }}
