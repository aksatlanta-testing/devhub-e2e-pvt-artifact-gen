apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo15752d4b-b5b3-4752-b8ae-d3529a86b760.fullname" . }}
  labels:
    {{- include "go-echo15752d4b-b5b3-4752-b8ae-d3529a86b760.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo15752d4b-b5b3-4752-b8ae-d3529a86b760.selectorLabels" . | nindent 6 }}
