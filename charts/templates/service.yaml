apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7bf0d090-16ea-4741-93dc-b612973925e0.fullname" . }}
  labels:
    {{- include "go-echo7bf0d090-16ea-4741-93dc-b612973925e0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7bf0d090-16ea-4741-93dc-b612973925e0.selectorLabels" . | nindent 6 }}
