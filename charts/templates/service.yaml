apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa8a2beeb-37a6-4069-a650-a2f48ac3d608.fullname" . }}
  labels:
    {{- include "go-echoa8a2beeb-37a6-4069-a650-a2f48ac3d608.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa8a2beeb-37a6-4069-a650-a2f48ac3d608.selectorLabels" . | nindent 6 }}
