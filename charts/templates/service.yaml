apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2baa172b-4445-4c34-8857-770de6325524.fullname" . }}
  labels:
    {{- include "go-echo2baa172b-4445-4c34-8857-770de6325524.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2baa172b-4445-4c34-8857-770de6325524.selectorLabels" . | nindent 6 }}
