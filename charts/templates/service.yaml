apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoae41acab-70e1-471d-b4c8-5088623ac474.fullname" . }}
  labels:
    {{- include "go-echoae41acab-70e1-471d-b4c8-5088623ac474.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoae41acab-70e1-471d-b4c8-5088623ac474.selectorLabels" . | nindent 6 }}
