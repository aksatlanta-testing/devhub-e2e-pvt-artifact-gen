apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod6d1719e-d08d-4c04-82d3-644831ff2779.fullname" . }}
  labels:
    {{- include "go-echod6d1719e-d08d-4c04-82d3-644831ff2779.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod6d1719e-d08d-4c04-82d3-644831ff2779.selectorLabels" . | nindent 6 }}
