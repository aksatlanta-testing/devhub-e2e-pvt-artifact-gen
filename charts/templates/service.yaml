apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo27b07467-5e00-4cd9-bd6c-15acf05713c5.fullname" . }}
  labels:
    {{- include "go-echo27b07467-5e00-4cd9-bd6c-15acf05713c5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo27b07467-5e00-4cd9-bd6c-15acf05713c5.selectorLabels" . | nindent 6 }}
