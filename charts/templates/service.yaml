apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof635b4e5-6383-47f8-a825-11a05a16dd13.fullname" . }}
  labels:
    {{- include "go-echof635b4e5-6383-47f8-a825-11a05a16dd13.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof635b4e5-6383-47f8-a825-11a05a16dd13.selectorLabels" . | nindent 6 }}
