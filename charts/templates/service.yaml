apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo89685311-b938-4052-a958-992a31d2eb3b.fullname" . }}
  labels:
    {{- include "go-echo89685311-b938-4052-a958-992a31d2eb3b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo89685311-b938-4052-a958-992a31d2eb3b.selectorLabels" . | nindent 6 }}
