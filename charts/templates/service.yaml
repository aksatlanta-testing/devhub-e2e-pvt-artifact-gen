apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofaab048d-9a5c-4219-949c-ece491932bc6.fullname" . }}
  labels:
    {{- include "go-echofaab048d-9a5c-4219-949c-ece491932bc6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofaab048d-9a5c-4219-949c-ece491932bc6.selectorLabels" . | nindent 6 }}
