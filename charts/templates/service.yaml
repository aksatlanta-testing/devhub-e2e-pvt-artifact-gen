apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo89f6cecd-f3ef-4fd9-863e-6246e2e35d63.fullname" . }}
  labels:
    {{- include "go-echo89f6cecd-f3ef-4fd9-863e-6246e2e35d63.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo89f6cecd-f3ef-4fd9-863e-6246e2e35d63.selectorLabels" . | nindent 6 }}
