apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6af40183-0f5d-4ca0-9ba1-a69ef9f12b9f.fullname" . }}
  labels:
    {{- include "go-echo6af40183-0f5d-4ca0-9ba1-a69ef9f12b9f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6af40183-0f5d-4ca0-9ba1-a69ef9f12b9f.selectorLabels" . | nindent 6 }}
