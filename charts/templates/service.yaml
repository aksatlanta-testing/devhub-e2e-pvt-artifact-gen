apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9d39a999-d191-4ac4-a419-4e04697b906b.fullname" . }}
  labels:
    {{- include "go-echo9d39a999-d191-4ac4-a419-4e04697b906b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9d39a999-d191-4ac4-a419-4e04697b906b.selectorLabels" . | nindent 6 }}
