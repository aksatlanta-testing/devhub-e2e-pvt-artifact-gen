apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo49da6052-d7d8-4593-a3a8-0370ce8dff3d.fullname" . }}
  labels:
    {{- include "go-echo49da6052-d7d8-4593-a3a8-0370ce8dff3d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo49da6052-d7d8-4593-a3a8-0370ce8dff3d.selectorLabels" . | nindent 6 }}
