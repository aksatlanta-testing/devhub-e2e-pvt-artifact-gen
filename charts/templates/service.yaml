apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo323b8118-86a5-4fb7-88e9-7994768ba912.fullname" . }}
  labels:
    {{- include "go-echo323b8118-86a5-4fb7-88e9-7994768ba912.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo323b8118-86a5-4fb7-88e9-7994768ba912.selectorLabels" . | nindent 6 }}
