apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0785b6b1-d363-40ca-bf34-3bed6bf988be.fullname" . }}
  labels:
    {{- include "go-echo0785b6b1-d363-40ca-bf34-3bed6bf988be.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0785b6b1-d363-40ca-bf34-3bed6bf988be.selectorLabels" . | nindent 6 }}
