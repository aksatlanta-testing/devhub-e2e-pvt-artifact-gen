apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobef04443-876b-4f74-843e-aab19024f49f.fullname" . }}
  labels:
    {{- include "go-echobef04443-876b-4f74-843e-aab19024f49f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobef04443-876b-4f74-843e-aab19024f49f.selectorLabels" . | nindent 6 }}
