apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0a938529-9a17-4a0e-9e93-823e3a5a3117.fullname" . }}
  labels:
    {{- include "go-echo0a938529-9a17-4a0e-9e93-823e3a5a3117.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0a938529-9a17-4a0e-9e93-823e3a5a3117.selectorLabels" . | nindent 6 }}
