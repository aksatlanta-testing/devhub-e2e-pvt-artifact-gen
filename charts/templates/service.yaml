apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo17014768-0d96-4254-9f1e-fe498448ede5.fullname" . }}
  labels:
    {{- include "go-echo17014768-0d96-4254-9f1e-fe498448ede5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo17014768-0d96-4254-9f1e-fe498448ede5.selectorLabels" . | nindent 6 }}
