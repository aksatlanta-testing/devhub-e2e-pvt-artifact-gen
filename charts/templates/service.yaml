apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0bb2db84-fdfe-4cdf-96b0-188c24424a49.fullname" . }}
  labels:
    {{- include "go-echo0bb2db84-fdfe-4cdf-96b0-188c24424a49.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0bb2db84-fdfe-4cdf-96b0-188c24424a49.selectorLabels" . | nindent 6 }}
