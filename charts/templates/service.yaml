apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo46b6286f-0c05-4f8e-be85-7be33d3adf7a.fullname" . }}
  labels:
    {{- include "go-echo46b6286f-0c05-4f8e-be85-7be33d3adf7a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo46b6286f-0c05-4f8e-be85-7be33d3adf7a.selectorLabels" . | nindent 6 }}
