apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodb8c803d-3b1d-454d-b595-d37b96e8c18b.fullname" . }}
  labels:
    {{- include "go-echodb8c803d-3b1d-454d-b595-d37b96e8c18b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodb8c803d-3b1d-454d-b595-d37b96e8c18b.selectorLabels" . | nindent 6 }}
