apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoedd4ce70-f2b9-41b7-b949-3d0a5b45e03b.fullname" . }}
  labels:
    {{- include "go-echoedd4ce70-f2b9-41b7-b949-3d0a5b45e03b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoedd4ce70-f2b9-41b7-b949-3d0a5b45e03b.selectorLabels" . | nindent 6 }}
