apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo31a6f9a1-ae79-4c12-89f4-26de1bd72b7a.fullname" . }}
  labels:
    {{- include "go-echo31a6f9a1-ae79-4c12-89f4-26de1bd72b7a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo31a6f9a1-ae79-4c12-89f4-26de1bd72b7a.selectorLabels" . | nindent 6 }}
