apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo47458ed6-d0f3-488e-b428-557fe9fce95e.fullname" . }}
  labels:
    {{- include "go-echo47458ed6-d0f3-488e-b428-557fe9fce95e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo47458ed6-d0f3-488e-b428-557fe9fce95e.selectorLabels" . | nindent 6 }}
