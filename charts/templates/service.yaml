apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1f1a9291-c5f6-41e7-adee-94533c2fc6dc.fullname" . }}
  labels:
    {{- include "go-echo1f1a9291-c5f6-41e7-adee-94533c2fc6dc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1f1a9291-c5f6-41e7-adee-94533c2fc6dc.selectorLabels" . | nindent 6 }}
