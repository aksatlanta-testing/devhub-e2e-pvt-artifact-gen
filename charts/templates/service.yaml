apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobe352d87-e2f9-4482-844b-32cb38299dff.fullname" . }}
  labels:
    {{- include "go-echobe352d87-e2f9-4482-844b-32cb38299dff.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobe352d87-e2f9-4482-844b-32cb38299dff.selectorLabels" . | nindent 6 }}
