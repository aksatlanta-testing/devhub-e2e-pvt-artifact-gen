apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocd6c377c-0b60-42c5-8fa3-93cc4ee920f5.fullname" . }}
  labels:
    {{- include "go-echocd6c377c-0b60-42c5-8fa3-93cc4ee920f5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocd6c377c-0b60-42c5-8fa3-93cc4ee920f5.selectorLabels" . | nindent 6 }}
