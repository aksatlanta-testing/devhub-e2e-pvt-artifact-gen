apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo423b7798-1460-473d-946d-04127b65bb58.fullname" . }}
  labels:
    {{- include "go-echo423b7798-1460-473d-946d-04127b65bb58.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo423b7798-1460-473d-946d-04127b65bb58.selectorLabels" . | nindent 6 }}
