apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1a9625b6-bea4-456d-9fc0-e127e62dc211.fullname" . }}
  labels:
    {{- include "go-echo1a9625b6-bea4-456d-9fc0-e127e62dc211.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1a9625b6-bea4-456d-9fc0-e127e62dc211.selectorLabels" . | nindent 6 }}
