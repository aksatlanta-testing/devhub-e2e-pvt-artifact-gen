apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo52686c21-d99e-467d-b529-7f0ce77a2669.fullname" . }}
  labels:
    {{- include "go-echo52686c21-d99e-467d-b529-7f0ce77a2669.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo52686c21-d99e-467d-b529-7f0ce77a2669.selectorLabels" . | nindent 6 }}
