apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo504c4430-eb34-49a0-bc7c-039efe90072b.fullname" . }}
  labels:
    {{- include "go-echo504c4430-eb34-49a0-bc7c-039efe90072b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo504c4430-eb34-49a0-bc7c-039efe90072b.selectorLabels" . | nindent 6 }}
