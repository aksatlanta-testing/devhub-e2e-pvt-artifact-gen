apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa2f86e51-6e52-4b46-b8d2-bc310d96dc4c.fullname" . }}
  labels:
    {{- include "go-echoa2f86e51-6e52-4b46-b8d2-bc310d96dc4c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa2f86e51-6e52-4b46-b8d2-bc310d96dc4c.selectorLabels" . | nindent 6 }}
