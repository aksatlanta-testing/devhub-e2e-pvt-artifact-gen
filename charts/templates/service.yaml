apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8f519b2b-30b0-414d-84fe-4a9853601ed7.fullname" . }}
  labels:
    {{- include "go-echo8f519b2b-30b0-414d-84fe-4a9853601ed7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8f519b2b-30b0-414d-84fe-4a9853601ed7.selectorLabels" . | nindent 6 }}
