apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoebd60e84-1609-4f18-b147-1c95f6f80b73.fullname" . }}
  labels:
    {{- include "go-echoebd60e84-1609-4f18-b147-1c95f6f80b73.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoebd60e84-1609-4f18-b147-1c95f6f80b73.selectorLabels" . | nindent 6 }}
