apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo114d4888-f023-409a-b936-75069c55991c.fullname" . }}
  labels:
    {{- include "go-echo114d4888-f023-409a-b936-75069c55991c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo114d4888-f023-409a-b936-75069c55991c.selectorLabels" . | nindent 6 }}
