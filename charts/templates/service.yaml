apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo58b75208-bbc5-405c-88c4-c539cf594f74.fullname" . }}
  labels:
    {{- include "go-echo58b75208-bbc5-405c-88c4-c539cf594f74.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo58b75208-bbc5-405c-88c4-c539cf594f74.selectorLabels" . | nindent 6 }}
