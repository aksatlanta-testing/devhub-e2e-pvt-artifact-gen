apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8011f448-d355-462e-aab3-02378279d735.fullname" . }}
  labels:
    {{- include "go-echo8011f448-d355-462e-aab3-02378279d735.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8011f448-d355-462e-aab3-02378279d735.selectorLabels" . | nindent 6 }}
