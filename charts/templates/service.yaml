apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo94a6d06f-6b1d-4f6e-bcb2-6d32b528c50f.fullname" . }}
  labels:
    {{- include "go-echo94a6d06f-6b1d-4f6e-bcb2-6d32b528c50f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo94a6d06f-6b1d-4f6e-bcb2-6d32b528c50f.selectorLabels" . | nindent 6 }}
