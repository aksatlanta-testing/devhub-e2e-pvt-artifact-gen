apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo287eb85d-9690-4c4f-8ff8-902e5495209e.fullname" . }}
  labels:
    {{- include "go-echo287eb85d-9690-4c4f-8ff8-902e5495209e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo287eb85d-9690-4c4f-8ff8-902e5495209e.selectorLabels" . | nindent 6 }}
