apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa437344f-3e36-453c-8a66-2245361c99b4.fullname" . }}
  labels:
    {{- include "go-echoa437344f-3e36-453c-8a66-2245361c99b4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa437344f-3e36-453c-8a66-2245361c99b4.selectorLabels" . | nindent 6 }}
