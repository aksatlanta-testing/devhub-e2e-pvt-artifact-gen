apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod2557bbc-2cad-40e9-bbbf-c836c958a21a.fullname" . }}
  labels:
    {{- include "go-echod2557bbc-2cad-40e9-bbbf-c836c958a21a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod2557bbc-2cad-40e9-bbbf-c836c958a21a.selectorLabels" . | nindent 6 }}
