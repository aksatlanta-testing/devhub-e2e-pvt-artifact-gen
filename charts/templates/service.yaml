apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo851c06bb-43d7-43a2-a9d9-a13e7481601e.fullname" . }}
  labels:
    {{- include "go-echo851c06bb-43d7-43a2-a9d9-a13e7481601e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo851c06bb-43d7-43a2-a9d9-a13e7481601e.selectorLabels" . | nindent 6 }}
