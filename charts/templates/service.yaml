apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe7b8781f-2f78-41bf-8f21-94852a019cc1.fullname" . }}
  labels:
    {{- include "go-echoe7b8781f-2f78-41bf-8f21-94852a019cc1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe7b8781f-2f78-41bf-8f21-94852a019cc1.selectorLabels" . | nindent 6 }}
