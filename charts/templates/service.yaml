apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo35249810-93a1-4a3a-91a2-defd97aa265b.fullname" . }}
  labels:
    {{- include "go-echo35249810-93a1-4a3a-91a2-defd97aa265b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo35249810-93a1-4a3a-91a2-defd97aa265b.selectorLabels" . | nindent 6 }}
