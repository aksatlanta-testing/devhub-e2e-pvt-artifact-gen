apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob8374de5-cad6-4bf7-8c9d-bf9587f08f50.fullname" . }}
  labels:
    {{- include "go-echob8374de5-cad6-4bf7-8c9d-bf9587f08f50.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob8374de5-cad6-4bf7-8c9d-bf9587f08f50.selectorLabels" . | nindent 6 }}
