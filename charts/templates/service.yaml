apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0c241de8-c2a5-49bf-b4c8-0e22c6ea2a08.fullname" . }}
  labels:
    {{- include "go-echo0c241de8-c2a5-49bf-b4c8-0e22c6ea2a08.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0c241de8-c2a5-49bf-b4c8-0e22c6ea2a08.selectorLabels" . | nindent 6 }}
