apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof8230e8e-ad49-4100-9e4b-32dcaec09bdb.fullname" . }}
  labels:
    {{- include "go-echof8230e8e-ad49-4100-9e4b-32dcaec09bdb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof8230e8e-ad49-4100-9e4b-32dcaec09bdb.selectorLabels" . | nindent 6 }}
