apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda12e545-6895-4e18-bd51-1070547f132f.fullname" . }}
  labels:
    {{- include "go-echoda12e545-6895-4e18-bd51-1070547f132f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda12e545-6895-4e18-bd51-1070547f132f.selectorLabels" . | nindent 6 }}
