apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoad297cfd-c848-4f14-aa54-3aad7e0091a0.fullname" . }}
  labels:
    {{- include "go-echoad297cfd-c848-4f14-aa54-3aad7e0091a0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoad297cfd-c848-4f14-aa54-3aad7e0091a0.selectorLabels" . | nindent 6 }}
