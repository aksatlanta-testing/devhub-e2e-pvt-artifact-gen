apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc5cd6177-513b-4591-a927-11383bd7ca2c.fullname" . }}
  labels:
    {{- include "go-echoc5cd6177-513b-4591-a927-11383bd7ca2c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc5cd6177-513b-4591-a927-11383bd7ca2c.selectorLabels" . | nindent 6 }}
