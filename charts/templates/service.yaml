apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7da15481-a41f-495f-a5f2-de050a57412e.fullname" . }}
  labels:
    {{- include "go-echo7da15481-a41f-495f-a5f2-de050a57412e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7da15481-a41f-495f-a5f2-de050a57412e.selectorLabels" . | nindent 6 }}
