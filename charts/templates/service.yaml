apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo16abaee2-a4a9-4e3e-bbb6-9b1b148a33e5.fullname" . }}
  labels:
    {{- include "go-echo16abaee2-a4a9-4e3e-bbb6-9b1b148a33e5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo16abaee2-a4a9-4e3e-bbb6-9b1b148a33e5.selectorLabels" . | nindent 6 }}
