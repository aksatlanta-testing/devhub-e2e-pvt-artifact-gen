apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3b7d5b9f-a22b-4911-95e6-b08eaa0f4c56.fullname" . }}
  labels:
    {{- include "go-echo3b7d5b9f-a22b-4911-95e6-b08eaa0f4c56.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3b7d5b9f-a22b-4911-95e6-b08eaa0f4c56.selectorLabels" . | nindent 6 }}
