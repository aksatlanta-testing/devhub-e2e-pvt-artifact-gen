apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo54b1a566-e361-40c1-b1b2-be7dd094fc7d.fullname" . }}
  labels:
    {{- include "go-echo54b1a566-e361-40c1-b1b2-be7dd094fc7d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo54b1a566-e361-40c1-b1b2-be7dd094fc7d.selectorLabels" . | nindent 6 }}
