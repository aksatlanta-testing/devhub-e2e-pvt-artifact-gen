apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo82eb00df-961f-4c14-b5ed-228aadad4223.fullname" . }}
  labels:
    {{- include "go-echo82eb00df-961f-4c14-b5ed-228aadad4223.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo82eb00df-961f-4c14-b5ed-228aadad4223.selectorLabels" . | nindent 6 }}
