apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc5eca595-abc9-4ae8-89f5-b0fdc3a8e6ff.fullname" . }}
  labels:
    {{- include "go-echoc5eca595-abc9-4ae8-89f5-b0fdc3a8e6ff.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc5eca595-abc9-4ae8-89f5-b0fdc3a8e6ff.selectorLabels" . | nindent 6 }}
