apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6c9e15bf-a035-4673-8795-a949627dad04.fullname" . }}
  labels:
    {{- include "go-echo6c9e15bf-a035-4673-8795-a949627dad04.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6c9e15bf-a035-4673-8795-a949627dad04.selectorLabels" . | nindent 6 }}
