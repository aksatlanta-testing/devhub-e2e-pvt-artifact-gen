apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo486b2d98-b70a-4783-b0eb-f8c483185edb.fullname" . }}
  labels:
    {{- include "go-echo486b2d98-b70a-4783-b0eb-f8c483185edb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo486b2d98-b70a-4783-b0eb-f8c483185edb.selectorLabels" . | nindent 6 }}
