apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod08b7b69-5f5e-4bb5-bcdf-04967cb55a46.fullname" . }}
  labels:
    {{- include "go-echod08b7b69-5f5e-4bb5-bcdf-04967cb55a46.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod08b7b69-5f5e-4bb5-bcdf-04967cb55a46.selectorLabels" . | nindent 6 }}
