apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoac74d0e5-00c8-45a9-a3c5-7d7af2e6dedf.fullname" . }}
  labels:
    {{- include "go-echoac74d0e5-00c8-45a9-a3c5-7d7af2e6dedf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoac74d0e5-00c8-45a9-a3c5-7d7af2e6dedf.selectorLabels" . | nindent 6 }}
