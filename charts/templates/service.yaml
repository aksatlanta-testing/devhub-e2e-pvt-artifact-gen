apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6e63558f-7e2d-4cb0-b476-bf246ea834c5.fullname" . }}
  labels:
    {{- include "go-echo6e63558f-7e2d-4cb0-b476-bf246ea834c5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6e63558f-7e2d-4cb0-b476-bf246ea834c5.selectorLabels" . | nindent 6 }}
