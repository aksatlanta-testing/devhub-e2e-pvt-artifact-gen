apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaca5f611-bb8e-449c-986b-695002c88bad.fullname" . }}
  labels:
    {{- include "go-echoaca5f611-bb8e-449c-986b-695002c88bad.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaca5f611-bb8e-449c-986b-695002c88bad.selectorLabels" . | nindent 6 }}
