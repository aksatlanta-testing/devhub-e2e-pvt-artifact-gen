apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa538394a-579f-45fd-a272-11b77e618a7b.fullname" . }}
  labels:
    {{- include "go-echoa538394a-579f-45fd-a272-11b77e618a7b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa538394a-579f-45fd-a272-11b77e618a7b.selectorLabels" . | nindent 6 }}
