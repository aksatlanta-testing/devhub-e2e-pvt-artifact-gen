apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo894508ce-6fce-4c77-aa39-1e83c0d505fb.fullname" . }}
  labels:
    {{- include "go-echo894508ce-6fce-4c77-aa39-1e83c0d505fb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo894508ce-6fce-4c77-aa39-1e83c0d505fb.selectorLabels" . | nindent 6 }}
