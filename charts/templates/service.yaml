apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod7b008a8-87c5-44cb-935c-14d5684af87a.fullname" . }}
  labels:
    {{- include "go-echod7b008a8-87c5-44cb-935c-14d5684af87a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod7b008a8-87c5-44cb-935c-14d5684af87a.selectorLabels" . | nindent 6 }}
