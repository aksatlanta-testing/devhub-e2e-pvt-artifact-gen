apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0f66fa0a-cb9a-4e00-83a7-f5572110ee30.fullname" . }}
  labels:
    {{- include "go-echo0f66fa0a-cb9a-4e00-83a7-f5572110ee30.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0f66fa0a-cb9a-4e00-83a7-f5572110ee30.selectorLabels" . | nindent 6 }}
