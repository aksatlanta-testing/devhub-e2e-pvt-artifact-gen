apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7c93b001-01be-43d1-83f4-5b0673ef425b.fullname" . }}
  labels:
    {{- include "go-echo7c93b001-01be-43d1-83f4-5b0673ef425b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7c93b001-01be-43d1-83f4-5b0673ef425b.selectorLabels" . | nindent 6 }}
