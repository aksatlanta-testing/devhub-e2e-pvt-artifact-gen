apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6c036cb7-d150-4016-aba3-1657908a6e95.fullname" . }}
  labels:
    {{- include "go-echo6c036cb7-d150-4016-aba3-1657908a6e95.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6c036cb7-d150-4016-aba3-1657908a6e95.selectorLabels" . | nindent 6 }}
