apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1c7506e6-981d-4325-93c6-1a59715769bd.fullname" . }}
  labels:
    {{- include "go-echo1c7506e6-981d-4325-93c6-1a59715769bd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1c7506e6-981d-4325-93c6-1a59715769bd.selectorLabels" . | nindent 6 }}
