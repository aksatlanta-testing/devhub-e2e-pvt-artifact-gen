apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoac2aad73-2fc4-4795-a396-409577f1c3eb.fullname" . }}
  labels:
    {{- include "go-echoac2aad73-2fc4-4795-a396-409577f1c3eb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoac2aad73-2fc4-4795-a396-409577f1c3eb.selectorLabels" . | nindent 6 }}
