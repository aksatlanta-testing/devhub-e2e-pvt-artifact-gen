apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaeb59258-0012-488a-a01b-5bf749f83350.fullname" . }}
  labels:
    {{- include "go-echoaeb59258-0012-488a-a01b-5bf749f83350.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaeb59258-0012-488a-a01b-5bf749f83350.selectorLabels" . | nindent 6 }}
