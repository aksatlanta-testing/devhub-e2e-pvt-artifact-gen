apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo57f27b9d-39b4-4e80-9c1a-5e5763872058.fullname" . }}
  labels:
    {{- include "go-echo57f27b9d-39b4-4e80-9c1a-5e5763872058.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo57f27b9d-39b4-4e80-9c1a-5e5763872058.selectorLabels" . | nindent 6 }}
