apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7b18a23a-c030-4e02-82f9-e776fa05f50e.fullname" . }}
  labels:
    {{- include "go-echo7b18a23a-c030-4e02-82f9-e776fa05f50e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7b18a23a-c030-4e02-82f9-e776fa05f50e.selectorLabels" . | nindent 6 }}
