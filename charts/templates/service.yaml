apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe793d571-1dcf-47b4-9046-dc6c66b0ab33.fullname" . }}
  labels:
    {{- include "go-echoe793d571-1dcf-47b4-9046-dc6c66b0ab33.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe793d571-1dcf-47b4-9046-dc6c66b0ab33.selectorLabels" . | nindent 6 }}
