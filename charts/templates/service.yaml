apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod963a20e-b7a1-49aa-94ec-4ece46faf087.fullname" . }}
  labels:
    {{- include "go-echod963a20e-b7a1-49aa-94ec-4ece46faf087.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod963a20e-b7a1-49aa-94ec-4ece46faf087.selectorLabels" . | nindent 6 }}
