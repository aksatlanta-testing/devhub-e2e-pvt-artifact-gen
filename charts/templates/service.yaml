apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo52f0e96c-5a3c-4e34-bb8e-ec2ca3ee5138.fullname" . }}
  labels:
    {{- include "go-echo52f0e96c-5a3c-4e34-bb8e-ec2ca3ee5138.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo52f0e96c-5a3c-4e34-bb8e-ec2ca3ee5138.selectorLabels" . | nindent 6 }}
