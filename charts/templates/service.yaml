apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo42f70917-10b5-4c5a-b7f8-84654fdef5ac.fullname" . }}
  labels:
    {{- include "go-echo42f70917-10b5-4c5a-b7f8-84654fdef5ac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo42f70917-10b5-4c5a-b7f8-84654fdef5ac.selectorLabels" . | nindent 6 }}
