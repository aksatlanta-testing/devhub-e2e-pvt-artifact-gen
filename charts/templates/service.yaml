apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo38fba468-bc57-4360-9efb-ab60e018db03.fullname" . }}
  labels:
    {{- include "go-echo38fba468-bc57-4360-9efb-ab60e018db03.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo38fba468-bc57-4360-9efb-ab60e018db03.selectorLabels" . | nindent 6 }}
