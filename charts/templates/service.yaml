apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe1432f1d-0c5c-4d21-9a52-329e4ad981b9.fullname" . }}
  labels:
    {{- include "go-echoe1432f1d-0c5c-4d21-9a52-329e4ad981b9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe1432f1d-0c5c-4d21-9a52-329e4ad981b9.selectorLabels" . | nindent 6 }}
