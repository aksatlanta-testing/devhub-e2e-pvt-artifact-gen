apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod951f6cf-b9c4-4320-84a2-984b1db4312d.fullname" . }}
  labels:
    {{- include "go-echod951f6cf-b9c4-4320-84a2-984b1db4312d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod951f6cf-b9c4-4320-84a2-984b1db4312d.selectorLabels" . | nindent 6 }}
