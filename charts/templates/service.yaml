apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo09d7bc3d-f244-49db-8e3c-84e2bd5fbf1a.fullname" . }}
  labels:
    {{- include "go-echo09d7bc3d-f244-49db-8e3c-84e2bd5fbf1a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo09d7bc3d-f244-49db-8e3c-84e2bd5fbf1a.selectorLabels" . | nindent 6 }}
