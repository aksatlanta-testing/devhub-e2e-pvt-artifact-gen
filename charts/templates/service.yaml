apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofb19bee4-a8db-412d-962c-4bdcc94848ad.fullname" . }}
  labels:
    {{- include "go-echofb19bee4-a8db-412d-962c-4bdcc94848ad.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofb19bee4-a8db-412d-962c-4bdcc94848ad.selectorLabels" . | nindent 6 }}
