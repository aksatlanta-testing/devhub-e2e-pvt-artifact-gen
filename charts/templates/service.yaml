apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo49305655-3861-42fc-b090-1a151d941925.fullname" . }}
  labels:
    {{- include "go-echo49305655-3861-42fc-b090-1a151d941925.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo49305655-3861-42fc-b090-1a151d941925.selectorLabels" . | nindent 6 }}
