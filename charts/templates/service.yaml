apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo45dc3f94-04e5-4242-9d75-8a90313cc920.fullname" . }}
  labels:
    {{- include "go-echo45dc3f94-04e5-4242-9d75-8a90313cc920.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo45dc3f94-04e5-4242-9d75-8a90313cc920.selectorLabels" . | nindent 6 }}
