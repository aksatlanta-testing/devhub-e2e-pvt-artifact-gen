apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8dcbae3b-0d5a-49c6-97e2-bb995a907cb6.fullname" . }}
  labels:
    {{- include "go-echo8dcbae3b-0d5a-49c6-97e2-bb995a907cb6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8dcbae3b-0d5a-49c6-97e2-bb995a907cb6.selectorLabels" . | nindent 6 }}
