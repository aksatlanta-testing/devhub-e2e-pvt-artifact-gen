apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo442f43d8-32fc-4e25-b333-6a4f6eca6713.fullname" . }}
  labels:
    {{- include "go-echo442f43d8-32fc-4e25-b333-6a4f6eca6713.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo442f43d8-32fc-4e25-b333-6a4f6eca6713.selectorLabels" . | nindent 6 }}
