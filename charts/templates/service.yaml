apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9f1c8866-e9dd-4984-a04f-137b2b9ee297.fullname" . }}
  labels:
    {{- include "go-echo9f1c8866-e9dd-4984-a04f-137b2b9ee297.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9f1c8866-e9dd-4984-a04f-137b2b9ee297.selectorLabels" . | nindent 6 }}
