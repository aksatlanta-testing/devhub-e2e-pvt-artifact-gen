apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc19de613-d959-4056-baa8-9315bd29ee93.fullname" . }}
  labels:
    {{- include "go-echoc19de613-d959-4056-baa8-9315bd29ee93.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc19de613-d959-4056-baa8-9315bd29ee93.selectorLabels" . | nindent 6 }}
