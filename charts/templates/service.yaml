apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo824027a3-2b2a-4e5e-a1b2-a130107305da.fullname" . }}
  labels:
    {{- include "go-echo824027a3-2b2a-4e5e-a1b2-a130107305da.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo824027a3-2b2a-4e5e-a1b2-a130107305da.selectorLabels" . | nindent 6 }}
