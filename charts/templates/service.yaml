apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo320bcc60-7a75-4977-8e41-3672506e4009.fullname" . }}
  labels:
    {{- include "go-echo320bcc60-7a75-4977-8e41-3672506e4009.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo320bcc60-7a75-4977-8e41-3672506e4009.selectorLabels" . | nindent 6 }}
