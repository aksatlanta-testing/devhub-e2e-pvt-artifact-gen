apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0de18df4-1342-40ae-b713-44377cb2aa6a.fullname" . }}
  labels:
    {{- include "go-echo0de18df4-1342-40ae-b713-44377cb2aa6a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0de18df4-1342-40ae-b713-44377cb2aa6a.selectorLabels" . | nindent 6 }}
