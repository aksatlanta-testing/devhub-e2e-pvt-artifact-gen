apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc0ae6f0-4351-4bac-9691-5e19b1059378.fullname" . }}
  labels:
    {{- include "go-echocc0ae6f0-4351-4bac-9691-5e19b1059378.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc0ae6f0-4351-4bac-9691-5e19b1059378.selectorLabels" . | nindent 6 }}
