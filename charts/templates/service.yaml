apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo31e3f567-3c8c-429b-b62e-044a89388343.fullname" . }}
  labels:
    {{- include "go-echo31e3f567-3c8c-429b-b62e-044a89388343.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo31e3f567-3c8c-429b-b62e-044a89388343.selectorLabels" . | nindent 6 }}
