apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9827ecd5-0108-4c70-8418-3e544d096ffb.fullname" . }}
  labels:
    {{- include "go-echo9827ecd5-0108-4c70-8418-3e544d096ffb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9827ecd5-0108-4c70-8418-3e544d096ffb.selectorLabels" . | nindent 6 }}
