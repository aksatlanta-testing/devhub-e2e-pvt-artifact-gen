apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo58cfa7e2-50c1-4856-a46b-2950393514a5.fullname" . }}
  labels:
    {{- include "go-echo58cfa7e2-50c1-4856-a46b-2950393514a5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo58cfa7e2-50c1-4856-a46b-2950393514a5.selectorLabels" . | nindent 6 }}
