apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob04b1dd8-3858-4c6c-8510-790ec8aa343f.fullname" . }}
  labels:
    {{- include "go-echob04b1dd8-3858-4c6c-8510-790ec8aa343f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob04b1dd8-3858-4c6c-8510-790ec8aa343f.selectorLabels" . | nindent 6 }}
