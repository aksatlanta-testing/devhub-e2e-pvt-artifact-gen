apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5df770e6-5017-4623-8489-11d69ac45a59.fullname" . }}
  labels:
    {{- include "go-echo5df770e6-5017-4623-8489-11d69ac45a59.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5df770e6-5017-4623-8489-11d69ac45a59.selectorLabels" . | nindent 6 }}
