apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo532e8264-2969-488f-8d95-5a056aa2beb1.fullname" . }}
  labels:
    {{- include "go-echo532e8264-2969-488f-8d95-5a056aa2beb1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo532e8264-2969-488f-8d95-5a056aa2beb1.selectorLabels" . | nindent 6 }}
