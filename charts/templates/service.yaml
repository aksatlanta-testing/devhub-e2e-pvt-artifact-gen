apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1ff80428-8239-4002-9e81-297620f5d3fc.fullname" . }}
  labels:
    {{- include "go-echo1ff80428-8239-4002-9e81-297620f5d3fc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1ff80428-8239-4002-9e81-297620f5d3fc.selectorLabels" . | nindent 6 }}
