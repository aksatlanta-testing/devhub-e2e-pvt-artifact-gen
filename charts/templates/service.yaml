apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5969810a-b30e-41b7-ba36-bd810c8ba4f2.fullname" . }}
  labels:
    {{- include "go-echo5969810a-b30e-41b7-ba36-bd810c8ba4f2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5969810a-b30e-41b7-ba36-bd810c8ba4f2.selectorLabels" . | nindent 6 }}
