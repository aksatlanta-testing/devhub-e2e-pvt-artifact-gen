apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo11ad9b1b-1377-4ce4-9ad7-ceb7d82e859c.fullname" . }}
  labels:
    {{- include "go-echo11ad9b1b-1377-4ce4-9ad7-ceb7d82e859c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo11ad9b1b-1377-4ce4-9ad7-ceb7d82e859c.selectorLabels" . | nindent 6 }}
