apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo36b4969a-4f0a-4dbe-ab7f-a7c0ccb680ca.fullname" . }}
  labels:
    {{- include "go-echo36b4969a-4f0a-4dbe-ab7f-a7c0ccb680ca.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo36b4969a-4f0a-4dbe-ab7f-a7c0ccb680ca.selectorLabels" . | nindent 6 }}
