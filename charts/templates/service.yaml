apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoae22da9e-276a-4e1e-95c3-2c6f38a9e0f2.fullname" . }}
  labels:
    {{- include "go-echoae22da9e-276a-4e1e-95c3-2c6f38a9e0f2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoae22da9e-276a-4e1e-95c3-2c6f38a9e0f2.selectorLabels" . | nindent 6 }}
