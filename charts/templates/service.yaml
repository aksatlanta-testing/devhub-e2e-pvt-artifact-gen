apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo85327bce-bf5d-47ee-9c60-c9c69d436975.fullname" . }}
  labels:
    {{- include "go-echo85327bce-bf5d-47ee-9c60-c9c69d436975.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo85327bce-bf5d-47ee-9c60-c9c69d436975.selectorLabels" . | nindent 6 }}
