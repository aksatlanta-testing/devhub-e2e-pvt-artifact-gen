apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoda790230-c74f-4881-be6a-8f554dc05f18.fullname" . }}
  labels:
    {{- include "go-echoda790230-c74f-4881-be6a-8f554dc05f18.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoda790230-c74f-4881-be6a-8f554dc05f18.selectorLabels" . | nindent 6 }}
