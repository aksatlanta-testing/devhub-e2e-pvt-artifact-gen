apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo68319993-14ca-47ac-88a0-e1d249af1cf3.fullname" . }}
  labels:
    {{- include "go-echo68319993-14ca-47ac-88a0-e1d249af1cf3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo68319993-14ca-47ac-88a0-e1d249af1cf3.selectorLabels" . | nindent 6 }}
