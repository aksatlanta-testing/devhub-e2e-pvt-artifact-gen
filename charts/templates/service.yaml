apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob12a7408-e944-43ff-b80d-5697b98465ff.fullname" . }}
  labels:
    {{- include "go-echob12a7408-e944-43ff-b80d-5697b98465ff.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob12a7408-e944-43ff-b80d-5697b98465ff.selectorLabels" . | nindent 6 }}
