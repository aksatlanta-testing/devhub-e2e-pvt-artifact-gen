apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofd0a78a6-069c-46d8-9d23-013bfdbbee28.fullname" . }}
  labels:
    {{- include "go-echofd0a78a6-069c-46d8-9d23-013bfdbbee28.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofd0a78a6-069c-46d8-9d23-013bfdbbee28.selectorLabels" . | nindent 6 }}
