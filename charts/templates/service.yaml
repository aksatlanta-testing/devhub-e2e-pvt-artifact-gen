apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodac773a4-3cd3-4359-b7ca-af5c0cff5d0b.fullname" . }}
  labels:
    {{- include "go-echodac773a4-3cd3-4359-b7ca-af5c0cff5d0b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodac773a4-3cd3-4359-b7ca-af5c0cff5d0b.selectorLabels" . | nindent 6 }}
