apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo33525dd9-8300-404e-8dfa-e85422466040.fullname" . }}
  labels:
    {{- include "go-echo33525dd9-8300-404e-8dfa-e85422466040.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo33525dd9-8300-404e-8dfa-e85422466040.selectorLabels" . | nindent 6 }}
