apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo01f2656a-2a73-4844-845b-058f28ffe9d6.fullname" . }}
  labels:
    {{- include "go-echo01f2656a-2a73-4844-845b-058f28ffe9d6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo01f2656a-2a73-4844-845b-058f28ffe9d6.selectorLabels" . | nindent 6 }}
