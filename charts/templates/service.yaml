apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2a4ead79-61b3-49d2-b821-d502e9d82414.fullname" . }}
  labels:
    {{- include "go-echo2a4ead79-61b3-49d2-b821-d502e9d82414.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2a4ead79-61b3-49d2-b821-d502e9d82414.selectorLabels" . | nindent 6 }}
