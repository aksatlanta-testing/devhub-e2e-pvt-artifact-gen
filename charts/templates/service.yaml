apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob935ea42-0519-447e-aefd-baa8678a9198.fullname" . }}
  labels:
    {{- include "go-echob935ea42-0519-447e-aefd-baa8678a9198.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob935ea42-0519-447e-aefd-baa8678a9198.selectorLabels" . | nindent 6 }}
