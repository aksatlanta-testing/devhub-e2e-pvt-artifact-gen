apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo30499d92-4756-4fea-be38-b45cc3ec2219.fullname" . }}
  labels:
    {{- include "go-echo30499d92-4756-4fea-be38-b45cc3ec2219.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo30499d92-4756-4fea-be38-b45cc3ec2219.selectorLabels" . | nindent 6 }}
