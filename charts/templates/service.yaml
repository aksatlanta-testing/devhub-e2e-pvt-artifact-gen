apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo881ee50a-9d1f-4ac1-8574-5c37f48729e2.fullname" . }}
  labels:
    {{- include "go-echo881ee50a-9d1f-4ac1-8574-5c37f48729e2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo881ee50a-9d1f-4ac1-8574-5c37f48729e2.selectorLabels" . | nindent 6 }}
