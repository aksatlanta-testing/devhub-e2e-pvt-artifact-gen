apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo40c1f929-ca3a-4696-ae30-861cc6be6abb.fullname" . }}
  labels:
    {{- include "go-echo40c1f929-ca3a-4696-ae30-861cc6be6abb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo40c1f929-ca3a-4696-ae30-861cc6be6abb.selectorLabels" . | nindent 6 }}
