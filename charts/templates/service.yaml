apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodd33d143-f1ec-4938-b85e-c5fe07833894.fullname" . }}
  labels:
    {{- include "go-echodd33d143-f1ec-4938-b85e-c5fe07833894.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodd33d143-f1ec-4938-b85e-c5fe07833894.selectorLabels" . | nindent 6 }}
