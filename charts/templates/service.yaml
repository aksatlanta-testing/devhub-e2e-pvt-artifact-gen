apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo50446f4e-617b-4e46-b1f0-db446de11840.fullname" . }}
  labels:
    {{- include "go-echo50446f4e-617b-4e46-b1f0-db446de11840.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo50446f4e-617b-4e46-b1f0-db446de11840.selectorLabels" . | nindent 6 }}
