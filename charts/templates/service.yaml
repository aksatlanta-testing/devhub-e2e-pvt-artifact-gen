apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9f8a6f29-2b6b-472a-afc7-d34bf3ca45e7.fullname" . }}
  labels:
    {{- include "go-echo9f8a6f29-2b6b-472a-afc7-d34bf3ca45e7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9f8a6f29-2b6b-472a-afc7-d34bf3ca45e7.selectorLabels" . | nindent 6 }}
