apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1e1de6e3-99e7-4eae-a9e2-9b2eda21274f.fullname" . }}
  labels:
    {{- include "go-echo1e1de6e3-99e7-4eae-a9e2-9b2eda21274f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1e1de6e3-99e7-4eae-a9e2-9b2eda21274f.selectorLabels" . | nindent 6 }}
