apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc93d1ffc-14eb-498b-bd54-d4043ac94283.fullname" . }}
  labels:
    {{- include "go-echoc93d1ffc-14eb-498b-bd54-d4043ac94283.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc93d1ffc-14eb-498b-bd54-d4043ac94283.selectorLabels" . | nindent 6 }}
