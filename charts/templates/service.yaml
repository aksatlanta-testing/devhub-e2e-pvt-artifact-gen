apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa8fd5098-6a64-48c1-977f-826bd9632bab.fullname" . }}
  labels:
    {{- include "go-echoa8fd5098-6a64-48c1-977f-826bd9632bab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa8fd5098-6a64-48c1-977f-826bd9632bab.selectorLabels" . | nindent 6 }}
