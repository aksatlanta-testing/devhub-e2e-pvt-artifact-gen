apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo408e7d79-d023-4edd-a545-02e69b7a5e45.fullname" . }}
  labels:
    {{- include "go-echo408e7d79-d023-4edd-a545-02e69b7a5e45.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo408e7d79-d023-4edd-a545-02e69b7a5e45.selectorLabels" . | nindent 6 }}
