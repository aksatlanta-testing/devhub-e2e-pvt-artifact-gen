apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo949891ff-3c11-42a5-b1a1-4c6e7d4e1f4a.fullname" . }}
  labels:
    {{- include "go-echo949891ff-3c11-42a5-b1a1-4c6e7d4e1f4a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo949891ff-3c11-42a5-b1a1-4c6e7d4e1f4a.selectorLabels" . | nindent 6 }}
