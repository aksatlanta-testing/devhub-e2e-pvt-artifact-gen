apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7e7f54f7-b449-4507-a045-b861dc72cb6c.fullname" . }}
  labels:
    {{- include "go-echo7e7f54f7-b449-4507-a045-b861dc72cb6c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7e7f54f7-b449-4507-a045-b861dc72cb6c.selectorLabels" . | nindent 6 }}
