apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0812f581-d503-4ce5-a96b-4b8f0de90688.fullname" . }}
  labels:
    {{- include "go-echo0812f581-d503-4ce5-a96b-4b8f0de90688.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0812f581-d503-4ce5-a96b-4b8f0de90688.selectorLabels" . | nindent 6 }}
