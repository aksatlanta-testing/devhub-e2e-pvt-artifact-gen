apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobcd19c6c-c8e6-4ae9-ba4b-777f08ecb4d3.fullname" . }}
  labels:
    {{- include "go-echobcd19c6c-c8e6-4ae9-ba4b-777f08ecb4d3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobcd19c6c-c8e6-4ae9-ba4b-777f08ecb4d3.selectorLabels" . | nindent 6 }}
