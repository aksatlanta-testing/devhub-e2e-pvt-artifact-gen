apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9df5a0c7-2933-445c-8765-5b8a862a24c9.fullname" . }}
  labels:
    {{- include "go-echo9df5a0c7-2933-445c-8765-5b8a862a24c9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9df5a0c7-2933-445c-8765-5b8a862a24c9.selectorLabels" . | nindent 6 }}
