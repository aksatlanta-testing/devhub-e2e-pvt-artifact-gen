apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof4d25aaf-b616-4ee8-a72c-039af07f189a.fullname" . }}
  labels:
    {{- include "go-echof4d25aaf-b616-4ee8-a72c-039af07f189a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof4d25aaf-b616-4ee8-a72c-039af07f189a.selectorLabels" . | nindent 6 }}
