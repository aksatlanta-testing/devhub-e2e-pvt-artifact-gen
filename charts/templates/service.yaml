apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo15c954ef-e2d9-4907-9005-ba4bffeff5f6.fullname" . }}
  labels:
    {{- include "go-echo15c954ef-e2d9-4907-9005-ba4bffeff5f6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo15c954ef-e2d9-4907-9005-ba4bffeff5f6.selectorLabels" . | nindent 6 }}
