apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo14e2316c-c847-4c2d-a6d7-2b7d164f5374.fullname" . }}
  labels:
    {{- include "go-echo14e2316c-c847-4c2d-a6d7-2b7d164f5374.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo14e2316c-c847-4c2d-a6d7-2b7d164f5374.selectorLabels" . | nindent 6 }}
