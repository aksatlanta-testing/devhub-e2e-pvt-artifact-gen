apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo05cf3176-9f0d-4e73-9048-19955a3db576.fullname" . }}
  labels:
    {{- include "go-echo05cf3176-9f0d-4e73-9048-19955a3db576.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo05cf3176-9f0d-4e73-9048-19955a3db576.selectorLabels" . | nindent 6 }}
