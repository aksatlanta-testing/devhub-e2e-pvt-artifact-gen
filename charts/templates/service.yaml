apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod30c87ba-7545-424a-8ac2-4ed345aef16c.fullname" . }}
  labels:
    {{- include "go-echod30c87ba-7545-424a-8ac2-4ed345aef16c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod30c87ba-7545-424a-8ac2-4ed345aef16c.selectorLabels" . | nindent 6 }}
