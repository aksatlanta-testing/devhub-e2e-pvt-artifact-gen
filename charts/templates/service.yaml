apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa402437b-e7a7-4e63-bc6d-50492fcaddba.fullname" . }}
  labels:
    {{- include "go-echoa402437b-e7a7-4e63-bc6d-50492fcaddba.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa402437b-e7a7-4e63-bc6d-50492fcaddba.selectorLabels" . | nindent 6 }}
