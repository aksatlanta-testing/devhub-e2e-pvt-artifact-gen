apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod84579d2-5d4b-4d7e-8652-787f6f625f8b.fullname" . }}
  labels:
    {{- include "go-echod84579d2-5d4b-4d7e-8652-787f6f625f8b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod84579d2-5d4b-4d7e-8652-787f6f625f8b.selectorLabels" . | nindent 6 }}
