apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe39d8383-6628-439d-a64c-f83385be33b2.fullname" . }}
  labels:
    {{- include "go-echoe39d8383-6628-439d-a64c-f83385be33b2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe39d8383-6628-439d-a64c-f83385be33b2.selectorLabels" . | nindent 6 }}
