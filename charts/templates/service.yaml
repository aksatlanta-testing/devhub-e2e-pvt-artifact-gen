apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo104e0311-cb9b-4d09-91d7-8418d9fb38c3.fullname" . }}
  labels:
    {{- include "go-echo104e0311-cb9b-4d09-91d7-8418d9fb38c3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo104e0311-cb9b-4d09-91d7-8418d9fb38c3.selectorLabels" . | nindent 6 }}
