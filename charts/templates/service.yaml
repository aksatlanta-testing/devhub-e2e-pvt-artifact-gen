apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo751996ff-26eb-4fe5-b146-02dd15948987.fullname" . }}
  labels:
    {{- include "go-echo751996ff-26eb-4fe5-b146-02dd15948987.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo751996ff-26eb-4fe5-b146-02dd15948987.selectorLabels" . | nindent 6 }}
