apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo95a82479-95fc-4281-81e4-0387aa62445c.fullname" . }}
  labels:
    {{- include "go-echo95a82479-95fc-4281-81e4-0387aa62445c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo95a82479-95fc-4281-81e4-0387aa62445c.selectorLabels" . | nindent 6 }}
