apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof5fae306-3776-4593-ba6a-c3a3c37060a4.fullname" . }}
  labels:
    {{- include "go-echof5fae306-3776-4593-ba6a-c3a3c37060a4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof5fae306-3776-4593-ba6a-c3a3c37060a4.selectorLabels" . | nindent 6 }}
