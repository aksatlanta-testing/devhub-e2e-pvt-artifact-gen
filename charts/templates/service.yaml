apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2462d622-5bd0-4a3f-ac88-36782892ad68.fullname" . }}
  labels:
    {{- include "go-echo2462d622-5bd0-4a3f-ac88-36782892ad68.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2462d622-5bd0-4a3f-ac88-36782892ad68.selectorLabels" . | nindent 6 }}
