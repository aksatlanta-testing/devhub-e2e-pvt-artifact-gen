apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoce653c7f-5ba5-4046-9329-7d4e1ea6743f.fullname" . }}
  labels:
    {{- include "go-echoce653c7f-5ba5-4046-9329-7d4e1ea6743f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoce653c7f-5ba5-4046-9329-7d4e1ea6743f.selectorLabels" . | nindent 6 }}
