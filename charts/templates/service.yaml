apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9ccb3e0e-4f51-46e2-9eb1-cb9c8f608892.fullname" . }}
  labels:
    {{- include "go-echo9ccb3e0e-4f51-46e2-9eb1-cb9c8f608892.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9ccb3e0e-4f51-46e2-9eb1-cb9c8f608892.selectorLabels" . | nindent 6 }}
