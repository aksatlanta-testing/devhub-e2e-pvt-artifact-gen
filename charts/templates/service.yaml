apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo64ae390e-c31e-49ac-8051-0bab92f8db20.fullname" . }}
  labels:
    {{- include "go-echo64ae390e-c31e-49ac-8051-0bab92f8db20.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo64ae390e-c31e-49ac-8051-0bab92f8db20.selectorLabels" . | nindent 6 }}
