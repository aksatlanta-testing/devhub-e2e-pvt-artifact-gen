apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod9193118-8f03-4793-8998-e1ee60637675.fullname" . }}
  labels:
    {{- include "go-echod9193118-8f03-4793-8998-e1ee60637675.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod9193118-8f03-4793-8998-e1ee60637675.selectorLabels" . | nindent 6 }}
