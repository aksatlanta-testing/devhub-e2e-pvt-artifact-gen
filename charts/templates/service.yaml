apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc019b4ef-0414-4485-a919-2aed9a58fa10.fullname" . }}
  labels:
    {{- include "go-echoc019b4ef-0414-4485-a919-2aed9a58fa10.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc019b4ef-0414-4485-a919-2aed9a58fa10.selectorLabels" . | nindent 6 }}
