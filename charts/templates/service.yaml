apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo679d7e27-b703-4a78-810a-c783cb2e21b6.fullname" . }}
  labels:
    {{- include "go-echo679d7e27-b703-4a78-810a-c783cb2e21b6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo679d7e27-b703-4a78-810a-c783cb2e21b6.selectorLabels" . | nindent 6 }}
