apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaec84f9a-c9d8-42d8-a558-f70e37970876.fullname" . }}
  labels:
    {{- include "go-echoaec84f9a-c9d8-42d8-a558-f70e37970876.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaec84f9a-c9d8-42d8-a558-f70e37970876.selectorLabels" . | nindent 6 }}
