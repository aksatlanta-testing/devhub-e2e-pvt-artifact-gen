apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc1c1ebec-e2a7-400f-ae95-d506da69b9ff.fullname" . }}
  labels:
    {{- include "go-echoc1c1ebec-e2a7-400f-ae95-d506da69b9ff.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc1c1ebec-e2a7-400f-ae95-d506da69b9ff.selectorLabels" . | nindent 6 }}
