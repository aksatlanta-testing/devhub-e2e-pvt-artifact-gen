apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc79f581-7bcd-4a69-a219-783096e45b67.fullname" . }}
  labels:
    {{- include "go-echocc79f581-7bcd-4a69-a219-783096e45b67.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc79f581-7bcd-4a69-a219-783096e45b67.selectorLabels" . | nindent 6 }}
