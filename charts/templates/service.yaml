apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodf1f9d8a-b171-4e47-ab72-9a7c5b9fdc81.fullname" . }}
  labels:
    {{- include "go-echodf1f9d8a-b171-4e47-ab72-9a7c5b9fdc81.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodf1f9d8a-b171-4e47-ab72-9a7c5b9fdc81.selectorLabels" . | nindent 6 }}
