apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo97e8217f-2103-4ebd-9872-b5358da2c5dc.fullname" . }}
  labels:
    {{- include "go-echo97e8217f-2103-4ebd-9872-b5358da2c5dc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo97e8217f-2103-4ebd-9872-b5358da2c5dc.selectorLabels" . | nindent 6 }}
