apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof0e30e7d-4dc3-4a2e-a53c-e13f86c2f8b6.fullname" . }}
  labels:
    {{- include "go-echof0e30e7d-4dc3-4a2e-a53c-e13f86c2f8b6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof0e30e7d-4dc3-4a2e-a53c-e13f86c2f8b6.selectorLabels" . | nindent 6 }}
