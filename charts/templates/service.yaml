apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa302419e-4aab-45c2-bffb-b55f0155bb39.fullname" . }}
  labels:
    {{- include "go-echoa302419e-4aab-45c2-bffb-b55f0155bb39.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa302419e-4aab-45c2-bffb-b55f0155bb39.selectorLabels" . | nindent 6 }}
