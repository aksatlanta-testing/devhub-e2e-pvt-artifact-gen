apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo41e8dc85-4723-4eeb-8470-10e558c87c49.fullname" . }}
  labels:
    {{- include "go-echo41e8dc85-4723-4eeb-8470-10e558c87c49.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo41e8dc85-4723-4eeb-8470-10e558c87c49.selectorLabels" . | nindent 6 }}
