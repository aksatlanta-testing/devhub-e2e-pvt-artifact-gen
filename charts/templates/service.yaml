apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodd080e1f-232a-4f4e-b6de-f436df3cb4a4.fullname" . }}
  labels:
    {{- include "go-echodd080e1f-232a-4f4e-b6de-f436df3cb4a4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodd080e1f-232a-4f4e-b6de-f436df3cb4a4.selectorLabels" . | nindent 6 }}
