apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo55eb9208-5fbe-400e-aeac-1d9fcb084d36.fullname" . }}
  labels:
    {{- include "go-echo55eb9208-5fbe-400e-aeac-1d9fcb084d36.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo55eb9208-5fbe-400e-aeac-1d9fcb084d36.selectorLabels" . | nindent 6 }}
