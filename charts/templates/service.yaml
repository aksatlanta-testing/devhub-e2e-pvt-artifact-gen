apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3d036039-3935-4b12-ae10-e40fa3239932.fullname" . }}
  labels:
    {{- include "go-echo3d036039-3935-4b12-ae10-e40fa3239932.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
