apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1d2b37ec-47e8-45c3-8508-6c2746d8e9d5.fullname" . }}
  labels:
    {{- include "go-echo1d2b37ec-47e8-45c3-8508-6c2746d8e9d5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo1d2b37ec-47e8-45c3-8508-6c2746d8e9d5.selectorLabels" . | nindent 6 }}
