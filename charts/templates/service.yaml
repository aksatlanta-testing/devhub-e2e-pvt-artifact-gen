apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo63f35625-996f-44c3-90c8-4e65bb36bb17.fullname" . }}
  labels:
    {{- include "go-echo63f35625-996f-44c3-90c8-4e65bb36bb17.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo63f35625-996f-44c3-90c8-4e65bb36bb17.selectorLabels" . | nindent 6 }}
