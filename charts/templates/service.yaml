apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7c1be2ca-8518-4500-a5e0-ae5d73aab4e5.fullname" . }}
  labels:
    {{- include "go-echo7c1be2ca-8518-4500-a5e0-ae5d73aab4e5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7c1be2ca-8518-4500-a5e0-ae5d73aab4e5.selectorLabels" . | nindent 6 }}
