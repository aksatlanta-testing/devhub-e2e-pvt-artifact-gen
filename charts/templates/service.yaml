apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo95baaa58-20ce-4235-b732-91b97bd1b6e4.fullname" . }}
  labels:
    {{- include "go-echo95baaa58-20ce-4235-b732-91b97bd1b6e4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo95baaa58-20ce-4235-b732-91b97bd1b6e4.selectorLabels" . | nindent 6 }}
