apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo480c2133-9a5d-439b-9a71-51bd19f22fe1.fullname" . }}
  labels:
    {{- include "go-echo480c2133-9a5d-439b-9a71-51bd19f22fe1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo480c2133-9a5d-439b-9a71-51bd19f22fe1.selectorLabels" . | nindent 6 }}
