apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof9837361-2a6a-4d4b-8cb3-64f958262b70.fullname" . }}
  labels:
    {{- include "go-echof9837361-2a6a-4d4b-8cb3-64f958262b70.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof9837361-2a6a-4d4b-8cb3-64f958262b70.selectorLabels" . | nindent 6 }}
