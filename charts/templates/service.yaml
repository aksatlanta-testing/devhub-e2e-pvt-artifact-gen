apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9442d717-a205-4f52-9588-a1b3b8e87420.fullname" . }}
  labels:
    {{- include "go-echo9442d717-a205-4f52-9588-a1b3b8e87420.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9442d717-a205-4f52-9588-a1b3b8e87420.selectorLabels" . | nindent 6 }}
