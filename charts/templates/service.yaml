apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobb1b665b-0cca-4fc3-a0f5-82ef73c7921f.fullname" . }}
  labels:
    {{- include "go-echobb1b665b-0cca-4fc3-a0f5-82ef73c7921f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobb1b665b-0cca-4fc3-a0f5-82ef73c7921f.selectorLabels" . | nindent 6 }}
