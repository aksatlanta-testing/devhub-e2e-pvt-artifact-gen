apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc9d6b239-8c7f-4c2a-b0b5-e33ca4f1a863.fullname" . }}
  labels:
    {{- include "go-echoc9d6b239-8c7f-4c2a-b0b5-e33ca4f1a863.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc9d6b239-8c7f-4c2a-b0b5-e33ca4f1a863.selectorLabels" . | nindent 6 }}
