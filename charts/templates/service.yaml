apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo31d6dca6-feb4-4db4-a93c-b2c115e11a4e.fullname" . }}
  labels:
    {{- include "go-echo31d6dca6-feb4-4db4-a93c-b2c115e11a4e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo31d6dca6-feb4-4db4-a93c-b2c115e11a4e.selectorLabels" . | nindent 6 }}
