apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo911558f4-22f0-475c-b540-aa46270f903b.fullname" . }}
  labels:
    {{- include "go-echo911558f4-22f0-475c-b540-aa46270f903b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo911558f4-22f0-475c-b540-aa46270f903b.selectorLabels" . | nindent 6 }}
