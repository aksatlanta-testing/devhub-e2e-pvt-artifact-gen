apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7758c83c-c15f-47ad-aa1e-6144dc9f11c8.fullname" . }}
  labels:
    {{- include "go-echo7758c83c-c15f-47ad-aa1e-6144dc9f11c8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7758c83c-c15f-47ad-aa1e-6144dc9f11c8.selectorLabels" . | nindent 6 }}
