apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo91436be9-8895-482f-86aa-ed3b37d05c68.fullname" . }}
  labels:
    {{- include "go-echo91436be9-8895-482f-86aa-ed3b37d05c68.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo91436be9-8895-482f-86aa-ed3b37d05c68.selectorLabels" . | nindent 6 }}
