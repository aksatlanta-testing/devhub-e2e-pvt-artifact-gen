apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoebff0ee6-dbb8-4fea-8c71-74dda2285940.fullname" . }}
  labels:
    {{- include "go-echoebff0ee6-dbb8-4fea-8c71-74dda2285940.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoebff0ee6-dbb8-4fea-8c71-74dda2285940.selectorLabels" . | nindent 6 }}
