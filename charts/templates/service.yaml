apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2d023b5e-b7f4-4b49-b9b1-11dbd8b30710.fullname" . }}
  labels:
    {{- include "go-echo2d023b5e-b7f4-4b49-b9b1-11dbd8b30710.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2d023b5e-b7f4-4b49-b9b1-11dbd8b30710.selectorLabels" . | nindent 6 }}
