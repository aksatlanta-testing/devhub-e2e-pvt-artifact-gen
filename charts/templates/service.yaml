apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo835256dc-72fd-44e6-a454-d2b1d901a999.fullname" . }}
  labels:
    {{- include "go-echo835256dc-72fd-44e6-a454-d2b1d901a999.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo835256dc-72fd-44e6-a454-d2b1d901a999.selectorLabels" . | nindent 6 }}
