apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo46c5b3f4-7da8-466c-bcb0-d83fb0315777.fullname" . }}
  labels:
    {{- include "go-echo46c5b3f4-7da8-466c-bcb0-d83fb0315777.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo46c5b3f4-7da8-466c-bcb0-d83fb0315777.selectorLabels" . | nindent 6 }}
