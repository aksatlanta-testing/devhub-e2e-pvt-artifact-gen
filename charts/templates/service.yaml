apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2bfb3ff0-03ea-49aa-9128-09c9dbc02202.fullname" . }}
  labels:
    {{- include "go-echo2bfb3ff0-03ea-49aa-9128-09c9dbc02202.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2bfb3ff0-03ea-49aa-9128-09c9dbc02202.selectorLabels" . | nindent 6 }}
