apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobad1b18e-dd06-4e5e-b86b-ce49c549f912.fullname" . }}
  labels:
    {{- include "go-echobad1b18e-dd06-4e5e-b86b-ce49c549f912.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobad1b18e-dd06-4e5e-b86b-ce49c549f912.selectorLabels" . | nindent 6 }}
