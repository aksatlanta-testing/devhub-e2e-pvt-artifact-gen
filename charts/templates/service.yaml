apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo87c70ca6-a96a-432f-933b-ec5cc65638c9.fullname" . }}
  labels:
    {{- include "go-echo87c70ca6-a96a-432f-933b-ec5cc65638c9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo87c70ca6-a96a-432f-933b-ec5cc65638c9.selectorLabels" . | nindent 6 }}
