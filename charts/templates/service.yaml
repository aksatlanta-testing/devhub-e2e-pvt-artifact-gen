apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6bd2867a-e5d1-4313-b5ee-8a54210d43d4.fullname" . }}
  labels:
    {{- include "go-echo6bd2867a-e5d1-4313-b5ee-8a54210d43d4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6bd2867a-e5d1-4313-b5ee-8a54210d43d4.selectorLabels" . | nindent 6 }}
