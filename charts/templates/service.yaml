apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5243484a-9355-4c9f-91e9-15cd040a9ca7.fullname" . }}
  labels:
    {{- include "go-echo5243484a-9355-4c9f-91e9-15cd040a9ca7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5243484a-9355-4c9f-91e9-15cd040a9ca7.selectorLabels" . | nindent 6 }}
