apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoed8213fd-9e08-46f7-895d-f1b86d43916c.fullname" . }}
  labels:
    {{- include "go-echoed8213fd-9e08-46f7-895d-f1b86d43916c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoed8213fd-9e08-46f7-895d-f1b86d43916c.selectorLabels" . | nindent 6 }}
