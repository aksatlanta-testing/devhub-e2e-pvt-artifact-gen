apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc29398ad-1b6e-45d6-b094-ba490412a185.fullname" . }}
  labels:
    {{- include "go-echoc29398ad-1b6e-45d6-b094-ba490412a185.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc29398ad-1b6e-45d6-b094-ba490412a185.selectorLabels" . | nindent 6 }}
