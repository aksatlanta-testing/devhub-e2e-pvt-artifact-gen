apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa3ce7be8-6241-4871-8b3b-bc7cf3713189.fullname" . }}
  labels:
    {{- include "go-echoa3ce7be8-6241-4871-8b3b-bc7cf3713189.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa3ce7be8-6241-4871-8b3b-bc7cf3713189.selectorLabels" . | nindent 6 }}
