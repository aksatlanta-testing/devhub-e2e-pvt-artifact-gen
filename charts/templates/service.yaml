apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo209dcd78-8a5b-4c0c-9d53-fdbe1422f4a1.fullname" . }}
  labels:
    {{- include "go-echo209dcd78-8a5b-4c0c-9d53-fdbe1422f4a1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo209dcd78-8a5b-4c0c-9d53-fdbe1422f4a1.selectorLabels" . | nindent 6 }}
