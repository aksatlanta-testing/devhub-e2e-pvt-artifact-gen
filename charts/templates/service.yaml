apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo83eaff92-0e27-42aa-b1af-f7daa9937375.fullname" . }}
  labels:
    {{- include "go-echo83eaff92-0e27-42aa-b1af-f7daa9937375.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo83eaff92-0e27-42aa-b1af-f7daa9937375.selectorLabels" . | nindent 6 }}
