apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod65de466-27a1-4be8-a131-d65f4adff313.fullname" . }}
  labels:
    {{- include "go-echod65de466-27a1-4be8-a131-d65f4adff313.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod65de466-27a1-4be8-a131-d65f4adff313.selectorLabels" . | nindent 6 }}
