apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8ed4e777-12d8-4214-bdde-70f62b943b5b.fullname" . }}
  labels:
    {{- include "go-echo8ed4e777-12d8-4214-bdde-70f62b943b5b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8ed4e777-12d8-4214-bdde-70f62b943b5b.selectorLabels" . | nindent 6 }}
