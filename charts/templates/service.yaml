apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobd5ecd87-076b-4a41-9878-587d692d5ec4.fullname" . }}
  labels:
    {{- include "go-echobd5ecd87-076b-4a41-9878-587d692d5ec4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobd5ecd87-076b-4a41-9878-587d692d5ec4.selectorLabels" . | nindent 6 }}
