apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo65a9f686-d86e-4047-b9e7-53ef6b9eaeb9.fullname" . }}
  labels:
    {{- include "go-echo65a9f686-d86e-4047-b9e7-53ef6b9eaeb9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo65a9f686-d86e-4047-b9e7-53ef6b9eaeb9.selectorLabels" . | nindent 6 }}
