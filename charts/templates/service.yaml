apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob7d0ee55-aec5-4ee5-93f4-6fb1c4631f30.fullname" . }}
  labels:
    {{- include "go-echob7d0ee55-aec5-4ee5-93f4-6fb1c4631f30.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob7d0ee55-aec5-4ee5-93f4-6fb1c4631f30.selectorLabels" . | nindent 6 }}
