apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof52b087c-7b65-40c0-a1a4-c6c4fab61cd9.fullname" . }}
  labels:
    {{- include "go-echof52b087c-7b65-40c0-a1a4-c6c4fab61cd9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof52b087c-7b65-40c0-a1a4-c6c4fab61cd9.selectorLabels" . | nindent 6 }}
