apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoace2aff6-0d15-48ae-b2ea-f7220d7dc634.fullname" . }}
  labels:
    {{- include "go-echoace2aff6-0d15-48ae-b2ea-f7220d7dc634.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoace2aff6-0d15-48ae-b2ea-f7220d7dc634.selectorLabels" . | nindent 6 }}
