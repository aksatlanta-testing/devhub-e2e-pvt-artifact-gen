apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0b6bdb6e-847f-453b-8fc3-655820f7323a.fullname" . }}
  labels:
    {{- include "go-echo0b6bdb6e-847f-453b-8fc3-655820f7323a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0b6bdb6e-847f-453b-8fc3-655820f7323a.selectorLabels" . | nindent 6 }}
