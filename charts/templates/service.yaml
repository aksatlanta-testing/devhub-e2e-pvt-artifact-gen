apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo578e2510-ae1c-422d-bf5c-32bb85ebb418.fullname" . }}
  labels:
    {{- include "go-echo578e2510-ae1c-422d-bf5c-32bb85ebb418.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo578e2510-ae1c-422d-bf5c-32bb85ebb418.selectorLabels" . | nindent 6 }}
