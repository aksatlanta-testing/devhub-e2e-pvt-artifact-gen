apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe7be5d0f-9922-4f84-9bfb-8a1759e043e7.fullname" . }}
  labels:
    {{- include "go-echoe7be5d0f-9922-4f84-9bfb-8a1759e043e7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe7be5d0f-9922-4f84-9bfb-8a1759e043e7.selectorLabels" . | nindent 6 }}
