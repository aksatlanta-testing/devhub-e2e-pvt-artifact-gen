apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo90254ffe-316e-4f3f-bdaf-4d0302adc16c.fullname" . }}
  labels:
    {{- include "go-echo90254ffe-316e-4f3f-bdaf-4d0302adc16c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo90254ffe-316e-4f3f-bdaf-4d0302adc16c.selectorLabels" . | nindent 6 }}
