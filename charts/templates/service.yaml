apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod9550e73-6612-4aac-9d6a-9e6c5cf1dd85.fullname" . }}
  labels:
    {{- include "go-echod9550e73-6612-4aac-9d6a-9e6c5cf1dd85.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod9550e73-6612-4aac-9d6a-9e6c5cf1dd85.selectorLabels" . | nindent 6 }}
