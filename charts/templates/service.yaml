apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2553fe09-fa91-4dba-ab84-7788566d5582.fullname" . }}
  labels:
    {{- include "go-echo2553fe09-fa91-4dba-ab84-7788566d5582.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2553fe09-fa91-4dba-ab84-7788566d5582.selectorLabels" . | nindent 6 }}
