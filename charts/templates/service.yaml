apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo25aab9e2-9a79-41c7-9b4b-ef154258bc4a.fullname" . }}
  labels:
    {{- include "go-echo25aab9e2-9a79-41c7-9b4b-ef154258bc4a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo25aab9e2-9a79-41c7-9b4b-ef154258bc4a.selectorLabels" . | nindent 6 }}
