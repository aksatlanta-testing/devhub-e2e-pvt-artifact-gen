apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0191c632-ad2d-4c0a-8fd6-fdd301a40041.fullname" . }}
  labels:
    {{- include "go-echo0191c632-ad2d-4c0a-8fd6-fdd301a40041.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0191c632-ad2d-4c0a-8fd6-fdd301a40041.selectorLabels" . | nindent 6 }}
