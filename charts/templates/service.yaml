apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo55585e36-9304-49f3-8c4d-bece40343c52.fullname" . }}
  labels:
    {{- include "go-echo55585e36-9304-49f3-8c4d-bece40343c52.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo55585e36-9304-49f3-8c4d-bece40343c52.selectorLabels" . | nindent 6 }}
