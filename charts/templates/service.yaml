apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe1aceb3d-4550-46d7-ac60-4238be121407.fullname" . }}
  labels:
    {{- include "go-echoe1aceb3d-4550-46d7-ac60-4238be121407.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe1aceb3d-4550-46d7-ac60-4238be121407.selectorLabels" . | nindent 6 }}
