apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo320ecb78-ad86-407b-bcaf-44643e587c50.fullname" . }}
  labels:
    {{- include "go-echo320ecb78-ad86-407b-bcaf-44643e587c50.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo320ecb78-ad86-407b-bcaf-44643e587c50.selectorLabels" . | nindent 6 }}
