apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoec7d040b-79fb-4ebd-af52-4379f0c11f01.fullname" . }}
  labels:
    {{- include "go-echoec7d040b-79fb-4ebd-af52-4379f0c11f01.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoec7d040b-79fb-4ebd-af52-4379f0c11f01.selectorLabels" . | nindent 6 }}
