apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo16d8a234-bda4-4825-932c-1c7e169298a8.fullname" . }}
  labels:
    {{- include "go-echo16d8a234-bda4-4825-932c-1c7e169298a8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo16d8a234-bda4-4825-932c-1c7e169298a8.selectorLabels" . | nindent 6 }}
