apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo19d8f9d2-54c6-4670-8096-e1a15e209bde.fullname" . }}
  labels:
    {{- include "go-echo19d8f9d2-54c6-4670-8096-e1a15e209bde.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo19d8f9d2-54c6-4670-8096-e1a15e209bde.selectorLabels" . | nindent 6 }}
