apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob9c6b49a-cda8-41b8-b20f-6cfdb56aff7a.fullname" . }}
  labels:
    {{- include "go-echob9c6b49a-cda8-41b8-b20f-6cfdb56aff7a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob9c6b49a-cda8-41b8-b20f-6cfdb56aff7a.selectorLabels" . | nindent 6 }}
