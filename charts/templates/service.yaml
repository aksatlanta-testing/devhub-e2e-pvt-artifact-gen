apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo91cc6a3b-0485-47c8-afea-32794bf77f26.fullname" . }}
  labels:
    {{- include "go-echo91cc6a3b-0485-47c8-afea-32794bf77f26.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo91cc6a3b-0485-47c8-afea-32794bf77f26.selectorLabels" . | nindent 6 }}
