apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob5dd173e-4e28-40f0-919c-10098ad53bcf.fullname" . }}
  labels:
    {{- include "go-echob5dd173e-4e28-40f0-919c-10098ad53bcf.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob5dd173e-4e28-40f0-919c-10098ad53bcf.selectorLabels" . | nindent 6 }}
