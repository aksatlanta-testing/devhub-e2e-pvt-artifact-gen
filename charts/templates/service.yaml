apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9bc6098d-ec3d-4ae1-8209-12e4a576f333.fullname" . }}
  labels:
    {{- include "go-echo9bc6098d-ec3d-4ae1-8209-12e4a576f333.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9bc6098d-ec3d-4ae1-8209-12e4a576f333.selectorLabels" . | nindent 6 }}
