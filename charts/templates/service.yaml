apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo26c6ab0d-3686-457d-9b88-a24199ae7d46.fullname" . }}
  labels:
    {{- include "go-echo26c6ab0d-3686-457d-9b88-a24199ae7d46.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo26c6ab0d-3686-457d-9b88-a24199ae7d46.selectorLabels" . | nindent 6 }}
