apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc699e39a-912a-4c4b-8372-b86fc1a41fba.fullname" . }}
  labels:
    {{- include "go-echoc699e39a-912a-4c4b-8372-b86fc1a41fba.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc699e39a-912a-4c4b-8372-b86fc1a41fba.selectorLabels" . | nindent 6 }}
