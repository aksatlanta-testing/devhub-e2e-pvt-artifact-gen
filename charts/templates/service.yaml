apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo176b77f6-ccd5-4e01-b6ca-13c28a371d35.fullname" . }}
  labels:
    {{- include "go-echo176b77f6-ccd5-4e01-b6ca-13c28a371d35.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo176b77f6-ccd5-4e01-b6ca-13c28a371d35.selectorLabels" . | nindent 6 }}
