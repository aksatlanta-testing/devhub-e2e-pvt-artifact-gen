apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5bdca407-b437-46d8-b22a-7b124a526683.fullname" . }}
  labels:
    {{- include "go-echo5bdca407-b437-46d8-b22a-7b124a526683.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5bdca407-b437-46d8-b22a-7b124a526683.selectorLabels" . | nindent 6 }}
