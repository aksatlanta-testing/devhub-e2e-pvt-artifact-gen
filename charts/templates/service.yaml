apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6578d7c2-fdc9-4da6-ac5f-9cd9797da632.fullname" . }}
  labels:
    {{- include "go-echo6578d7c2-fdc9-4da6-ac5f-9cd9797da632.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6578d7c2-fdc9-4da6-ac5f-9cd9797da632.selectorLabels" . | nindent 6 }}
