apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob71b7245-845d-4c3e-abb0-79b3d43f015b.fullname" . }}
  labels:
    {{- include "go-echob71b7245-845d-4c3e-abb0-79b3d43f015b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob71b7245-845d-4c3e-abb0-79b3d43f015b.selectorLabels" . | nindent 6 }}
