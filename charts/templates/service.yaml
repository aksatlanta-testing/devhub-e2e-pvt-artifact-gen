apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa8f5747c-2ea6-49d6-bcf0-dd1be5e934a0.fullname" . }}
  labels:
    {{- include "go-echoa8f5747c-2ea6-49d6-bcf0-dd1be5e934a0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa8f5747c-2ea6-49d6-bcf0-dd1be5e934a0.selectorLabels" . | nindent 6 }}
