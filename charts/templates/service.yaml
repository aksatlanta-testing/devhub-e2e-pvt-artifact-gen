apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo121af06c-cd29-438b-a721-de776c90b5f8.fullname" . }}
  labels:
    {{- include "go-echo121af06c-cd29-438b-a721-de776c90b5f8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo121af06c-cd29-438b-a721-de776c90b5f8.selectorLabels" . | nindent 6 }}
