apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo253ef69c-4419-45fc-8cdf-05cb086485a4.fullname" . }}
  labels:
    {{- include "go-echo253ef69c-4419-45fc-8cdf-05cb086485a4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo253ef69c-4419-45fc-8cdf-05cb086485a4.selectorLabels" . | nindent 6 }}
