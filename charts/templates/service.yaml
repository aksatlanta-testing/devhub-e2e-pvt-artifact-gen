apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5063c2ab-aa89-49a5-81b9-51bed3fb5e4e.fullname" . }}
  labels:
    {{- include "go-echo5063c2ab-aa89-49a5-81b9-51bed3fb5e4e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5063c2ab-aa89-49a5-81b9-51bed3fb5e4e.selectorLabels" . | nindent 6 }}
