apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0da79c6d-7792-45f8-a1a4-d48aeb307f83.fullname" . }}
  labels:
    {{- include "go-echo0da79c6d-7792-45f8-a1a4-d48aeb307f83.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0da79c6d-7792-45f8-a1a4-d48aeb307f83.selectorLabels" . | nindent 6 }}
