apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3644d74a-a77e-4b71-969b-d4e0a1804289.fullname" . }}
  labels:
    {{- include "go-echo3644d74a-a77e-4b71-969b-d4e0a1804289.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3644d74a-a77e-4b71-969b-d4e0a1804289.selectorLabels" . | nindent 6 }}
