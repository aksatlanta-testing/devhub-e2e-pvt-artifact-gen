apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod243d2ca-f2b5-4520-b17d-c44792e04ccc.fullname" . }}
  labels:
    {{- include "go-echod243d2ca-f2b5-4520-b17d-c44792e04ccc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod243d2ca-f2b5-4520-b17d-c44792e04ccc.selectorLabels" . | nindent 6 }}
