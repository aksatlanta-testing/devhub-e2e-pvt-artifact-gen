apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2403cd7f-52ff-4c6f-a03a-770e41cd506c.fullname" . }}
  labels:
    {{- include "go-echo2403cd7f-52ff-4c6f-a03a-770e41cd506c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2403cd7f-52ff-4c6f-a03a-770e41cd506c.selectorLabels" . | nindent 6 }}
