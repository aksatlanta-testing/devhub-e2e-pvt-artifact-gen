apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo478223f6-0a27-4c33-bc43-f9f46fe36079.fullname" . }}
  labels:
    {{- include "go-echo478223f6-0a27-4c33-bc43-f9f46fe36079.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo478223f6-0a27-4c33-bc43-f9f46fe36079.selectorLabels" . | nindent 6 }}
