apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0db363fb-c4c8-4c21-acf1-8c44fcd8c1d9.fullname" . }}
  labels:
    {{- include "go-echo0db363fb-c4c8-4c21-acf1-8c44fcd8c1d9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0db363fb-c4c8-4c21-acf1-8c44fcd8c1d9.selectorLabels" . | nindent 6 }}
