apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5a7b3322-35f9-407f-9b70-bd327d29a7b8.fullname" . }}
  labels:
    {{- include "go-echo5a7b3322-35f9-407f-9b70-bd327d29a7b8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5a7b3322-35f9-407f-9b70-bd327d29a7b8.selectorLabels" . | nindent 6 }}
