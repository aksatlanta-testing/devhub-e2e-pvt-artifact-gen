apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoec9f0d83-45f5-4333-ae68-55073bb69519.fullname" . }}
  labels:
    {{- include "go-echoec9f0d83-45f5-4333-ae68-55073bb69519.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoec9f0d83-45f5-4333-ae68-55073bb69519.selectorLabels" . | nindent 6 }}
