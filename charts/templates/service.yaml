apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo103b5a32-691b-4cfc-95b6-500e6096c5a2.fullname" . }}
  labels:
    {{- include "go-echo103b5a32-691b-4cfc-95b6-500e6096c5a2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo103b5a32-691b-4cfc-95b6-500e6096c5a2.selectorLabels" . | nindent 6 }}
