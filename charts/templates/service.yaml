apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4a79069f-9604-46a7-9dbd-52fd25c46dfd.fullname" . }}
  labels:
    {{- include "go-echo4a79069f-9604-46a7-9dbd-52fd25c46dfd.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4a79069f-9604-46a7-9dbd-52fd25c46dfd.selectorLabels" . | nindent 6 }}
