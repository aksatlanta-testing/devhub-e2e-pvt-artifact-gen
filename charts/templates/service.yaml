apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5848a98a-1f6b-4d66-a1d2-bf09c7a1cea1.fullname" . }}
  labels:
    {{- include "go-echo5848a98a-1f6b-4d66-a1d2-bf09c7a1cea1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5848a98a-1f6b-4d66-a1d2-bf09c7a1cea1.selectorLabels" . | nindent 6 }}
