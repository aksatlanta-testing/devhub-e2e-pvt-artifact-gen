apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocd815ab4-6f64-4e26-99a0-fb1b33e9ed35.fullname" . }}
  labels:
    {{- include "go-echocd815ab4-6f64-4e26-99a0-fb1b33e9ed35.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocd815ab4-6f64-4e26-99a0-fb1b33e9ed35.selectorLabels" . | nindent 6 }}
