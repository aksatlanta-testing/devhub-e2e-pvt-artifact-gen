apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo558710af-a321-43ee-af4a-3c1625d738cc.fullname" . }}
  labels:
    {{- include "go-echo558710af-a321-43ee-af4a-3c1625d738cc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo558710af-a321-43ee-af4a-3c1625d738cc.selectorLabels" . | nindent 6 }}
