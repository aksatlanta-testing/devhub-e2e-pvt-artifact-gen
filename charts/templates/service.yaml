apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo004ae506-6b92-4dfb-bff6-44011ae93cc3.fullname" . }}
  labels:
    {{- include "go-echo004ae506-6b92-4dfb-bff6-44011ae93cc3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo004ae506-6b92-4dfb-bff6-44011ae93cc3.selectorLabels" . | nindent 6 }}
