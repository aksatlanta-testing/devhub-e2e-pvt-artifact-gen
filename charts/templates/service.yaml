apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo740c4ff4-fb0d-48e9-8619-2a22d9c0bd96.fullname" . }}
  labels:
    {{- include "go-echo740c4ff4-fb0d-48e9-8619-2a22d9c0bd96.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo740c4ff4-fb0d-48e9-8619-2a22d9c0bd96.selectorLabels" . | nindent 6 }}
