apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo796bf94a-6eab-4a81-b887-ee2934c27a5a.fullname" . }}
  labels:
    {{- include "go-echo796bf94a-6eab-4a81-b887-ee2934c27a5a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo796bf94a-6eab-4a81-b887-ee2934c27a5a.selectorLabels" . | nindent 6 }}
