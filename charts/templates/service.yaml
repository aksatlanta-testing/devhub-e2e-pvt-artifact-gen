apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo62cd431d-5b24-4395-9f8b-1b608f6e0cfe.fullname" . }}
  labels:
    {{- include "go-echo62cd431d-5b24-4395-9f8b-1b608f6e0cfe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo62cd431d-5b24-4395-9f8b-1b608f6e0cfe.selectorLabels" . | nindent 6 }}
