apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo3cfe7c2b-98cd-4439-932a-d8ce9d991fc0.fullname" . }}
  labels:
    {{- include "go-echo3cfe7c2b-98cd-4439-932a-d8ce9d991fc0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo3cfe7c2b-98cd-4439-932a-d8ce9d991fc0.selectorLabels" . | nindent 6 }}
