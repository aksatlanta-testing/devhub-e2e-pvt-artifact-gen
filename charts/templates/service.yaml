apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4357587f-72ad-49ae-94fd-0b0af8963c8f.fullname" . }}
  labels:
    {{- include "go-echo4357587f-72ad-49ae-94fd-0b0af8963c8f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4357587f-72ad-49ae-94fd-0b0af8963c8f.selectorLabels" . | nindent 6 }}
