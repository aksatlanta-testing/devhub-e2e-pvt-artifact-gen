apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa835bbf4-446e-4106-b36a-a07d4273199f.fullname" . }}
  labels:
    {{- include "go-echoa835bbf4-446e-4106-b36a-a07d4273199f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa835bbf4-446e-4106-b36a-a07d4273199f.selectorLabels" . | nindent 6 }}
