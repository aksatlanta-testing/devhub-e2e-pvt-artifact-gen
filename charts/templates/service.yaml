apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2c31bf5e-9fcb-4b5a-a3e4-b79d63a6492d.fullname" . }}
  labels:
    {{- include "go-echo2c31bf5e-9fcb-4b5a-a3e4-b79d63a6492d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2c31bf5e-9fcb-4b5a-a3e4-b79d63a6492d.selectorLabels" . | nindent 6 }}
