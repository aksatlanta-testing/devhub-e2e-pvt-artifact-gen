apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof4176bef-ad34-4709-9370-49f70fe955c6.fullname" . }}
  labels:
    {{- include "go-echof4176bef-ad34-4709-9370-49f70fe955c6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof4176bef-ad34-4709-9370-49f70fe955c6.selectorLabels" . | nindent 6 }}
