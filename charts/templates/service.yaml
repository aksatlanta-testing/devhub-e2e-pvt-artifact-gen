apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9bf4ca61-2a26-4692-9106-3b282c29cf8d.fullname" . }}
  labels:
    {{- include "go-echo9bf4ca61-2a26-4692-9106-3b282c29cf8d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9bf4ca61-2a26-4692-9106-3b282c29cf8d.selectorLabels" . | nindent 6 }}
