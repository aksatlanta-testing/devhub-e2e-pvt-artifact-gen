apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo49712a3c-062c-4e2b-91d6-cf40edc3c084.fullname" . }}
  labels:
    {{- include "go-echo49712a3c-062c-4e2b-91d6-cf40edc3c084.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo49712a3c-062c-4e2b-91d6-cf40edc3c084.selectorLabels" . | nindent 6 }}
