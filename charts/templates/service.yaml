apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2063f08d-dc52-4305-ba52-4b2c1aa22707.fullname" . }}
  labels:
    {{- include "go-echo2063f08d-dc52-4305-ba52-4b2c1aa22707.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2063f08d-dc52-4305-ba52-4b2c1aa22707.selectorLabels" . | nindent 6 }}
