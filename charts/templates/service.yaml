apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob5d48345-0835-4b54-98de-d7288b7ba93d.fullname" . }}
  labels:
    {{- include "go-echob5d48345-0835-4b54-98de-d7288b7ba93d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob5d48345-0835-4b54-98de-d7288b7ba93d.selectorLabels" . | nindent 6 }}
