apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo47afea10-9244-4bf4-ba08-8b13aab138d4.fullname" . }}
  labels:
    {{- include "go-echo47afea10-9244-4bf4-ba08-8b13aab138d4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo47afea10-9244-4bf4-ba08-8b13aab138d4.selectorLabels" . | nindent 6 }}
