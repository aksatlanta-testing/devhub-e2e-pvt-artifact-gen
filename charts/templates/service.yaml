apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoac4083be-0676-490e-beec-9da0e0c94613.fullname" . }}
  labels:
    {{- include "go-echoac4083be-0676-490e-beec-9da0e0c94613.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoac4083be-0676-490e-beec-9da0e0c94613.selectorLabels" . | nindent 6 }}
