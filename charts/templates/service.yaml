apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e1271f4-44b2-493e-a045-b76a554bed95.fullname" . }}
  labels:
    {{- include "go-echo0e1271f4-44b2-493e-a045-b76a554bed95.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e1271f4-44b2-493e-a045-b76a554bed95.selectorLabels" . | nindent 6 }}
