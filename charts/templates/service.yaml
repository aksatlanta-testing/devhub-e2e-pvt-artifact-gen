apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo42bdfd37-6048-44e8-9c0d-190a4cf1dfe3.fullname" . }}
  labels:
    {{- include "go-echo42bdfd37-6048-44e8-9c0d-190a4cf1dfe3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo42bdfd37-6048-44e8-9c0d-190a4cf1dfe3.selectorLabels" . | nindent 6 }}
