apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod0ce1a1e-338b-4676-91c0-fd06e4f83ef5.fullname" . }}
  labels:
    {{- include "go-echod0ce1a1e-338b-4676-91c0-fd06e4f83ef5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod0ce1a1e-338b-4676-91c0-fd06e4f83ef5.selectorLabels" . | nindent 6 }}
