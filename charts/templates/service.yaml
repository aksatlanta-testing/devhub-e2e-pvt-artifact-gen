apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo640d918d-1ff4-4939-ad41-75b7de5da5b0.fullname" . }}
  labels:
    {{- include "go-echo640d918d-1ff4-4939-ad41-75b7de5da5b0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo640d918d-1ff4-4939-ad41-75b7de5da5b0.selectorLabels" . | nindent 6 }}
