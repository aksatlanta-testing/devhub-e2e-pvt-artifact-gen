apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2c5930c4-9063-40ac-8979-84d1a8d5117d.fullname" . }}
  labels:
    {{- include "go-echo2c5930c4-9063-40ac-8979-84d1a8d5117d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2c5930c4-9063-40ac-8979-84d1a8d5117d.selectorLabels" . | nindent 6 }}
