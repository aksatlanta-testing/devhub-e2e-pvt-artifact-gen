apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo26898b35-dbf7-4c86-8b96-3ed7f6328944.fullname" . }}
  labels:
    {{- include "go-echo26898b35-dbf7-4c86-8b96-3ed7f6328944.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo26898b35-dbf7-4c86-8b96-3ed7f6328944.selectorLabels" . | nindent 6 }}
