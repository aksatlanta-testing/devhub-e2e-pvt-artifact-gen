apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo47f4b185-fffb-4e11-9838-dffcecb12705.fullname" . }}
  labels:
    {{- include "go-echo47f4b185-fffb-4e11-9838-dffcecb12705.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo47f4b185-fffb-4e11-9838-dffcecb12705.selectorLabels" . | nindent 6 }}
