apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2fbe6d7d-cb75-4375-88c3-0008102314e6.fullname" . }}
  labels:
    {{- include "go-echo2fbe6d7d-cb75-4375-88c3-0008102314e6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2fbe6d7d-cb75-4375-88c3-0008102314e6.selectorLabels" . | nindent 6 }}
