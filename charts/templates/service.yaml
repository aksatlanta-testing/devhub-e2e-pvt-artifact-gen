apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo82d525d7-4b1d-428d-b2e0-d608ba2644c6.fullname" . }}
  labels:
    {{- include "go-echo82d525d7-4b1d-428d-b2e0-d608ba2644c6.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo82d525d7-4b1d-428d-b2e0-d608ba2644c6.selectorLabels" . | nindent 6 }}
