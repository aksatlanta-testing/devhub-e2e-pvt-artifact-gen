apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo02d839e2-d62e-4bab-9caa-68ba3a765424.fullname" . }}
  labels:
    {{- include "go-echo02d839e2-d62e-4bab-9caa-68ba3a765424.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo02d839e2-d62e-4bab-9caa-68ba3a765424.selectorLabels" . | nindent 6 }}
