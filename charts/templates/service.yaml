apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo16de3a52-da15-4abf-8e1d-05afb21685c0.fullname" . }}
  labels:
    {{- include "go-echo16de3a52-da15-4abf-8e1d-05afb21685c0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo16de3a52-da15-4abf-8e1d-05afb21685c0.selectorLabels" . | nindent 6 }}
