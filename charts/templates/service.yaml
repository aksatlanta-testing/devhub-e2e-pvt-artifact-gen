apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo68899623-383a-495a-8660-78df464b9b57.fullname" . }}
  labels:
    {{- include "go-echo68899623-383a-495a-8660-78df464b9b57.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo68899623-383a-495a-8660-78df464b9b57.selectorLabels" . | nindent 6 }}
