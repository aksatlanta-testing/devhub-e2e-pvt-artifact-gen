apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo9e7d7c4d-7519-4a8f-bf87-c0b98612a116.fullname" . }}
  labels:
    {{- include "go-echo9e7d7c4d-7519-4a8f-bf87-c0b98612a116.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo9e7d7c4d-7519-4a8f-bf87-c0b98612a116.selectorLabels" . | nindent 6 }}
