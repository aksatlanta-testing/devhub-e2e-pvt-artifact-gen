apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaf2e14c5-9284-4092-b67f-53edc9107932.fullname" . }}
  labels:
    {{- include "go-echoaf2e14c5-9284-4092-b67f-53edc9107932.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaf2e14c5-9284-4092-b67f-53edc9107932.selectorLabels" . | nindent 6 }}
