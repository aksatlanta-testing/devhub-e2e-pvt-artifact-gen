apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7e90d521-2487-44c9-80b1-fc689f28381d.fullname" . }}
  labels:
    {{- include "go-echo7e90d521-2487-44c9-80b1-fc689f28381d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7e90d521-2487-44c9-80b1-fc689f28381d.selectorLabels" . | nindent 6 }}
