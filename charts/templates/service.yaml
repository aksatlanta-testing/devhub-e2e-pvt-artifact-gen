apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo36938974-599d-42ce-95e9-16424e148afe.fullname" . }}
  labels:
    {{- include "go-echo36938974-599d-42ce-95e9-16424e148afe.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo36938974-599d-42ce-95e9-16424e148afe.selectorLabels" . | nindent 6 }}
