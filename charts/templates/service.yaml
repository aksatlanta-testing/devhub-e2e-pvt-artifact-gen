apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo899a2a8b-5f77-4dfa-b380-73cd7fd180c8.fullname" . }}
  labels:
    {{- include "go-echo899a2a8b-5f77-4dfa-b380-73cd7fd180c8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo899a2a8b-5f77-4dfa-b380-73cd7fd180c8.selectorLabels" . | nindent 6 }}
