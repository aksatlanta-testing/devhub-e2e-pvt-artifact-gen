apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe19e103-7a88-4522-af0d-d984097ba333.fullname" . }}
  labels:
    {{- include "go-echofe19e103-7a88-4522-af0d-d984097ba333.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe19e103-7a88-4522-af0d-d984097ba333.selectorLabels" . | nindent 6 }}
