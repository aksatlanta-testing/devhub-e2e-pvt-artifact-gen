apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo58783171-1b35-451c-a20f-3818088416ad.fullname" . }}
  labels:
    {{- include "go-echo58783171-1b35-451c-a20f-3818088416ad.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo58783171-1b35-451c-a20f-3818088416ad.selectorLabels" . | nindent 6 }}
