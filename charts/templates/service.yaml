apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo767130ed-ebac-41df-8b3d-3c1a7e757f73.fullname" . }}
  labels:
    {{- include "go-echo767130ed-ebac-41df-8b3d-3c1a7e757f73.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo767130ed-ebac-41df-8b3d-3c1a7e757f73.selectorLabels" . | nindent 6 }}
