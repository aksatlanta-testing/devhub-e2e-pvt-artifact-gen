apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod5f708c6-f280-4057-a742-b426cbacb466.fullname" . }}
  labels:
    {{- include "go-echod5f708c6-f280-4057-a742-b426cbacb466.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod5f708c6-f280-4057-a742-b426cbacb466.selectorLabels" . | nindent 6 }}
