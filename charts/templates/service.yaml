apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocb5d5f7e-2066-45af-819e-4f8bd1a8c500.fullname" . }}
  labels:
    {{- include "go-echocb5d5f7e-2066-45af-819e-4f8bd1a8c500.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocb5d5f7e-2066-45af-819e-4f8bd1a8c500.selectorLabels" . | nindent 6 }}
