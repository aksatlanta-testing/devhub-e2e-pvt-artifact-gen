apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8c14636f-3e7a-432e-88ca-26090136a894.fullname" . }}
  labels:
    {{- include "go-echo8c14636f-3e7a-432e-88ca-26090136a894.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8c14636f-3e7a-432e-88ca-26090136a894.selectorLabels" . | nindent 6 }}
