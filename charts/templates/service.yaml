apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7280ce54-a75d-4152-ba9a-daedde94bb4b.fullname" . }}
  labels:
    {{- include "go-echo7280ce54-a75d-4152-ba9a-daedde94bb4b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7280ce54-a75d-4152-ba9a-daedde94bb4b.selectorLabels" . | nindent 6 }}
