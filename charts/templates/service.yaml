apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaa20a62d-1c62-47c9-9a18-92b7fbc31768.fullname" . }}
  labels:
    {{- include "go-echoaa20a62d-1c62-47c9-9a18-92b7fbc31768.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaa20a62d-1c62-47c9-9a18-92b7fbc31768.selectorLabels" . | nindent 6 }}
