apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod988ce7c-ea25-4d62-a602-0d9d39998e4a.fullname" . }}
  labels:
    {{- include "go-echod988ce7c-ea25-4d62-a602-0d9d39998e4a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod988ce7c-ea25-4d62-a602-0d9d39998e4a.selectorLabels" . | nindent 6 }}
