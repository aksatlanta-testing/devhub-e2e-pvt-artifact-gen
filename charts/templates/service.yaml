apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echofe22a3f9-e5b3-4081-8f77-af503cd6f7a8.fullname" . }}
  labels:
    {{- include "go-echofe22a3f9-e5b3-4081-8f77-af503cd6f7a8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echofe22a3f9-e5b3-4081-8f77-af503cd6f7a8.selectorLabels" . | nindent 6 }}
