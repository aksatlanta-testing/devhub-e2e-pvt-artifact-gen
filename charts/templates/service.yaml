apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo40376054-0606-4ab1-9217-f2921a8e257e.fullname" . }}
  labels:
    {{- include "go-echo40376054-0606-4ab1-9217-f2921a8e257e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo40376054-0606-4ab1-9217-f2921a8e257e.selectorLabels" . | nindent 6 }}
