apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8d9a5912-a20e-4a86-bde8-24ba2a718d4e.fullname" . }}
  labels:
    {{- include "go-echo8d9a5912-a20e-4a86-bde8-24ba2a718d4e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8d9a5912-a20e-4a86-bde8-24ba2a718d4e.selectorLabels" . | nindent 6 }}
