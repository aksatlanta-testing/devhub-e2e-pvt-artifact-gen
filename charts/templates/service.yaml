apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5a2d1e2e-4ce7-4491-9909-1b175a118e54.fullname" . }}
  labels:
    {{- include "go-echo5a2d1e2e-4ce7-4491-9909-1b175a118e54.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5a2d1e2e-4ce7-4491-9909-1b175a118e54.selectorLabels" . | nindent 6 }}
