apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo28c90f96-d795-48d6-825e-4ff50f7bd97d.fullname" . }}
  labels:
    {{- include "go-echo28c90f96-d795-48d6-825e-4ff50f7bd97d.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo28c90f96-d795-48d6-825e-4ff50f7bd97d.selectorLabels" . | nindent 6 }}
