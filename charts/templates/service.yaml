apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodc4072b3-f31b-4321-86c0-84a5eed96f32.fullname" . }}
  labels:
    {{- include "go-echodc4072b3-f31b-4321-86c0-84a5eed96f32.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodc4072b3-f31b-4321-86c0-84a5eed96f32.selectorLabels" . | nindent 6 }}
