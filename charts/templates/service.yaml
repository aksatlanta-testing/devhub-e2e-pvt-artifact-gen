apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo70b7c0a8-0d7d-40bf-839f-dc650ef3a3f4.fullname" . }}
  labels:
    {{- include "go-echo70b7c0a8-0d7d-40bf-839f-dc650ef3a3f4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo70b7c0a8-0d7d-40bf-839f-dc650ef3a3f4.selectorLabels" . | nindent 6 }}
