apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7bc2fd1b-3e1d-4fcd-816a-0e132c2e79e2.fullname" . }}
  labels:
    {{- include "go-echo7bc2fd1b-3e1d-4fcd-816a-0e132c2e79e2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7bc2fd1b-3e1d-4fcd-816a-0e132c2e79e2.selectorLabels" . | nindent 6 }}
