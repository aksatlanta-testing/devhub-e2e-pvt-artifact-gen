apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo894171f1-f81b-4d71-a69c-c5d6b72ac1ae.fullname" . }}
  labels:
    {{- include "go-echo894171f1-f81b-4d71-a69c-c5d6b72ac1ae.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo894171f1-f81b-4d71-a69c-c5d6b72ac1ae.selectorLabels" . | nindent 6 }}
