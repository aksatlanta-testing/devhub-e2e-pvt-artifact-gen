apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4964ae30-8614-4512-8f9e-c2439e3890ee.fullname" . }}
  labels:
    {{- include "go-echo4964ae30-8614-4512-8f9e-c2439e3890ee.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4964ae30-8614-4512-8f9e-c2439e3890ee.selectorLabels" . | nindent 6 }}
