apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe097cfed-28a5-4873-b8f6-0adbdf1dab52.fullname" . }}
  labels:
    {{- include "go-echoe097cfed-28a5-4873-b8f6-0adbdf1dab52.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe097cfed-28a5-4873-b8f6-0adbdf1dab52.selectorLabels" . | nindent 6 }}
