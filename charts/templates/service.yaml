apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8314be2e-4a5c-4ceb-bb47-82500fc1b36b.fullname" . }}
  labels:
    {{- include "go-echo8314be2e-4a5c-4ceb-bb47-82500fc1b36b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8314be2e-4a5c-4ceb-bb47-82500fc1b36b.selectorLabels" . | nindent 6 }}
