apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobc7f94d9-9837-4149-ad36-6cf80ce77005.fullname" . }}
  labels:
    {{- include "go-echobc7f94d9-9837-4149-ad36-6cf80ce77005.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobc7f94d9-9837-4149-ad36-6cf80ce77005.selectorLabels" . | nindent 6 }}
