apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod13b07b7-cd3b-42b0-9066-184d429afbed.fullname" . }}
  labels:
    {{- include "go-echod13b07b7-cd3b-42b0-9066-184d429afbed.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod13b07b7-cd3b-42b0-9066-184d429afbed.selectorLabels" . | nindent 6 }}
