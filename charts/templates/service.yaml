apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoce5043b0-8bfb-49fb-8eaf-ecce8c562be9.fullname" . }}
  labels:
    {{- include "go-echoce5043b0-8bfb-49fb-8eaf-ecce8c562be9.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoce5043b0-8bfb-49fb-8eaf-ecce8c562be9.selectorLabels" . | nindent 6 }}
