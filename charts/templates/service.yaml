apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocf880111-41b2-49fe-b28d-c74c0134bb0f.fullname" . }}
  labels:
    {{- include "go-echocf880111-41b2-49fe-b28d-c74c0134bb0f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocf880111-41b2-49fe-b28d-c74c0134bb0f.selectorLabels" . | nindent 6 }}
