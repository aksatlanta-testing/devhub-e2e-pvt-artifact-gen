apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8484c5a6-68cc-4f7b-a29c-bb43033dffe4.fullname" . }}
  labels:
    {{- include "go-echo8484c5a6-68cc-4f7b-a29c-bb43033dffe4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8484c5a6-68cc-4f7b-a29c-bb43033dffe4.selectorLabels" . | nindent 6 }}
