apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo24da8ff2-3bee-42c3-8c2a-a9fd8b90076c.fullname" . }}
  labels:
    {{- include "go-echo24da8ff2-3bee-42c3-8c2a-a9fd8b90076c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo24da8ff2-3bee-42c3-8c2a-a9fd8b90076c.selectorLabels" . | nindent 6 }}
