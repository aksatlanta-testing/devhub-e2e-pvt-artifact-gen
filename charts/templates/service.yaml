apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo04e8b0ad-b3e2-469c-82f7-56a855ad50cc.fullname" . }}
  labels:
    {{- include "go-echo04e8b0ad-b3e2-469c-82f7-56a855ad50cc.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo04e8b0ad-b3e2-469c-82f7-56a855ad50cc.selectorLabels" . | nindent 6 }}
