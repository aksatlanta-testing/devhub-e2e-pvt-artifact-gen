apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob8c4b347-97b3-4b86-adad-7285af2d6315.fullname" . }}
  labels:
    {{- include "go-echob8c4b347-97b3-4b86-adad-7285af2d6315.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob8c4b347-97b3-4b86-adad-7285af2d6315.selectorLabels" . | nindent 6 }}
