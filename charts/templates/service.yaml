apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6174a93e-0b99-4c1d-b4e5-0e9a37613d83.fullname" . }}
  labels:
    {{- include "go-echo6174a93e-0b99-4c1d-b4e5-0e9a37613d83.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6174a93e-0b99-4c1d-b4e5-0e9a37613d83.selectorLabels" . | nindent 6 }}
