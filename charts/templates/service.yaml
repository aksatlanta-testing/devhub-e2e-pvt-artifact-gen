apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo438b9ea2-409c-497b-8561-305da0348b59.fullname" . }}
  labels:
    {{- include "go-echo438b9ea2-409c-497b-8561-305da0348b59.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo438b9ea2-409c-497b-8561-305da0348b59.selectorLabels" . | nindent 6 }}
