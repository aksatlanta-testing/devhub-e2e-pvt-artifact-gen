apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4fafec2f-250f-4acd-8c99-d895e562ea6a.fullname" . }}
  labels:
    {{- include "go-echo4fafec2f-250f-4acd-8c99-d895e562ea6a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4fafec2f-250f-4acd-8c99-d895e562ea6a.selectorLabels" . | nindent 6 }}
