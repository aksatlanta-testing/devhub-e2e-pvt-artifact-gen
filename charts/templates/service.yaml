apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob957af8a-d2fd-455b-8a24-c41f61188fab.fullname" . }}
  labels:
    {{- include "go-echob957af8a-d2fd-455b-8a24-c41f61188fab.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob957af8a-d2fd-455b-8a24-c41f61188fab.selectorLabels" . | nindent 6 }}
