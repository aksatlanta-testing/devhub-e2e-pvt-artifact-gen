apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo1770c985-f705-465a-915a-481170dad525.fullname" . }}
  labels:
    {{- include "go-echo1770c985-f705-465a-915a-481170dad525.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
