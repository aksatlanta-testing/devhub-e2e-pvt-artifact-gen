apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8be28552-e577-4a95-8151-a03a5b54a3a4.fullname" . }}
  labels:
    {{- include "go-echo8be28552-e577-4a95-8151-a03a5b54a3a4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8be28552-e577-4a95-8151-a03a5b54a3a4.selectorLabels" . | nindent 6 }}
