apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodfd14ce1-4c06-4d2d-b3d9-4cdd353058aa.fullname" . }}
  labels:
    {{- include "go-echodfd14ce1-4c06-4d2d-b3d9-4cdd353058aa.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodfd14ce1-4c06-4d2d-b3d9-4cdd353058aa.selectorLabels" . | nindent 6 }}
