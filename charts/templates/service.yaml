apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6729314e-b63c-4477-ad5c-c9a43f13aa31.fullname" . }}
  labels:
    {{- include "go-echo6729314e-b63c-4477-ad5c-c9a43f13aa31.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6729314e-b63c-4477-ad5c-c9a43f13aa31.selectorLabels" . | nindent 6 }}
