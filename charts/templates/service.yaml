apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4f69f1cb-930f-40ee-9267-ae01a6af6ce3.fullname" . }}
  labels:
    {{- include "go-echo4f69f1cb-930f-40ee-9267-ae01a6af6ce3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4f69f1cb-930f-40ee-9267-ae01a6af6ce3.selectorLabels" . | nindent 6 }}
