apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo39c65613-04d2-4e1b-b05c-e4759a35e6c2.fullname" . }}
  labels:
    {{- include "go-echo39c65613-04d2-4e1b-b05c-e4759a35e6c2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo39c65613-04d2-4e1b-b05c-e4759a35e6c2.selectorLabels" . | nindent 6 }}
