apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe7be06b0-432c-45f1-b1d0-b62c2d62ddf5.fullname" . }}
  labels:
    {{- include "go-echoe7be06b0-432c-45f1-b1d0-b62c2d62ddf5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe7be06b0-432c-45f1-b1d0-b62c2d62ddf5.selectorLabels" . | nindent 6 }}
