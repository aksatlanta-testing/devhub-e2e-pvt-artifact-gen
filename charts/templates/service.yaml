apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo5e82ca46-6a5b-4d61-9f61-d147092635f2.fullname" . }}
  labels:
    {{- include "go-echo5e82ca46-6a5b-4d61-9f61-d147092635f2.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo5e82ca46-6a5b-4d61-9f61-d147092635f2.selectorLabels" . | nindent 6 }}
