apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo7e01c58c-d778-4dd8-bd6f-a051cf64a02f.fullname" . }}
  labels:
    {{- include "go-echo7e01c58c-d778-4dd8-bd6f-a051cf64a02f.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo7e01c58c-d778-4dd8-bd6f-a051cf64a02f.selectorLabels" . | nindent 6 }}
