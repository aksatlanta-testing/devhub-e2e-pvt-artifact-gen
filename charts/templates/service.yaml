apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo6c0ef2dc-a404-474d-a03f-ede77625822a.fullname" . }}
  labels:
    {{- include "go-echo6c0ef2dc-a404-474d-a03f-ede77625822a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo6c0ef2dc-a404-474d-a03f-ede77625822a.selectorLabels" . | nindent 6 }}
