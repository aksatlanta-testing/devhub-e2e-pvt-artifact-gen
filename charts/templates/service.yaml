apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo74d40097-ea01-451d-86ee-2397ad1dcaa7.fullname" . }}
  labels:
    {{- include "go-echo74d40097-ea01-451d-86ee-2397ad1dcaa7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo74d40097-ea01-451d-86ee-2397ad1dcaa7.selectorLabels" . | nindent 6 }}
