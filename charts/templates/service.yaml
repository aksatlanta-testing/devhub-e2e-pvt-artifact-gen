apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe21ad9e6-b916-41e9-b7c3-e1e7a5ca4182.fullname" . }}
  labels:
    {{- include "go-echoe21ad9e6-b916-41e9-b7c3-e1e7a5ca4182.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe21ad9e6-b916-41e9-b7c3-e1e7a5ca4182.selectorLabels" . | nindent 6 }}
