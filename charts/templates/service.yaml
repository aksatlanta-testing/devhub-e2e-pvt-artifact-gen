apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo91bfbe14-e30a-4233-9e90-dabe3a139329.fullname" . }}
  labels:
    {{- include "go-echo91bfbe14-e30a-4233-9e90-dabe3a139329.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo91bfbe14-e30a-4233-9e90-dabe3a139329.selectorLabels" . | nindent 6 }}
