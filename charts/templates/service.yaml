apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo00ed40a8-acdc-44e1-b6af-88c2f5e0b738.fullname" . }}
  labels:
    {{- include "go-echo00ed40a8-acdc-44e1-b6af-88c2f5e0b738.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo00ed40a8-acdc-44e1-b6af-88c2f5e0b738.selectorLabels" . | nindent 6 }}
