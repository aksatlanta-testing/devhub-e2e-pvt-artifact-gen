apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc1523fba-7741-4f7b-af58-9d0dfb27c193.fullname" . }}
  labels:
    {{- include "go-echoc1523fba-7741-4f7b-af58-9d0dfb27c193.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc1523fba-7741-4f7b-af58-9d0dfb27c193.selectorLabels" . | nindent 6 }}
