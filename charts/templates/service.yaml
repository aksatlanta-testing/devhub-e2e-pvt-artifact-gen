apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoaadfdf1c-ef27-4ad0-ae06-23fc36df65ac.fullname" . }}
  labels:
    {{- include "go-echoaadfdf1c-ef27-4ad0-ae06-23fc36df65ac.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoaadfdf1c-ef27-4ad0-ae06-23fc36df65ac.selectorLabels" . | nindent 6 }}
