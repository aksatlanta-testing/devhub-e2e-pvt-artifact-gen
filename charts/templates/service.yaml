apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo71655b6d-ad58-4d8b-8908-8f85a131a419.fullname" . }}
  labels:
    {{- include "go-echo71655b6d-ad58-4d8b-8908-8f85a131a419.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo71655b6d-ad58-4d8b-8908-8f85a131a419.selectorLabels" . | nindent 6 }}
