apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2bc85ad7-f7db-4100-bcc2-d669bf21cdf3.fullname" . }}
  labels:
    {{- include "go-echo2bc85ad7-f7db-4100-bcc2-d669bf21cdf3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2bc85ad7-f7db-4100-bcc2-d669bf21cdf3.selectorLabels" . | nindent 6 }}
