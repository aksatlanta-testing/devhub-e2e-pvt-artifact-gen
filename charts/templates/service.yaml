apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoc0b3e659-288e-4c26-8229-a2a8f1ab1de1.fullname" . }}
  labels:
    {{- include "go-echoc0b3e659-288e-4c26-8229-a2a8f1ab1de1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoc0b3e659-288e-4c26-8229-a2a8f1ab1de1.selectorLabels" . | nindent 6 }}
