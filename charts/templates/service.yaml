apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo53aab9d7-e533-48df-8118-f599f4c66cd4.fullname" . }}
  labels:
    {{- include "go-echo53aab9d7-e533-48df-8118-f599f4c66cd4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo53aab9d7-e533-48df-8118-f599f4c66cd4.selectorLabels" . | nindent 6 }}
