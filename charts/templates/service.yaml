apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo967101d1-ba73-4efa-a942-9985370071f0.fullname" . }}
  labels:
    {{- include "go-echo967101d1-ba73-4efa-a942-9985370071f0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo967101d1-ba73-4efa-a942-9985370071f0.selectorLabels" . | nindent 6 }}
