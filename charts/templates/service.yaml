apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe24522d6-ee1c-40d5-8d85-814bdd5d7ce7.fullname" . }}
  labels:
    {{- include "go-echoe24522d6-ee1c-40d5-8d85-814bdd5d7ce7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe24522d6-ee1c-40d5-8d85-814bdd5d7ce7.selectorLabels" . | nindent 6 }}
