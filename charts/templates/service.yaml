apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo03c624a3-fe7c-44cb-a410-4bf8e789438c.fullname" . }}
  labels:
    {{- include "go-echo03c624a3-fe7c-44cb-a410-4bf8e789438c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo03c624a3-fe7c-44cb-a410-4bf8e789438c.selectorLabels" . | nindent 6 }}
