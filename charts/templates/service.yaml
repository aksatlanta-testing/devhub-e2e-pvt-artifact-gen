apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo331cbf98-0536-458f-bbaa-d74e9bd1fedb.fullname" . }}
  labels:
    {{- include "go-echo331cbf98-0536-458f-bbaa-d74e9bd1fedb.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo331cbf98-0536-458f-bbaa-d74e9bd1fedb.selectorLabels" . | nindent 6 }}
