apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echod94c966e-1381-495c-bde4-f07802283b77.fullname" . }}
  labels:
    {{- include "go-echod94c966e-1381-495c-bde4-f07802283b77.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echod94c966e-1381-495c-bde4-f07802283b77.selectorLabels" . | nindent 6 }}
