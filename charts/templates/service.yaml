apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo34a95044-bae8-4503-a6cf-ad854ddbe642.fullname" . }}
  labels:
    {{- include "go-echo34a95044-bae8-4503-a6cf-ad854ddbe642.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo34a95044-bae8-4503-a6cf-ad854ddbe642.selectorLabels" . | nindent 6 }}
