apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8ddd3db5-52f4-4c89-b16e-39d4f72c5c7a.fullname" . }}
  labels:
    {{- include "go-echo8ddd3db5-52f4-4c89-b16e-39d4f72c5c7a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8ddd3db5-52f4-4c89-b16e-39d4f72c5c7a.selectorLabels" . | nindent 6 }}
