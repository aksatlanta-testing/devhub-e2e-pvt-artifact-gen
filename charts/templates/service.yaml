apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodafa4f54-2f6f-488e-9591-268217f0740e.fullname" . }}
  labels:
    {{- include "go-echodafa4f54-2f6f-488e-9591-268217f0740e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodafa4f54-2f6f-488e-9591-268217f0740e.selectorLabels" . | nindent 6 }}
