apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echocc7d64c1-2488-4193-9c1e-c02384b5934c.fullname" . }}
  labels:
    {{- include "go-echocc7d64c1-2488-4193-9c1e-c02384b5934c.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echocc7d64c1-2488-4193-9c1e-c02384b5934c.selectorLabels" . | nindent 6 }}
