apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobb2b17d9-d6a1-4764-9443-0e633e91d237.fullname" . }}
  labels:
    {{- include "go-echobb2b17d9-d6a1-4764-9443-0e633e91d237.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobb2b17d9-d6a1-4764-9443-0e633e91d237.selectorLabels" . | nindent 6 }}
