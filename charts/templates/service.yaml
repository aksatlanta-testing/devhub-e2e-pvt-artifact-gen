apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo57e651f3-6b0e-4f75-8724-03257bf5a8b5.fullname" . }}
  labels:
    {{- include "go-echo57e651f3-6b0e-4f75-8724-03257bf5a8b5.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo57e651f3-6b0e-4f75-8724-03257bf5a8b5.selectorLabels" . | nindent 6 }}
