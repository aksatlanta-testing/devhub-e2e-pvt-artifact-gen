apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa7d440dd-b4be-43d0-8fff-a2ac6392a3a7.fullname" . }}
  labels:
    {{- include "go-echoa7d440dd-b4be-43d0-8fff-a2ac6392a3a7.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa7d440dd-b4be-43d0-8fff-a2ac6392a3a7.selectorLabels" . | nindent 6 }}
