apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo466311de-e71a-43e1-ac0d-103cd523bcca.fullname" . }}
  labels:
    {{- include "go-echo466311de-e71a-43e1-ac0d-103cd523bcca.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo466311de-e71a-43e1-ac0d-103cd523bcca.selectorLabels" . | nindent 6 }}
