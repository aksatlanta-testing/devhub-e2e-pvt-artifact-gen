apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob38be84d-b59f-48e2-be2c-013f12550a74.fullname" . }}
  labels:
    {{- include "go-echob38be84d-b59f-48e2-be2c-013f12550a74.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob38be84d-b59f-48e2-be2c-013f12550a74.selectorLabels" . | nindent 6 }}
