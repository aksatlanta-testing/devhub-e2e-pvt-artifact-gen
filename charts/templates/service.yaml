apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoce592261-a323-45e1-a95d-7275a1e441ce.fullname" . }}
  labels:
    {{- include "go-echoce592261-a323-45e1-a95d-7275a1e441ce.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoce592261-a323-45e1-a95d-7275a1e441ce.selectorLabels" . | nindent 6 }}
