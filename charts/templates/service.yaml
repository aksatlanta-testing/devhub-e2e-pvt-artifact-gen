apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo21470466-7fe4-4cc9-a8d3-10d55ebeabe4.fullname" . }}
  labels:
    {{- include "go-echo21470466-7fe4-4cc9-a8d3-10d55ebeabe4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo21470466-7fe4-4cc9-a8d3-10d55ebeabe4.selectorLabels" . | nindent 6 }}
