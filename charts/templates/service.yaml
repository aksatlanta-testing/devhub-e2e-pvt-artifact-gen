apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob4812ee5-ca95-411f-adf9-bf2389a1190b.fullname" . }}
  labels:
    {{- include "go-echob4812ee5-ca95-411f-adf9-bf2389a1190b.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob4812ee5-ca95-411f-adf9-bf2389a1190b.selectorLabels" . | nindent 6 }}
