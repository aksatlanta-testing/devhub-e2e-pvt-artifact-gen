apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo4ceb1e35-af2e-47f8-aa7f-b9280fa2b4c8.fullname" . }}
  labels:
    {{- include "go-echo4ceb1e35-af2e-47f8-aa7f-b9280fa2b4c8.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo4ceb1e35-af2e-47f8-aa7f-b9280fa2b4c8.selectorLabels" . | nindent 6 }}
