apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo48e476b6-80f6-4e0a-8e1a-846ea84abff3.fullname" . }}
  labels:
    {{- include "go-echo48e476b6-80f6-4e0a-8e1a-846ea84abff3.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo48e476b6-80f6-4e0a-8e1a-846ea84abff3.selectorLabels" . | nindent 6 }}
