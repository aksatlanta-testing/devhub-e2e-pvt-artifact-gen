apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo33d1fb13-ed49-4c60-b234-b36fa45c23b1.fullname" . }}
  labels:
    {{- include "go-echo33d1fb13-ed49-4c60-b234-b36fa45c23b1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo33d1fb13-ed49-4c60-b234-b36fa45c23b1.selectorLabels" . | nindent 6 }}
