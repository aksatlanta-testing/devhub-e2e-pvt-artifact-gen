apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe0077056-407b-48fb-868b-cf2a6109926e.fullname" . }}
  labels:
    {{- include "go-echoe0077056-407b-48fb-868b-cf2a6109926e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe0077056-407b-48fb-868b-cf2a6109926e.selectorLabels" . | nindent 6 }}
