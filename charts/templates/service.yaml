apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoa477d055-c818-40cf-aec4-9e12b1e307d1.fullname" . }}
  labels:
    {{- include "go-echoa477d055-c818-40cf-aec4-9e12b1e307d1.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoa477d055-c818-40cf-aec4-9e12b1e307d1.selectorLabels" . | nindent 6 }}
