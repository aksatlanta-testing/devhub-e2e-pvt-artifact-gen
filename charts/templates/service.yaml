apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoba23b906-ed12-44ac-b057-70e9a592dd58.fullname" . }}
  labels:
    {{- include "go-echoba23b906-ed12-44ac-b057-70e9a592dd58.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoba23b906-ed12-44ac-b057-70e9a592dd58.selectorLabels" . | nindent 6 }}
