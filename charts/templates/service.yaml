apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0cfd2633-ca0c-4a27-8a87-89e1289cabff.fullname" . }}
  labels:
    {{- include "go-echo0cfd2633-ca0c-4a27-8a87-89e1289cabff.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0cfd2633-ca0c-4a27-8a87-89e1289cabff.selectorLabels" . | nindent 6 }}
