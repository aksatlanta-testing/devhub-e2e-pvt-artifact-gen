apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echobbe1e13d-f2d9-4daf-a828-f02811dee987.fullname" . }}
  labels:
    {{- include "go-echobbe1e13d-f2d9-4daf-a828-f02811dee987.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echobbe1e13d-f2d9-4daf-a828-f02811dee987.selectorLabels" . | nindent 6 }}
