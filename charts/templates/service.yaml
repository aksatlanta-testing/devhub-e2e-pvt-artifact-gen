apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echode94b258-1c48-478d-b644-a77b3bb1d40e.fullname" . }}
  labels:
    {{- include "go-echode94b258-1c48-478d-b644-a77b3bb1d40e.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echode94b258-1c48-478d-b644-a77b3bb1d40e.selectorLabels" . | nindent 6 }}
