apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo2e798448-51b9-45e1-9d9f-0f55402e8e01.fullname" . }}
  labels:
    {{- include "go-echo2e798448-51b9-45e1-9d9f-0f55402e8e01.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo2e798448-51b9-45e1-9d9f-0f55402e8e01.selectorLabels" . | nindent 6 }}
