apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo0e793588-f3e1-48d5-a959-85f6a60a2ef0.fullname" . }}
  labels:
    {{- include "go-echo0e793588-f3e1-48d5-a959-85f6a60a2ef0.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo0e793588-f3e1-48d5-a959-85f6a60a2ef0.selectorLabels" . | nindent 6 }}
