apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo8a1c50b5-bc3e-47aa-bf07-1031c703785a.fullname" . }}
  labels:
    {{- include "go-echo8a1c50b5-bc3e-47aa-bf07-1031c703785a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo8a1c50b5-bc3e-47aa-bf07-1031c703785a.selectorLabels" . | nindent 6 }}
