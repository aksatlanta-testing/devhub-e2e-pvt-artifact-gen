apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo55ddeb6a-3537-422d-a8de-60725380e0c4.fullname" . }}
  labels:
    {{- include "go-echo55ddeb6a-3537-422d-a8de-60725380e0c4.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo55ddeb6a-3537-422d-a8de-60725380e0c4.selectorLabels" . | nindent 6 }}
