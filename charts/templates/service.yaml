apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echodc4ecbe4-e996-4e4b-a46c-0ac96ca13910.fullname" . }}
  labels:
    {{- include "go-echodc4ecbe4-e996-4e4b-a46c-0ac96ca13910.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echodc4ecbe4-e996-4e4b-a46c-0ac96ca13910.selectorLabels" . | nindent 6 }}
