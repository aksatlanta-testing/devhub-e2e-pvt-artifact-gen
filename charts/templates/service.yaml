apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob852b487-1fff-457a-8cb6-a6ce9c401684.fullname" . }}
  labels:
    {{- include "go-echob852b487-1fff-457a-8cb6-a6ce9c401684.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob852b487-1fff-457a-8cb6-a6ce9c401684.selectorLabels" . | nindent 6 }}
