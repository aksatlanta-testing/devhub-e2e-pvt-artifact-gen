apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echo67560a5e-86ec-4d84-ac38-2140bf1359db.fullname" . }}
  labels:
    {{- include "go-echo67560a5e-86ec-4d84-ac38-2140bf1359db.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echo67560a5e-86ec-4d84-ac38-2140bf1359db.selectorLabels" . | nindent 6 }}
