apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echof727e950-871c-40b5-9aa2-14f226109e40.fullname" . }}
  labels:
    {{- include "go-echof727e950-871c-40b5-9aa2-14f226109e40.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echof727e950-871c-40b5-9aa2-14f226109e40.selectorLabels" . | nindent 6 }}
