apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echob60bd497-15fe-4d80-a430-6aa9a10f3dca.fullname" . }}
  labels:
    {{- include "go-echob60bd497-15fe-4d80-a430-6aa9a10f3dca.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echob60bd497-15fe-4d80-a430-6aa9a10f3dca.selectorLabels" . | nindent 6 }}
