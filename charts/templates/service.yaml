apiVersion: v1
kind: Service
metadata:
  name: {{ include "go-echoe632c501-0113-4921-bea6-da15d6ba1e6a.fullname" . }}
  labels:
    {{- include "go-echoe632c501-0113-4921-bea6-da15d6ba1e6a.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.service.annotations | nindent 4 }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: svchttp
  selector:
    {{- include "go-echoe632c501-0113-4921-bea6-da15d6ba1e6a.selectorLabels" . | nindent 6 }}
