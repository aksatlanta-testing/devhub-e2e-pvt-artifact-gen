apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echobafdccaa-6b85-44fc-a14d-418653dacbd0.fullname" . }}-config
  labels:
    {{- include "go-echobafdccaa-6b85-44fc-a14d-418653dacbd0.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
