  labels:
    {{- include "go-echofb98b8f8-3951-46ae-aa3e-8ec7ff6937c2.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
