apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echoc080f2c9-ea8d-4c7d-9e26-0973b23f5fd2.fullname" . }}-config
  labels:
    {{- include "go-echoc080f2c9-ea8d-4c7d-9e26-0973b23f5fd2.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
