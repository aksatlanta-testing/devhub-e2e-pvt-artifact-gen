  labels:
    {{- include "go-echocb97bbfd-b0f5-4cf0-a3d5-86bbfca31b81.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
