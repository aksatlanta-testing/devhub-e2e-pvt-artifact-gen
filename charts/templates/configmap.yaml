apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echofcd1aaef-bdea-466a-9c02-713cb8b2ae23.fullname" . }}-config
  labels:
    {{- include "go-echofcd1aaef-bdea-466a-9c02-713cb8b2ae23.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
