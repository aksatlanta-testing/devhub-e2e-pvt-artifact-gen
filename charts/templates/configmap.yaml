apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echoc93d1ffc-14eb-498b-bd54-d4043ac94283.fullname" . }}-config
  labels:
    {{- include "go-echoc93d1ffc-14eb-498b-bd54-d4043ac94283.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
