apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echobcd19c6c-c8e6-4ae9-ba4b-777f08ecb4d3.fullname" . }}-config
  labels:
    {{- include "go-echobcd19c6c-c8e6-4ae9-ba4b-777f08ecb4d3.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
