apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echoce53e8cf-9ed1-4e8b-ade4-97fc4fd69ea1.fullname" . }}-config
  labels:
    {{- include "go-echoce53e8cf-9ed1-4e8b-ade4-97fc4fd69ea1.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
