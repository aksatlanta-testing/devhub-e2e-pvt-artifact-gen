apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echob4812ee5-ca95-411f-adf9-bf2389a1190b.fullname" . }}-config
  labels:
    {{- include "go-echob4812ee5-ca95-411f-adf9-bf2389a1190b.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
