apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echocd6dc3aa-5de1-4941-9afa-761d2563e851.fullname" . }}-config
  labels:
    {{- include "go-echocd6dc3aa-5de1-4941-9afa-761d2563e851.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
