apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-echobff8e82a-cecc-449e-a8bc-2a3f6ad14b4d.fullname" . }}-config
  labels:
    {{- include "go-echobff8e82a-cecc-449e-a8bc-2a3f6ad14b4d.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace }}
data:
{{- range $key, $value := .Values.envVars }}
  {{ $key }}: {{ $value }}
{{- end }}
